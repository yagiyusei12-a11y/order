<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ゲーム・占い — __STORE_NAME_HTML__</title>
  <style>
    :root { --bg:#0f1419; --card:#161c24; --text:#e8eef4; --muted:#8b9aab; --accent:#c9a227; --line:#2a3340; --ok:#6ee7a0; --bad:#ffb4b4; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:1rem 1rem calc(1rem + env(safe-area-inset-bottom)); }
    .wrap { max-width:28rem; margin:0 auto; }
    h1 { font-size:1.25rem; margin:0 0 0.25rem; }
    .sub { color:var(--muted); font-size:0.85rem; margin:0 0 1rem; line-height:1.5; }
    .banner { background:#1e2735; border:1px solid var(--line); border-radius:10px; padding:0.75rem 0.85rem; margin-bottom:1rem; font-size:0.82rem; line-height:1.5; }
    .banner.ok { border-color:#3d6b4a; background:#152019; color:var(--ok); }
    .banner.warn { border-color:#6b5a3d; background:#1a1812; color:#f0d090; }
    .grid { display:flex; flex-direction:column; gap:0.65rem; }
    .card {
      display:flex; gap:0.75rem; align-items:flex-start; background:var(--card); border:1px solid var(--line);
      border-radius:12px; padding:0.85rem 0.9rem; cursor:pointer; text-align:left; color:inherit;
      width:100%; font:inherit;
    }
    .card:active { opacity:0.85; }
    .emoji { font-size:1.75rem; line-height:1; flex-shrink:0; }
    .card-body { flex:1; min-width:0; }
    .card-title { font-weight:800; font-size:1rem; margin:0 0 0.2rem; }
    .card-desc { margin:0; font-size:0.78rem; color:var(--muted); line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .badge { display:inline-block; font-size:0.68rem; font-weight:800; padding:0.15rem 0.45rem; border-radius:999px; margin-left:0.35rem; vertical-align:middle; }
    .badge.paid { background:#3d2f14; color:#f0c060; }
    .badge.fortune { background:#2a2040; color:#c4b5fd; }
    .badge.tool { background:#1a2a24; color:#6ee7a0; }
    .badge.reward { background:#2a3318; color:#b8e986; margin-left:0; margin-top:0.25rem; }
    .meta { font-size:0.72rem; color:var(--muted); margin-top:0.35rem; }
    .section-title {
      font-size:0.78rem; font-weight:800; color:var(--muted); margin:0.85rem 0 0.35rem; letter-spacing:0.04em;
    }
    .section-title:first-child { margin-top:0; }
    #loading { text-align:center; color:var(--muted); padding:2rem 0; }
    #err { color:var(--bad); font-size:0.85rem; margin-top:0.75rem; display:none; }
    .link-btn { display:inline-block; margin-top:0.5rem; color:var(--accent); font-weight:700; font-size:0.82rem; background:none; border:none; cursor:pointer; padding:0; font-family:inherit; }
    .scan-btn {
      display:inline-block; margin-top:0.55rem; padding:0.45rem 0.85rem; border:none; border-radius:999px;
      background:var(--accent); color:#1a1408; font-weight:800; font-size:0.82rem; cursor:pointer; font-family:inherit;
    }
    .detail[hidden] { display:none !important; }
    .detail { position:fixed; inset:0; z-index:100; display:flex; align-items:flex-end; justify-content:center; }
    .detail__backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.55); }
    .detail__sheet {
      position:relative; width:min(28rem,100%); max-height:88vh; overflow:auto;
      background:var(--card); border:1px solid var(--line); border-radius:16px 16px 0 0;
      padding:1rem 1rem calc(1rem + env(safe-area-inset-bottom));
    }
    .detail__head { display:flex; gap:0.75rem; align-items:flex-start; margin-bottom:0.75rem; }
    .detail__emoji { font-size:2.25rem; line-height:1; }
    .detail__title { font-size:1.15rem; font-weight:900; margin:0 0 0.25rem; }
    .detail__desc { font-size:0.88rem; color:var(--muted); line-height:1.55; margin:0 0 0.75rem; white-space:pre-wrap; }
    .detail__price { font-size:0.82rem; margin:0 0 0.75rem; line-height:1.5; }
    .detail__rewards-title { font-size:0.78rem; font-weight:800; color:#b8e986; margin:0 0 0.45rem; }
    .detail__rewards { display:flex; flex-direction:column; gap:0.45rem; margin:0 0 1rem; }
    .detail__reward {
      display:flex; gap:0.55rem; align-items:center; padding:0.45rem 0.55rem;
      border:1px solid var(--line); border-radius:10px; background:#1a222c;
    }
    .detail__reward img { width:2.75rem; height:2.75rem; object-fit:cover; border-radius:8px; flex-shrink:0; }
    .detail__reward span { font-size:0.88rem; font-weight:700; }
    .detail__play {
      width:100%; padding:0.8rem; border:none; border-radius:10px; background:var(--accent);
      color:#1a1408; font-weight:900; font-size:0.95rem; cursor:pointer;
    }
    .detail__close {
      position:absolute; top:0.65rem; right:0.65rem; width:2rem; height:2rem; border:none;
      border-radius:999px; background:#2a3340; color:var(--text); font-size:1.1rem; cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>__STORE_NAME_HTML__</h1>
    <p class="sub">店内ゲーム・占いコーナー</p>
    <div id="sessionBanner" class="banner warn" style="display:none"></div>
    <p id="loading">読み込み中…</p>
    <div id="grid" class="grid" style="display:none"></div>
    <p id="err" role="alert"></p>
  </div>
  <div id="gameDetail" class="detail" hidden aria-hidden="true">
    <div class="detail__backdrop" id="detailBackdrop"></div>
    <div class="detail__sheet" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
      <button type="button" class="detail__close" id="detailClose" aria-label="閉じる">×</button>
      <div id="detailContent"></div>
    </div>
  </div>
  <script>
    const STORE_ID = __STORE_ID_JS__;
    const HUB_KEY = __HUB_KEY_JS__;
    const TOKEN_KEY = "gamesHubGuestToken_v1:" + STORE_ID;

    let gamesBySlug = new Map();

    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function getToken() {
      try {
        const q = new URLSearchParams(location.search).get("token");
        if (q && q.trim()) {
          localStorage.setItem(TOKEN_KEY, q.trim());
          return q.trim();
        }
        return localStorage.getItem(TOKEN_KEY) || "";
      } catch (_) { return ""; }
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = () => resolve();
        s.onerror = () => reject(new Error("module load failed"));
        document.head.appendChild(s);
      });
    }

    async function openQrScanner() {
      await loadScript("/games-modules/qr-link.js");
      const qr = window.__gamesQrLink;
      if (!qr) throw new Error("QR連携の読み込みに失敗しました");
      const text = await qr.openScanner({ cancelLabel: "閉じる" });
      await qr.linkFromScan(text, STORE_ID, HUB_KEY);
      await refreshSessionBanner();
    }

    function bindScanButton(id) {
      const btn = document.getElementById(id);
      if (!btn) return;
      btn.addEventListener("click", () => {
        btn.disabled = true;
        openQrScanner()
          .catch((e) => {
            if (!(e instanceof Error) || e.message.indexOf("キャンセル") < 0) {
              const errEl = document.getElementById("err");
              errEl.style.display = "block";
              errEl.textContent = e instanceof Error ? e.message : "QRの読み取りに失敗しました";
            }
          })
          .finally(() => { btn.disabled = false; });
      });
    }

    function playUrl(slug) {
      const t = getToken();
      let u = "/games/" + encodeURIComponent(STORE_ID) + "/play/" + encodeURIComponent(slug) + "?key=" + encodeURIComponent(HUB_KEY);
      if (t) u += "&token=" + encodeURIComponent(t);
      return u;
    }

    async function api(path) {
      const r = await fetch(path, { credentials: "same-origin" });
      const j = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(j.error || j.message || "error");
      return j;
    }

    function rewardItems(g) {
      if (g.kind === "tool") return [];
      if (Array.isArray(g.rewardMenuItems) && g.rewardMenuItems.length) return g.rewardMenuItems;
      if (g.rewardMenuItem) return [g.rewardMenuItem];
      return [];
    }

    function defaultHubCategory(g) {
      if (g.kind === "tool") return "tool";
      if (g.kind === "paid") return "game";
      const pro = new Set(["omikuji","ai-serious-tarot","ai-four-pillars","ai-astrology","ai-palm-reading"]);
      if (pro.has(g.slug)) return "fortune_pro";
      return "fortune";
    }

    function hubCat(g, categoryIds) {
      if (g.hubCategory && categoryIds.has(g.hubCategory)) return g.hubCategory;
      return defaultHubCategory(g);
    }

    function priceBadge(g) {
      const kind = g.kind === "tool" ? "tool" : g.kind === "fortune" ? "fortune" : "paid";
      const ex = g.playPriceYen != null ? g.playPriceYen : 80;
      if (kind === "tool") return '<span class="badge tool">無料</span>';
      if (kind === "fortune") return '<span class="badge fortune">' + esc(String(ex)) + "円（税抜）</span>";
      return '<span class="badge paid">' + esc(String(ex)) + '円（税抜）</span>';
    }

    function rewardTeaser(g) {
      const items = rewardItems(g);
      if (!items.length) return "";
      if (items.length === 1) {
        return '<div class="meta"><span class="badge reward">🎁 景品: ' + esc(items[0].name) + "</span></div>";
      }
      return '<div class="meta"><span class="badge reward">🎁 景品 ' + items.length + "種 · 成功後に選択</span></div>";
    }

    function renderCard(g) {
      const kind = g.kind === "tool" ? "tool" : g.kind === "fortune" ? "fortune" : "paid";
      const inc = g.playPriceYenInclusive != null ? g.playPriceYenInclusive : g.playPriceYen;
      const priceNote =
        kind === "tool"
          ? '<div class="meta">タップで詳細 · 会計追加なし</div>'
          : '<div class="meta">税込 ' + esc(String(inc)) + '円 · タップで詳細</div>';
      return (
        '<button type="button" class="card" data-slug="' + esc(g.slug) + '">' +
        '<span class="emoji">' + esc(g.iconEmoji || (kind === "tool" ? "🛠️" : kind === "fortune" ? "🔮" : "🎮")) + '</span>' +
        '<div class="card-body">' +
        '<p class="card-title">' + esc(g.title) + priceBadge(g) + '</p>' +
        (g.description ? '<p class="card-desc">' + esc(g.description) + '</p>' : "") +
        rewardTeaser(g) +
        priceNote +
        '</div></button>'
      );
    }

    function openDetail(slug) {
      const g = gamesBySlug.get(slug);
      if (!g) return;
      const kind = g.kind === "tool" ? "tool" : g.kind === "fortune" ? "fortune" : "paid";
      const ex = g.playPriceYen != null ? g.playPriceYen : 80;
      const inc = g.playPriceYenInclusive != null ? g.playPriceYenInclusive : ex;
      const items = rewardItems(g);
      let rewardsHtml = "";
      if (items.length) {
        rewardsHtml = '<p class="detail__rewards-title">🎁 成功時の景品</p><div class="detail__rewards">';
        for (const it of items) {
          const img = it.imageUrl
            ? '<img src="' + esc(it.imageUrl) + '" alt="" loading="lazy" />'
            : '<span style="width:2.75rem;text-align:center;font-size:1.5rem;flex-shrink:0">🎁</span>';
          rewardsHtml += '<div class="detail__reward">' + img + "<span>" + esc(it.name) + "</span></div>";
        }
        rewardsHtml += "</div>";
        if (items.length > 1) {
          rewardsHtml += '<p class="meta" style="margin:-0.5rem 0 1rem">成功後、お好きな景品を1つ選べます。</p>';
        }
      }
      const priceHtml =
        kind === "tool"
          ? "<strong>無料</strong>（卓の会計には載りません）"
          : "参加費 <strong>" + esc(String(ex)) + "円（税抜）</strong> / 税込 " + esc(String(inc)) + "円<br>卓の会計に追加されます";
      document.getElementById("detailContent").innerHTML =
        '<div class="detail__head">' +
        '<span class="detail__emoji">' + esc(g.iconEmoji || "🎮") + "</span>" +
        "<div><h2 class=\"detail__title\" id=\"detailTitle\">" + esc(g.title) + "</h2>" + priceBadge(g) + "</div></div>" +
        (g.description ? '<p class="detail__desc">' + esc(g.description) + "</p>" : "") +
        '<p class="detail__price">' + priceHtml + "</p>" +
        rewardsHtml +
        '<button type="button" class="detail__play" id="detailPlay">プレイする</button>';
      const modal = document.getElementById("gameDetail");
      modal.hidden = false;
      modal.setAttribute("aria-hidden", "false");
      document.getElementById("detailPlay").onclick = async () => {
        if (!getToken()) {
          try {
            await openQrScanner();
          } catch (e) {
            if (e instanceof Error && e.message.indexOf("キャンセル") >= 0) return;
            const errEl = document.getElementById("err");
            errEl.style.display = "block";
            errEl.textContent = e instanceof Error ? e.message : "QRの読み取りに失敗しました";
            return;
          }
        }
        location.href = playUrl(g.slug);
      };
    }

    function closeDetail() {
      const modal = document.getElementById("gameDetail");
      modal.hidden = true;
      modal.setAttribute("aria-hidden", "true");
    }

    async function refreshSessionBanner() {
      const el = document.getElementById("sessionBanner");
      const token = getToken();
      if (!token) {
        el.style.display = "block";
        el.className = "banner warn";
        el.innerHTML =
          "ゲーム・占いをプレイするには、<strong>お席のモバイルオーダー用QR</strong>を読み取ってください。" +
          '<br><span class="meta">参加費は卓の会計に追加されます（税抜設定・税込請求）。</span>' +
          '<br><button type="button" class="scan-btn" id="btnScanQr">QRを読み取る</button>';
        bindScanButton("btnScanQr");
        return;
      }
      try {
        const s = await api(
          "/games/api/" + encodeURIComponent(STORE_ID) + "/session?key=" + encodeURIComponent(HUB_KEY) +
          "&token=" + encodeURIComponent(token),
        );
        let bannerText = "卓「" + (s.tableName || "—") + "」の会計に紐付け済み";
        try {
          const bs = await api(
            "/games/api/" + encodeURIComponent(STORE_ID) + "/bill-summary?key=" + encodeURIComponent(HUB_KEY) +
            "&token=" + encodeURIComponent(token),
          );
          if (bs.totalAvailable && bs.totalYen != null) {
            bannerText += " · 見込み " + Number(bs.totalYen).toLocaleString("ja-JP") + "円（税込）";
          }
        } catch (_) {}
        el.style.display = "block";
        el.className = "banner ok";
        el.textContent = bannerText;
      } catch (_) {
        el.style.display = "block";
        el.className = "banner warn";
        el.innerHTML =
          "卓との連携が切れています。お席のQRを再度読み取ってください。" +
          '<br><button type="button" class="scan-btn" id="btnRescanQr">QRを読み取る</button>' +
          '<br><button type="button" class="link-btn" id="clearToken">連携を解除</button>';
        bindScanButton("btnRescanQr");
        document.getElementById("clearToken")?.addEventListener("click", () => {
          try { localStorage.removeItem(TOKEN_KEY); } catch (_) {}
          location.reload();
        });
      }
    }

    async function main() {
      const errEl = document.getElementById("err");
      document.getElementById("detailClose").addEventListener("click", closeDetail);
      document.getElementById("detailBackdrop").addEventListener("click", closeDetail);
      try {
        await refreshSessionBanner();
        const meta = await api("/games/api/" + encodeURIComponent(STORE_ID) + "/meta?key=" + encodeURIComponent(HUB_KEY));
        const games = Array.isArray(meta.games) ? meta.games : [];
        gamesBySlug = new Map(games.map((g) => [g.slug, g]));
        document.getElementById("loading").style.display = "none";
        const grid = document.getElementById("grid");
        grid.style.display = "flex";
        if (games.length === 0) {
          grid.innerHTML = '<p class="sub">現在公開中のゲームはありません。</p>';
          return;
        }
        const categories =
          meta.hubCategories && Array.isArray(meta.hubCategories.categories) && meta.hubCategories.categories.length
            ? meta.hubCategories.categories
            : [
                { id: "game", label: "有料ゲーム" },
                { id: "fortune", label: "占い・エンタメ" },
                { id: "fortune_pro", label: "本格占い・鑑定" },
                { id: "tool", label: "無料ツール" },
              ];
        const categoryIds = new Set(categories.map((c) => c.id));
        let html = "";
        for (const cat of categories) {
          const items = games.filter((g) => hubCat(g, categoryIds) === cat.id);
          if (!items.length) continue;
          html += '<h2 class="section-title">' + esc(cat.label) + "</h2>";
          html += items.map(renderCard).join("");
        }
        grid.innerHTML = html;
        grid.querySelectorAll(".card[data-slug]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const slug = btn.getAttribute("data-slug");
            if (slug) openDetail(slug);
          });
        });
      } catch (e) {
        document.getElementById("loading").style.display = "none";
        errEl.style.display = "block";
        errEl.textContent = e instanceof Error ? e.message : "読み込みに失敗しました";
      }
    }
    void main();
  </script>
</body>
</html>
