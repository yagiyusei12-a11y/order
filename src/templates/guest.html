<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ご注文</title>
  <style>
    :root { --bg: #0c0f12; --surface: #161c24; --line: #2a3340; --text: #eef2f7; --muted: #8b98a8; --accent: #e8b84a; --ok: #3ecf8e; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 6.5rem; }
    header { padding: 0.85rem 1rem; background: var(--surface); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 5; }
    header h1 { font-size: 1.05rem; margin: 0 0 0.2rem; font-weight: 700; }
    header .sub { font-size: 0.8rem; color: var(--muted); }
    .cat { padding: 0.6rem 1rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); background: var(--bg); }
    .item {
      display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;
      padding: 0.85rem 1rem; border-bottom: 1px solid var(--line); background: var(--surface);
    }
    .item .left { display: flex; gap: 0.7rem; align-items: center; min-width: 0; }
    .item .thumb {
      width: 56px; height: 56px; object-fit: cover; border-radius: 8px; border: 1px solid var(--line);
      background: #0f141c; flex-shrink: 0;
    }
    .item .text { min-width: 0; }
    .item .name { font-weight: 600; font-size: 0.95rem; }
    .item .meta { font-size: 0.8rem; color: var(--muted); margin-top: 0.15rem; }
    .item .badges { margin-top: 0.2rem; display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center; }
    .item .badge-low { font-size: 0.68rem; font-weight: 700; color: #92400e; background: #fef3c7; padding: 0.12rem 0.4rem; border-radius: 4px; }
    .item .badge-sold { font-size: 0.68rem; font-weight: 700; color: #fecaca; background: #450a0a; padding: 0.12rem 0.4rem; border-radius: 4px; }
    .item .price { font-variant-numeric: tabular-nums; color: var(--accent); font-weight: 600; }
    .item .price .incl { display:block; font-size:0.72rem; color:var(--muted); font-weight:500; margin-top:0.1rem; }
    .item button {
      flex-shrink: 0; min-width: 2.75rem; height: 2.75rem; border-radius: 8px; border: 1px solid var(--line);
      background: #222a35; color: var(--text); font-size: 1.1rem; font-weight: 700; cursor: pointer;
    }
    .item button:active { transform: scale(0.96); }
    .item button:disabled { opacity: 0.4; cursor: not-allowed; }
    .toast { position: fixed; bottom: 5.5rem; left: 50%; transform: translateX(-50%); background: #2a3340; padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 20; }
    .toast.show { opacity: 1; }
    footer.cart {
      position: fixed; bottom: 0; left: 0; right: 0; padding: 0.75rem 1rem calc(0.75rem + env(safe-area-inset-bottom));
      background: #121820; border-top: 1px solid var(--line); display: flex; gap: 0.6rem; align-items: stretch; z-index: 10;
    }
    footer.cart .info { flex: 1; min-width: 0; }
    footer.cart .count { font-size: 0.75rem; color: var(--muted); }
    footer.cart .sum { font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    footer.cart button.submit {
      flex-shrink: 0; padding: 0 1.1rem; border: none; border-radius: 10px; background: var(--accent); color: #1a1408;
      font-weight: 800; font-size: 0.95rem; cursor: pointer;
    }
    footer.cart button.submit:disabled { opacity: 0.45; cursor: not-allowed; }
    #err { margin: 1rem; padding: 0.75rem; background: #3a2020; border-radius: 8px; color: #ffb4b4; font-size: 0.9rem; display: none; }
    #orders { padding: 0 1rem 1rem; }
    #orders h2 { font-size: 0.85rem; color: var(--muted); margin: 1rem 0 0.5rem; }
    .order-card { background: var(--surface); border-radius: 10px; padding: 0.65rem 0.85rem; margin-bottom: 0.5rem; border: 1px solid var(--line); font-size: 0.85rem; }
    .badge-alcohol { font-size: 0.68rem; font-weight: 700; color: #7c2d12; background: #ffedd5; padding: 0.12rem 0.4rem; border-radius: 4px; }
    .agegate {
      position: fixed; inset: 0; z-index: 40; background: rgba(0, 0, 0, 0.65);
      display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .agegate-card {
      width: 100%; max-width: 30rem; background: #101722; border: 1px solid #314156;
      border-radius: 12px; padding: 1rem;
    }
    .agegate-card h2 { margin: 0 0 0.45rem; font-size: 1rem; }
    .agegate-card p { margin: 0 0 0.8rem; color: var(--muted); font-size: 0.82rem; line-height: 1.45; }
    .age-q { margin-bottom: 0.75rem; }
    .age-q strong { display: block; font-size: 0.85rem; margin-bottom: 0.35rem; }
    .age-q .row { display: flex; gap: 0.4rem; }
    .age-q button {
      border: 1px solid var(--line); background: #1e293b; color: var(--text);
      border-radius: 8px; padding: 0.45rem 0.7rem; cursor: pointer; font-size: 0.82rem;
    }
    .age-q button.on { border-color: var(--accent); color: var(--accent); background: #2b3442; }
    .agegate-card .primary {
      width: 100%; border: none; border-radius: 9px; padding: 0.65rem;
      font-weight: 800; background: var(--accent); color: #1a1408; cursor: pointer;
    }
    .agegate-card .primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .safety-note {
      margin: 0.5rem 1rem 0.2rem; padding: 0.5rem 0.65rem; border-radius: 8px;
      border: 1px solid #7f1d1d; background: #3f1616; color: #fecaca; font-size: 0.78rem;
    }
    .badge-set { font-size: 0.68rem; font-weight: 700; color: #1e3a5f; background: #bfdbfe; padding: 0.12rem 0.4rem; border-radius: 4px; }
    .set-sheet {
      position: fixed; inset: 0; z-index: 30; background: rgba(0,0,0,0.55);
      display: flex; align-items: flex-end; justify-content: center; padding: 0;
    }
    .set-sheet .panel {
      width: 100%; max-width: 28rem; max-height: 88vh; overflow: auto;
      background: #121820; border: 1px solid var(--line); border-radius: 14px 14px 0 0;
      padding: 0.85rem 1rem calc(0.85rem + env(safe-area-inset-bottom));
    }
    .set-sheet h3 { margin: 0 0 0.5rem; font-size: 1rem; }
    .set-step { margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--line); }
    .set-step .sl { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.35rem; }
    .set-step .pick { display: flex; flex-direction: column; gap: 0.35rem; }
    .set-step label.row {
      display: flex; align-items: center; gap: 0.45rem; font-size: 0.85rem; cursor: pointer;
      padding: 0.35rem 0.4rem; border-radius: 8px; background: #1a222c;
    }
    .set-step .extra { font-size: 0.72rem; color: var(--accent); margin-left: auto; }
    .set-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .set-actions button { flex: 1; padding: 0.6rem; border-radius: 10px; border: 1px solid var(--line); font-weight: 700; cursor: pointer; }
    .set-actions .cancel { background: #1e293b; color: var(--text); }
    .set-actions .ok { background: var(--accent); color: #1a1408; border: none; }
  </style>
</head>
<body>
  <header>
    <h1>ご注文</h1>
    <div class="sub" id="hdr">読み込み中…</div>
  </header>
  <div id="err"></div>
  <div id="safetyNote" class="safety-note" style="display:none"></div>
  <div id="menu"></div>
  <div id="orders"></div>

  <footer class="cart">
    <div class="info">
      <div class="count" id="cartCount">カート 0点</div>
      <div class="sum" id="cartSum">¥0</div>
    </div>
    <button class="submit" id="submit" disabled type="button">注文する</button>
  </footer>
  <div class="toast" id="toast"></div>
  <div id="setSheet" class="set-sheet" style="display:none" aria-hidden="true"></div>
  <div id="optionSheet" class="set-sheet" style="display:none" aria-hidden="true"></div>
  <div class="agegate" id="ageGate" style="display:none">
    <div class="agegate-card">
      <h2>ご注文前の確認</h2>
      <p>飲酒運転防止・未成年者飲酒防止のため、酒類注文前に確認が必要です。</p>
      <div class="age-q" id="qDrive">
        <strong>本日、車・バイク・自転車を運転する予定はありますか？</strong>
        <div class="row">
          <button type="button" data-v="yes">はい（予定あり）</button>
          <button type="button" data-v="no">いいえ（予定なし）</button>
        </div>
      </div>
      <div class="age-q" id="qAge">
        <strong>20歳以上ですか？</strong>
        <div class="row">
          <button type="button" data-v="yes">はい（20歳以上）</button>
          <button type="button" data-v="no">いいえ（20歳未満）</button>
        </div>
      </div>
      <button type="button" class="primary" id="ageGateOk" disabled>確認して進む</button>
    </div>
  </div>

  <script>
    const TOKEN = __TOKEN_JS__;
    const api = (path, opt) => fetch(path, opt).then(async (r) => {
      const j = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(j.error || r.statusText || String(r.status));
      return j;
    });

    /**
     * @typedef {{ cartKey: string, menuItemId: string, name: string, unitPrice: number, qty: number,
     *   sellKind?: string, setSelections?: { stepId: string, menuItemIds: string[] }[],
     *   optionSelections?: { optionGroupId: string, optionItemIds: string[] }[] }} CartLine
     */
    /** @type {Record<string, CartLine>} */
    const cart = {};
    let guestShowMenuPrices = true;
    let menuPriceTaxMode = "inclusive";
    let taxRatePercent = 10;
    let alcoholRestricted = false;
    const alcoholById = new Map();

    function fmtMoney(n) {
      if (!guestShowMenuPrices) return "—";
      return "¥" + n.toLocaleString("ja-JP");
    }
    function fmtItemPrice(item) {
      if (!guestShowMenuPrices) return "—";
      const mode = item.priceTaxMode === "exclusive" ? "exclusive" : menuPriceTaxMode;
      if (mode === "exclusive") {
        const base = Number(item.basePrice || item.price || 0);
        const incl = Number(item.taxIncludedPrice || item.price || 0);
        return "¥" + base.toLocaleString("ja-JP") + "<span class=\"incl\">(税込 ¥" + incl.toLocaleString("ja-JP") + ")</span>";
      }
      return "¥" + Number(item.price || 0).toLocaleString("ja-JP");
    }

    function isAlcoholItem(item, categoryName) {
      const text = ((item.name || "") + " " + (item.description || "") + " " + (categoryName || "")).toLowerCase();
      return /ビール|ワイン|焼酎|日本酒|ウイスキー|ハイボール|サワー|酎ハイ|カクテル|梅酒|酒|beer|wine|whisky|whiskey|cocktail|alcohol/.test(text);
    }

    function cartSumLabel(n) {
      if (!guestShowMenuPrices) return "（お会計時にご案内）";
      return "¥" + n.toLocaleString("ja-JP");
    }

    function renderCart() {
      const lines = Object.values(cart).filter((x) => x.qty > 0);
      const count = lines.reduce((s, x) => s + x.qty, 0);
      const sum = lines.reduce((s, x) => s + x.unitPrice * x.qty, 0);
      document.getElementById("cartCount").textContent = "カート " + count + "点";
      document.getElementById("cartSum").textContent = cartSumLabel(sum);
      document.getElementById("submit").disabled = count === 0;
    }

    function toast(t) {
      const el = document.getElementById("toast");
      el.textContent = t;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 1600);
    }

    function stableSetKey(sel) {
      if (!sel || !sel.length) return "";
      return sel
        .map((s) => String(s.stepId) + ":" + [...(s.menuItemIds || [])].sort().join(","))
        .sort()
        .join("|");
    }

    function choiceExtraInclusive(ch) {
      const ex = Number(ch.extraPrice || 0);
      if (ch.extraTaxIncluded != null && Number.isFinite(Number(ch.extraTaxIncluded))) {
        return Number(ch.extraTaxIncluded);
      }
      return Math.round(ex * (1 + taxRatePercent / 100));
    }

    function computeSetUnitPrice(item, setSelections) {
      let extras = 0;
      for (const st of item.setSteps || []) {
        const sel = setSelections.find((x) => x.stepId === st.id);
        if (!sel) return null;
        for (const mid of sel.menuItemIds || []) {
          const ch = (st.choices || []).find((c) => c.menuItemId === mid);
          if (!ch) return null;
          extras += choiceExtraInclusive(ch);
        }
      }
      return Number(item.price || 0) + extras;
    }

    function stableOptionKey(sel) {
      if (!sel || !sel.length) return "";
      return sel
        .map((x) => String(x.optionGroupId) + ":" + [...(x.optionItemIds || [])].sort().join(","))
        .sort()
        .join("|");
    }

    function computeOptionUnitPrice(item, optionSelections) {
      let add = 0;
      for (const g of item.optionGroups || []) {
        const row = optionSelections.find((o) => o.optionGroupId === g.id);
        const ids = (row && row.optionItemIds) || [];
        for (const oid of ids) {
          const oi = (g.items || []).find((x) => x.id === oid);
          if (oi) add += Number(oi.priceDelta || 0);
        }
      }
      return Number(item.price || 0) + add;
    }

    function openOptionSheet(item) {
      const host = document.getElementById("optionSheet");
      if (!host) return;
      let html = "<div class=\"panel\" role=\"dialog\" aria-labelledby=\"optSheetTitle\">";
      html += "<h3 id=\"optSheetTitle\">" + escapeHtml(item.name) + "</h3>";
      html += "<p class=\"meta\" style=\"margin:0 0 0.75rem\">オプションを選んでください。加算は<strong>税込</strong>の目安です（店舗設定に合わせた税表示と合算されます）。</p>";
      for (const g of item.optionGroups || []) {
        html += "<div class=\"set-step\" data-opt-group-id=\"" + escapeHtml(g.id) + "\">";
        html +=
          "<div class=\"sl\"><strong>" +
          escapeHtml(g.name) +
          "</strong> · " +
          g.minSelect +
          "〜" +
          g.maxSelect +
          " 個選ぶ</div><div class=\"pick\">";
        const useRadio = Number(g.maxSelect || 1) <= 1;
        for (const oi of g.items || []) {
          const yen = Number(oi.priceDelta || 0);
          const delta =
            yen > 0 ? "<span class=\"extra\">（+" + yen.toLocaleString("ja-JP") + "円）</span>" : "<span class=\"extra\"></span>";
          if (useRadio) {
            html +=
              "<label class=\"row\"><input type=\"radio\" name=\"og-" +
              escapeHtml(g.id) +
              "\" value=\"" +
              escapeHtml(oi.id) +
              "\" data-min=\"" +
              g.minSelect +
              "\" data-max=\"" +
              g.maxSelect +
              "\" /><span>" +
              escapeHtml(oi.name) +
              "</span>" +
              delta +
              "</label>";
          } else {
            html +=
              "<label class=\"row\"><input type=\"checkbox\" name=\"ogcb-" +
              escapeHtml(g.id) +
              "\" value=\"" +
              escapeHtml(oi.id) +
              "\" data-min=\"" +
              g.minSelect +
              "\" data-max=\"" +
              g.maxSelect +
              "\" /><span>" +
              escapeHtml(oi.name) +
              "</span>" +
              delta +
              "</label>";
          }
        }
        html += "</div></div>";
      }
      html += "<div class=\"set-actions\"><button type=\"button\" class=\"cancel\">閉じる</button><button type=\"button\" class=\"ok\">カートに追加</button></div></div>";
      host.innerHTML = html;
      host.style.display = "flex";
      host.setAttribute("aria-hidden", "false");

      host.querySelectorAll("[data-opt-group-id]").forEach((stepEl) => {
        const gid = stepEl.getAttribute("data-opt-group-id");
        const boxes = [...stepEl.querySelectorAll("input[type=checkbox]")];
        if (boxes.length === 0) return;
        const minP = Number(boxes[0].getAttribute("data-min") || 0);
        const maxP = Number(boxes[0].getAttribute("data-max") || 1);
        boxes.forEach((inp) => {
          inp.addEventListener("change", () => {
            const checked = boxes.filter((b) => b.checked);
            if (checked.length > maxP) {
              inp.checked = false;
              toast("このオプションは最大 " + maxP + " 個までです");
            }
          });
        });
      });

      host.querySelector(".cancel").onclick = () => {
        host.style.display = "none";
        host.innerHTML = "";
      };
      host.querySelector(".ok").onclick = () => {
        /** @type {{ optionGroupId: string, optionItemIds: string[] }[]} */
        const optionSelections = [];
        for (const g of item.optionGroups || []) {
          const stepEl = [...host.querySelectorAll("[data-opt-group-id]")].find(
            (el) => el.getAttribute("data-opt-group-id") === g.id,
          );
          let ids = [];
          if (Number(g.maxSelect || 1) <= 1) {
            const r = stepEl ? stepEl.querySelector("input[type=radio]:checked") : null;
            if (r && r.value) ids = [r.value];
          } else {
            ids = stepEl ? [...stepEl.querySelectorAll("input[type=checkbox]:checked")].map((x) => x.value) : [];
          }
          optionSelections.push({ optionGroupId: g.id, optionItemIds: ids });
        }
        for (const g of item.optionGroups || []) {
          const sel = optionSelections.find((x) => x.optionGroupId === g.id);
          const n = (sel && sel.optionItemIds) ? sel.optionItemIds.length : 0;
          if (n < g.minSelect || n > g.maxSelect) {
            toast(g.name + " は " + g.minSelect + "〜" + g.maxSelect + " 個選んでください");
            return;
          }
        }
        const unitPrice = computeOptionUnitPrice(item, optionSelections);
        const cartKey = "o:" + item.id + ":" + stableOptionKey(optionSelections);
        const cur = cart[cartKey] || {
          cartKey,
          menuItemId: item.id,
          name: item.name,
          unitPrice,
          qty: 0,
          sellKind: "single",
          optionSelections,
        };
        cur.unitPrice = unitPrice;
        cur.optionSelections = optionSelections;
        cur.name = item.name;
        const next = (cur.qty || 0) + 1;
        if (item.stockQty != null && next > item.stockQty) {
          toast("これ以上は在庫がありません");
          return;
        }
        cur.qty = next;
        cart[cartKey] = cur;
        host.style.display = "none";
        host.innerHTML = "";
        renderCart();
        toast(item.name + " を追加");
      };
      host.onclick = (ev) => {
        if (ev.target === host) {
          host.style.display = "none";
          host.innerHTML = "";
        }
      };
    }

    function setStockAllows(item, setSelections, addQty) {
      const need = new Map();
      need.set(item.id, addQty);
      for (const st of item.setSteps || []) {
        const sel = setSelections.find((x) => x.stepId === st.id);
        if (!sel) return false;
        for (const mid of sel.menuItemIds || []) {
          need.set(mid, (need.get(mid) || 0) + addQty);
        }
      }
      for (const [id, q] of need) {
        let max = null;
        if (id === item.id) {
          max = item.stockQty;
        } else {
          for (const st of item.setSteps) {
            for (const ch of st.choices || []) {
              if (ch.menuItemId === id && ch.stockQty != null) max = ch.stockQty;
            }
          }
        }
        if (max != null && max < q) return false;
      }
      for (const [id, q] of need) {
        const existing = Object.values(cart).reduce((s, line) => {
          if (line.menuItemId === id) return s + (line.qty || 0);
          if (line.sellKind === "set" && line.setSelections) {
            let u = 0;
            for (const st of line.setSelections) {
              for (const mid of st.menuItemIds || []) if (mid === id) u += line.qty || 0;
            }
            return s + u;
          }
          return s;
        }, 0);
        let max = null;
        if (id === item.id) max = item.stockQty;
        else {
          for (const st of item.setSteps) {
            for (const ch of st.choices || []) {
              if (ch.menuItemId === id && ch.stockQty != null) max = ch.stockQty;
            }
          }
        }
        if (max != null && existing + q > max) return false;
      }
      return true;
    }

    function openSetSheet(item) {
      const host = document.getElementById("setSheet");
      if (!host) return;
      let html = "<div class=\"panel\" role=\"dialog\" aria-labelledby=\"setSheetTitle\">";
      html += "<h3 id=\"setSheetTitle\">" + escapeHtml(item.name) + "</h3>";
      html += "<p class=\"meta\" style=\"margin:0 0 0.75rem\">項目ごとに選んでください。+表示は<strong>税抜</strong>／カート合計は税込換算後です。</p>";
      for (const st of item.setSteps || []) {
        html += "<div class=\"set-step\" data-step-id=\"" + escapeHtml(st.id) + "\">";
        html += "<div class=\"sl\"><strong>" + escapeHtml(st.label) + "</strong> · " + st.minPick + "〜" + st.maxPick + "品選ぶ</div>";
        html += "<div class=\"pick\">";
        for (const ch of st.choices || []) {
          const sold = ch.soldOut === true || (ch.stockQty != null && ch.stockQty <= 0);
          const ex = Number(ch.extraPrice || 0);
          const incl = choiceExtraInclusive(ch);
          const exLabel =
            ex > 0
              ? "（税抜+" + ex.toLocaleString("ja-JP") + "・税込+" + incl.toLocaleString("ja-JP") + "）"
              : "";
          const soldTag = sold ? "<span class=\"badge-sold\" style=\"margin-left:0.25rem\">売り切れ</span>" : "";
          html +=
            "<label class=\"row\" style=\"" +
            (sold ? "opacity:0.55" : "") +
            "\"><input type=\"checkbox\" name=\"p-" +
            escapeHtml(st.id) +
            "\" value=\"" +
            escapeHtml(ch.menuItemId) +
            "\" data-min=\"" +
            st.minPick +
            "\" data-max=\"" +
            st.maxPick +
            "\"" +
            (sold ? " disabled" : "") +
            " /><span>" +
            escapeHtml(ch.name) +
            soldTag +
            "</span><span class=\"extra\">" +
            escapeHtml(exLabel) +
            "</span></label>";
        }
        html += "</div></div>";
      }
      html += "<div class=\"set-actions\"><button type=\"button\" class=\"cancel\">閉じる</button><button type=\"button\" class=\"ok\">カートに追加</button></div></div>";
      host.innerHTML = html;
      host.style.display = "flex";
      host.setAttribute("aria-hidden", "false");

      function syncChecks(ev) {
        const inp = ev.target;
        if (!inp || inp.type !== "checkbox" || !inp.name || !inp.name.startsWith("p-")) return;
        const stepId = inp.name.slice(2);
        const stepEl = [...host.querySelectorAll("[data-step-id]")].find(
          (el) => el.getAttribute("data-step-id") === stepId,
        );
        if (!stepEl) return;
        const boxes = [...stepEl.querySelectorAll("input[type=checkbox]")];
        const minP = Number(boxes[0]?.getAttribute("data-min") || 0);
        const maxP = Number(boxes[0]?.getAttribute("data-max") || 1);
        const checked = boxes.filter((b) => b.checked);
        if (checked.length > maxP) {
          inp.checked = false;
          toast("この項目は最大 " + maxP + " 品までです");
        }
      }
      host.querySelectorAll("input[type=checkbox]").forEach((b) => b.addEventListener("change", syncChecks));

      host.querySelector(".cancel").onclick = () => {
        host.style.display = "none";
        host.innerHTML = "";
      };
      host.querySelector(".ok").onclick = () => {
        const setSelections = [];
        for (const st of item.setSteps || []) {
          const stepEl = [...host.querySelectorAll("[data-step-id]")].find(
            (el) => el.getAttribute("data-step-id") === st.id,
          );
          const ids = stepEl
            ? [...stepEl.querySelectorAll("input[type=checkbox]:checked")].map((x) => x.value)
            : [];
          setSelections.push({ stepId: st.id, menuItemIds: ids });
        }
        for (const st of item.setSteps || []) {
          const sel = setSelections.find((x) => x.stepId === st.id);
          const n = (sel && sel.menuItemIds) ? sel.menuItemIds.length : 0;
          if (n < st.minPick || n > st.maxPick) {
            toast(st.label + " は " + st.minPick + "〜" + st.maxPick + " 品選んでください");
            return;
          }
        }
        const unitPrice = computeSetUnitPrice(item, setSelections);
        if (unitPrice == null) {
          toast("選択内容を確認してください");
          return;
        }
        if (!setStockAllows(item, setSelections, 1)) {
          toast("在庫が不足しています");
          return;
        }
        const cartKey = "s:" + item.id + ":" + stableSetKey(setSelections);
        const cur = cart[cartKey] || {
          cartKey,
          menuItemId: item.id,
          name: item.name,
          unitPrice,
          qty: 0,
          sellKind: "set",
          setSelections,
        };
        cur.unitPrice = unitPrice;
        cur.setSelections = setSelections;
        cur.name = item.name;
        const next = (cur.qty || 0) + 1;
        if (!setStockAllows(item, setSelections, next)) {
          toast("これ以上は在庫がありません");
          return;
        }
        cur.qty = next;
        cart[cartKey] = cur;
        host.style.display = "none";
        host.innerHTML = "";
        renderCart();
        toast(item.name + " を追加");
      };
      host.onclick = (ev) => {
        if (ev.target === host) {
          host.style.display = "none";
          host.innerHTML = "";
        }
      };
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function addLine(item) {
      if (alcoholRestricted && alcoholById.get(item.id)) {
        toast("酒類はご注文いただけません");
        return;
      }
      if (item.sellKind === "set" && item.setSteps && item.setSteps.length) {
        openSetSheet(item);
        return;
      }
      if (item.optionGroups && item.optionGroups.length) {
        openOptionSheet(item);
        return;
      }
      if (item.stockQty != null && item.stockQty <= 0) {
        toast("売り切れです");
        return;
      }
      const cartKey = item.id;
      const cur = cart[cartKey] || {
        cartKey,
        menuItemId: item.id,
        name: item.name,
        unitPrice: item.price,
        qty: 0,
        sellKind: "single",
      };
      cur.unitPrice = item.price;
      cur.name = item.name;
      const next = (cur.qty || 0) + 1;
      if (item.stockQty != null && next > item.stockQty) {
        toast("これ以上は在庫がありません");
        return;
      }
      cur.qty = next;
      cart[cartKey] = cur;
      renderCart();
      toast(item.name + " を追加");
    }

    function clampCartToStock(categories) {
      const maxById = new Map();
      const setById = new Map();
      for (const c of categories || []) {
        for (const it of c.items || []) {
          if (it.stockQty != null) maxById.set(it.id, it.stockQty);
          if (it.sellKind === "set") setById.set(it.id, it);
        }
      }
      for (const k of Object.keys(cart)) {
        const line = cart[k];
        if (line.sellKind === "set" && line.setSelections) {
          const it = setById.get(line.menuItemId);
          if (it && !setStockAllows(it, line.setSelections, line.qty)) {
            let lo = 0;
            let hi = line.qty;
            while (lo < hi) {
              const mid = Math.ceil((lo + hi) / 2);
              if (setStockAllows(it, line.setSelections, mid)) lo = mid;
              else hi = mid - 1;
            }
            line.qty = lo;
          }
        } else {
          const m = maxById.get(line.menuItemId);
          if (m != null && line.qty > m) line.qty = m;
        }
        if (!line.qty || line.qty <= 0) delete cart[k];
      }
    }

    async function loadMenu() {
      const data = await api("/guest/" + encodeURIComponent(TOKEN) + "/menu");
      guestShowMenuPrices = !(data.store && data.store.showMenuPrices === false);
      menuPriceTaxMode = (data.store && data.store.menuPriceTaxMode) || "inclusive";
      taxRatePercent = Number((data.store && data.store.taxRatePercent) || 10);
      const s = data.session;
      let hdr = "人数 " + (s.guestCount || "—");
      if (s.course) {
        hdr += " · " + s.course.name + "（制限時間 " + s.course.durationMinutes + "分）";
        if (s.course.restrictedToMenuItems) {
          hdr += " · コース対象メニューのみ注文可";
        }
      }
      if (alcoholRestricted) hdr += " · 酒類注文は制限中";
      document.getElementById("hdr").textContent = hdr;
      const sn = document.getElementById("safetyNote");
      if (sn) {
        sn.style.display = alcoholRestricted ? "block" : "none";
        sn.textContent = alcoholRestricted
          ? "安全確認により、酒類の注文を制限しています。スタッフへご相談ください。"
          : "";
      }

      const cats = data.categories || [];
      alcoholById.clear();
      clampCartToStock(cats);
      renderCart();
      const catNameById = new Map(cats.map((c) => [c.id, c.name]));

      const root = document.getElementById("menu");
      root.innerHTML = "";
      for (const c of cats) {
        const d = document.createElement("div");
        d.className = "cat";
        d.textContent = c.parentId && catNameById.has(c.parentId) ? catNameById.get(c.parentId) + " > " + c.name : c.name;
        root.appendChild(d);
        for (const it of c.items || []) {
          const isAlcohol = isAlcoholItem(it, c.name);
          alcoholById.set(it.id, isAlcohol);
          const row = document.createElement("div");
          row.className = "item";
          row.innerHTML =
            "<div class=\"left\"><img class=\"thumb\" alt=\"\"><div class=\"text\"><div class=\"name\"></div><div class=\"meta\"></div><div class=\"badges\"></div></div></div>" +
            "<div class=\"price\"></div><button type=\"button\" aria-label=\"追加\">+</button>";
          const thumb = row.querySelector(".thumb");
          if (it.imageUrl) {
            thumb.src = it.imageUrl;
            thumb.alt = it.name;
          } else {
            thumb.style.display = "none";
          }
          row.querySelector(".name").textContent = it.name;
          row.querySelector(".meta").textContent = it.description || "";
          const sold = it.stockQty != null && it.stockQty <= 0;
          const badges = row.querySelector(".badges");
          if (sold) {
            const b = document.createElement("span");
            b.className = "badge-sold";
            b.textContent = "売り切れ";
            badges.appendChild(b);
          } else if (it.lowStock) {
            const b = document.createElement("span");
            b.className = "badge-low";
            b.textContent = "残りわずか";
            badges.appendChild(b);
          }
          if (it.sellKind === "set") {
            const b = document.createElement("span");
            b.className = "badge-set";
            b.textContent = "セット";
            badges.appendChild(b);
          }
          if (isAlcohol) {
            const b = document.createElement("span");
            b.className = "badge-alcohol";
            b.textContent = "酒類";
            badges.appendChild(b);
          }
          if (isAlcohol && alcoholRestricted) {
            const b = document.createElement("span");
            b.className = "badge-sold";
            b.textContent = "注文不可";
            badges.appendChild(b);
          }
          row.querySelector(".price").innerHTML = fmtItemPrice(it);
          const btn = row.querySelector("button");
          btn.disabled = sold || (isAlcohol && alcoholRestricted);
          btn.onclick = () => addLine(it);
          root.appendChild(row);
        }
      }
    }

    async function loadOrders() {
      const data = await api("/guest/" + encodeURIComponent(TOKEN) + "/orders");
      const box = document.getElementById("orders");
      const list = data.orders || [];
      if (list.length === 0) {
        box.innerHTML = "";
        return;
      }
      let html = "<h2>注文履歴</h2>";
      for (const o of list) {
        const lines = (o.lines || []).map((l) => l.nameSnapshot + " ×" + l.qty + " " + fmtMoney(l.unitPrice * l.qty)).join("<br>");
        html += "<div class=\"order-card\"><strong>" + new Date(o.createdAt).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" }) + "</strong> · " + (o.status || "") + "<br>" + lines + "</div>";
      }
      box.innerHTML = html;
    }

    document.getElementById("submit").onclick = async () => {
      const lines = Object.values(cart)
        .filter((x) => x.qty > 0)
        .map((x) => {
          const o = { menuItemId: x.menuItemId, qty: x.qty };
          if (x.sellKind === "set" && x.setSelections) o.setSelections = x.setSelections;
          if (x.optionSelections && x.optionSelections.length) o.optionSelections = x.optionSelections;
          return o;
        });
      if (lines.length === 0) return;
      if (alcoholRestricted) {
        const alcoholLine = lines.find((l) => alcoholById.get(l.menuItemId));
        if (alcoholLine) {
          toast("酒類が含まれているため送信できません");
          return;
        }
      }
      const btn = document.getElementById("submit");
      btn.disabled = true;
      try {
        await api("/guest/" + encodeURIComponent(TOKEN) + "/orders", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ lines }),
        });
        for (const k of Object.keys(cart)) delete cart[k];
        renderCart();
        toast("注文を送信しました");
        await loadOrders();
        await loadMenu();
      } catch (e) {
        document.getElementById("err").style.display = "block";
        document.getElementById("err").textContent = String(e.message || e);
      } finally {
        btn.disabled = Object.values(cart).reduce((s, x) => s + (x.qty || 0), 0) === 0;
      }
    };

    async function ensureSafetyGate() {
      const key = "guest-safety:" + TOKEN;
      try {
        const raw = sessionStorage.getItem(key);
        if (raw) {
          const parsed = JSON.parse(raw);
          alcoholRestricted = parsed && parsed.allowAlcohol === false;
          return;
        }
      } catch (_) {}
      const gate = document.getElementById("ageGate");
      const qDrive = document.getElementById("qDrive");
      const qAge = document.getElementById("qAge");
      const okBtn = document.getElementById("ageGateOk");
      if (!gate || !qDrive || !qAge || !okBtn) return;
      gate.style.display = "flex";
      let drive = "";
      let age = "";
      function refreshBtn() {
        okBtn.disabled = !(drive && age);
      }
      qDrive.querySelectorAll("button").forEach((b) => {
        b.onclick = () => {
          drive = b.getAttribute("data-v") || "";
          qDrive.querySelectorAll("button").forEach((x) => x.classList.toggle("on", x === b));
          refreshBtn();
        };
      });
      qAge.querySelectorAll("button").forEach((b) => {
        b.onclick = () => {
          age = b.getAttribute("data-v") || "";
          qAge.querySelectorAll("button").forEach((x) => x.classList.toggle("on", x === b));
          refreshBtn();
        };
      });
      await new Promise((resolve) => {
        okBtn.onclick = () => {
          const allowAlcohol = drive === "no" && age === "yes";
          alcoholRestricted = !allowAlcohol;
          try {
            sessionStorage.setItem(key, JSON.stringify({ allowAlcohol, at: Date.now() }));
          } catch (_) {}
          gate.style.display = "none";
          resolve();
        };
      });
    }

    (async () => {
      try {
        await ensureSafetyGate();
        await loadMenu();
        await loadOrders();
      } catch (e) {
        document.getElementById("err").style.display = "block";
        document.getElementById("err").textContent = String(e.message || e);
        document.getElementById("hdr").textContent = "セッションを開けませんでした";
      }
    })();
  </script>
</body>
