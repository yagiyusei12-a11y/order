    async function ensureReorderMenuItemsInCache() {
      const ids = new Set();
      for (const o of ordersCache || []) {
        for (const ln of o.lines || []) {
          const ex = ln.lineExtra && typeof ln.lineExtra === "object" ? ln.lineExtra : null;
          if (ex && ex.kind === SERVE_LATER_LINE_KIND) continue;
          if (ln.menuItemId != null && ln.menuItemId !== "") ids.add(String(ln.menuItemId));
        }
      }
      const missing = [...ids].filter((id) => !menuItemById.has(id));
      if (missing.length === 0) return;
      try {
        const res = await api(
          "/guest/" + encodeURIComponent(TOKEN) + "/reorder-menu-items?ids=" + missing.map(encodeURIComponent).join(",")
        );
        for (const it of res.items || []) {
          if (it && it.id != null && it.id !== "") menuItemById.set(String(it.id), it);
        }
      } catch (_) {}
    }

    function enrichHistorySetSelectionsFromOrder(order, ln, setSelections, lineExtra) {
      if (!order || !lineExtra || !Array.isArray(lineExtra.steps) || lineExtra.steps.length === 0) return setSelections;
      const bid = typeof lineExtra.bundleId === "string" ? lineExtra.bundleId.trim() : "";
      let defSteps = [];
      if (Array.isArray(lineExtra.serveLaterDeferredStepIds)) {
        for (const id of lineExtra.serveLaterDeferredStepIds) {
          if (typeof id === "string" && id.trim()) defSteps.push(id.trim());
        }
      }
      if (
        defSteps.length === 0 &&
        typeof lineExtra.serveLaterDeferredStepId === "string" &&
        lineExtra.serveLaterDeferredStepId.trim()
      ) {
        defSteps = [lineExtra.serveLaterDeferredStepId.trim()];
      }
      if (!bid || defSteps.length === 0) return setSelections;

      const serveLaterChildren = [];
      for (const ol of order.lines || []) {
        if (ol.id === ln.id) continue;
        const ox = ol.lineExtra && typeof ol.lineExtra === "object" ? ol.lineExtra : null;
        if (!ox || ox.kind !== SERVE_LATER_LINE_KIND) continue;
        if (ox.bundleId !== bid) continue;
        const did = typeof ox.deferredStepId === "string" ? ox.deferredStepId.trim() : "";
        if (did && ol.menuItemId) serveLaterChildren.push({ deferredStepId: did, menuItemId: ol.menuItemId });
      }

      let out = setSelections.slice();
      for (const defStep of defSteps) {
        if (out.some((x) => String(x.stepId) === defStep)) continue;
        const picks = serveLaterChildren
          .filter((c) => c.deferredStepId === defStep)
          .map((c) => c.menuItemId)
          .filter(Boolean);
        if (picks.length) out = out.concat([{ stepId: defStep, menuItemIds: picks }]);
      }
      return out;
    }

    /**
     * @param {*} ln API の注文明細（OrderLine）
     */
    function parseHistoryLineForReorder(ln) {
      const mid = ln.menuItemId;
      if (mid == null || mid === "") return { ok: false, reason: "no_menu" };
      const ex = ln.lineExtra && typeof ln.lineExtra === "object" ? ln.lineExtra : null;
      if (ex && ex.kind === SERVE_LATER_LINE_KIND) return { ok: false, reason: "serve_later_child" };

      const eatMode = ln.eatMode === "takeout" ? "takeout" : "dine_in";

      const hasSetSteps = ex && Array.isArray(ex.steps) && ex.steps.length > 0;
      /** steps が無いのに kind だけ "set" の古い／欠損データはオプション or 単品へフォールバックする */
      const hasSingleOptions =
        ex && Array.isArray(ex.options) && ex.options.length > 0 && !hasSetSteps;

      if (hasSetSteps) {
        const setSelections = ex.steps.map((st) => ({
          stepId: st.stepId,
          menuItemIds: (st.picks || [])
            .map((p) => {
              if (!p || typeof p !== "object") return "";
              const v = p.menuItemId != null && p.menuItemId !== "" ? p.menuItemId : p.id;
              return v != null && v !== "" ? String(v) : "";
            })
            .filter(Boolean),
        }));
        const setComponentOptionSelections = [];
        for (const st of ex.steps || []) {
          const sid = typeof st.stepId === "string" ? st.stepId : "";
          if (!sid) continue;
          for (const p of st.picks || []) {
            if (!p || typeof p !== "object") continue;
            const oe = p.optionExtra;
            if (!oe || oe.kind !== "single" || !Array.isArray(oe.options)) continue;
            const rawPick = p.menuItemId != null && p.menuItemId !== "" ? p.menuItemId : p.id;
            const midPick = rawPick != null && rawPick !== "" ? String(rawPick) : "";
            if (!midPick) continue;
            const optionSelections = oe.options.map((gr) => ({
              optionGroupId: String(gr.groupId ?? gr.optionGroupId ?? ""),
              optionItemIds: (gr.picks || [])
                .map((x) => (x && (x.optionItemId != null ? x.optionItemId : x.id) ? String(x.optionItemId != null ? x.optionItemId : x.id) : ""))
                .filter(Boolean),
            }));
            if (optionSelections.length)
              setComponentOptionSelections.push({
                stepId: sid,
                menuItemId: midPick,
                optionSelections,
              });
          }
        }
        let serveLaterDeferStepIds = [];
        if (Array.isArray(ex.serveLaterDeferredStepIds)) {
          for (const id of ex.serveLaterDeferredStepIds) {
            if (typeof id === "string" && id.trim()) serveLaterDeferStepIds.push(id.trim());
          }
        }
        if (
          serveLaterDeferStepIds.length === 0 &&
          typeof ex.serveLaterDeferredStepId === "string" &&
          ex.serveLaterDeferredStepId.trim()
        ) {
          serveLaterDeferStepIds = [ex.serveLaterDeferredStepId.trim()];
        }

        return {
          ok: true,
          sellKind: "set",
          setSelections,
          setComponentOptionSelections:
            setComponentOptionSelections.length > 0 ? setComponentOptionSelections : undefined,
          serveLaterDeferStepIds: serveLaterDeferStepIds.length ? serveLaterDeferStepIds : undefined,
          serveLaterDeferStepId: serveLaterDeferStepIds[0],
          eatMode,
        };
      }

      if (hasSingleOptions) {
        const optionSelections = ex.options.map((gr) => ({
          optionGroupId: String(gr.groupId ?? gr.optionGroupId ?? ""),
          optionItemIds: (gr.picks || [])
            .map((x) => (x && (x.optionItemId != null ? x.optionItemId : x.id) ? String(x.optionItemId != null ? x.optionItemId : x.id) : ""))
            .filter(Boolean),
        }));
        return { ok: true, sellKind: "options", optionSelections, eatMode };
      }

      return { ok: true, sellKind: "plain", eatMode };
    }

    async function mergeHistoryIntoCart(order, ln, qty) {
      const q = Math.max(1, Math.min(99, Math.floor(Number(qty) || 1)));
      const parsed = parseHistoryLineForReorder(ln);
      if (!parsed.ok) {
        if (parsed.reason === "serve_later_child") toast("この明細は再注文できません");
        else toast("この注文は再注文できません");
        return;
      }
      const lineMenuKey = ln.menuItemId != null && ln.menuItemId !== "" ? String(ln.menuItemId) : "";
      if (!lineMenuKey) {
        toast("この注文は再注文できません");
        return;
      }
      let item = menuItemById.get(lineMenuKey);
      if (!item) {
        await ensureReorderMenuItemsInCache();
        item = menuItemById.get(lineMenuKey);
      }
      if (!item) {
        toast("メニューに載っていない商品です。スタッフへお問い合わせください。");
        return;
      }
      if (ln.status === "cancelled") {
        toast("取り消された注文です");
        return;
      }
      if (guestReorderBlockedByParsed(parsed)) {
        toast(guestLoIsSinglesOnlyMode() ? guestLoSetBlockedToast() : "ラストオーダーの時間を過ぎています");
        return;
      }

      if (parsed.sellKind === "set") {
        if (item.sellKind !== "set") {
          toast("メニューが変更されています（以前: セット / 現在: 単品）。メニューから選び直してください");
          return;
        }
        const ex0 = ln.lineExtra && typeof ln.lineExtra === "object" ? ln.lineExtra : null;
        let setSelections =
          ex0 && Array.isArray(ex0.steps) && ex0.steps.length > 0 && order
            ? enrichHistorySetSelectionsFromOrder(order, ln, parsed.setSelections, ex0)
            : parsed.setSelections;
        for (const st of item.setSteps || []) {
          const sel = setSelections.find((x) => String(x.stepId) === String(st.id));
          const ids = sel && sel.menuItemIds ? sel.menuItemIds : [];
          const fixedSet = new Set((st.fixedChoices || []).map((c) => String(c.menuItemId)));
          const userPickCount = ids.filter((id) => !fixedSet.has(String(id))).length;
          if (userPickCount < st.minPick || userPickCount > st.maxPick) {
            toast("セットの内容が変わった可能性があります。メニューから選び直してください");
            return;
          }
        }
        const unitPrice = computeSetUnitPrice(item, setSelections);
        if (unitPrice == null) {
          toast("セットの選択を復元できませんでした");
          return;
        }
        if (!setStockAllows(item, setSelections, q)) {
          toast("在庫が不足しています");
          return;
        }
        if (alcoholRestricted && setSelectionHasAlcohol(item, setSelections)) {
          toast("酒類はご注文いただけません");
          return;
        }
        const slIds = parsed.serveLaterDeferStepIds && parsed.serveLaterDeferStepIds.length
          ? parsed.serveLaterDeferStepIds
          : parsed.serveLaterDeferStepId
            ? [parsed.serveLaterDeferStepId]
            : [];
        const ddPair = guestDeferDrinkDessertStepIds(item);
        const pairGuess =
          Boolean(
            slIds.length === 2 &&
              ddPair &&
              [...slIds].sort().join(",") === [ddPair.drinkId, ddPair.dessertId].sort().join(","),
          );
        if (slIds.length) {
          for (const sid of slIds) {
            const st0 = (item.setSteps || []).find((s) => s.id === sid);
            if (!st0 || !st0.allowServeLaterSplit) {
              toast("「後から提供」はメニューから選び直してください");
              return;
            }
          }
        }
        const cartKey =
          "s:" +
          item.id +
          ":" +
          stableSetKey(setSelections) +
          stableServeLaterCartSuffix(slIds, pairGuess);
        const cur = cart[cartKey] || {
          cartKey,
          menuItemId: item.id,
          name: item.name,
          unitPrice,
          qty: 0,
          sellKind: "set",
          setSelections,
        };
        cur.unitPrice = unitPrice;
        cur.setSelections = setSelections;
        cur.name = item.name;
        cur.eatMode = parsed.eatMode;
        if (parsed.setComponentOptionSelections && parsed.setComponentOptionSelections.length) {
          cur.setComponentOptionSelections = parsed.setComponentOptionSelections;
        } else delete cur.setComponentOptionSelections;
        if (slIds.length) {
          cur.serveLaterDeferStepIds = slIds;
          if (pairGuess) cur.serveLaterDeferPairDrinkDessert = true;
          else delete cur.serveLaterDeferPairDrinkDessert;
          delete cur.serveLaterDeferStepId;
        } else {
          delete cur.serveLaterDeferStepIds;
          delete cur.serveLaterDeferPairDrinkDessert;
          delete cur.serveLaterDeferStepId;
        }
        cur.qty = (cur.qty || 0) + q;
        cart[cartKey] = cur;
        renderCart();
        toast(item.name + " をカートに追加");
        closeHistorySheet();
        return;
      }

      if (parsed.sellKind === "options") {
        if (item.sellKind !== "single" || !item.optionGroups || !item.optionGroups.length) {
          toast("メニューが変更されているため再注文できません");
          return;
        }
        const optionSelections = parsed.optionSelections;
        for (const g of item.optionGroups || []) {
          const sel = optionSelections.find((x) => String(x.optionGroupId) === String(g.id));
          const n = sel && sel.optionItemIds ? sel.optionItemIds.length : 0;
          if (n < g.minSelect || n > g.maxSelect) {
            toast("オプションの組み合わせが変わりました。メニューから選び直してください");
            return;
          }
        }
        const unitPrice = computeOptionUnitPrice(item, optionSelections);
        const cartKey = "o:" + item.id + ":" + stableOptionKey(optionSelections);
        if (item.stockQty != null && totalCartQtyForMenuItem(item.id) + q > item.stockQty) {
          toast("これ以上は在庫がありません");
          return;
        }
        const fakeLine = {
          menuItemId: item.id,
          sellKind: "single",
          optionSelections,
          qty: q,
        };
        if (alcoholRestricted && cartLineBlocksAlcohol(fakeLine)) {
          toast("酒類はご注文いただけません");
          return;
        }
        const cur = cart[cartKey] || {
          cartKey,
          menuItemId: item.id,
          name: item.name,
          unitPrice,
          qty: 0,
          sellKind: "single",
          optionSelections,
        };
        cur.unitPrice = unitPrice;
        cur.optionSelections = optionSelections;
        cur.name = item.name;
        cur.eatMode = parsed.eatMode;
        cur.qty = (cur.qty || 0) + q;
        cart[cartKey] = cur;
        renderCart();
        toast(item.name + " をカートに追加");
        closeHistorySheet();
        return;
      }

      if (item.sellKind !== "single") {
        if (item.sellKind === "set" && parsed.sellKind === "plain") {
          toast("注文データにセットの内容がありません。メニューから選び直してください");
        } else {
          toast("メニューが変更されているため再注文できません");
        }
        return;
      }
      const base = singleGuestChargeBase(item);
      const cartKey = item.id;
      if (item.stockQty != null && totalCartQtyForMenuItem(item.id) + q > item.stockQty) {
        toast("これ以上は在庫がありません");
        return;
      }
      if (alcoholRestricted && item.containsAlcohol) {
        toast("酒類はご注文いただけません");
        return;
      }
      const cur = cart[cartKey] || {
        cartKey,
        menuItemId: item.id,
        name: item.name,
        unitPrice: base,
        qty: 0,
        sellKind: "single",
      };
      cur.unitPrice = base;
      cur.name = item.name;
      cur.eatMode = parsed.eatMode;
      cur.qty = (cur.qty || 0) + q;
      cart[cartKey] = cur;
      renderCart();
      toast(item.name + " をカートに追加");
      closeHistorySheet();
    }

    function renderHistorySheetBody() {
      const body = document.getElementById("historySheetBody");
      if (!body) return;
      body.innerHTML = "";
      if (ordersSessionCourse && ordersSessionCourse.name) {
        const courseRow = document.createElement("p");
        courseRow.className = "muted";
        courseRow.style.margin = "0 0 0.65rem";
        courseRow.style.fontSize = "0.82rem";
        courseRow.textContent = "コース: " + ordersSessionCourse.name;
        body.appendChild(courseRow);
      }
      const list = ordersCache || [];
      if (list.length === 0) {
        const p = document.createElement("p");
        p.className = "muted";
        p.style.margin = "0";
        p.style.fontSize = "0.82rem";
        p.textContent = "まだ注文がありません";
        body.appendChild(p);
        return;
      }
      for (const o of list) {
        const card = document.createElement("div");
        card.className = "guest-history-card";
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = new Date(o.createdAt).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
        card.appendChild(meta);
        for (const ln of o.lines || []) {
          if (ln.status === "cancelled") continue;
          const row = document.createElement("div");
          row.className = "guest-history-line guest-history-line--reorder";
          const main = document.createElement("div");
          main.className = "guest-history-line-main";
          const lineSum = guestShowMenuPrices ? "¥" + (ln.unitPrice * ln.qty).toLocaleString("ja-JP") : "—";
          const nm = document.createElement("span");
          nm.className = "guest-history-name";
          nm.textContent = ln.nameSnapshot || "";
          const prev = document.createElement("span");
          prev.className = "guest-history-prev";
          prev.textContent = "前回 ×" + ln.qty + " " + lineSum;
          main.appendChild(nm);
          main.appendChild(prev);

          const controls = document.createElement("div");
          controls.className = "guest-history-reorder";
          const minus = document.createElement("button");
          minus.type = "button";
          minus.className = "guest-history-qbtn";
          minus.setAttribute("aria-label", "数量を減らす");
          minus.textContent = "−";
          const num = document.createElement("span");
          num.className = "guest-history-qty";
          num.textContent = "1";
          let rq = 1;
          const plus = document.createElement("button");
          plus.type = "button";
          plus.className = "guest-history-qbtn";
          plus.setAttribute("aria-label", "数量を増やす");
          plus.textContent = "+";
          const addBtn = document.createElement("button");
          addBtn.type = "button";
          addBtn.className = "guest-history-addbtn";
          addBtn.textContent = "カートに追加";

          minus.onclick = () => {
            if (rq <= 1) return;
            rq -= 1;
            num.textContent = String(rq);
          };
          plus.onclick = () => {
            if (rq >= 99) return;
            rq += 1;
            num.textContent = String(rq);
          };
          addBtn.onclick = async () => {
            try {
              await mergeHistoryIntoCart(o, ln, rq);
            } catch (err) {
              console.error(err);
              toast("カートに追加できませんでした: " + String(err && err.message ? err.message : err));
            }
          };

          const preview = parseHistoryLineForReorder(ln);
          if (!preview.ok) {
            addBtn.disabled = true;
            addBtn.style.opacity = "0.45";
            addBtn.title =
              preview.reason === "serve_later_child"
                ? "この明細は再注文できません"
                : "再注文できない注文です";
          } else if (!ln.menuItemId) {
            addBtn.disabled = true;
            addBtn.style.opacity = "0.45";
            addBtn.title = "再注文できない注文です";
          }

          controls.appendChild(minus);
          controls.appendChild(num);
          controls.appendChild(plus);
          controls.appendChild(addBtn);
          row.appendChild(main);
          row.appendChild(controls);
          card.appendChild(row);
        }
        body.appendChild(card);
      }
    }

    /**
     * @returns {{ isComplete: () => boolean }}
     */
    function initGuestDetailWizard(panel, item, opts) {
      const stack = panel.querySelector("[data-guest-wiz-stack]");
      const panes = stack ? [...stack.querySelectorAll("[data-wiz-pane]")] : [];
      const summaryEl = panel.querySelector("[data-guest-wiz-summary]");
      const bar = panel.querySelector("[data-guest-wiz-bar]");
      const btnBack = panel.querySelector("[data-wiz-back]");
      const btnNext = panel.querySelector("[data-wiz-next]");
      const btnEdit = panel.querySelector("[data-wiz-edit]");
      const addBtn = panel.querySelector("[data-add]");
      const doneRow = panel.querySelector("[data-guest-wiz-done]");
      const ctr = panel.querySelector("[data-guest-wiz-controls]");
      if (!panes.length) {
        if (addBtn) addBtn.disabled = false;
        if (bar) bar.style.display = "none";
        if (doneRow) doneRow.style.display = "none";
        if (ctr) ctr.style.display = "none";
        return { isComplete: () => true };
      }
      let idx = 0;
      let completed = false;
      function validateCurrentPane() {
        const pane = panes[idx];
        if (!pane) return true;
        const stepInner = pane.querySelector("[data-step-id]");
        const stepId = stepInner ? stepInner.getAttribute("data-step-id") : "";
        if (stepId && item.setSteps) {
          const st = item.setSteps.find((s) => s.id === stepId);
          if (st) {
            const sel = collectSetSelections(panel, item).find((x) => x.stepId === st.id);
            const n = guestSetStepUserPickCount(st, sel && sel.menuItemIds ? sel.menuItemIds : []);
            if (!guestValidateSetStepPickCount(st, n)) {
              toast(st.label + " は " + st.minPick + "〜" + st.maxPick + " 品選んでください");
              return false;
            }
            if (!guestValidateSetComponentOptions(st, pane)) return false;
          }
        }
        const ogEl = pane.querySelector("[data-opt-group-id]");
        if (ogEl && item.optionGroups) {
          const gid = ogEl.getAttribute("data-opt-group-id");
          const g = item.optionGroups.find((x) => x.id === gid);
          if (g) {
            const sel = collectOptionSelections(panel, item).find((x) => x.optionGroupId === g.id);
            const n = sel && sel.optionItemIds ? sel.optionItemIds.length : 0;
            if (n < g.minSelect || n > g.maxSelect) {
              toast(g.name + " は " + g.minSelect + "〜" + g.maxSelect + " 個選んでください");
              return false;
            }
          }
        }
        if (pane.querySelector("[data-serve-later-wrap]")) {
          const sl = getServeLaterDeferPayload(panel, item);
          if (!sl.ok) {
            toast("「後から提供」を選んでください");
            return false;
          }
        }
        return true;
      }
      function showPane(i) {
        idx = Math.max(0, Math.min(i, panes.length - 1));
        panes.forEach((p, j) => {
          p.style.display = j === idx ? "" : "none";
        });
        if (btnBack) btnBack.style.visibility = idx > 0 ? "visible" : "hidden";
        if (btnNext) btnNext.textContent = idx >= panes.length - 1 ? "内容を確認" : "次へ";
        try {
          const sheet = document.getElementById("detailSheet");
          const scroll = sheet && sheet.querySelector(".detail-scroll");
          if (scroll) scroll.scrollTop = 0;
        } catch (_) {}
      }
      function enterSummary() {
        completed = true;
        if (stack) stack.style.display = "none";
        if (bar) bar.style.display = "none";
        if (summaryEl) {
          summaryEl.hidden = false;
          summaryEl.innerHTML =
            opts && typeof opts.buildSummaryHtml === "function" ? opts.buildSummaryHtml() : "";
        }
        if (doneRow) doneRow.style.display = "flex";
        if (addBtn) addBtn.disabled = false;
      }
      function exitSummary() {
        completed = false;
        if (stack) stack.style.display = "";
        if (bar) bar.style.display = "flex";
        if (summaryEl) {
          summaryEl.hidden = true;
          summaryEl.innerHTML = "";
        }
        if (doneRow) doneRow.style.display = "none";
        if (addBtn) addBtn.disabled = true;
        showPane(0);
      }
      showPane(0);
      if (bar) {
        bar.style.display = "flex";
        bar.style.flexDirection = "row";
        bar.style.flexWrap = "wrap";
        bar.style.alignItems = "stretch";
      }
      if (ctr) ctr.style.display = "flex";
      if (addBtn) addBtn.disabled = true;
      if (btnNext)
        btnNext.onclick = () => {
          if (!validateCurrentPane()) return;
          if (idx >= panes.length - 1) enterSummary();
          else showPane(idx + 1);
        };
      if (btnBack)
        btnBack.onclick = () => {
          if (completed) return;
          if (idx > 0) showPane(idx - 1);
        };
      if (btnEdit) btnEdit.onclick = () => exitSummary();
      return {
        isComplete: () => completed,
      };
    }

    function wireQty(panel, item, getUnitPrice) {
      const minus = panel.querySelector("[data-qty-min]");
      const plus = panel.querySelector("[data-qty-plus]");
      const numEl = panel.querySelector("[data-qty]");
      let qty = 1;
      const raw = item.stockQty;
      const stockNum = typeof raw === "number" && Number.isFinite(raw) ? raw : null;

      function maxQtyThisAdd() {
        const courseCap =
          item.courseTier === "included" && !guestLoChargesIncludedAsPaid()
            ? maxCourseIncludedAddQty(item, null)
            : 99;
        if (stockNum == null) return Math.min(99, courseCap);
        const remain = stockNum - totalCartQtyForMenuItem(item.id);
        if (remain <= 0) return 0;
        return Math.min(99, remain, courseCap);
      }

      function refresh() {
        const cap = maxQtyThisAdd();
        if (cap > 0) qty = Math.min(qty, cap);
        numEl.textContent = String(qty);
        minus.disabled = qty <= 1;
        const atMax = cap <= 0 || qty >= cap;
        plus.disabled = false;
        plus.style.opacity = atMax ? "0.4" : "";
        plus.title =
          cap <= 0 && stockNum != null
            ? "在庫がありません"
            : atMax && stockNum != null
              ? "在庫の上限です"
              : atMax
                ? "これ以上は選べません"
                : "";
        syncDetailAddPrice(panel, getUnitPrice(), qty);
      }

      minus.onclick = () => {
        if (qty <= 1) return;
        qty -= 1;
        refresh();
      };
      plus.onclick = () => {
        const cap = maxQtyThisAdd();
        if (cap <= 0) {
          toast("在庫がありません");
          return;
        }
        if (qty >= cap) {
          toast(stockNum != null ? "在庫の上限です" : "これ以上は選べません");
          return;
        }
        qty += 1;
        refresh();
      };
      refresh();
      return () => qty;
    }

    function stopLastOrderTicker() {
      if (lastOrderTimer) clearInterval(lastOrderTimer);
      lastOrderTimer = null;
    }

    function startLastOrderTicker(lo) {
      stopLastOrderTicker();
      const el = document.getElementById("lastOrderBanner");
      if (!lo || !lo.deadlineIso) {
        el.style.display = "none";
        lastOrderClosedFlag = false;
        guestLastOrderPastLocal = false;
        guestLoPolicy = "block_all";
        syncGuestMenuCardsDimForLastOrder();
        return;
      }
      guestLoPolicy =
        lo.policy === "allow_all" ||
        lo.policy === "singles_only" ||
        lo.policy === "singles_paid_only" ||
        lo.policy === "block_all"
          ? lo.policy
          : "block_all";
      /** block_all のときだけ従来どおり「締切後は全面ブロック」フラグを立てる */
      const blocksFull = lo.blocksOrderingAfterDeadline !== false;
      lastOrderDeadlineTs = Date.parse(lo.deadlineIso);
      el.style.display = "block";
      function tick() {
        const left = Math.floor((lastOrderDeadlineTs - Date.now()) / 1000);
        const serverClosed = Boolean(lo.orderingClosed);
        const pastLocal = left <= 0;
        guestLastOrderPastLocal = pastLocal;
        lastOrderClosedFlag = blocksFull && (serverClosed || pastLocal);
        renderCart();
        syncGuestMenuCardsDimForLastOrder();
        if (blocksFull && (serverClosed || pastLocal)) {
          el.innerHTML =
            "<span class=\"lo-inner\">ラストオーダーは終了しました（追加のご注文はスタッフへお声がけください）</span>";
          el.classList.add("lo-ended");
          stopLastOrderTicker();
          return;
        }
        if (!blocksFull && pastLocal && guestLoPolicy === "allow_all") {
          el.innerHTML =
            "<span class=\"lo-inner\">ラストオーダーの予定時刻を過ぎました（このままご注文いただけます）</span>";
          el.classList.remove("lo-ended");
          syncGuestMenuCardsDimForLastOrder();
          stopLastOrderTicker();
          return;
        }
        if (!blocksFull && pastLocal && guestLoIsSinglesOnlyMode()) {
          const loMsg =
            guestLoPolicy === "singles_paid_only"
              ? "ラストオーダーは終了しました（セットはご注文いただけません。単品は通常料金でご注文いただけます）"
              : "ラストオーダーは終了しました（セットはご注文いただけません。単品は引き続きご注文いただけます）";
          el.innerHTML = "<span class=\"lo-inner\">" + loMsg + "</span>";
          el.classList.add("lo-ended");
          syncGuestMenuCardsDimForLastOrder();
          stopLastOrderTicker();
          return;
        }
        el.classList.remove("lo-ended");
        const m = Math.floor(left / 60);
        const s = left % 60;
        el.innerHTML =
          "<span class=\"lo-inner\">ラストオーダーまで あと <strong>" +
          String(m) +
          ":" +
          String(s).padStart(2, "0") +
          "</strong>（残り " +
          left +
          " 秒）</span>";
      }
      tick();
      lastOrderTimer = setInterval(tick, 1000);
    }

    function clampCartToStock(categories) {
      const maxById = new Map();
      const setById = new Map();
      for (const c of categories || []) {
        for (const it of c.items || []) {
          if (it.stockQty != null) maxById.set(it.id, it.stockQty);
          if (it.sellKind === "set") setById.set(it.id, it);
        }
      }
      for (const k of Object.keys(cart)) {
        const line = cart[k];
        if (line.sellKind === "set" && line.setSelections) {
          const it = setById.get(line.menuItemId);
          if (it && !setStockAllows(it, line.setSelections, line.qty)) {
            let lo = 0;
            let hi = line.qty;
            while (lo < hi) {
              const mid = Math.ceil((lo + hi) / 2);
              if (setStockAllows(it, line.setSelections, mid)) lo = mid;
              else hi = mid - 1;
            }
            line.qty = lo;
          }
        } else {
          const m = maxById.get(line.menuItemId);
          if (m != null && line.qty > m) line.qty = m;
        }
        if (!line.qty || line.qty <= 0) delete cart[k];
      }
    }

    /** セット一覧カード: 各ステップを「ラベル: 付属・候補名…」の1行。ラベルと内容が完全一致する行だけ重複を省く */
    function buildGuestSetComponentsUl(it) {
      if (it.sellKind !== "set" || !Array.isArray(it.setSteps) || it.setSteps.length === 0) return null;
      const steps = [...it.setSteps].sort((a, b) => Number(a.sortOrder ?? 0) - Number(b.sortOrder ?? 0));
      const rawLines = [];
      for (const st of steps) {
        const lab = String(st.label || "").trim() || "項目";
        const names = [];
        const seenInStep = new Set();
        for (const fc of st.fixedChoices || []) {
          const id = fc.menuItemId;
          if (!id || seenInStep.has(id)) continue;
          seenInStep.add(id);
          const n = String(fc.name || "").trim() || "（名称未設定）";
          names.push(n);
        }
        for (const ch of st.choices || []) {
          const id = ch.menuItemId;
          if (!id || seenInStep.has(id)) continue;
          seenInStep.add(id);
          const n = String(ch.name || "").trim() || "（名称未設定）";
          names.push(n);
        }
        if (names.length === 0) continue;
        const joined = names.join("、");
        rawLines.push({ lab, joined, key: lab + "\u0001" + joined });
      }
      const merged = [];
      for (const row of rawLines) {
        const prev = merged[merged.length - 1];
        if (prev && prev.key === row.key) continue;
        merged.push(row);
      }
      const ul = document.createElement("ul");
      ul.className = "go-set-components";
      for (const row of merged) {
        const li = document.createElement("li");
        li.className = "go-set-li";
        const labEl = document.createElement("span");
        labEl.className = "go-set-step-lab";
        labEl.textContent = row.lab;
        const sep = document.createElement("span");
        sep.className = "go-set-step-sep";
        sep.textContent = ": ";
        const nm = document.createElement("span");
        nm.className = "go-set-li-name";
        nm.textContent = row.joined;
        li.appendChild(labEl);
        li.appendChild(sep);
        li.appendChild(nm);
        ul.appendChild(li);
      }
      return ul.childNodes.length ? ul : null;
    }

              const taxSub =
                p.extraPriceTaxMode === "exclusive"
                  ? "（※店舗が税抜入力の場合、お支払いは税込額です）"
                  : "";

              if (scope === "per_person_pick") {
                const maxP =
                  typeof p.maxSelectablePeople === "number" && p.maxSelectablePeople >= 1
                    ? p.maxSelectablePeople
                    : gCount;
                const line = document.createElement("div");
                line.className = "course-pack-people";
                line.appendChild(document.createTextNode(p.name + " · 一人税込 "));
                const strong = document.createElement("strong");
                strong.style.color = "var(--accent)";
                strong.textContent = "¥" + unitTi.toLocaleString("ja-JP");
                line.appendChild(strong);
                line.appendChild(document.createTextNode(" × "));
                const numIn = document.createElement("input");
                numIn.type = "number";
                numIn.min = "1";
                numIn.max = String(maxP);
                numIn.value = "1";
                numIn.setAttribute("aria-label", "オプションの人数");
                line.appendChild(numIn);
                line.appendChild(document.createTextNode(" 名（1〜" + maxP + "）"));
                const btnP = document.createElement("button");
                btnP.type = "button";
                btnP.className = "course-pack-btn";
                btnP.style.marginTop = "0.2rem";
                btnP.textContent = "この内容で追加する";
                btnP.onclick = async function () {
                  const n = parseInt(numIn.value, 10);
                  if (!Number.isInteger(n) || n < 1 || n > maxP) {
                    toast("人数は1〜" + maxP + "の整数で選んでください");
                    return;
                  }
                  try {
                    await api("/guest/" + encodeURIComponent(TOKEN) + "/course-option-packs/purchase", {
                      method: "POST",
                      headers: { "Content-Type": "application/json" },
                      body: JSON.stringify({ packId: p.id, peopleCount: n }),
                    });
                    toast("追加しました");
                    await loadMenu();
                  } catch (e) {
                    toast(String(e.message || e));
                  }
                };
                row.appendChild(line);
                row.appendChild(btnP);
                if (taxSub) {
                  const tn = document.createElement("div");
                  tn.style.fontSize = "0.65rem";
                  tn.style.opacity = "0.85";
                  tn.textContent = taxSub;
                  row.appendChild(tn);
                }
                wrap.appendChild(row);
                continue;
              }

              const payBtn = document.createElement("button");
              payBtn.type = "button";
              payBtn.className = "course-pack-btn";
              let payTotal = 0;
              let labelExtra = "";
              if (scope === "per_person_all") {
                payTotal =
                  typeof p.totalIfAllGuestsTaxIncluded === "number" &&
                  Number.isFinite(p.totalIfAllGuestsTaxIncluded)
                    ? p.totalIfAllGuestsTaxIncluded
                    : unitTi * gCount;
                labelExtra = "（税込・延べ" + gCount + "名分）";
              } else {
                payTotal =
                  typeof p.chargeTaxIncluded === "number" && Number.isFinite(p.chargeTaxIncluded)
                    ? p.chargeTaxIncluded
                    : unitTi;
                labelExtra = "（税込・卓1回）";
              }
              payBtn.innerHTML =
                escapeHtml(p.name) +
                " <strong>+¥" +
                payTotal.toLocaleString("ja-JP") +
                "</strong><span style=\"font-size:0.72rem\">" +
                escapeHtml(labelExtra) +
                "</span>" +
                (taxSub
                  ? "<span style=\"font-size:0.65rem;opacity:0.85;display:block;margin-top:0.15rem\">" +
                    escapeHtml(taxSub) +
                    "</span>"
                  : "") +
                "<span style=\"font-size:0.68rem;font-weight:600;opacity:0.9;display:block;margin-top:0.2rem\">対象メニューが広がります</span>";
              payBtn.onclick = async function () {
                try {
                  await api("/guest/" + encodeURIComponent(TOKEN) + "/course-option-packs/purchase", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ packId: p.id }),
                  });
                  toast("追加しました");
                  await loadMenu();
                } catch (e) {
                  toast(String(e.message || e));
                }
              };
              row.appendChild(payBtn);
              wrap.appendChild(row);
            }
            packStrip.appendChild(wrap);
          } else {
            packStrip.style.display = "none";
          }
        } else {
          packStrip.style.display = "none";
        }
      }

      const cp = data.customerProfile;
      const lp = readLocalCustomerProfile();
      if (cp) {
        document.getElementById("custName").value = cp.name || "";
        document.getElementById("custPhone").value = cp.phone || "";
        if (lp && lp.email) document.getElementById("custEmail").value = lp.email || "";
      } else if (lp) {
        if (lp.name) document.getElementById("custName").value = lp.name || "";
        if (lp.phone) document.getElementById("custPhone").value = lp.phone || "";
        if (lp.email) document.getElementById("custEmail").value = lp.email || "";
      }

      // お客様情報：開閉はユーザーの明示操作のみ（入力済みでも自動では開かない）
      try {
        const wantOpen = readProfileOpenPref();
        setProfileCollapsed(!wantOpen);
        const btn = document.getElementById("profileToggle");
        if (btn) {
          btn.onclick = function () {
            const card = document.getElementById("profileCard");
            const isCollapsed = card.classList.contains("is-collapsed");
            if (isCollapsed) {
              setProfileCollapsed(false, { focus: true });
              writeProfileOpenPref(true);
            } else {
              setProfileCollapsed(true);
              writeProfileOpenPref(false);
            }
          };
        }
      } catch (_) {}

      try {
        setupCombineBillingUi();
      } catch (_) {}

      try {
        const dev = getOrCreateDeviceId();
        const idRes = await api("/guest/" + encodeURIComponent(TOKEN) + "/identify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ deviceId: dev }),
        });
        const hint = document.getElementById("profileHint");
        if (hint && idRes.customer && idRes.customer.visitCount != null) {
          hint.textContent =
            "ご来店の記録: " +
            idRes.customer.visitCount +
            "回" +
            (idRes.customer.firstLinkThisSession ? "（今回のご来店を記録しました）" : "");
        }
      } catch (_) {}

      const cats = data.categories || [];
      guestMenuCategories = cats;
      menuItemById = new Map();
      for (const c of cats) {
        for (const it of c.items || []) {
          if (it && it.id != null && it.id !== "") menuItemById.set(String(it.id), it);
          if (it && it.sellKind === "set" && it.setSteps) {
            for (const st of it.setSteps) {
              for (const ch of [...(st.fixedChoices || []), ...(st.choices || [])]) {
                if (!ch || ch.menuItemId == null || ch.menuItemId === "") continue;
                const mid = String(ch.menuItemId);
                if (!ch.optionGroups || !ch.optionGroups.length) continue;
                const prev = menuItemById.get(mid);
                menuItemById.set(mid, {
                  ...(prev || {}),
                  id: mid,
                  name: ch.name || (prev && prev.name) || "",
                  optionGroups: ch.optionGroups,
                });
              }
            }
          }
        }
      }
      const gs = data.session;
      sessionGuestCount = Math.max(1, parseInt(String((gs && gs.guestCount) || 1), 10) || 1);
      if (gs && gs.guestAlcoholAllowed === true) alcoholRestricted = false;
      else if (gs && gs.guestAlcoholAllowed === false) alcoholRestricted = true;
      hydrateGuestCartFromStorage();
      clampCartToStock(cats);
      renderCart();

      const tabs = document.getElementById("catTabs");
      tabs.innerHTML = "";
      activeGuestCatId = "";
      const allBtn = document.createElement("button");
      allBtn.type = "button";
      allBtn.className = "go-tab is-active";
      allBtn.dataset.cat = "";
      allBtn.textContent = "すべて";
      tabs.appendChild(allBtn);
      for (const c of cats) {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "go-tab";
        b.dataset.cat = c.id;
        b.textContent = c.name;
        tabs.appendChild(b);
      }
      tabs.onclick = (ev) => {
        const t = ev.target.closest(".go-tab");
        if (!t) return;
        [...tabs.querySelectorAll(".go-tab")].forEach((x) => x.classList.toggle("is-active", x === t));
        activeGuestCatId = t.dataset.cat || "";
        syncGuestMenuCardsVisibility();
      };

      const root = document.getElementById("menu");
      root.innerHTML = "";
      for (const c of cats) {
        for (const it of c.items || []) {
          const sold = it.stockQty != null && it.stockQty <= 0;
          const showAlcoholBadge = itemShowsAlcoholBadge(it);
          const baseBlocked = sold || (it.containsAlcohol === true && alcoholRestricted);
          const card = document.createElement("article");
          card.className = "go-card";
          card.dataset.cat = c.id;
          card.dataset.courseIncluded = it.courseTier === "included" ? "1" : "0";
          card.dataset.guestBlockedBase = baseBlocked ? "1" : "0";
          card.dataset.sellKind = it.sellKind === "set" ? "set" : "single";
          if (baseBlocked || guestCardDimByLastOrderSellKind(it.sellKind === "set" ? "set" : "single"))
            card.classList.add("is-dim");

          const media = document.createElement("div");
          media.className = "go-card-media";
          if (it.imageUrl) {
            const im = document.createElement("img");
            im.src = it.imageUrl;
            im.alt = it.name;
            im.loading = "lazy";
            media.appendChild(im);
          } else {
            const ph = document.createElement("div");
            ph.className = "go-ph";
            ph.textContent = "◇";
            media.appendChild(ph);
          }
          const badgeStack = document.createElement("div");
          badgeStack.style.cssText = "position:absolute;top:0;right:0;display:flex;flex-direction:column;align-items:flex-end;gap:0.25rem;padding:0.35rem;";
          if (it.sellKind === "set") {
            const b = document.createElement("span");
            b.className = "go-card-badge";
            b.textContent = "セット";
            badgeStack.appendChild(b);
          }
          if (showAlcoholBadge) {
            const b = document.createElement("span");
            b.className = "go-card-badge";
            b.style.background = "rgba(124,45,18,.75)";
            b.textContent = "酒類";
            badgeStack.appendChild(b);
          }
          if (it.courseTier === "included" && !guestLoChargesIncludedAsPaid()) {
            const b = document.createElement("span");
            b.className = "badge-course-in";
            b.textContent = "コース内";
            badgeStack.appendChild(b);
          } else if (it.courseTier === "addon") {
            const b = document.createElement("span");
            b.className = "badge-course-add";
            b.textContent = "追加料金";
            badgeStack.appendChild(b);
          }
          if (guestTimeDiscountActive(it)) {
            const b = document.createElement("span");
            b.className = "badge-time-disc";
            b.textContent = "時間割";
            badgeStack.appendChild(b);
          }
          media.appendChild(badgeStack);

          const body = document.createElement("div");
          body.className = "go-card-body";
          const title = document.createElement("div");
          title.className = "go-card-title";
          title.textContent = it.name;
          const meta = document.createElement("div");
          meta.className = "go-card-meta";
          meta.textContent = it.description || "";
          const price = document.createElement("div");
          price.className = "go-card-price";
          price.innerHTML = fmtItemPrice(it);
          const badges = document.createElement("div");
          badges.style.cssText = "display:flex;flex-wrap:wrap;gap:0.25rem;margin-top:0.35rem;";
          if (sold) {
            const b = document.createElement("span");
            b.className = "badge-sold";
            b.textContent = "売切";
            badges.appendChild(b);
          } else if (it.lowStock) {
            const b = document.createElement("span");
            b.className = "badge-low";
            b.textContent = "残りわずか";
            badges.appendChild(b);
          }
          if (it.containsAlcohol && alcoholRestricted) {
            const b = document.createElement("span");
            b.className = "badge-sold";
            b.textContent = "注文不可";
            badges.appendChild(b);
          }
          body.appendChild(title);
          if (it.sellKind === "set") {
            const setUl = buildGuestSetComponentsUl(it);
            if (setUl) body.appendChild(setUl);
          }
          if (it.description) body.appendChild(meta);
          body.appendChild(price);
          if (badges.childNodes.length) body.appendChild(badges);

          card.appendChild(media);
          card.appendChild(body);
          card.onclick = () => {
            if (sold) {
              toast("売り切れです");
              return;
            }
            if (it.containsAlcohol && alcoholRestricted) {
              toast("酒類はご注文いただけません");
              return;
            }
            if (guestProductDetailBlocked(it)) {
              toast(
                guestLoIsSinglesOnlyMode() && it.sellKind === "set"
                  ? guestLoSetBlockedToast()
                  : "ラストオーダーの時間を過ぎています",
              );
              return;
            }
            addLine(it);
          };
          root.appendChild(card);
        }
      }
      syncGuestMenuCardsVisibility();
    }

    function collectGuestDeferredKitchenLines() {
      const rows = [];
      const SET_SERVE_LATER = "set_serve_later";
      for (const ord of ordersCache || []) {
        for (const ln of ord.lines || []) {
          const ex = ln.lineExtra;
          const kind = ex && typeof ex === "object" && !Array.isArray(ex) ? ex.kind : null;
          if (ln.status === "guest_deferred" && kind === SET_SERVE_LATER) rows.push(ln);
        }
      }
      return rows;
    }

    function renderDeferredKitchenPanel() {
      const root = document.getElementById("guestDeferredKitchenPanel");
      if (!root) return;
      const lines = collectGuestDeferredKitchenLines();
      if (lines.length === 0) {
        root.style.display = "none";
        root.innerHTML = "";
        return;
      }
      root.style.display = "block";
      const title = "後から提供（キッチン未送信）";
      let html = '<div class="guest-deferred-kitchen-inner">';
      html += '<div class="guest-deferred-kitchen-title">' + escapeHtml(title) + "</div>";
      for (const ln of lines) {
        const nm = escapeHtml(String(ln.nameSnapshot || "商品"));
        const qty = ln.qty > 1 ? " ×" + String(ln.qty) : "";
        html += '<div class="guest-deferred-kitchen-row">';
        html += '<span class="guest-deferred-kitchen-name">' + nm + qty + "</span>";
        html +=
          '<button type="button" class="guest-deferred-kitchen-btn" data-deferred-line-id="' +
          escapeHtml(String(ln.id)) +
          '">キッチンにオーダー</button>';
        html += "</div>";
      }
      html += "</div>";
      root.innerHTML = html;
      root.querySelectorAll("[data-deferred-line-id]").forEach((btn) => {
        btn.onclick = async () => {
          const id = btn.getAttribute("data-deferred-line-id");
          if (!id) return;
          btn.disabled = true;
          try {
            await api(
              "/guest/" +
                encodeURIComponent(TOKEN) +
                "/deferred-lines/" +
                encodeURIComponent(id) +
                "/send-kitchen",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: "{}",
              },
            );
            toast("キッチンに送信しました");
            await loadOrders();
          } catch (e) {
            toast(String(e.message || e));
          } finally {
            btn.disabled = false;
          }
        };
      });
    }

    async function loadOrders() {
      const data = await api("/guest/" + encodeURIComponent(TOKEN) + "/orders");
      ordersCache = data.orders || [];
      ordersSessionCourse =
        data.sessionCourse && data.sessionCourse.name
          ? { id: String(data.sessionCourse.id || ""), name: String(data.sessionCourse.name || "") }
          : null;
      renderDeferredKitchenPanel();
      if (document.getElementById("historySheet") && document.getElementById("historySheet").classList.contains("is-open")) {
        await ensureReorderMenuItemsInCache();
        renderHistorySheetBody();
      }
    }

    document.getElementById("submit").onclick = async () => {
      if (guestOrderGateBlocked) {
        toast(guestOrderGateMessage || "ただいま注文を受け付けておりません");
        return;
      }
      if (guestSubmitBlockedByLastOrder()) {
        toast(guestLoIsSinglesOnlyMode() ? guestLoSetBlockedToast() : "ラストオーダーの時間を過ぎています");
        return;
      }
      const lines = Object.values(cart)
        .filter((x) => x.qty > 0)
        .map((x) => {
          const o = { menuItemId: x.menuItemId, qty: x.qty };
          if (x.sellKind === "set" && x.setSelections) o.setSelections = x.setSelections;
          if (x.optionSelections && x.optionSelections.length) o.optionSelections = x.optionSelections;
          if (x.serveLaterDeferStepIds && x.serveLaterDeferStepIds.length) {
            o.serveLaterDeferStepIds = x.serveLaterDeferStepIds;
            if (x.serveLaterDeferPairDrinkDessert) o.serveLaterDeferPairDrinkDessert = true;
          } else if (x.serveLaterDeferStepId) o.serveLaterDeferStepId = x.serveLaterDeferStepId;
          if (x.setComponentOptionSelections && x.setComponentOptionSelections.length) o.setComponentOptionSelections = x.setComponentOptionSelections;
          if (x.eatMode) o.eatMode = x.eatMode;
          return o;
        });
      if (lines.length === 0) return;
      if (alcoholRestricted) {
        const bad = Object.values(cart)
          .filter((x) => x.qty > 0)
          .find((line) => cartLineBlocksAlcohol(line));
        if (bad) {
          toast("酒類が含まれているため送信できません");
          return;
        }
      }
      const btn = document.getElementById("submit");
      btn.disabled = true;
      try {
        await api("/guest/" + encodeURIComponent(TOKEN) + "/orders", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ lines, guestDeviceId: getOrCreateDeviceId() }),
        });
        clearGuestCartStorage();
        for (const k of Object.keys(cart)) delete cart[k];
        renderCart();
        closeCartSheet();
        toast("注文を送信しました");
        await loadOrders();
        await loadMenu();
      } catch (e) {
        document.getElementById("err").style.display = "block";
        document.getElementById("err").textContent = String(e.message || e);
      } finally {
        btn.disabled = Object.values(cart).reduce((s, x) => s + (x.qty || 0), 0) === 0;
      }
    };

    document.getElementById("btnHistory").onclick = () => void openHistorySheet();
    document.getElementById("btnStaff").onclick = async () => {
      try {
        await api("/guest/" + encodeURIComponent(TOKEN) + "/call-staff", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({}),
        });
        toast("スタッフをお呼びしました。少々お待ちください。");
      } catch (e) {
        toast(String(e.message || e));
      }
    };
    document.getElementById("btnCartScroll").onclick = () => openCartSheet();

    function wireCartFooterOpen() {
      const info = document.getElementById("cartFooterInfo");
      if (!info) return;
      info.onclick = () => openCartSheet();
      info.onkeydown = (ev) => {
        if (ev.key === "Enter" || ev.key === " ") {
          ev.preventDefault();
          openCartSheet();
        }
      };
    }
    wireCartFooterOpen();

    document.getElementById("cartSheetCloseBtn").onclick = () => closeCartSheet();
    document.getElementById("cartSheetBg").onclick = () => closeCartSheet();
    document.getElementById("historySheetCloseBtn").onclick = () => closeHistorySheet();
    document.getElementById("historySheetBg").onclick = () => closeHistorySheet();

    document.getElementById("cartSheetOrderBtn").onclick = () => {
      document.getElementById("submit").click();
    };

    document.getElementById("btnSaveProfile").onclick = async () => {
      try {
        const dev = getOrCreateDeviceId();
        const name = document.getElementById("custName").value.trim();
        const phone = document.getElementById("custPhone").value.trim();
        const email = document.getElementById("custEmail").value.trim();
        const idRes = await api("/guest/" + encodeURIComponent(TOKEN) + "/identify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ deviceId: dev, name, phone }),
        });
        writeLocalCustomerProfile({ name, phone, email });
        const hint = document.getElementById("profileHint");
        if (hint && idRes.customer && idRes.customer.visitCount != null) {
          hint.textContent = "ご来店の記録: " + idRes.customer.visitCount + "回 · 保存しました";
        }
        setProfileCollapsed(true);
        writeProfileOpenPref(false);
        toast("お客様情報を保存しました");
      } catch (e) {
        toast(String(e.message || e));
      }
    };

    async function syncAlcoholAckToServer(allowAlcohol) {
      await api("/guest/" + encodeURIComponent(TOKEN) + "/alcohol-ack", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ allowAlcohol }),
      });
    }

    async function ensureSafetyGate() {
      const key = "guest-safety:" + TOKEN;
      try {
        const raw = sessionStorage.getItem(key);
        if (raw) {
          const parsed = JSON.parse(raw);
          const allowAlcohol = !(parsed && parsed.allowAlcohol === false);
          alcoholRestricted = !allowAlcohol;
          await syncAlcoholAckToServer(allowAlcohol);
          return;
        }
      } catch (_) {}
      const gate = document.getElementById("ageGate");
      const btnDeny = document.getElementById("ageGateDeny");
      const btnAllow = document.getElementById("ageGateAllow");
      if (!gate || !btnDeny || !btnAllow) return;
      gate.style.display = "flex";
      await new Promise((resolve) => {
        const finish = async (allowAlcohol) => {
          alcoholRestricted = !allowAlcohol;
          try {
            sessionStorage.setItem(key, JSON.stringify({ allowAlcohol, at: Date.now() }));
          } catch (_) {}
          gate.style.display = "none";
          btnDeny.onclick = null;
          btnAllow.onclick = null;
          try {
            await syncAlcoholAckToServer(allowAlcohol);
          } catch (_) {}
          resolve();
        };
        btnDeny.onclick = () => void finish(false);
        btnAllow.onclick = () => void finish(true);
      });
    }

    (async () => {
      try {
        await ensureSafetyGate();
        await loadMenu();
        await loadOrders();
      } catch (e) {
        document.getElementById("err").style.display = "block";
        document.getElementById("err").textContent = String(e.message || e);
        document.getElementById("hdr").textContent = "セッションを開けませんでした";
      }
    })();
  </script>
</body>
</html>
