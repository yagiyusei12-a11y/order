<!DOCTYPE html>
<!-- guest-ui-build: 20260520-utf8-fix -->
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0e12" />
  <title>ご注文</title>
  <style>
    :root {
      --bg: #0c0e12;
      --surface: #151922;
      --surface2: #1c2230;
      --line: #2a3142;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #f97316;
      --accent-dim: rgba(249, 115, 22, 0.15);
      --ok: #22c55e;
      --danger: #fb7185;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: calc(5.75rem + env(safe-area-inset-bottom));
      min-height: 100dvh;
    }

    /* ========== トップバー（アイコン） ========== */
    .go-topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.35rem;
      padding: 0.5rem 0.65rem calc(0.45rem + env(safe-area-inset-top));
      background: linear-gradient(180deg, #12161f 0%, #0c0e12 100%);
      border-bottom: 1px solid var(--line);
    }
    .go-topicons {
      display: flex;
      align-items: center;
      gap: 0.15rem;
    }
    .go-iconbtn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }
    .go-iconbtn:active { background: var(--surface2); color: var(--text); }
    .go-iconbtn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
    /* 呼出：記号だけだと分かりにくいため文字ラベル */
    .go-iconbtn.go-call {
      width: auto;
      min-width: 44px;
      height: 44px;
      padding: 0 0.5rem;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1.15;
    }
    .go-brand {
      flex: 1;
      min-width: 0;
      text-align: center;
      padding: 0 0.25rem;
    }
    .go-brand h1 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .go-brand .sub {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.15rem;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .go-brand .sub.sub-hint {
      margin-top: 0.12rem;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      line-height: 1.25;
      color: rgba(226, 232, 240, 0.86);
    }

    /* ========== カテゴリタブ ========== */
    .go-tabs-wrap {
      position: sticky;
      top: calc(52px + env(safe-area-inset-top));
      z-index: 40;
      background: linear-gradient(180deg, #0c0e12 70%, transparent);
      padding: 0.35rem 0 0.65rem;
      margin-top: -1px;
    }
    .go-tabs {
      display: flex;
      gap: 0.35rem;
      overflow-x: auto;
      padding: 0 0.75rem;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .go-tabs::-webkit-scrollbar { display: none; }
    .go-tab {
      flex-shrink: 0;
      padding: 0.45rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .go-tab.is-active {
      background: var(--accent-dim);
      border-color: rgba(249, 115, 22, 0.45);
      color: var(--accent);
    }

    /* ========== メニューグリッド ========== */
    .go-menu-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.65rem;
      padding: 0 0.65rem 1rem;
    }
    @media (min-width: 480px) {
      .go-menu-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.85rem; padding: 0 1rem 1rem; }
    }
    .go-card {
      border-radius: 16px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--line);
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .go-card:active { transform: scale(0.98); }
    .go-card.is-dim { opacity: 0.45; pointer-events: none; }
    .go-card-media {
      aspect-ratio: 4 / 3;
      background: linear-gradient(145deg, #1e293b, #0f172a);
      position: relative;
    }
    .go-card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .go-card-media .go-ph {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      opacity: 0.35;
    }
    .go-card-badge {
      position: absolute;
      top: 0.35rem;
      left: 0.35rem;
      font-size: 0.62rem;
      font-weight: 800;
      padding: 0.15rem 0.4rem;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
    }
    .go-card-body { padding: 0.55rem 0.65rem 0.65rem; flex: 1; display: flex; flex-direction: column; }
    .go-card-title {
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .go-card-meta {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.2rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }
    .go-set-components {
      list-style: none;
      margin: 0.35rem 0 0;
      padding: 0;
      font-size: 0.65rem;
      line-height: 1.45;
      color: var(--muted);
      max-height: 9.5rem;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .go-set-li {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0;
      padding: 0.05rem 0;
    }
    .go-set-step-lab {
      font-weight: 700;
      color: color-mix(in srgb, var(--muted) 70%, #fff 30%);
    }
    .go-set-step-sep {
      font-weight: 500;
      margin-right: 0.15rem;
    }
    .go-set-li-name {
      flex: 1;
      min-width: 0;
      font-weight: 500;
    }
    .go-card-price {
      margin-top: 0.45rem;
      font-size: 0.88rem;
      font-weight: 800;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .go-card-price .incl {
      display: block;
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--muted);
      margin-top: 0.1rem;
    }
    .go-time-disc {
      display: block;
      line-height: 1.45;
    }
    .go-time-disc-normal {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-thickness: 1px;
    }
    .go-time-disc-arrow {
      display: none;
    }
    .go-time-disc-now {
      display: block;
      font-size: 0.92rem;
      font-weight: 800;
      color: #ea580c;
      margin-top: 0.12rem;
    }
    .go-time-disc .incl {
      display: block;
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--muted);
      margin-top: 0.12rem;
    }
    .detail-time-disc {
      margin: 0.35rem 0 0.65rem;
      font-size: 0.88rem;
    }
    .badge-time-disc {
      font-size: 0.58rem;
      font-weight: 800;
      color: #fff7ed;
      background: rgba(234, 88, 12, 0.88);
      padding: 0.12rem 0.4rem;
      border-radius: 4px;
    }

    .badge-low { font-size: 0.6rem; font-weight: 700; color: #fde68a; background: rgba(180, 83, 9, 0.5); padding: 0.1rem 0.35rem; border-radius: 4px; }
    .badge-sold { font-size: 0.6rem; font-weight: 700; color: #fecaca; background: rgba(127, 29, 29, 0.6); padding: 0.1rem 0.35rem; border-radius: 4px; }
    .badge-set { font-size: 0.6rem; font-weight: 700; color: #bfdbfe; background: rgba(30, 58, 95, 0.7); padding: 0.1rem 0.35rem; border-radius: 4px; }
    .badge-alcohol { font-size: 0.6rem; font-weight: 700; color: #ffedd5; background: rgba(124, 45, 18, 0.65); padding: 0.1rem 0.35rem; border-radius: 4px; }
    .badge-course-in {
      font-size: 0.58rem; font-weight: 800; color: #ecfdf5; background: rgba(5, 150, 105, 0.85);
      padding: 0.12rem 0.4rem; border-radius: 4px;
    }
    .badge-course-add {
      font-size: 0.58rem; font-weight: 800; color: #fff7ed; background: rgba(234, 88, 12, 0.85);
      padding: 0.12rem 0.4rem; border-radius: 4px;
    }
    .course-included-price { color: #34d399; font-weight: 800; }
    #lastOrderBanner {
      display: none;
      position: sticky;
      top: calc(52px + env(safe-area-inset-top));
      z-index: 45;
      margin: 0;
      padding: 0.45rem 0.75rem;
      background: linear-gradient(180deg, rgba(30, 58, 95, 0.95), rgba(15, 23, 42, 0.98));
      border-bottom: 1px solid #334155;
      font-size: 0.78rem;
      text-align: center;
      line-height: 1.35;
    }
    #lastOrderBanner.lo-ended {
      background: linear-gradient(180deg, rgba(127, 29, 29, 0.9), rgba(69, 10, 10, 0.95));
    }
    #lastOrderBanner strong { font-variant-numeric: tabular-nums; color: #fde68a; }

    .course-menu-filter-wrap {
      display: none;
      padding: 0.35rem 0.75rem 0.5rem;
      background: linear-gradient(180deg, rgba(22, 26, 32, 0.98), rgba(15, 17, 21, 0.96));
      border-bottom: 1px solid var(--line);
      text-align: center;
    }
    .course-menu-filter-btn {
      width: 100%;
      max-width: 28rem;
      margin: 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.48rem 0.7rem;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .course-menu-filter-btn.is-active {
      background: rgba(5, 150, 105, 0.22);
      border-color: rgba(52, 211, 153, 0.45);
      color: #6ee7b7;
    }

    /* ========== フッターカート ========== */
    footer.go-cart {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.65rem 0.85rem calc(0.65rem + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(12, 14, 18, 0.92) 0%, #0c0e12 40%);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--line);
      display: flex;
      gap: 0.65rem;
      align-items: center;
      z-index: 30;
    }
    footer.go-cart .info {
      flex: 1;
      min-width: 0;
      cursor: pointer;
      user-select: none;
      border-radius: 10px;
      padding: 0.15rem 0.35rem;
      margin: -0.15rem -0.35rem;
    }
    footer.go-cart .info:active { opacity: 0.85; }
    footer.go-cart .count { font-size: 0.72rem; color: var(--muted); }
    footer.go-cart .sum { font-size: 1.05rem; font-weight: 800; font-variant-numeric: tabular-nums; }
    footer.go-cart button.submit {
      flex-shrink: 0;
      padding: 0.75rem 1.35rem;
      border: none;
      border-radius: 14px;
      background: linear-gradient(180deg, #fb923c, var(--accent));
      color: #fff;
      font-weight: 800;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(249, 115, 22, 0.35);
    }
    footer.go-cart button.submit:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
    }

    .toast {
      position: fixed;
      bottom: 6rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--line);
      padding: 0.55rem 1rem;
      border-radius: 12px;
      font-size: 0.82rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 220;
      max-width: 90vw;
      text-align: center;
    }
    .toast.show { opacity: 1; }

    /* ========== カート / 注文履歴シート（固定フッターとは別レイヤー） ========== */
    .guest-sheet {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      background: rgba(0, 0, 0, 0.55);
    }
    .guest-sheet.is-open {
      display: flex;
    }
    .guest-sheet-bg {
      position: absolute;
      inset: 0;
    }
    .guest-sheet-panel {
      position: relative;
      width: 100%;
      max-width: 28rem;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: sheetIn 0.28s ease-out;
    }
    .guest-sheet-pad {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .guest-sheet-pad .detail-title {
      flex-shrink: 0;
      margin: 0 0 0.5rem;
    }
    .guest-cart-lines {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-right: 0.15rem;
    }
    .guest-cart-line {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0.65rem 0.7rem;
      margin-bottom: 0.5rem;
      font-size: 0.82rem;
      background: var(--surface2);
    }
    .guest-cart-line-head {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      align-items: flex-start;
    }
    .guest-cart-line-head .nm {
      font-weight: 700;
      line-height: 1.35;
      min-width: 0;
      flex: 1;
    }
    .guest-cart-line-head .pr {
      font-weight: 800;
      color: var(--accent);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    .guest-cart-line-sub {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.35rem;
      white-space: pre-line;
      line-height: 1.45;
    }
    .guest-cart-line-actions {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0.45rem;
      flex-wrap: wrap;
    }
    .guest-cart-btn {
      padding: 0.32rem 0.55rem;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      font: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
    }
    .guest-cart-btn.danger {
      color: #fecaca;
      border-color: rgba(248, 113, 113, 0.35);
    }
    .guest-cart-qty {
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      min-width: 1.75rem;
      text-align: center;
      font-size: 0.88rem;
    }
    .guest-sheet-bar {
      flex-shrink: 0;
      padding: 0.65rem 1rem calc(0.65rem + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      display: flex;
      gap: 0.55rem;
      align-items: center;
      background: #0f131a;
    }
    .guest-sheet-bar .guest-sheet-sum {

      font-size: 0.95rem;
      font-weight: 800;

    }
    .guest-sheet-bar .submit {
      flex-shrink: 0;
      padding: 0.65rem 1.1rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(180deg, #fb923c, var(--accent));
      color: #fff;
      font-weight: 800;

    }
    .guest-sheet-bar .submit:disabled {

    }
    .guest-history-card {

    .guest-history-line--reorder:last-child {

    .guest-history-line-main {

    }
    .guest-history-name {

      font-weight: 700;
      margin-bottom: 0.15rem;

    }
    .guest-history-prev {

    }
    .guest-history-reorder {

      align-items: center;
      gap: 0.28rem;
      flex-shrink: 0;
    }
    .guest-history-qbtn {
      width: 2rem;
      height: 2rem;
      padding: 0;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 1rem;

      cursor: pointer;

    }
    .guest-history-qbtn:active {

    }
    .guest-history-qty {

    #err {
      margin: 0.65rem;
      padding: 0.75rem;
      background: rgba(127, 29, 29, 0.35);
      border-radius: 12px;
      color: #fecaca;
      font-size: 0.85rem;
      display: none;
      border: 1px solid rgba(248, 113, 113, 0.35);
    }

    /* 注文履歴はシート表示に統一（メニュー下の埋め込みは使わない） */
    #orders { display: none; }
    #orders h2 {
      font-size: 0.78rem;
      color: var(--muted);
      margin: 0 0 0.5rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .order-card {
      background: var(--surface);
      border-radius: 14px;
      padding: 0.75rem 0.85rem;
      margin-bottom: 0.5rem;
      border: 1px solid var(--line);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    /* ========== 商品詳細シート ========== */
    #detailSheet {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }
    #detailSheet.is-open { display: flex; }
    .detail-panel {
      width: 100%;
      max-width: 28rem;
      max-height: 92vh;
      min-height: 0;
      background: #12161f;
      border: 1px solid var(--line);
      border-radius: 20px 20px 0 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: sheetIn 0.28s ease-out;
    }
    @keyframes sheetIn {
      from { transform: translateY(100%); opacity: 0.85; }
      to { transform: translateY(0); opacity: 1; }
    }
    .detail-close {
      position: absolute;
      top: 0.65rem;
      right: 0.65rem;
      z-index: 5;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
    }
    .detail-hero {
      aspect-ratio: 16 / 10;
      /* 縦長画像の intrinsic 高さや aspect-ratio 非対応端末でもシートを食いつぶさない */
      max-height: min(42dvh, 260px);
      background: linear-gradient(145deg, #1e293b, #0f172a);
      position: relative;
      flex-shrink: 0;
      overflow: hidden;
    }
    .detail-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;

      border: 1px solid rgba(148, 163, 184, 0.32);

      font-size: 1.05rem;

    .opt-row:active { transform: translateY(0.5px); }
    .opt-row input {
      accent-color: var(--accent);
      width: 1.25rem;
      height: 1.25rem;

      border-radius: 999px;

    .opt-row .opt-name {
      flex: 1;
      min-width: 0;
      white-space: normal;
      word-break: break-word;

      font-weight: 800;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.45);
    }
    .opt-row .opt-price {
      font-size: 0.92rem;
      font-weight: 700;

    .opt-row:hover {
      border-color: rgba(226, 232, 240, 0.45);

    .opt-row input:focus-visible { outline: 2px solid rgba(251, 146, 60, 0.55); outline-offset: 3px; border-radius: 999px; }

      border-color: rgba(251, 146, 60, 0.65);
      background: rgba(251, 146, 60, 0.16);

      outline: 2px solid rgba(251, 146, 60, 0.55);

    }
    .opt-row.is-disabled {

      pointer-events: none;
      background: rgba(15, 23, 42, 0.6);

    /* セット構成単品の「オプション」(opt-comp) が白飛びして読めない環境があるため、濃い面に統一 */
    .opt-comp {
      display: none;
      margin: 0.35rem 0 0.55rem 0.8rem !important;
      padding: 0.55rem 0.6rem !important;
      border-left: 3px solid rgba(251, 146, 60, 0.75) !important;
      background: rgba(2, 6, 23, 0.65) !important;
      border-radius: 12px !important;
    }
    /* 標準付属はチェックボックスがないため、直後の opt-comp を常に表示 */
    .opt-row-fixed + .opt-comp,
    .opt-comp.opt-comp--fixed {
      display: block;
    }
    /* チェックした行の直後だけ展開（対応ブラウザ用）。JSでも同じ制御を行う */
    label.opt-row:has(> input[type=checkbox]:checked) + .opt-comp { display: block; }
    .opt-comp .muted { color: rgba(241, 245, 249, 0.78) !important; }
    .opt-comp [data-comp-opt-group].opt-block {
      background: rgba(15, 23, 42, 0.92) !important;
      border: 1px solid rgba(148, 163, 184, 0.22) !important;

    .guest-deferred-kitchen-panel {

      align-items: center;

      height: 100%;

    .agegate-lead {
      margin: 0 0 0.65rem;

    .agegate-q {

      font-weight: 600;
      line-height: 1.55;

    .agegate-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
    }
    .agegate-btn {
      border: none;
      border-radius: 12px;
      padding: 0.78rem 0.4rem;
      font-weight: 800;
      font-size: 0.78rem;
      line-height: 1.35;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.1s ease, filter 0.12s;

    .agegate-btn:active {

    }
    .agegate-btn--deny {

      color: #ffffff;

    }

    /* コース＋オプション（有料で対象拡大） */
    .course-pack-strip {

          <circle cx="50" cy="50" r="48" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5" />

          <path
            d="M50 22 L40 48 Q50 58 60 48 L50 22 Z"

            stroke-width="1.8"
            stroke-linejoin="round"
          />
          <path d="M44 40 Q50 46 56 40" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" />
          <line x1="50" y1="56" x2="50" y2="72" stroke="#991b1b" stroke-width="2.2" stroke-linecap="round" />
          <path d="M40 74 h20" stroke="#991b1b" stroke-width="2.5" stroke-linecap="round" />
          <!-- 車（横から見た簡易シルエット） -->
          <path
            d="M18 78 h64 a3 3 0 0 0 3-3v-4H15v4a3 3 0 0 0 3 3z"

          />
          <path d="M22 71 L30 60 h40 l8 11" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" stroke-linejoin="round" />
          <circle cx="32" cy="78" r="4.2" fill="#1e293b" />
          <circle cx="68" cy="78" r="4.2" fill="#1e293b" />
          <!-- 禁止線（最前面） -->

      </div>
      <p class="agegate-lead">20歳未満の方、および車でご来店の方の飲酒はお断りしております。</p>
      <p class="agegate-q" id="ageGateQuestion">あなたと同席者は全員20歳以上であり、運転の予定はございませんか？</p>
      <div class="agegate-actions">
        <button type="button" class="agegate-btn agegate-btn--deny" id="ageGateDeny">いいえ (飲酒不可)</button>
        <button type="button" class="agegate-btn agegate-btn--allow" id="ageGateAllow">はい (飲酒OK)</button>
      </div>
    </div>
  </div>

  <script>
    const TOKEN = __TOKEN_JS__;
    const DEVICE_KEY = "order-guest-device-v1";
    const PROFILE_KEY = "order-customer-profile-v1";
    const PROFILE_OPEN_KEY = "order-guest-profile-open-v1";

    function readProfileOpenPref() {
      try {
        return localStorage.getItem(PROFILE_OPEN_KEY + "_" + String(TOKEN || "x")) === "1";
      } catch (_) {
        return false;
      }
    }
    function writeProfileOpenPref(open) {
      try {
        localStorage.setItem(PROFILE_OPEN_KEY + "_" + String(TOKEN || "x"), open ? "1" : "0");
      } catch (_) {}
    }

    function setupCombineBillingUi() {
      const card = document.getElementById("combineBillingCard");
      const btn = document.getElementById("combineBillingToggle");
      const shareEl = document.getElementById("shareGuestTokenDisplay");
      const peerEl = document.getElementById("peerGuestTokenInput");
      const goBtn = document.getElementById("btnCombineBilling");
      const hint = document.getElementById("combineBillingHint");
      if (!card || !btn || !shareEl || !peerEl || !goBtn) return;
      shareEl.value = String(TOKEN || "");
      btn.onclick = function () {
        const isCollapsed = card.classList.contains("is-collapsed");
        if (isCollapsed) {
          card.classList.remove("is-collapsed");
          btn.setAttribute("aria-expanded", "true");
        } else {
          card.classList.add("is-collapsed");
          btn.setAttribute("aria-expanded", "false");
        }
      };
      goBtn.onclick = async function () {
        if (hint) hint.textContent = "";
        const peer = String(peerEl.value || "").trim();
        if (!peer) {
          toast("相手のトークンを入力してください");
          return;
        }
        try {
          await api("/guest/" + encodeURIComponent(TOKEN) + "/combine-same-table-billing", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ peerGuestToken: peer }),
          });
          toast("まとめました");
          location.reload();
        } catch (e) {
          const msg = String(e.message || e);
          if (hint) hint.textContent = msg;
          toast(msg);
        }
      };
    }

    function setProfileCollapsed(collapsed, focusOpts) {
      const card = document.getElementById("profileCard");
      const btn = document.getElementById("profileToggle");
      const body = document.getElementById("profileBody");
      if (!card || !btn || !body) return;
      card.classList.toggle("is-collapsed", collapsed);
      btn.setAttribute("aria-expanded", collapsed ? "false" : "true");
      if (!collapsed && focusOpts && focusOpts.focus === true) {
        try {
          const first = body.querySelector("input,button,select,textarea");
          if (first) first.focus();
        } catch (_) {}
      }
    }

    function blurIfFocusInProfile() {
      try {
        const c = document.getElementById("profileCard");
        const ae = document.activeElement;
        if (c && ae && c.contains(ae) && typeof ae.blur === "function") ae.blur();
      } catch (_) {}
    }

    function getOrCreateDeviceId() {
      try {
        let id = localStorage.getItem(DEVICE_KEY);
        if (id && /^[a-zA-Z0-9_-]{8,128}$/.test(id)) return id;
        id =
          typeof crypto !== "undefined" && typeof crypto.randomUUID === "function"
            ? crypto.randomUUID()
            : "g" + Date.now().toString(36) + Math.random().toString(36).slice(2, 12);
        localStorage.setItem(DEVICE_KEY, id);
        return id;
      } catch (_) {
        return "fallback-" + Date.now().toString(36);
      }
    }

    function readLocalCustomerProfile() {
      try {
        const raw = localStorage.getItem(PROFILE_KEY);
        if (!raw) return { name: "", phone: "", email: "" };
        const p = JSON.parse(raw);
        return {
          name: p && typeof p.name === "string" ? p.name : "",
          phone: p && typeof p.phone === "string" ? p.phone : "",
          email: p && typeof p.email === "string" ? p.email : "",
        };
      } catch (_) {
        return { name: "", phone: "", email: "" };
      }
    }

    function writeLocalCustomerProfile(next) {
      try {
        localStorage.setItem(
          PROFILE_KEY,
          JSON.stringify({
            name: String(next.name || "").trim().slice(0, 100),
            phone: String(next.phone || "").trim().slice(0, 30),
            email: String(next.email || "").trim().slice(0, 200),
            at: Date.now(),
          })
        );
      } catch (_) {}
    }

    const api = (path, opt) => fetch(path, opt).then(async (r) => {
      const j = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(j.message || j.error || r.statusText || String(r.status));
      return j;
    });

    /** @type {Record<string, unknown>} */
    const cart = {};

    function guestCartStorageKey() {
      return "guestCart_v1:" + String(TOKEN || "");
    }

    function clearGuestCartStorage() {
      try {
        localStorage.removeItem(guestCartStorageKey());
      } catch (_) {}
    }

    function persistGuestCart() {
      try {
        if (!TOKEN) return;
        const key = guestCartStorageKey();
        const lines = [];
        for (const cartKey of Object.keys(cart)) {
          const line = cart[cartKey];
          if (!line || !(line.qty > 0)) continue;
          const snap = JSON.parse(JSON.stringify(line));
          lines.push({ cartKey, line: snap });
        }
        if (!lines.length) {
          localStorage.removeItem(key);
          return;
        }
        localStorage.setItem(key, JSON.stringify({ v: 1, lines }));
      } catch (_) {}
    }

    /**
     * @param {string} cartKey
     * @param {Record<string, unknown>} src
     */
    function validateHydratedCartLine(cartKey, src) {
      if (!cartKey || !src || typeof src !== "object") return null;
      const menuItemId = src.menuItemId != null ? String(src.menuItemId) : "";
      if (!menuItemId) return null;
      const item = menuItemById.get(menuItemId);
      if (!item) return null;
      const qty = Math.max(0, Math.min(99, Math.floor(Number(src.qty) || 0)));
      if (qty <= 0) return null;
      let eatMode = src.eatMode === "takeout" ? "takeout" : "dine_in";
      if (eatMode === "takeout" && !item.allowTakeout) eatMode = "dine_in";

      const sellKind = src.sellKind === "set" ? "set" : "single";

      if (sellKind === "set") {
        if (item.sellKind !== "set" || !item.setSteps || !item.setSteps.length) return null;
        const setSelections = Array.isArray(src.setSelections) ? src.setSelections : null;
        if (!setSelections) return null;
        for (const st of item.setSteps) {
          const sel = setSelections.find((x) => String(x.stepId) === String(st.id));
          const n = sel && sel.menuItemIds ? sel.menuItemIds.length : 0;
          if (!guestValidateSetStepPickCount(st, n)) return null;
        }
        const unitPrice = computeSetUnitPrice(item, setSelections);
        if (unitPrice == null) return null;
        if (!setStockAllows(item, setSelections, qty)) return null;
        const fakeLine = {
          menuItemId: item.id,
          sellKind: "set",
          setSelections,
          qty,
        };
        if (Array.isArray(src.setComponentOptionSelections) && src.setComponentOptionSelections.length) {
          fakeLine.setComponentOptionSelections = src.setComponentOptionSelections;
        }
        if (alcoholRestricted && setSelectionHasAlcohol(item, setSelections)) return null;
        if (alcoholRestricted && fakeLine.setComponentOptionSelections && cartLineBlocksAlcohol(fakeLine)) return null;
        /** @type {Record<string, unknown>} */
        const out = {
          cartKey,
          menuItemId: item.id,
          name: item.name,
          unitPrice,
          qty,
          sellKind: "set",
          setSelections,
          eatMode,
        };
        if (Array.isArray(src.setComponentOptionSelections) && src.setComponentOptionSelections.length) {
          out.setComponentOptionSelections = src.setComponentOptionSelections;
        }
        if (src.serveLaterDeferStepIds && Array.isArray(src.serveLaterDeferStepIds) && src.serveLaterDeferStepIds.length) {
          out.serveLaterDeferStepIds = src.serveLaterDeferStepIds.map((x) => String(x));
          if (src.serveLaterDeferPairDrinkDessert) out.serveLaterDeferPairDrinkDessert = true;
        } else if (src.serveLaterDeferStepId) {
          out.serveLaterDeferStepId = String(src.serveLaterDeferStepId);
        }
        return out;
      }

      if (item.sellKind === "set") return null;
      const optionSelections = Array.isArray(src.optionSelections) ? src.optionSelections : [];
      if (optionSelections.length) {
        if (!item.optionGroups || !item.optionGroups.length) return null;
        for (const g of item.optionGroups) {
          const sel = optionSelections.find((x) => String(x.optionGroupId) === String(g.id));
          const n = sel && sel.optionItemIds ? sel.optionItemIds.length : 0;
          if (n < g.minSelect || n > g.maxSelect) return null;
        }
        const unitPrice = computeOptionUnitPrice(item, optionSelections);
        const fakeLine = { menuItemId: item.id, sellKind: "single", optionSelections, qty };
        if (alcoholRestricted && cartLineBlocksAlcohol(fakeLine)) return null;
        if (item.stockQty != null && totalCartQtyForMenuItem(item.id) + qty > item.stockQty) return null;
        return {
          cartKey,
          menuItemId: item.id,
          name: item.name,
          unitPrice,
          qty,
          sellKind: "single",
          optionSelections,
          eatMode,
        };
      }

      const unitPrice = singleGuestChargeBase(item);
      const fakeLine = { menuItemId: item.id, sellKind: "single", qty };
      if (alcoholRestricted && cartLineBlocksAlcohol(fakeLine)) return null;
      if (item.stockQty != null && totalCartQtyForMenuItem(item.id) + qty > item.stockQty) return null;
      return {
        cartKey,
        menuItemId: item.id,
        name: item.name,
        unitPrice,
        qty,
        sellKind: "single",
        eatMode,
      };
    }

    function hydrateGuestCartFromStorage() {
      if (!TOKEN) return;
      let parsed = null;
      try {
        const raw = localStorage.getItem(guestCartStorageKey());
        if (!raw) return;
        parsed = JSON.parse(raw);
      } catch (_) {
        return;
      }
      if (!parsed || parsed.v !== 1 || !Array.isArray(parsed.lines)) return;
      for (const row of parsed.lines) {
        const ck = row && typeof row.cartKey === "string" ? row.cartKey : "";
        const src = row && row.line && typeof row.line === "object" ? row.line : null;
        if (!ck || !src) continue;
        const normalized = validateHydratedCartLine(ck, src);
        if (!normalized) continue;
        if (!cart[ck] || !(cart[ck].qty > 0)) cart[ck] = normalized;
      }
    }

    let guestShowMenuPrices = true;
    let guestOrderGateBlocked = false;
    let guestOrderGateMessage = "";
    let menuPriceTaxMode = "inclusive";
    let coursePriceTaxMode = "inclusive";
    let taxRatePercent = 10;
    let alcoholRestricted = false;
    /** @type {Map<string, object>} */
    let menuItemById = new Map();
    let lastOrderTimer = null;
    let lastOrderDeadlineTs = 0;
    /** block_all かつ締切後など、全カテゴリを締めるとき true（従来互換） */
    let lastOrderClosedFlag = false;
    /** ローカル時計でラストオーダー締切を過ぎたか（単品のみモードの判定に使用） */
    let guestLastOrderPastLocal = false;
    /** allow_all | singles_only | singles_paid_only | block_all */
    let guestLoPolicy = "block_all";
    /** @type {unknown[]} */
    let guestMenuCategories = [];
    /** @type {unknown[]} */
    let ordersCache = [];
    /** @type {{ id: string, name: string } | null} */
    let ordersSessionCourse = null;
    let sessionGuestCount = 1;
    let activeGuestCatId = "";
    let courseIncludedOnly = false;
    let guestShowEatModeTaxNote = false;
    const guestServeLaterDefaults = {
      guestServeLaterBlockTitle: "後から提供",
      guestServeLaterSelectPlaceholder: "選択してください",
      guestServeLaterWithMealLabel: "料理と一緒に出す",
      guestServeLaterPairDrinkDessertLabel:
        "後からメニューが2つ以上ある場合はドリンクとデザートは後から出す",
      guestServeLaterPerStepOptionFormat: "{label} だけ後から",
      guestServeLaterSingleRadioDeferFormat: "「{label}」は後から提供（別の明細・キッチン行・0円）",
      guestServeLaterHelpSingle: "セット価格はそのままです。在庫切れキャンセルはセット全体まとめて行われます。",
      guestServeLaterHelpMulti: "選んだ項目だけ別明細（0円）になります。キャンセルはセット全体です。",
    };
    let guestServeLaterCopy = Object.assign({}, guestServeLaterDefaults);
    function syncGuestServeLaterCopyFromStore(store) {
      const st = store || {};
      for (const k of Object.keys(guestServeLaterDefaults)) {
        const v = st[k];
        guestServeLaterCopy[k] =
          typeof v === "string" && String(v).trim() ? String(v).trim() : guestServeLaterDefaults[k];
      }
    }
    /** 店舗設定の `{label}` をステップ名に置換し、表示用にエスケープ */
    function guestServeLaterFillTemplate(template, rawLabel) {
      const lab = String(rawLabel || "").trim() || "（項目）";
      const filled = String(template || "").replace(/\{label\}/g, lab);
      return escapeHtml(filled);
    }
    /** "1" = 単品・全商品も表示 / 未設定・"0" = コース対象のみ（既定） */
    function courseFilterStorageKey() {
      return "guestCourseShowAllMenu_" + String(TOKEN || "x");
    }
    function readCourseFilterPref() {
      try {
        return sessionStorage.getItem(courseFilterStorageKey()) !== "1";
      } catch (_) {
        return true;
      }
    }
    function writeCourseFilterPref(courseIncludedOnly) {
      try {
        sessionStorage.setItem(courseFilterStorageKey(), courseIncludedOnly ? "0" : "1");
      } catch (_) {}
    }
    function syncGuestMenuCardsVisibility() {
      document.querySelectorAll("#menu .go-card").forEach((card) => {
        const catOk = !activeGuestCatId || card.dataset.cat === activeGuestCatId;
        const inc = card.dataset.courseIncluded === "1";
        const courseOk = !courseIncludedOnly || inc;
        card.style.display = catOk && courseOk ? "" : "none";
      });
    }

    function guestLoIsSinglesOnlyMode() {
      return guestLoPolicy === "singles_only" || guestLoPolicy === "singles_paid_only";
    }

    function guestLoChargesIncludedAsPaid() {
      return guestLastOrderPastLocal && guestLoPolicy === "singles_paid_only";
    }

    function guestLoSetBlockedToast() {
      return "ラストオーダー後はセットをご注文いただけません（単品のみご利用いただけます）";
    }

    function guestCardDimByLastOrderSellKind(sellKind) {
      if (!guestLastOrderPastLocal) return false;
      if (guestLoPolicy === "allow_all") return false;
      if (guestLoPolicy === "block_all") return true;
      return sellKind === "set";
    }

    /** 商品詳細・カート追加をブロックするか（単品のみモードではセットのみ） */
    function guestProductDetailBlocked(item) {
      if (!guestLastOrderPastLocal) return false;
      if (guestLoPolicy === "allow_all") return false;
      if (guestLoPolicy === "block_all") return true;
      return item && item.sellKind === "set";
    }

    function guestReorderBlockedByParsed(parsed) {
      if (!guestLastOrderPastLocal) return false;
      if (guestLoPolicy === "allow_all") return false;
      if (guestLoPolicy === "block_all") return true;
      return parsed && parsed.sellKind === "set";
    }

    function guestSubmitBlockedByLastOrder() {
      if (!guestLastOrderPastLocal) return false;
      if (guestLoPolicy === "allow_all") return false;
      if (guestLoPolicy === "block_all") return true;
      const lines = Object.values(cart).filter((x) => x.qty > 0);
      return lines.some((x) => x.sellKind === "set");
    }

    function syncGuestMenuCardsDimForLastOrder() {
      document.querySelectorAll("#menu .go-card").forEach((card) => {
        const base = card.dataset.guestBlockedBase === "1";
        const sk = card.dataset.sellKind === "set" ? "set" : "single";
        card.classList.toggle("is-dim", base || guestCardDimByLastOrderSellKind(sk));
      });
    }

    function fmtMoney(n) {
      if (!guestShowMenuPrices) return "—";
      return "¥" + n.toLocaleString("ja-JP");
    }
    /** 単品・セット内オプションの差額表示（金額非表示設定時は数値を出さない） */
    function fmtGuestOptionDeltaHtml(yenTaxInclusive) {
      const y = Math.max(0, Number(yenTaxInclusive || 0));
      if (!guestShowMenuPrices) {
        return y > 0
          ? "<span class=\"muted\" style=\"font-size:.68rem\">（お会計時にご案内）</span>"
          : "+¥0";
      }
      if (y > 0) {
        return (
          "+" +
          y.toLocaleString("ja-JP") +
          "円 <span style=\"color:var(--muted);font-size:.68rem\">(税込目安)</span>"
        );
      }
      return "+¥0";
    }
    /** セット構成選択の付加価格（税込） */
    function fmtGuestSetStepChoiceExtraHtml(ch) {
      const ex = Number(ch.extraPrice || 0);
      if (ex <= 0) return "+¥0";
      if (!guestShowMenuPrices) {
        return "<span class=\"muted\" style=\"font-size:.68rem\">（お会計時にご案内）</span>";
      }
      const incl = choiceExtraInclusive(ch);
      return (
        "+" +
        fmtMoney(incl).replace("¥", "") +
        " <span style=\"color:var(--muted);font-size:.68rem;font-weight:500\">(税込)</span>"
      );
    }

    function guestOptionSelectBounds(g) {
      const minSelect = Math.max(0, Number(g.minSelect) || 0);
      let maxSelect = Number(g.maxSelect);
      if (!Number.isFinite(maxSelect) || maxSelect < 1) maxSelect = Math.max(minSelect, 1);
      if (maxSelect < minSelect) maxSelect = minSelect;
      return { minSelect, maxSelect };
    }

    function guestSetChoiceByMid(st, mid) {
      const k = String(mid);
      return (
        (st.choices || []).find((c) => String(c.menuItemId) === k) ||
        (st.fixedChoices || []).find((c) => String(c.menuItemId) === k) ||
        null
      );
    }

    function guestSetMergedPickIds(st, rootEl) {
      const stepEl = rootEl.querySelector("[data-step-id=\"" + selEsc(st.id) + "\"]");
      const userIds = stepEl
        ? [...stepEl.querySelectorAll("input[type=checkbox][name^=\"p-\"]:checked")].map((x) => x.value)
        : [];
      const fixedIds = (st.fixedChoices || []).map((c) => String(c.menuItemId));
      return [...new Set([...fixedIds, ...userIds])];
    }

    function guestChoiceOptionGroups(ch) {
      if (ch && ch.optionGroups && ch.optionGroups.length) return ch.optionGroups;
      const mid = ch && ch.menuItemId != null ? String(ch.menuItemId) : "";
      if (!mid) return [];
      const fromCatalog = menuItemById.get(mid);
      if (fromCatalog && fromCatalog.optionGroups && fromCatalog.optionGroups.length) {
        return fromCatalog.optionGroups;
      }
      return [];
    }

    function guestHtmlSetChoiceOptionGroups(st, ch, visible) {
      const groups = guestChoiceOptionGroups(ch);
      if (!groups.length) return "";
      const disp = visible === false ? ' style="display:none"' : "";
      const fixedCls = visible !== false ? " opt-comp--fixed" : "";
      let html =
        "<div class=\"opt-comp" +
        fixedCls +
        "\"" +
        disp +
        ' data-comp-for="' +
        escapeHtml(ch.menuItemId) +
        '">';
      html +=
        "<div class=\"muted\" style=\"font-size:.68rem;margin:0 0 .25rem\">オプション（" +
        escapeHtml(ch.name) +
        "）</div>";
      for (const g of groups) {
        const b = guestOptionSelectBounds(g);
        const useRadio = b.maxSelect <= 1;
        html +=
          "<div class=\"opt-block\" data-comp-opt-group><div class=\"opt-block-head\"><strong>" +
          escapeHtml(g.name) +
          "</strong>" +
          (b.minSelect > 0 ? '<span class="tag-req">必須</span>' : '<span class="tag-opt">任意</span>') +
          '<span class="tag-opt" style="margin-left:auto">' +
          b.minSelect +
          "〜" +
          b.maxSelect +
          "個</span></div>";
        for (const oi of g.items || []) {
          const priceTxt = fmtGuestOptionDeltaHtml(Number(oi.priceDelta || 0));
          const nm = "copt-" + escapeHtml(st.id) + "-" + escapeHtml(ch.menuItemId) + "-" + escapeHtml(g.id);
          if (useRadio) {
            html +=
              '<label class="opt-row"><input type="radio" name="' +
              nm +
              '" value="' +
              escapeHtml(oi.id) +
              '" /><span class="opt-name">' +
              escapeHtml(oi.name) +
              '</span><span class="opt-price">' +
              priceTxt +
              "</span></label>";
          } else {
            html +=
              '<label class="opt-row"><input type="checkbox" name="' +
              nm +
              '" value="' +
              escapeHtml(oi.id) +
              '" data-min="' +
              b.minSelect +
              '" data-max="' +
              b.maxSelect +
              '" /><span class="opt-name">' +
              escapeHtml(oi.name) +
              '</span><span class="opt-price">' +
              priceTxt +
              "</span></label>";
          }
        }
        html += "</div>";
      }
      html += "</div>";
      return html;
    }

    function guestValidateSetStepPickCount(st, userPickCount) {
      const pickable = (st.choices || []).length;
      if (pickable === 0) return userPickCount === 0;
      return userPickCount >= st.minPick && userPickCount <= st.maxPick;
    }


    function guestSetStepUserPickCount(st, menuItemIds) {
      const fixedSet = new Set((st.fixedChoices || []).map((c) => String(c.menuItemId)));
      return (menuItemIds || []).filter((id) => !fixedSet.has(String(id))).length;
    }

    function guestValidateSetComponentOptions(st, rootEl) {
      for (const mid of guestSetMergedPickIds(st, rootEl)) {
        const ch = guestSetChoiceByMid(st, mid);
        if (!ch || !ch.optionGroups || !ch.optionGroups.length) continue;
        for (const g of ch.optionGroups) {
          const b = guestOptionSelectBounds(g);
          const nm = "copt-" + st.id + "-" + mid + "-" + g.id;
          const useRadio = b.maxSelect <= 1;
          let picked = 0;
          if (useRadio) {
            const r = rootEl.querySelector("input[type=radio][name=\"" + selEsc(nm) + "\"]:checked");
            picked = r && r.value ? 1 : 0;
          } else {
            picked = rootEl.querySelectorAll("input[type=checkbox][name=\"" + selEsc(nm) + "\"]:checked").length;
          }
          if (picked < b.minSelect || picked > b.maxSelect) {
            toast(
              (ch.name || "構成単品") +
                " の「" +
                g.name +
                "」は " +
                b.minSelect +
                "〜" +
                b.maxSelect +
                " 個選んでください",
            );
            return false;
          }
        }
      }
      return true;
    }

    function wireGuestSetComponentOptionLimits(panel) {
      panel.querySelectorAll('.opt-comp input[type="checkbox"][data-max]').forEach((inp) => {
        inp.addEventListener("change", () => {
          const maxP = Number(inp.getAttribute("data-max") || 1);
          const boxes = panel.querySelectorAll('input[type="checkbox"][name="' + inp.name + '"]');
          if ([...boxes].filter((b) => b.checked).length > maxP) {
            inp.checked = false;
            toast("このオプションは最大 " + maxP + " 個までです");
          }
        });
      });
    }
    function guestTimeDiscountActive(item) {
      if (!item) return false;
      const orig = Number(item.originalTaxIncludedPrice);
      const cur = Number(item.taxIncludedPrice != null ? item.taxIncludedPrice : item.price);
      return Number.isFinite(orig) && orig > 0 && Number.isFinite(cur) && orig > cur;
    }

    function fmtGuestTimeDiscountPriceHtml(item) {
      const orig = Number(item.originalTaxIncludedPrice);
      const cur = Number(item.taxIncludedPrice != null ? item.taxIncludedPrice : item.price);
      const mode = item.priceTaxMode === "exclusive" ? "exclusive" : menuPriceTaxMode;
      let html =
        "<span class=\"go-time-disc\">" +
        "<span class=\"go-time-disc-normal\">通常価格 ¥" +
        orig.toLocaleString("ja-JP") +
        "</span>" +
        "<span class=\"go-time-disc-now\">今の時間は ¥" +
        cur.toLocaleString("ja-JP") +
        "</span>";
      if (mode === "exclusive") {
        const base = Number(item.basePrice || 0);
        html +=
          "<span class=\"incl\">税抜 ¥" +
          base.toLocaleString("ja-JP") +
          "（今の時間の税込は ¥" +
          cur.toLocaleString("ja-JP") +
          "）</span>";
      } else {
        html += "<span class=\"incl\">（税込）</span>";
      }
      html += "</span>";
      return html;
    }

    function fmtItemPrice(item) {
      if (item.courseTier === "included" && !guestLoChargesIncludedAsPaid()) {
        if (!guestShowMenuPrices) return "<span class=\"course-included-price\">コース内</span>";
        const optLine = guestCourseIncludedChargeOptionExtras
          ? "<span class=\"incl\">オプション差額は追加になる場合があります</span>"
          : "<span class=\"incl\">オプション差額もコース内（0円）</span>";
        const refLine = guestTimeDiscountActive(item)
          ? "<span class=\"incl\">参考・" + fmtGuestTimeDiscountPriceHtml(item) + "</span>"
          : "<span class=\"incl\">参考・メニュー税込 ¥" + Number(item.price || 0).toLocaleString("ja-JP") + "</span>";
        return (
          "<span class=\"course-included-price\">コース料に含む（本体追加0円）</span>" +
          optLine +
          refLine
        );
      }
      if (!guestShowMenuPrices) {
        return item.courseTier === "addon" ? "追加料金" : "—";
      }
      if (guestTimeDiscountActive(item)) {
        let core = fmtGuestTimeDiscountPriceHtml(item);
        if (item.courseTier === "addon") {
          core += " <span class=\"badge-course-add\" style=\"font-size:0.55rem;vertical-align:middle\">追加料金</span>";
        }
        return core;
      }
      const mode = item.priceTaxMode === "exclusive" ? "exclusive" : menuPriceTaxMode;
      let core = "";
      if (mode === "exclusive") {
        const base = Number(item.basePrice || item.price || 0);
        const incl = Number(item.taxIncludedPrice || item.price || 0);
        core =
          "¥" +
          base.toLocaleString("ja-JP") +
          "<span class=\"incl\">税込 ¥" +
          incl.toLocaleString("ja-JP") +
          "</span>";
      } else {
        core = "¥" + Number(item.price || 0).toLocaleString("ja-JP");
      }
      if (item.courseTier === "addon") {
        core += " <span class=\"badge-course-add\" style=\"font-size:0.55rem;vertical-align:middle\">追加料金</span>";
      }
      return core;
    }

    /** コース内単品は追加料金0（税込ベース）。それ以外はゲスト表示価格 */
    function singleGuestChargeBase(item) {
      if (item.courseTier === "included" && !guestLoChargesIncludedAsPaid()) return 0;
      return Number(item.price || 0);
    }

    function itemShowsAlcoholBadge(it) {
      if (it.containsAlcohol) return true;
      if (it.sellKind === "set" && it.setSteps) {
        for (const st of it.setSteps) {
          for (const ch of st.choices || []) {
            if (ch.containsAlcohol) return true;
          }
          for (const ch of st.fixedChoices || []) {
            if (ch.containsAlcohol) return true;
          }
        }
      }
      return false;
    }

    function setSelectionHasAlcohol(item, setSelections) {
      if (item.containsAlcohol) return true;
      const sel = setSelections || [];
      for (const st of item.setSteps || []) {
        for (const ch of st.fixedChoices || []) {
          if (ch.containsAlcohol) return true;
        }
        const row = sel.find((x) => String(x.stepId) === String(st.id));
        if (!row || !row.menuItemIds) continue;
        for (const mid of row.menuItemIds) {
          const ch = (st.choices || []).find((c) => String(c.menuItemId) === String(mid));
          if (ch && ch.containsAlcohol) return true;
        }
      }
      return false;
    }

    function cartLineBlocksAlcohol(line) {
      if (!alcoholRestricted) return false;
      const it =
        line.menuItemId != null && line.menuItemId !== ""
          ? menuItemById.get(String(line.menuItemId))
          : null;
      if (!it) return false;
      if (it.sellKind === "set") return setSelectionHasAlcohol(it, line.setSelections);
      return it.containsAlcohol === true;
    }

    function cartSumLabel(n) {
      if (!guestShowMenuPrices) return "（お会計時にご案内）";
      return "¥" + n.toLocaleString("ja-JP");
    }

    function renderCart() {
      const lines = Object.values(cart).filter((x) => x.qty > 0);
      const count = lines.reduce((s, x) => s + x.qty, 0);
      const sum = lines.reduce((s, x) => s + x.unitPrice * x.qty, 0);
      document.getElementById("cartCount").textContent = "カート " + count + "点";
      document.getElementById("cartSum").textContent = cartSumLabel(sum);
      document.getElementById("submit").disabled = count === 0 || guestSubmitBlockedByLastOrder();
      syncCartSheetIfOpen();
      persistGuestCart();
    }

    function toast(t) {
      const el = document.getElementById("toast");
      el.textContent = t;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 1800);
    }

    function stableSetKey(sel) {
      if (!sel || !sel.length) return "";
      return sel
        .map((s) => String(s.stepId) + ":" + [...(s.menuItemIds || [])].sort().join(","))
        .sort()
        .join("|");
    }

    function choiceExtraInclusive(ch) {
      const ex = Number(ch.extraPrice || 0);
      if (ch.extraTaxIncluded != null && Number.isFinite(Number(ch.extraTaxIncluded))) {
        return Number(ch.extraTaxIncluded);
      }
      return Math.round(ex * (1 + taxRatePercent / 100));
    }

    function computeSetUnitPrice(item, setSelections) {
      let extras = 0;
      for (const st of item.setSteps || []) {
        const sel = setSelections.find((x) => String(x.stepId) === String(st.id));
        const ids = sel && sel.menuItemIds ? sel.menuItemIds : [];
        const fixedSet = new Set((st.fixedChoices || []).map((c) => String(c.menuItemId)));
        const seen = new Set();
        for (const mid of ids) {
          const midK = String(mid);
          const ch = (st.choices || []).find((c) => String(c.menuItemId) === midK);
          const fc = (st.fixedChoices || []).find((c) => String(c.menuItemId) === midK);
          const row = ch || fc;
          if (!row) return null;
          if (seen.has(midK)) continue;
          seen.add(midK);
          extras += choiceExtraInclusive(row);
        }
        for (const fc of st.fixedChoices || []) {
          const fk = String(fc.menuItemId);
          if (!seen.has(fk)) {
            seen.add(fk);
            extras += choiceExtraInclusive(fc);
          }
        }
        const userPickCount = ids.filter((id) => !fixedSet.has(String(id))).length;
        if (userPickCount < st.minPick || userPickCount > st.maxPick) return null;
      }
      return Number(item.price || 0) + extras;
    }

    function stableOptionKey(sel) {
      if (!sel || !sel.length) return "";
      return sel
        .map((x) => String(x.optionGroupId) + ":" + [...(x.optionItemIds || [])].sort().join(","))
        .sort()
        .join("|");
    }

    function computeOptionUnitPrice(item, optionSelections) {
      let add = 0;
      for (const g of item.optionGroups || []) {
        const row = optionSelections.find((o) => String(o.optionGroupId) === String(g.id));
        const ids = (row && row.optionItemIds) || [];
        for (const oid of ids) {
          const oi = (g.items || []).find((x) => String(x.id) === String(oid));
          if (oi) add += Number(oi.priceDelta || 0);
        }
      }
      const base = singleGuestChargeBase(item);
      if (
        item.courseTier === "included" &&
        !guestCourseIncludedChargeOptionExtras &&
        !guestLoChargesIncludedAsPaid()
      ) {
        return 0;
      }
      return base + add;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function closeDetail() {
      const host = document.getElementById("detailSheet");
      host.classList.remove("is-open");
      host.innerHTML = "";
      host.setAttribute("aria-hidden", "true");
    }

    function setStockAllows(item, setSelections, addQty) {
      const need = new Map();
      need.set(String(item.id), addQty);
      for (const st of item.setSteps || []) {
        const sel = setSelections.find((x) => String(x.stepId) === String(st.id));
        if (!sel) return false;
        for (const mid of sel.menuItemIds || []) {
          const k = String(mid);
          need.set(k, (need.get(k) || 0) + addQty);
        }
        for (const fc of st.fixedChoices || []) {
          const fk = String(fc.menuItemId);
          need.set(fk, (need.get(fk) || 0) + addQty);
        }
      }
      for (const [id, q] of need) {
        let max = null;
        if (id === String(item.id)) {
          max = item.stockQty;
        } else {
          for (const st of item.setSteps) {
            for (const ch of st.choices || []) {
              if (String(ch.menuItemId) === id && ch.stockQty != null) max = ch.stockQty;
            }
            for (const ch of st.fixedChoices || []) {
              if (String(ch.menuItemId) === id && ch.stockQty != null) max = ch.stockQty;
            }
          }
        }
        if (max != null && max < q) return false;
      }
      for (const [id, q] of need) {
        const existing = Object.values(cart).reduce((s, line) => {
          if (String(line.menuItemId) === id) return s + (line.qty || 0);
          if (line.sellKind === "set" && line.setSelections) {
            let u = 0;
            for (const st of line.setSelections) {
              for (const mid of st.menuItemIds || []) if (String(mid) === id) u += line.qty || 0;
            }
            const lit =
              line.menuItemId != null && line.menuItemId !== ""
                ? menuItemById.get(String(line.menuItemId))
                : null;
            if (lit && lit.setSteps) {
              for (const st0 of lit.setSteps) {
                for (const fc of st0.fixedChoices || []) {
                  if (String(fc.menuItemId) === id) u += line.qty || 0;
                }
              }
            }
            return s + u;
          }
          return s;
        }, 0);
        let max = null;
        if (id === String(item.id)) max = item.stockQty;
        else {
          for (const st of item.setSteps) {
            for (const ch of st.choices || []) {
              if (String(ch.menuItemId) === id && ch.stockQty != null) max = ch.stockQty;
            }
            for (const ch of st.fixedChoices || []) {
              if (String(ch.menuItemId) === id && ch.stockQty != null) max = ch.stockQty;
            }
          }
        }
        if (max != null && existing + q > max) return false;
      }
      return true;
    }

    function selEsc(id) {
      return String(id).replace(/\\/g, "\\\\").replace(/"/g, '\\"');
    }

    /**
     * @param {{ lines?: { optionGroupId: string, optionItemIds: string[] }[] }} host — detail panel element
     */
    function collectOptionSelections(host, item) {
      /** @type {{ optionGroupId: string, optionItemIds: string[] }[]} */
      const optionSelections = [];
      for (const g of item.optionGroups || []) {
        const stepEl = host.querySelector("[data-opt-group-id=\"" + selEsc(g.id) + "\"]");
        let ids = [];
        if (Number(g.maxSelect || 1) <= 1) {
          const r = stepEl ? stepEl.querySelector("input[type=radio]:checked") : null;
          if (r && r.value) ids = [r.value];
        } else {
          ids = stepEl ? [...stepEl.querySelectorAll("input[type=checkbox]:checked")].map((x) => x.value) : [];
        }
        optionSelections.push({ optionGroupId: g.id, optionItemIds: ids });
      }
      return optionSelections;
    }

    function collectSetSelections(host, item) {
      /** @type {{ stepId: string, menuItemIds: string[] }[]} */
      const setSelections = [];
      for (const st of item.setSteps || []) {
        const stepEl = host.querySelector("[data-step-id=\"" + selEsc(st.id) + "\"]");
        const ids = stepEl
          ? [...stepEl.querySelectorAll("input[type=checkbox][name^=\"p-\"]:checked")].map((x) => x.value)
          : [];
        setSelections.push({ stepId: st.id, menuItemIds: ids });
      }
      return setSelections;
    }

    function collectSetComponentOptionSelections(host, item) {
      const out = [];
      for (const st of item.setSteps || []) {
        for (const mid of guestSetMergedPickIds(st, host)) {
          const ch = guestSetChoiceByMid(st, mid);
          const compGroups = guestChoiceOptionGroups(ch);
          if (!compGroups.length) continue;
          const optionSelections = [];
          for (const g of compGroups) {
            const b = guestOptionSelectBounds(g);
            const useRadio = b.maxSelect <= 1;
            let ids = [];
            const nm = "copt-" + selEsc(st.id) + "-" + selEsc(mid) + "-" + selEsc(g.id);
            if (useRadio) {
              const r = host.querySelector("input[type=radio][name=\"" + nm + "\"]:checked");
              if (r && r.value) ids = [r.value];
            } else {
              ids = [...host.querySelectorAll("input[type=checkbox][name=\"" + nm + "\"]:checked")].map((x) => x.value);
            }
            optionSelections.push({ optionGroupId: g.id, optionItemIds: ids });
          }
          out.push({ stepId: st.id, menuItemId: mid, optionSelections });
        }
      }
      return out;
    }

    function guestDeferDrinkDessertStepIds(item) {
      const def = (item.setSteps || []).filter((st) => st.allowServeLaterSplit);
      const drink = def.find((st) => st.serveLaterGroup === "drink");
      const dessert = def.find((st) => st.serveLaterGroup === "dessert");
      if (!drink || !dessert) return null;
      return { drinkId: drink.id, dessertId: dessert.id };
    }

    /** @returns {{ ok: boolean, ids: string[], pairDrinkDessert: boolean }} */
    function getServeLaterDeferPayload(panel, item) {
      const deferrable = (item.setSteps || []).filter((st) => st.allowServeLaterSplit);
      if (deferrable.length === 0) return { ok: true, ids: [], pairDrinkDessert: false };
      if (deferrable.length === 1) {
        const withMeal = panel.querySelector("[data-serve-later-radio][value=\"with_meal\"]:checked");
        const deferR = panel.querySelector("[data-serve-later-radio][value=\"defer\"]:checked");
        if (!withMeal && !deferR) return { ok: false, ids: [], pairDrinkDessert: false };
        if (withMeal) return { ok: true, ids: [], pairDrinkDessert: false };
        return { ok: true, ids: [String(deferrable[0].id)], pairDrinkDessert: false };
      }
      const sel = panel.querySelector("[data-serve-later-select]");
      const v = sel && sel.value ? String(sel.value) : "";
      if (!v) return { ok: false, ids: [], pairDrinkDessert: false };
      if (v === "__with_meal__") return { ok: true, ids: [], pairDrinkDessert: false };
      const dd = guestDeferDrinkDessertStepIds(item);
      if (v === "__pair_dd__") {
        if (!dd) return { ok: false, ids: [], pairDrinkDessert: false };
        return { ok: true, ids: [dd.drinkId, dd.dessertId], pairDrinkDessert: true };
      }
      return { ok: true, ids: [v], pairDrinkDessert: false };
    }

    function stableServeLaterCartSuffix(ids, pairFlag) {
      if (!ids || ids.length === 0) return "";
      const s = [...ids].sort().join(",");
      return "|sl:" + s + (pairFlag ? "|slp:dd" : "");
    }

    function getEatMode(panel, item) {
      if (!item || !item.allowTakeout) return "dine_in";
      const r = panel.querySelector("input[type=radio][name=eatmode]:checked");
      return r && r.value === "takeout" ? "takeout" : "dine_in";
    }

    function syncDetailAddPrice(panel, unitPrice, qty) {
      const btn = panel.querySelector("[data-add]");
      if (!btn || !guestShowMenuPrices) return;
      const n = Number(unitPrice) * Number(qty);
      btn.textContent = "追加 " + fmtMoney(isFinite(n) ? n : 0);
    }

    /** 同一商品IDのカート内合計（在庫残数の計算用） */
    function totalCartQtyForMenuItem(menuItemId) {
      const k = menuItemId != null && menuItemId !== "" ? String(menuItemId) : "";
      if (!k) return 0;
      let sum = 0;
      for (const key of Object.keys(cart)) {
        const line = cart[key];
        if (line && String(line.menuItemId) === k) sum += Number(line.qty || 0);
      }
      return sum;
    }

    /** 確定済み注文に含まれる同一商品IDの合計 */
    function totalOrderedQtyForMenuItem(menuItemId) {
      const k = menuItemId != null && menuItemId !== "" ? String(menuItemId) : "";
      if (!k) return 0;
      let sum = 0;
      for (const o of ordersCache || []) {
        for (const ln of o.lines || []) {
          if (ln.status === "cancelled") continue;
          const ex = ln.lineExtra && typeof ln.lineExtra === "object" ? ln.lineExtra : null;
          if (ex && ex.kind === "courseOptionPack") continue;
          if (ln.menuItemId != null && String(ln.menuItemId) === k) sum += Number(ln.qty || 0);
        }
      }
      return sum;
    }

    /** コース内単品の追加可能数（来店人数 − 確定済み − 他カート行） */
    function maxCourseIncludedAddQty(item, excludeCartKey) {
      const gc = Math.max(1, Number(sessionGuestCount || 1));
      const ordered = totalOrderedQtyForMenuItem(item.id);
      let inCartOther = 0;
      for (const key of Object.keys(cart)) {
        if (excludeCartKey && key === excludeCartKey) continue;
        const line = cart[key];
        if (line && String(line.menuItemId) === String(item.id)) inCartOther += Number(line.qty || 0);
      }
      return Math.max(0, gc - ordered - inCartOther);
    }

    function guestItemQtyAddCap(item, excludeCartKey, addDelta) {
      const delta = Math.max(0, Number(addDelta || 0));
      if (!item || delta <= 0) return 0;
      let cap =
        item.courseTier === "included" && !guestLoChargesIncludedAsPaid()
          ? maxCourseIncludedAddQty(item, excludeCartKey)
          : 99;
      if (item.stockQty != null) {
        let inCart = 0;
        for (const key of Object.keys(cart)) {
          if (excludeCartKey && key === excludeCartKey) continue;
          const line = cart[key];
          if (line && String(line.menuItemId) === String(item.id)) inCart += Number(line.qty || 0);
        }
        const stockRemain = Math.max(0, Number(item.stockQty) - inCart);
        cap = Math.min(cap, stockRemain);
      }
      return cap;
    }

    function guestCartLineSubtext(line) {
      const parts = [];
      const item =
        line.menuItemId != null && line.menuItemId !== ""
          ? menuItemById.get(String(line.menuItemId))
          : null;
      if (!item) return "";
      if (line.sellKind === "set" && item.setSteps && line.setSelections) {
        for (const st of item.setSteps) {
          const lab = String(st.label || "").trim() || "項目";
          const names = [];
          const seen = new Set();
          for (const fc of st.fixedChoices || []) {
            const id = fc.menuItemId;
            if (!id || seen.has(id)) continue;
            seen.add(id);
            names.push(String(fc.name || "").trim() || "（名称未設定）");
          }
          const sel = line.setSelections.find((x) => x.stepId === st.id);
          if (sel && sel.menuItemIds) {
            for (const mid of sel.menuItemIds) {
              if (seen.has(mid)) continue;
              seen.add(mid);
              const ch = guestSetChoiceByMid(st, mid);
              if (ch) names.push(String(ch.name || "").trim() || "（名称未設定）");
            }
          }
          if (names.length) parts.push(lab + ": " + names.join("、"));
        }
      }
      if (
        line.sellKind === "set" &&
        line.setComponentOptionSelections &&
        Array.isArray(line.setComponentOptionSelections) &&
        item.setSteps
      ) {
        for (const row of line.setComponentOptionSelections) {
          if (!row || !row.stepId || !row.menuItemId || !Array.isArray(row.optionSelections)) continue;
          const st = (item.setSteps || []).find((s) => s.id === row.stepId);
          if (!st) continue;
          const mid = row.menuItemId;
          const ch = (st.choices || []).find((c) => c.menuItemId === mid);
          if (!ch || !ch.optionGroups || !ch.optionGroups.length) continue;
          const optParts = [];
          for (const g of ch.optionGroups) {
            const sel = row.optionSelections.find((x) => x.optionGroupId === g.id);
            const ids = (sel && sel.optionItemIds) || [];
            if (!ids.length) continue;
            const picked = ids
              .map((oid) => (g.items || []).find((it) => it.id === oid))
              .filter(Boolean)
              .map((it) => it.name);
            if (picked.length) optParts.push(picked.join("・"));
          }
          if (optParts.length) parts.push(String(ch.name || "").trim() + " オプション: " + optParts.join(" / "));
        }
      }
      if (line.optionSelections && line.optionSelections.length && item.optionGroups) {
        for (const g of item.optionGroups) {
          const row = line.optionSelections.find((x) => x.optionGroupId === g.id);
          const ids = (row && row.optionItemIds) || [];
          if (ids.length === 0) continue;
          const nm = [];
          for (const oid of ids) {
            const oi = (g.items || []).find((x) => x.id === oid);
            if (oi) nm.push(oi.name);
          }
          if (nm.length) parts.push(g.name + ": " + nm.join("・"));
        }
      }
      let slLabels = [];
      if (line.serveLaterDeferStepIds && line.serveLaterDeferStepIds.length && item.setSteps) {
        for (const sid of line.serveLaterDeferStepIds) {
          const st = item.setSteps.find((s) => s.id === sid);
          if (st) slLabels.push("「" + String(st.label || "").trim() + "」");
        }
      } else if (line.serveLaterDeferStepId && item.setSteps) {
        const st = item.setSteps.find((s) => s.id === line.serveLaterDeferStepId);
        if (st) slLabels.push("「" + String(st.label || "").trim() + "」");
      }
      if (slLabels.length)
        parts.push(slLabels.join("・") + "は後から提供（別明細）");
      return parts.join("\n");
    }

    function removeCartLine(cartKey) {

    function adjustCartLineQty(cartKey, delta) {
      const line = cart[cartKey];
      if (!line || !(line.qty > 0)) return;
      if (delta < 0) {
        if (line.qty + delta <= 0) {
          removeCartLine(cartKey);
          return;
        }
        line.qty += delta;
        clampCartToStock(guestMenuCategories);
        renderCart();
        return;
      }
      const item =
        line.menuItemId != null && line.menuItemId !== ""
          ? menuItemById.get(String(line.menuItemId))
          : null;
      if (!item) {
        toast("メニューを再読込してください");
        return;
      }
      if (line.sellKind === "set" && line.setSelections) {
        if (!setStockAllows(item, line.setSelections, line.qty + delta)) {
          toast("在庫の上限です");
          return;
        }
      } else {
        const cap = guestItemQtyAddCap(item, cartKey, delta);
        if (delta > cap) {
          toast(
            item.courseTier === "included" && !guestLoChargesIncludedAsPaid() && cap <= 0
              ? "コースの人数分は注文済みです"
              : item.courseTier === "included" && !guestLoChargesIncludedAsPaid()
                ? "コース人数（" + sessionGuestCount + "名）または在庫の上限です"
                : "在庫の上限です",
          );
          return;
        }
      }
      line.qty += delta;
      clampCartToStock(guestMenuCategories);
      renderCart();
    }
