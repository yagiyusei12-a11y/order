<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0e12" />
  <title>ご注文</title>
  <style>
    :root {
      --bg: #0c0e12;
      --surface: #151922;
      --surface2: #1c2230;
      --line: #2a3142;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #f97316;
      --accent-dim: rgba(249, 115, 22, 0.15);
      --ok: #22c55e;
      --danger: #fb7185;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: calc(5.75rem + env(safe-area-inset-bottom));
      min-height: 100dvh;
    }

    /* ========== トップバー（アイコン） ========== */
    .go-topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.35rem;
      padding: 0.5rem 0.65rem calc(0.45rem + env(safe-area-inset-top));
      background: linear-gradient(180deg, #12161f 0%, #0c0e12 100%);
      border-bottom: 1px solid var(--line);
    }
    .go-topicons {
      display: flex;
      align-items: center;
      gap: 0.15rem;
    }
    .go-iconbtn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }
    .go-iconbtn:active { background: var(--surface2); color: var(--text); }
    .go-iconbtn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
    .go-brand {
      flex: 1;
      min-width: 0;
      text-align: center;
      padding: 0 0.25rem;
    }
    .go-brand h1 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .go-brand .sub {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.15rem;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ========== カテゴリタブ ========== */
    .go-tabs-wrap {
      position: sticky;
      top: calc(52px + env(safe-area-inset-top));
      z-index: 40;
      background: linear-gradient(180deg, #0c0e12 70%, transparent);
      padding: 0.35rem 0 0.65rem;
      margin-top: -1px;
    }
    .go-tabs {
      display: flex;
      gap: 0.35rem;
      overflow-x: auto;
      padding: 0 0.75rem;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .go-tabs::-webkit-scrollbar { display: none; }
    .go-tab {
      flex-shrink: 0;
      padding: 0.45rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .go-tab.is-active {
      background: var(--accent-dim);
      border-color: rgba(249, 115, 22, 0.45);
      color: var(--accent);
    }

    /* ========== メニューグリッド ========== */
    .go-menu-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.65rem;
      padding: 0 0.65rem 1rem;
    }
    @media (min-width: 480px) {
      .go-menu-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.85rem; padding: 0 1rem 1rem; }
    }
    .go-card {
      border-radius: 16px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--line);
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .go-card:active { transform: scale(0.98); }
    .go-card.is-dim { opacity: 0.45; pointer-events: none; }
    .go-card-media {
      aspect-ratio: 4 / 3;
      background: linear-gradient(145deg, #1e293b, #0f172a);
      position: relative;
    }
    .go-card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .go-card-media .go-ph {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      opacity: 0.35;
    }
    .go-card-badge {
      position: absolute;
      top: 0.35rem;
      left: 0.35rem;
      font-size: 0.62rem;
      font-weight: 800;
      padding: 0.15rem 0.4rem;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
    }
    .go-card-body { padding: 0.55rem 0.65rem 0.65rem; flex: 1; display: flex; flex-direction: column; }
    .go-card-title {
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .go-card-meta {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.2rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }
    .go-card-price {
      margin-top: 0.45rem;
      font-size: 0.88rem;
      font-weight: 800;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .go-card-price .incl {
      display: block;
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    .badge-low { font-size: 0.6rem; font-weight: 700; color: #fde68a; background: rgba(180, 83, 9, 0.5); padding: 0.1rem 0.35rem; border-radius: 4px; }
    .badge-sold { font-size: 0.6rem; font-weight: 700; color: #fecaca; background: rgba(127, 29, 29, 0.6); padding: 0.1rem 0.35rem; border-radius: 4px; }
    .badge-set { font-size: 0.6rem; font-weight: 700; color: #bfdbfe; background: rgba(30, 58, 95, 0.7); padding: 0.1rem 0.35rem; border-radius: 4px; }
    .badge-alcohol { font-size: 0.6rem; font-weight: 700; color: #ffedd5; background: rgba(124, 45, 18, 0.65); padding: 0.1rem 0.35rem; border-radius: 4px; }
    .badge-course-in {
      font-size: 0.58rem; font-weight: 800; color: #ecfdf5; background: rgba(5, 150, 105, 0.85);
      padding: 0.12rem 0.4rem; border-radius: 4px;
    }
    .badge-course-add {
      font-size: 0.58rem; font-weight: 800; color: #fff7ed; background: rgba(234, 88, 12, 0.85);
      padding: 0.12rem 0.4rem; border-radius: 4px;
    }
    .course-included-price { color: #34d399; font-weight: 800; }
    #lastOrderBanner {
      display: none;
      position: sticky;
      top: calc(52px + env(safe-area-inset-top));
      z-index: 45;
      margin: 0;
      padding: 0.45rem 0.75rem;
      background: linear-gradient(180deg, rgba(30, 58, 95, 0.95), rgba(15, 23, 42, 0.98));
      border-bottom: 1px solid #334155;
      font-size: 0.78rem;
      text-align: center;
      line-height: 1.35;
    }
    #lastOrderBanner.lo-ended {
      background: linear-gradient(180deg, rgba(127, 29, 29, 0.9), rgba(69, 10, 10, 0.95));
    }
    #lastOrderBanner strong { font-variant-numeric: tabular-nums; color: #fde68a; }

    /* ========== フッターカート ========== */
    footer.go-cart {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.65rem 0.85rem calc(0.65rem + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(12, 14, 18, 0.92) 0%, #0c0e12 40%);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--line);
      display: flex;
      gap: 0.65rem;
      align-items: center;
      z-index: 30;
    }
    footer.go-cart .info { flex: 1; min-width: 0; }
    footer.go-cart .count { font-size: 0.72rem; color: var(--muted); }
    footer.go-cart .sum { font-size: 1.05rem; font-weight: 800; font-variant-numeric: tabular-nums; }
    footer.go-cart button.submit {
      flex-shrink: 0;
      padding: 0.75rem 1.35rem;
      border: none;
      border-radius: 14px;
      background: linear-gradient(180deg, #fb923c, var(--accent));
      color: #fff;
      font-weight: 800;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(249, 115, 22, 0.35);
    }
    footer.go-cart button.submit:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
    }

    .toast {
      position: fixed;
      bottom: 6rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--line);
      padding: 0.55rem 1rem;
      border-radius: 12px;
      font-size: 0.82rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 60;
      max-width: 90vw;
      text-align: center;
    }
    .toast.show { opacity: 1; }

    #err {
      margin: 0.65rem;
      padding: 0.75rem;
      background: rgba(127, 29, 29, 0.35);
      border-radius: 12px;
      color: #fecaca;
      font-size: 0.85rem;
      display: none;
      border: 1px solid rgba(248, 113, 113, 0.35);
    }

    #orders { padding: 0 0.75rem 1rem; }
    #orders h2 {
      font-size: 0.78rem;
      color: var(--muted);
      margin: 0 0 0.5rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .order-card {
      background: var(--surface);
      border-radius: 14px;
      padding: 0.75rem 0.85rem;
      margin-bottom: 0.5rem;
      border: 1px solid var(--line);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    /* ========== 商品詳細シート ========== */
    #detailSheet {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }
    #detailSheet.is-open { display: flex; }
    .detail-panel {
      width: 100%;
      max-width: 28rem;
      max-height: 92vh;
      background: #12161f;
      border: 1px solid var(--line);
      border-radius: 20px 20px 0 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: sheetIn 0.28s ease-out;
    }
    @keyframes sheetIn {
      from { transform: translateY(100%); opacity: 0.85; }
      to { transform: translateY(0); opacity: 1; }
    }
    .detail-close {
      position: absolute;
      top: 0.65rem;
      right: 0.65rem;
      z-index: 5;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
    }
    .detail-hero {
      aspect-ratio: 16 / 10;
      background: linear-gradient(145deg, #1e293b, #0f172a);
      position: relative;
      flex-shrink: 0;
    }
    .detail-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .detail-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1rem 0.5rem;
      -webkit-overflow-scrolling: touch;
    }
    .detail-title { margin: 0 0 0.35rem; font-size: 1.15rem; font-weight: 800; line-height: 1.35; }
    .detail-desc { margin: 0 0 1rem; font-size: 0.82rem; color: var(--muted); line-height: 1.55; }

    .opt-block { margin-bottom: 1.1rem; }
    .opt-block-head {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      margin-bottom: 0.5rem;
    }
    .opt-block-head strong { font-size: 0.88rem; }
    .tag-req {
      font-size: 0.62rem;
      font-weight: 800;
      color: #fecaca;
      background: rgba(185, 28, 28, 0.45);
      padding: 0.12rem 0.4rem;
      border-radius: 4px;
    }
    .tag-opt {
      font-size: 0.62rem;
      font-weight: 700;
      color: var(--muted);
      background: var(--surface2);
      padding: 0.12rem 0.4rem;
      border-radius: 4px;
    }
    .opt-row {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.55rem 0.65rem;
      margin-bottom: 0.35rem;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--surface2);
      cursor: pointer;
      font-size: 0.86rem;
    }
    .opt-row input { accent-color: var(--accent); width: 1.1rem; height: 1.1rem; flex-shrink: 0; }
    .opt-row .opt-name { flex: 1; min-width: 0; }
    .opt-row .opt-price { font-size: 0.78rem; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
    .opt-row.is-disabled { opacity: 0.45; pointer-events: none; }

    .detail-footer {
      flex-shrink: 0;
      padding: 0.75rem 1rem calc(0.85rem + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: #0f131a;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .qty-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    .qty-bar button {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--surface2);
      color: var(--text);
      font-size: 1.35rem;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
    }
    .qty-bar button:disabled { opacity: 0.35; cursor: not-allowed; }
    .qty-bar .qty-num {
      font-size: 1.25rem;
      font-weight: 800;
      min-width: 2rem;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .detail-add {
      width: 100%;
      padding: 0.85rem 1rem;
      border: none;
      border-radius: 14px;
      background: linear-gradient(180deg, #fb923c, var(--accent));
      color: #fff;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(249, 115, 22, 0.4);
    }
    .detail-add:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

    .go-profile {
      margin: 0.55rem 0.75rem 0;
      padding: 0.75rem 0.85rem;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--line);
    }
    .go-profile > p:first-child { margin: 0 0 0.55rem; font-size: 0.72rem; color: var(--muted); line-height: 1.45; }
    .go-profile label { display: block; font-size: 0.72rem; color: var(--muted); margin: 0.4rem 0 0.2rem; }
    .go-profile input {
      width: 100%;
      padding: 0.5rem 0.6rem;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f131a;
      color: var(--text);
      font-size: 0.9rem;
      margin-bottom: 0.15rem;
    }
    .go-profile button#btnSaveProfile {
      width: 100%;
      margin-top: 0.55rem;
      padding: 0.55rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(180deg, #fb923c, var(--accent));
      color: #fff;
      font-weight: 800;
      font-size: 0.88rem;
      cursor: pointer;
    }
    #profileHint { margin-top: 0.4rem; }

    .safety-note {
      margin: 0.5rem 0.75rem 0;
      padding: 0.55rem 0.65rem;
      border-radius: 10px;
      border: 1px solid rgba(185, 28, 28, 0.45);
      background: rgba(69, 10, 10, 0.45);
      color: #fecaca;
      font-size: 0.75rem;
    }

    .agegate {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .agegate-card {
      width: 100%;
      max-width: 30rem;
      background: #12161f;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 1.1rem;
    }
    .agegate-card h2 { margin: 0 0 0.45rem; font-size: 1rem; }
    .agegate-card p { margin: 0 0 0.85rem; color: var(--muted); font-size: 0.82rem; line-height: 1.45; }
    .age-q { margin-bottom: 0.75rem; }
    .age-q strong { display: block; font-size: 0.85rem; margin-bottom: 0.35rem; }
    .age-q .row { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .age-q button {
      border: 1px solid var(--line);
      background: var(--surface2);
      color: var(--text);
      border-radius: 10px;
      padding: 0.45rem 0.7rem;
      cursor: pointer;
      font-size: 0.82rem;
    }
    .age-q button.on { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .agegate-card .primary {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 0.7rem;
      font-weight: 800;
      background: linear-gradient(180deg, #fb923c, var(--accent));
      color: #fff;
      cursor: pointer;
    }
    .agegate-card .primary:disabled { opacity: 0.45; cursor: not-allowed; }

    /* コース＋オプション（有料で対象拡大） */
    .course-pack-strip {
      padding: 0.5rem 0.75rem 0.35rem;
      background: linear-gradient(180deg, rgba(249, 115, 22, 0.12), transparent);
      border-bottom: 1px solid var(--line);
    }
    .course-pack-strip-inner {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .course-pack-btn {
      width: 100%;
      text-align: left;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.55rem 0.65rem;
      border-radius: 10px;
      border: 1px solid rgba(249, 115, 22, 0.45);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
    }
    .course-pack-btn:active { background: var(--surface); }
    .course-pack-btn strong { color: var(--accent); font-weight: 800; }
    .course-pack-row {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .course-pack-people {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: wrap;
      font-size: 0.78rem;
      line-height: 1.35;
    }
    .course-pack-people input[type="number"] {
      width: 3.25rem;
      padding: 0.4rem 0.35rem;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--surface2);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header class="go-topbar">
    <div class="go-topicons">
      <button type="button" class="go-iconbtn" id="btnHistory" title="注文履歴" aria-label="注文履歴">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      </button>
      <button type="button" class="go-iconbtn" id="btnStaff" title="店員を呼ぶ" aria-label="店員を呼ぶ">
        <svg viewBox="0 0 24 24"><path d="M12 3v3M5.6 5.6l2.1 2.1M3 12h3M5.6 18.4l2.1-2.1M12 21v-3M18.4 18.4l-2.1-2.1M21 12h-3M18.4 5.6l-2.1 2.1"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="go-brand">
      <h1>ご注文</h1>
      <div class="sub" id="hdr">読み込み中…</div>
    </div>
    <div class="go-topicons">
      <button type="button" class="go-iconbtn" id="btnCartScroll" title="カート" aria-label="カートへ">
        <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg>
      </button>
    </div>
  </header>

  <div id="lastOrderBanner" role="status" aria-live="polite"></div>

  <div id="err"></div>
  <div id="safetyNote" class="safety-note" style="display:none"></div>
  <div id="courseOptionPacksStrip" class="course-pack-strip" style="display:none" aria-live="polite"></div>

  <div class="go-profile" id="profileCard">
    <p>お客様情報（任意）<br /><span style="font-size:0.68rem;opacity:0.9">端末でお客様をお繋ぎします。お名前・電話は空でもご注文いただけます。</span></p>
    <label for="custName">お名前（ニックネーム可）</label>
    <input id="custName" type="text" autocomplete="name" maxlength="100" placeholder="未入力でも構いません" />
    <label for="custPhone">電話番号</label>
    <input id="custPhone" type="tel" autocomplete="tel" maxlength="20" placeholder="未入力でも構いません" />
    <button type="button" id="btnSaveProfile">お客様情報を保存</button>
    <span id="profileHint" class="muted"></span>
  </div>

  <div class="go-tabs-wrap">
    <div class="go-tabs" id="catTabs"></div>
  </div>
  <div id="menu" class="go-menu-grid"></div>
  <div id="orders"></div>

  <footer class="go-cart" id="cartFooter">
    <div class="info">
      <div class="count" id="cartCount">カート 0点</div>
      <div class="sum" id="cartSum">¥0</div>
    </div>
    <button class="submit" id="submit" disabled type="button">注文する</button>
  </footer>
  <div class="toast" id="toast"></div>

  <div id="detailSheet" aria-hidden="true"></div>

  <div class="agegate" id="ageGate" style="display:none">
    <div class="agegate-card">
      <h2>ご注文前の確認</h2>
      <p>飲酒運転防止・未成年者飲酒防止のため、酒類注文前に確認が必要です。</p>
      <div class="age-q" id="qDrive">
        <strong>本日、車・バイク・自転車を運転する予定はありますか？</strong>
        <div class="row">
          <button type="button" data-v="yes">はい（予定あり）</button>
          <button type="button" data-v="no">いいえ（予定なし）</button>
        </div>
      </div>
      <div class="age-q" id="qAge">
        <strong>20歳以上ですか？</strong>
        <div class="row">
          <button type="button" data-v="yes">はい（20歳以上）</button>
          <button type="button" data-v="no">いいえ（20歳未満）</button>
        </div>
      </div>
      <button type="button" class="primary" id="ageGateOk" disabled>確認して進む</button>
    </div>
  </div>

  <script>
    const TOKEN = __TOKEN_JS__;
    const DEVICE_KEY = "order-guest-device-v1";

    function getOrCreateDeviceId() {
      try {
        let id = localStorage.getItem(DEVICE_KEY);
        if (id && /^[a-zA-Z0-9_-]{8,128}$/.test(id)) return id;
        id =
          typeof crypto !== "undefined" && typeof crypto.randomUUID === "function"
            ? crypto.randomUUID()
            : "g" + Date.now().toString(36) + Math.random().toString(36).slice(2, 12);
        localStorage.setItem(DEVICE_KEY, id);
        return id;
      } catch (_) {
        return "fallback-" + Date.now().toString(36);
      }
    }

    const api = (path, opt) => fetch(path, opt).then(async (r) => {
      const j = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(j.error || r.statusText || String(r.status));
      return j;
    });

    /** @type {Record<string, unknown>} */
    const cart = {};
    let guestShowMenuPrices = true;
    let menuPriceTaxMode = "inclusive";
    let taxRatePercent = 10;
    let alcoholRestricted = false;
    const alcoholById = new Map();
    let lastOrderTimer = null;
    let lastOrderDeadlineTs = 0;
    let lastOrderClosedFlag = false;
    /** コース対象単品でオプション差額を請求する（店舗設定・既定はオン） */
    let guestCourseIncludedChargeOptionExtras = true;

    function fmtMoney(n) {
      if (!guestShowMenuPrices) return "—";
      return "¥" + n.toLocaleString("ja-JP");
    }
    function fmtItemPrice(item) {
      if (item.courseTier === "included") {
        if (!guestShowMenuPrices) return "<span class=\"course-included-price\">コース内</span>";
        const optLine = guestCourseIncludedChargeOptionExtras
          ? "<span class=\"incl\">オプション差額は追加になる場合があります</span>"
          : "<span class=\"incl\">オプション差額もコース内（0円）</span>";
        return (
          "<span class=\"course-included-price\">コース料に含む（本体追加0円）</span>" +
          optLine +
          "<span class=\"incl\">参考・メニュー税込 ¥" +
          Number(item.price || 0).toLocaleString("ja-JP") +
          "</span>"
        );
      }
      if (!guestShowMenuPrices) {
        return item.courseTier === "addon" ? "追加料金" : "—";
      }
      const mode = item.priceTaxMode === "exclusive" ? "exclusive" : menuPriceTaxMode;
      let core = "";
      if (mode === "exclusive") {
        const base = Number(item.basePrice || item.price || 0);
        const incl = Number(item.taxIncludedPrice || item.price || 0);
        core =
          "¥" +
          base.toLocaleString("ja-JP") +
          "<span class=\"incl\">税込 ¥" +
          incl.toLocaleString("ja-JP") +
          "</span>";
      } else {
        core = "¥" + Number(item.price || 0).toLocaleString("ja-JP");
      }
      if (item.courseTier === "addon") {
        core += " <span class=\"badge-course-add\" style=\"font-size:0.55rem;vertical-align:middle\">追加料金</span>";
      }
      return core;
    }

    /** コース内単品は追加料金0（税込ベース）。それ以外はゲスト表示価格 */
    function singleGuestChargeBase(item) {
      if (item.courseTier === "included") return 0;
      return Number(item.price || 0);
    }

    function isAlcoholItem(item, categoryName) {
      const text = ((item.name || "") + " " + (item.description || "") + " " + (categoryName || "")).toLowerCase();
      return /ビール|ワイン|焼酎|日本酒|ウイスキー|ハイボール|サワー|酎ハイ|カクテル|梅酒|酒|beer|wine|whisky|whiskey|cocktail|alcohol/.test(text);
    }

    function cartSumLabel(n) {
      if (!guestShowMenuPrices) return "（お会計時にご案内）";
      return "¥" + n.toLocaleString("ja-JP");
    }

    function renderCart() {
      const lines = Object.values(cart).filter((x) => x.qty > 0);
      const count = lines.reduce((s, x) => s + x.qty, 0);
      const sum = lines.reduce((s, x) => s + x.unitPrice * x.qty, 0);
      document.getElementById("cartCount").textContent = "カート " + count + "点";
      document.getElementById("cartSum").textContent = cartSumLabel(sum);
      document.getElementById("submit").disabled = count === 0 || lastOrderClosedFlag;
    }

    function toast(t) {
      const el = document.getElementById("toast");
      el.textContent = t;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 1800);
    }

    function stableSetKey(sel) {
      if (!sel || !sel.length) return "";
      return sel
        .map((s) => String(s.stepId) + ":" + [...(s.menuItemIds || [])].sort().join(","))
        .sort()
        .join("|");
    }

    function choiceExtraInclusive(ch) {
      const ex = Number(ch.extraPrice || 0);
      if (ch.extraTaxIncluded != null && Number.isFinite(Number(ch.extraTaxIncluded))) {
        return Number(ch.extraTaxIncluded);
      }
      return Math.round(ex * (1 + taxRatePercent / 100));
    }

    function computeSetUnitPrice(item, setSelections) {
      let extras = 0;
      for (const st of item.setSteps || []) {
        const sel = setSelections.find((x) => x.stepId === st.id);
        if (!sel) return null;
        for (const mid of sel.menuItemIds || []) {
          const ch = (st.choices || []).find((c) => c.menuItemId === mid);
          if (!ch) return null;
          extras += choiceExtraInclusive(ch);
        }
      }
      return Number(item.price || 0) + extras;
    }

    function stableOptionKey(sel) {
      if (!sel || !sel.length) return "";
      return sel
        .map((x) => String(x.optionGroupId) + ":" + [...(x.optionItemIds || [])].sort().join(","))
        .sort()
        .join("|");
    }

    function computeOptionUnitPrice(item, optionSelections) {
      let add = 0;
      for (const g of item.optionGroups || []) {
        const row = optionSelections.find((o) => o.optionGroupId === g.id);
        const ids = (row && row.optionItemIds) || [];
        for (const oid of ids) {
          const oi = (g.items || []).find((x) => x.id === oid);
          if (oi) add += Number(oi.priceDelta || 0);
        }
      }
      const base = singleGuestChargeBase(item);
      if (item.courseTier === "included" && !guestCourseIncludedChargeOptionExtras) {
        return 0;
      }
      return base + add;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function closeDetail() {
      const host = document.getElementById("detailSheet");
      host.classList.remove("is-open");
      host.innerHTML = "";
      host.setAttribute("aria-hidden", "true");
    }

    function setStockAllows(item, setSelections, addQty) {
      const need = new Map();
      need.set(item.id, addQty);
      for (const st of item.setSteps || []) {
        const sel = setSelections.find((x) => x.stepId === st.id);
        if (!sel) return false;
        for (const mid of sel.menuItemIds || []) {
          need.set(mid, (need.get(mid) || 0) + addQty);
        }
      }
      for (const [id, q] of need) {
        let max = null;
        if (id === item.id) {
          max = item.stockQty;
        } else {
          for (const st of item.setSteps) {
            for (const ch of st.choices || []) {
              if (ch.menuItemId === id && ch.stockQty != null) max = ch.stockQty;
            }
          }
        }
        if (max != null && max < q) return false;
      }
      for (const [id, q] of need) {
        const existing = Object.values(cart).reduce((s, line) => {
          if (line.menuItemId === id) return s + (line.qty || 0);
          if (line.sellKind === "set" && line.setSelections) {
            let u = 0;
            for (const st of line.setSelections) {
              for (const mid of st.menuItemIds || []) if (mid === id) u += line.qty || 0;
            }
            return s + u;
          }
          return s;
        }, 0);
        let max = null;
        if (id === item.id) max = item.stockQty;
        else {
          for (const st of item.setSteps) {
            for (const ch of st.choices || []) {
              if (ch.menuItemId === id && ch.stockQty != null) max = ch.stockQty;
            }
          }
        }
        if (max != null && existing + q > max) return false;
      }
      return true;
    }

    function selEsc(id) {
      return String(id).replace(/\\/g, "\\\\").replace(/"/g, '\\"');
    }

    /**
     * @param {{ lines?: { optionGroupId: string, optionItemIds: string[] }[] }} host — detail panel element
     */
    function collectOptionSelections(host, item) {
      /** @type {{ optionGroupId: string, optionItemIds: string[] }[]} */
      const optionSelections = [];
      for (const g of item.optionGroups || []) {
        const stepEl = host.querySelector("[data-opt-group-id=\"" + selEsc(g.id) + "\"]");
        let ids = [];
        if (Number(g.maxSelect || 1) <= 1) {
          const r = stepEl ? stepEl.querySelector("input[type=radio]:checked") : null;
          if (r && r.value) ids = [r.value];
        } else {
          ids = stepEl ? [...stepEl.querySelectorAll("input[type=checkbox]:checked")].map((x) => x.value) : [];
        }
        optionSelections.push({ optionGroupId: g.id, optionItemIds: ids });
      }
      return optionSelections;
    }

    function collectSetSelections(host, item) {
      /** @type {{ stepId: string, menuItemIds: string[] }[]} */
      const setSelections = [];
      for (const st of item.setSteps || []) {
        const stepEl = host.querySelector("[data-step-id=\"" + selEsc(st.id) + "\"]");
        const ids = stepEl
          ? [...stepEl.querySelectorAll("input[type=checkbox]:checked")].map((x) => x.value)
          : [];
        setSelections.push({ stepId: st.id, menuItemIds: ids });
      }
      return setSelections;
    }

    function syncDetailAddPrice(panel, unitPrice, qty) {
      const btn = panel.querySelector("[data-add]");
      if (!btn || !guestShowMenuPrices) return;
      const n = Number(unitPrice) * Number(qty);
      btn.textContent = "追加 " + fmtMoney(isFinite(n) ? n : 0);
    }

    /** 同一商品IDのカート内合計（在庫残数の計算用） */
    function totalCartQtyForMenuItem(menuItemId) {
      let sum = 0;
      for (const key of Object.keys(cart)) {
        const line = cart[key];
        if (line && line.menuItemId === menuItemId) sum += Number(line.qty || 0);
      }
      return sum;
    }

    function wireQty(panel, item, getUnitPrice) {
      const minus = panel.querySelector("[data-qty-min]");
      const plus = panel.querySelector("[data-qty-plus]");
      const numEl = panel.querySelector("[data-qty]");
      let qty = 1;
      const raw = item.stockQty;
      const stockNum = typeof raw === "number" && Number.isFinite(raw) ? raw : null;

      function maxQtyThisAdd() {
        if (stockNum == null) return 99;
        const remain = stockNum - totalCartQtyForMenuItem(item.id);
        if (remain <= 0) return 0;
        return Math.min(99, remain);
      }

      function refresh() {
        const cap = maxQtyThisAdd();
        if (cap > 0) qty = Math.min(qty, cap);
        numEl.textContent = String(qty);
        minus.disabled = qty <= 1;
        const atMax = cap <= 0 || qty >= cap;
        plus.disabled = false;
        plus.style.opacity = atMax ? "0.4" : "";
        plus.title =
          cap <= 0 && stockNum != null
            ? "在庫がありません"
            : atMax && stockNum != null
              ? "在庫の上限です"
              : atMax
                ? "これ以上は選べません"
                : "";
        syncDetailAddPrice(panel, getUnitPrice(), qty);
      }

      minus.onclick = () => {
        if (qty <= 1) return;
        qty -= 1;
        refresh();
      };
      plus.onclick = () => {
        const cap = maxQtyThisAdd();
        if (cap <= 0) {
          toast("在庫がありません");
          return;
        }
        if (qty >= cap) {
          toast(stockNum != null ? "在庫の上限です" : "これ以上は選べません");
          return;
        }
        qty += 1;
        refresh();
      };
      refresh();
      return () => qty;
    }

    function openProductDetail(item) {
      if (alcoholRestricted && alcoholById.get(item.id)) {
        toast("酒類はご注文いただけません");
        return;
      }
      const sold = item.stockQty != null && item.stockQty <= 0;
      if (sold && item.sellKind !== "set") {
        toast("売り切れです");
        return;
      }
      if (item.sellKind !== "set") {
        const sq = item.stockQty;
        const sn = typeof sq === "number" && Number.isFinite(sq) ? sq : null;
        if (sn != null && sn <= totalCartQtyForMenuItem(item.id)) {
          toast("これ以上は在庫がありません");
          return;
        }
      }

      const host = document.getElementById("detailSheet");
      const imgHtml = item.imageUrl
        ? "<img src=\"" + escapeHtml(item.imageUrl) + "\" alt=\"\" />"
        : "<div style=\"display:flex;align-items:center;justify-content:center;height:100%;font-size:3rem;opacity:.25\">◆</div>";

      let bodyInner = "";
      if (item.sellKind === "set" && item.setSteps && item.setSteps.length) {
        for (const st of item.setSteps) {
          const req = st.minPick > 0;
          bodyInner +=
            "<div class=\"opt-block\" data-step-id=\"" +
            escapeHtml(st.id) +
            "\">" +
            "<div class=\"opt-block-head\"><strong>" +
            escapeHtml(st.label) +
            "</strong>" +
            (req ? "<span class=\"tag-req\">必須</span>" : "<span class=\"tag-opt\">任意</span>") +
            "<span class=\"tag-opt\" style=\"margin-left:auto\">" +
            st.minPick +
            "〜" +
            st.maxPick +
            "品</span></div>";
          for (const ch of st.choices || []) {
            const soldX = ch.soldOut === true || (ch.stockQty != null && ch.stockQty <= 0);
            const ex = Number(ch.extraPrice || 0);
            const incl = choiceExtraInclusive(ch);
            const priceTxt =
              ex > 0
                ? "+" +
                  fmtMoney(incl).replace("¥", "") +
                  " <span style=\"color:var(--muted);font-size:.68rem;font-weight:500\">(税込)</span>"
                : "+¥0";
            bodyInner +=
              "<label class=\"opt-row" +
              (soldX ? " is-disabled" : "") +
              "\"><input type=\"checkbox\" name=\"p-" +
              escapeHtml(st.id) +
              "\" value=\"" +
              escapeHtml(ch.menuItemId) +
              "\" data-min=\"" +
              st.minPick +
              "\" data-max=\"" +
              st.maxPick +
              "\"" +
              (soldX ? " disabled" : "") +
              " /><span class=\"opt-name\">" +
              escapeHtml(ch.name) +
              (soldX ? " · 売切" : "") +
              "</span><span class=\"opt-price\">" +
              priceTxt +
              "</span></label>";
          }
          bodyInner += "</div>";
        }
      } else if (item.optionGroups && item.optionGroups.length) {
        for (const g of item.optionGroups) {
          const req = g.minSelect > 0;
          bodyInner +=
            "<div class=\"opt-block\" data-opt-group-id=\"" +
            escapeHtml(g.id) +
            "\">" +
            "<div class=\"opt-block-head\"><strong>" +
            escapeHtml(g.name) +
            "</strong>" +
            (req ? "<span class=\"tag-req\">必須</span>" : "<span class=\"tag-opt\">任意</span>") +
            "<span class=\"tag-opt\" style=\"margin-left:auto\">" +
            g.minSelect +
            "〜" +
            g.maxSelect +
            "個</span></div>";
          const useRadio = Number(g.maxSelect || 1) <= 1;
          for (const oi of g.items || []) {
            const yen = Number(oi.priceDelta || 0);
            const priceTxt =
              yen > 0
                ? "+" +
                  yen.toLocaleString("ja-JP") +
                  "円 <span style=\"color:var(--muted);font-size:.68rem\">(税込目安)</span>"
                : "+¥0";
            if (useRadio) {
              bodyInner +=
                "<label class=\"opt-row\"><input type=\"radio\" name=\"og-" +
                escapeHtml(g.id) +
                "\" value=\"" +
                escapeHtml(oi.id) +
                "\" /><span class=\"opt-name\">" +
                escapeHtml(oi.name) +
                "</span><span class=\"opt-price\">" +
                priceTxt +
                "</span></label>";
            } else {
              bodyInner +=
                "<label class=\"opt-row\"><input type=\"checkbox\" name=\"ogcb-" +
                escapeHtml(g.id) +
                "\" value=\"" +
                escapeHtml(oi.id) +
                "\" data-min=\"" +
                g.minSelect +
                "\" data-max=\"" +
                g.maxSelect +
                "\" /><span class=\"opt-name\">" +
                escapeHtml(oi.name) +
                "</span><span class=\"opt-price\">" +
                priceTxt +
                "</span></label>";
            }
          }
          bodyInner += "</div>";
        }
      }

      host.innerHTML =
        "<div class=\"detail-panel\" role=\"dialog\" aria-modal=\"true\">" +
        "<button type=\"button\" class=\"detail-close\" aria-label=\"閉じる\">×</button>" +
        "<div class=\"detail-hero\">" +
        imgHtml +
        "</div>" +
        "<div class=\"detail-scroll\">" +
        "<h2 class=\"detail-title\">" +
        escapeHtml(item.name) +
        "</h2>" +
        (item.description
          ? "<p class=\"detail-desc\">" + escapeHtml(item.description) + "</p>"
          : "") +
        bodyInner +
        "</div>" +
        "<div class=\"detail-footer\">" +
        "<div class=\"qty-bar\">" +
        "<button type=\"button\" data-qty-min>−</button>" +
        "<span class=\"qty-num\" data-qty>1</span>" +
        "<button type=\"button\" data-qty-plus>+</button>" +
        "</div>" +
        "<button type=\"button\" class=\"detail-add\" data-add data-add-price>追加</button>" +
        "</div></div>";

      host.classList.add("is-open");
      host.setAttribute("aria-hidden", "false");

      const panel = host.querySelector(".detail-panel");
      panel.querySelector(".detail-close").onclick = closeDetail;
      host.onclick = (ev) => {
        if (ev.target === host) closeDetail();
      };

      if (item.sellKind === "set" && item.setSteps && item.setSteps.length) {
        panel.querySelectorAll("input[type=checkbox]").forEach((inp) => {
          inp.addEventListener("change", (ev) => {
            const inpX = ev.target;
            if (!inpX || inpX.type !== "checkbox" || !inpX.name || !inpX.name.startsWith("p-")) return;
            const stepId = inpX.name.slice(2);
            const stepEl = panel.querySelector("[data-step-id=\"" + selEsc(stepId) + "\"]");
            if (!stepEl) return;
            const boxes = [...stepEl.querySelectorAll("input[type=checkbox]")];
            const maxP = Number(boxes[0]?.getAttribute("data-max") || item.setSteps.find((s) => s.id === stepId)?.maxPick || 1);
            const checked = boxes.filter((b) => b.checked);
            if (checked.length > maxP) {
              inpX.checked = false;
              toast("この項目は最大 " + maxP + " 品までです");
            }
            const sel = collectSetSelections(panel, item);
            const up = computeSetUnitPrice(item, sel);
            const unit = up != null ? up : Number(item.price || 0);
            syncDetailAddPrice(panel, unit, Number(panel.querySelector("[data-qty]").textContent));
          });
        });
        const getQty = wireQty(panel, item, () => {
          const sel = collectSetSelections(panel, item);
          const up = computeSetUnitPrice(item, sel);
          return up != null ? up : Number(item.price || 0);
        });
        panel.querySelector("[data-add]").onclick = () => {
          const setSelections = collectSetSelections(panel, item);
          for (const st of item.setSteps || []) {
            const sel = setSelections.find((x) => x.stepId === st.id);
            const n = sel && sel.menuItemIds ? sel.menuItemIds.length : 0;
            if (n < st.minPick || n > st.maxPick) {
              toast(st.label + " は " + st.minPick + "〜" + st.maxPick + " 品選んでください");
              return;
            }
          }
          const unitPrice = computeSetUnitPrice(item, setSelections);
          if (unitPrice == null) {
            toast("選択内容を確認してください");
            return;
          }
          const q = getQty();
          if (!setStockAllows(item, setSelections, q)) {
            toast("在庫が不足しています");
            return;
          }
          const cartKey = "s:" + item.id + ":" + stableSetKey(setSelections);
          const cur = cart[cartKey] || {
            cartKey,
            menuItemId: item.id,
            name: item.name,
            unitPrice,
            qty: 0,
            sellKind: "set",
            setSelections,
          };
          cur.unitPrice = unitPrice;
          cur.setSelections = setSelections;
          cur.name = item.name;
          cur.qty = (cur.qty || 0) + q;
          cart[cartKey] = cur;
          closeDetail();
          renderCart();
          toast(item.name + " をカートに追加");
        };
      } else if (item.optionGroups && item.optionGroups.length) {
        panel.querySelectorAll("[data-opt-group-id]").forEach((stepEl) => {
          const boxes = [...stepEl.querySelectorAll("input[type=checkbox]")];
          if (boxes.length === 0) return;
          const maxP = Number(boxes[0].getAttribute("data-max") || 1);
          boxes.forEach((inp) => {
            inp.addEventListener("change", () => {
              const checked = boxes.filter((b) => b.checked);
              if (checked.length > maxP) {
                inp.checked = false;
                toast("このオプションは最大 " + maxP + " 個までです");
              }
              const optionSelections = collectOptionSelections(panel, item);
              syncDetailAddPrice(panel, computeOptionUnitPrice(item, optionSelections), Number(panel.querySelector("[data-qty]").textContent));
            });
          });
        });
        panel.querySelectorAll("input[type=radio]").forEach((r) => {
          r.addEventListener("change", () => {
            const optionSelections = collectOptionSelections(panel, item);
            syncDetailAddPrice(panel, computeOptionUnitPrice(item, optionSelections), Number(panel.querySelector("[data-qty]").textContent));
          });
        });
        const getQty = wireQty(panel, item, () => {
          const optionSelections = collectOptionSelections(panel, item);
          return computeOptionUnitPrice(item, optionSelections);
        });
        panel.querySelector("[data-add]").onclick = () => {
          const optionSelections = collectOptionSelections(panel, item);
          for (const g of item.optionGroups || []) {
            const sel = optionSelections.find((x) => x.optionGroupId === g.id);
            const n = sel && sel.optionItemIds ? sel.optionItemIds.length : 0;
            if (n < g.minSelect || n > g.maxSelect) {
              toast(g.name + " は " + g.minSelect + "〜" + g.maxSelect + " 個選んでください");
              return;
            }
          }
          const unitPrice = computeOptionUnitPrice(item, optionSelections);
          const q = getQty();
          const cartKey = "o:" + item.id + ":" + stableOptionKey(optionSelections);
          const cur = cart[cartKey] || {
            cartKey,
            menuItemId: item.id,
            name: item.name,
            unitPrice,
            qty: 0,
            sellKind: "single",
            optionSelections,
          };
          cur.unitPrice = unitPrice;
          cur.optionSelections = optionSelections;
          cur.name = item.name;
          if (item.stockQty != null && (cur.qty || 0) + q > item.stockQty) {
            toast("これ以上は在庫がありません");
            return;
          }
          cur.qty = (cur.qty || 0) + q;
          cart[cartKey] = cur;
          closeDetail();
          renderCart();
          toast(item.name + " をカートに追加");
        };
      } else {
        const getQty = wireQty(panel, item, () => singleGuestChargeBase(item));
        panel.querySelector("[data-add]").onclick = () => {
          const q = getQty();
          if (item.stockQty != null && q > item.stockQty) {
            toast("在庫が不足しています");
            return;
          }
          const cartKey = item.id;
          const base = singleGuestChargeBase(item);
          const cur = cart[cartKey] || {
            cartKey,
            menuItemId: item.id,
            name: item.name,
            unitPrice: base,
            qty: 0,
            sellKind: "single",
          };
          cur.unitPrice = base;
          cur.name = item.name;
          if (item.stockQty != null && (cur.qty || 0) + q > item.stockQty) {
            toast("これ以上は在庫がありません");
            return;
          }
          cur.qty = (cur.qty || 0) + q;
          cart[cartKey] = cur;
          closeDetail();
          renderCart();
          toast(item.name + " をカートに追加");
        };
      }

      if (!guestShowMenuPrices) {
        const da = panel.querySelector("[data-add]");
        if (da) da.textContent = "追加";
      }
    }

    function addLine(item) {
      openProductDetail(item);
    }

    function stopLastOrderTicker() {
      if (lastOrderTimer) clearInterval(lastOrderTimer);
      lastOrderTimer = null;
    }

    function startLastOrderTicker(lo) {
      stopLastOrderTicker();
      const el = document.getElementById("lastOrderBanner");
      if (!lo || !lo.deadlineIso) {
        el.style.display = "none";
        lastOrderClosedFlag = false;
        return;
      }
      lastOrderDeadlineTs = Date.parse(lo.deadlineIso);
      el.style.display = "block";
      function tick() {
        const left = Math.floor((lastOrderDeadlineTs - Date.now()) / 1000);
        lastOrderClosedFlag = Boolean(lo.orderingClosed) || left <= 0;
        renderCart();
        if (lastOrderClosedFlag) {
          el.innerHTML =
            "<span class=\"lo-inner\">ラストオーダーは終了しました（追加のご注文はスタッフへお声がけください）</span>";
          el.classList.add("lo-ended");
          stopLastOrderTicker();
          return;
        }
        el.classList.remove("lo-ended");
        const m = Math.floor(left / 60);
        const s = left % 60;
        el.innerHTML =
          "<span class=\"lo-inner\">ラストオーダーまで あと <strong>" +
          String(m) +
          ":" +
          String(s).padStart(2, "0") +
          "</strong>（残り " +
          left +
          " 秒）</span>";
      }
      tick();
      lastOrderTimer = setInterval(tick, 1000);
    }

    function clampCartToStock(categories) {
      const maxById = new Map();
      const setById = new Map();
      for (const c of categories || []) {
        for (const it of c.items || []) {
          if (it.stockQty != null) maxById.set(it.id, it.stockQty);
          if (it.sellKind === "set") setById.set(it.id, it);
        }
      }
      for (const k of Object.keys(cart)) {
        const line = cart[k];
        if (line.sellKind === "set" && line.setSelections) {
          const it = setById.get(line.menuItemId);
          if (it && !setStockAllows(it, line.setSelections, line.qty)) {
            let lo = 0;
            let hi = line.qty;
            while (lo < hi) {
              const mid = Math.ceil((lo + hi) / 2);
              if (setStockAllows(it, line.setSelections, mid)) lo = mid;
              else hi = mid - 1;
            }
            line.qty = lo;
          }
        } else {
          const m = maxById.get(line.menuItemId);
          if (m != null && line.qty > m) line.qty = m;
        }
        if (!line.qty || line.qty <= 0) delete cart[k];
      }
    }

    async function loadMenu() {
      const data = await api("/guest/" + encodeURIComponent(TOKEN) + "/menu");
      guestShowMenuPrices = !(data.store && data.store.showMenuPrices === false);
      menuPriceTaxMode = (data.store && data.store.menuPriceTaxMode) || "inclusive";
      taxRatePercent = Number((data.store && data.store.taxRatePercent) || 10);
      guestCourseIncludedChargeOptionExtras =
        !data.store || data.store.guestCourseIncludedChargeOptionExtras !== false;
      const s = data.session;
      const cc = Number(s.childCount || 0);
      let hdr = "人数 " + (s.guestCount || "—");
      if (cc > 0) hdr += "（大人" + (Number(s.guestCount) - cc) + "・子" + cc + "）";
      if (s.course) {
        hdr += " · " + s.course.name + "（制限時間 " + s.course.durationMinutes + "分）";
        if (guestShowMenuPrices && s.course.childPricePerPerson != null) {
          hdr +=
            " · 大人 " +
            Number(s.course.pricePerPerson).toLocaleString("ja-JP") +
            "円 / 子 " +
            Number(s.course.childPricePerPerson).toLocaleString("ja-JP") +
            "円";
        }
      }
      if (alcoholRestricted) hdr += " · 酒類は制限中";
      document.getElementById("hdr").textContent = hdr;
      startLastOrderTicker(data.lastOrder);
      const sn = document.getElementById("safetyNote");
      if (sn) {
        sn.style.display = alcoholRestricted ? "block" : "none";
        sn.textContent = alcoholRestricted
          ? "安全確認により、酒類の注文を制限しています。スタッフへご相談ください。"
          : "";
      }

      const packStrip = document.getElementById("courseOptionPacksStrip");
      if (packStrip) {
        packStrip.innerHTML = "";
        const op = s.course && s.course.optionPacks;
        if (op && op.length) {
          const unw = op.filter(function (x) {
            return !x.purchased;
          });
          if (unw.length > 0) {
            packStrip.style.display = "block";
            const wrap = document.createElement("div");
            wrap.className = "course-pack-strip-inner";
            const gCount = Math.max(1, parseInt(String(s.guestCount || 1), 10) || 1);
            for (const p of unw) {
              const scope = p.chargeScope || "table_once";
              const unitTi =
                typeof p.unitChargeTaxIncluded === "number" && Number.isFinite(p.unitChargeTaxIncluded)
                  ? p.unitChargeTaxIncluded
                  : typeof p.chargeTaxIncluded === "number" && Number.isFinite(p.chargeTaxIncluded)
                    ? p.chargeTaxIncluded
                    : 0;
              const row = document.createElement("div");
              row.className = "course-pack-row";
              const taxSub =
                p.extraPriceTaxMode === "exclusive"
                  ? "（※店舗が税抜入力の場合、お支払いは税込額です）"
                  : "";

              if (scope === "per_person_pick") {
                const maxP =
                  typeof p.maxSelectablePeople === "number" && p.maxSelectablePeople >= 1
                    ? p.maxSelectablePeople
                    : gCount;
                const line = document.createElement("div");
                line.className = "course-pack-people";
                line.appendChild(document.createTextNode(p.name + " · 一人税込 "));
                const strong = document.createElement("strong");
                strong.style.color = "var(--accent)";
                strong.textContent = "¥" + unitTi.toLocaleString("ja-JP");
                line.appendChild(strong);
                line.appendChild(document.createTextNode(" × "));
                const numIn = document.createElement("input");
                numIn.type = "number";
                numIn.min = "1";
                numIn.max = String(maxP);
                numIn.value = "1";
                numIn.setAttribute("aria-label", "オプションの人数");
                line.appendChild(numIn);
                line.appendChild(document.createTextNode(" 名（1〜" + maxP + "）"));
                const btnP = document.createElement("button");
                btnP.type = "button";
                btnP.className = "course-pack-btn";
                btnP.style.marginTop = "0.2rem";
                btnP.textContent = "この内容で追加する";
                btnP.onclick = async function () {
                  const n = parseInt(numIn.value, 10);
                  if (!Number.isInteger(n) || n < 1 || n > maxP) {
                    toast("人数は1〜" + maxP + "の整数で選んでください");
                    return;
                  }
                  try {
                    await api("/guest/" + encodeURIComponent(TOKEN) + "/course-option-packs/purchase", {
                      method: "POST",
                      headers: { "Content-Type": "application/json" },
                      body: JSON.stringify({ packId: p.id, peopleCount: n }),
                    });
                    toast("追加しました");
                    await loadMenu();
                  } catch (e) {
                    toast(String(e.message || e));
                  }
                };
                row.appendChild(line);
                row.appendChild(btnP);
                if (taxSub) {
                  const tn = document.createElement("div");
                  tn.style.fontSize = "0.65rem";
                  tn.style.opacity = "0.85";
                  tn.textContent = taxSub;
                  row.appendChild(tn);
                }
                wrap.appendChild(row);
                continue;
              }

              const payBtn = document.createElement("button");
              payBtn.type = "button";
              payBtn.className = "course-pack-btn";
              let payTotal = 0;
              let labelExtra = "";
              if (scope === "per_person_all") {
                payTotal =
                  typeof p.totalIfAllGuestsTaxIncluded === "number" &&
                  Number.isFinite(p.totalIfAllGuestsTaxIncluded)
                    ? p.totalIfAllGuestsTaxIncluded
                    : unitTi * gCount;
                labelExtra = "（税込・延べ" + gCount + "名分）";
              } else {
                payTotal =
                  typeof p.chargeTaxIncluded === "number" && Number.isFinite(p.chargeTaxIncluded)
                    ? p.chargeTaxIncluded
                    : unitTi;
                labelExtra = "（税込・卓1回）";
              }
              payBtn.innerHTML =
                escapeHtml(p.name) +
                " <strong>+¥" +
                payTotal.toLocaleString("ja-JP") +
                "</strong><span style=\"font-size:0.72rem\">" +
                escapeHtml(labelExtra) +
                "</span>" +
                (taxSub
                  ? "<span style=\"font-size:0.65rem;opacity:0.85;display:block;margin-top:0.15rem\">" +
                    escapeHtml(taxSub) +
                    "</span>"
                  : "") +
                "<span style=\"font-size:0.68rem;font-weight:600;opacity:0.9;display:block;margin-top:0.2rem\">対象メニューが広がります</span>";
              payBtn.onclick = async function () {
                try {
                  await api("/guest/" + encodeURIComponent(TOKEN) + "/course-option-packs/purchase", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ packId: p.id }),
                  });
                  toast("追加しました");
                  await loadMenu();
                } catch (e) {
                  toast(String(e.message || e));
                }
              };
              row.appendChild(payBtn);
              wrap.appendChild(row);
            }
            packStrip.appendChild(wrap);
          } else {
            packStrip.style.display = "none";
          }
        } else {
          packStrip.style.display = "none";
        }
      }

      const cp = data.customerProfile;
      if (cp) {
        document.getElementById("custName").value = cp.name || "";
        document.getElementById("custPhone").value = cp.phone || "";
      }

      try {
        const dev = getOrCreateDeviceId();
        const idRes = await api("/guest/" + encodeURIComponent(TOKEN) + "/identify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ deviceId: dev }),
        });
        const hint = document.getElementById("profileHint");
        if (hint && idRes.customer && idRes.customer.visitCount != null) {
          hint.textContent =
            "ご来店の記録: " +
            idRes.customer.visitCount +
            "回" +
            (idRes.customer.firstLinkThisSession ? "（今回のご来店を記録しました）" : "");
        }
      } catch (_) {}

      const cats = data.categories || [];
      alcoholById.clear();
      clampCartToStock(cats);
      renderCart();

      const tabs = document.getElementById("catTabs");
      tabs.innerHTML = "";
      const allBtn = document.createElement("button");
      allBtn.type = "button";
      allBtn.className = "go-tab is-active";
      allBtn.dataset.cat = "";
      allBtn.textContent = "すべて";
      tabs.appendChild(allBtn);
      for (const c of cats) {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "go-tab";
        b.dataset.cat = c.id;
        b.textContent = c.name;
        tabs.appendChild(b);
      }
      tabs.onclick = (ev) => {
        const t = ev.target.closest(".go-tab");
        if (!t) return;
        [...tabs.querySelectorAll(".go-tab")].forEach((x) => x.classList.toggle("is-active", x === t));
        const id = t.dataset.cat || "";
        document.querySelectorAll(".go-card").forEach((card) => {
          if (!id || card.dataset.cat === id) {
            card.style.display = "";
          } else {
            card.style.display = "none";
          }
        });
      };

      const root = document.getElementById("menu");
      root.innerHTML = "";
      for (const c of cats) {
        for (const it of c.items || []) {
          const isAlcohol = isAlcoholItem(it, c.name);
          alcoholById.set(it.id, isAlcohol);
          const card = document.createElement("article");
          card.className = "go-card";
          card.dataset.cat = c.id;
          const sold = it.stockQty != null && it.stockQty <= 0;
          const blocked = sold || (isAlcohol && alcoholRestricted);
          if (blocked) card.classList.add("is-dim");

          const media = document.createElement("div");
          media.className = "go-card-media";
          if (it.imageUrl) {
            const im = document.createElement("img");
            im.src = it.imageUrl;
            im.alt = it.name;
            im.loading = "lazy";
            media.appendChild(im);
          } else {
            const ph = document.createElement("div");
            ph.className = "go-ph";
            ph.textContent = "◇";
            media.appendChild(ph);
          }
          const badgeStack = document.createElement("div");
          badgeStack.style.cssText = "position:absolute;top:0;right:0;display:flex;flex-direction:column;align-items:flex-end;gap:0.25rem;padding:0.35rem;";
          if (it.sellKind === "set") {
            const b = document.createElement("span");
            b.className = "go-card-badge";
            b.textContent = "セット";
            badgeStack.appendChild(b);
          }
          if (isAlcohol) {
            const b = document.createElement("span");
            b.className = "go-card-badge";
            b.style.background = "rgba(124,45,18,.75)";
            b.textContent = "酒類";
            badgeStack.appendChild(b);
          }
          if (it.courseTier === "included") {
            const b = document.createElement("span");
            b.className = "badge-course-in";
            b.textContent = "コース内";
            badgeStack.appendChild(b);
          } else if (it.courseTier === "addon") {
            const b = document.createElement("span");
            b.className = "badge-course-add";
            b.textContent = "追加料金";
            badgeStack.appendChild(b);
          }
          media.appendChild(badgeStack);

          const body = document.createElement("div");
          body.className = "go-card-body";
          const title = document.createElement("div");
          title.className = "go-card-title";
          title.textContent = it.name;
          const meta = document.createElement("div");
          meta.className = "go-card-meta";
          meta.textContent = it.description || "";
          const price = document.createElement("div");
          price.className = "go-card-price";
          price.innerHTML = fmtItemPrice(it);
          const badges = document.createElement("div");
          badges.style.cssText = "display:flex;flex-wrap:wrap;gap:0.25rem;margin-top:0.35rem;";
          if (sold) {
            const b = document.createElement("span");
            b.className = "badge-sold";
            b.textContent = "売切";
            badges.appendChild(b);
          } else if (it.lowStock) {
            const b = document.createElement("span");
            b.className = "badge-low";
            b.textContent = "残りわずか";
            badges.appendChild(b);
          }
          if (isAlcohol && alcoholRestricted) {
            const b = document.createElement("span");
            b.className = "badge-sold";
            b.textContent = "注文不可";
            badges.appendChild(b);
          }
          body.appendChild(title);
          if (it.description) body.appendChild(meta);
          body.appendChild(price);
          if (badges.childNodes.length) body.appendChild(badges);

          card.appendChild(media);
          card.appendChild(body);
          card.onclick = () => {
            if (!blocked) addLine(it);
            else if (sold) toast("売り切れです");
            else if (isAlcohol && alcoholRestricted) toast("酒類はご注文いただけません");
          };
          root.appendChild(card);
        }
      }
    }

    async function loadOrders() {
      const data = await api("/guest/" + encodeURIComponent(TOKEN) + "/orders");
      const box = document.getElementById("orders");
      const list = data.orders || [];
      if (list.length === 0) {
        box.innerHTML = "";
        return;
      }
      let html = "<h2 id=\"orderHistoryAnchor\">注文履歴</h2>";
      for (const o of list) {
        const lines = (o.lines || []).map((l) => l.nameSnapshot + " ×" + l.qty + " " + fmtMoney(l.unitPrice * l.qty)).join("<br>");
        html += "<div class=\"order-card\"><strong>" + new Date(o.createdAt).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" }) + "</strong> · " + (o.status || "") + "<br>" + lines + "</div>";
      }
      box.innerHTML = html;
    }

    document.getElementById("submit").onclick = async () => {
      if (lastOrderClosedFlag) {
        toast("ラストオーダーの時間を過ぎています");
        return;
      }
      const lines = Object.values(cart)
        .filter((x) => x.qty > 0)
        .map((x) => {
          const o = { menuItemId: x.menuItemId, qty: x.qty };
          if (x.sellKind === "set" && x.setSelections) o.setSelections = x.setSelections;
          if (x.optionSelections && x.optionSelections.length) o.optionSelections = x.optionSelections;
          return o;
        });
      if (lines.length === 0) return;
      if (alcoholRestricted) {
        const alcoholLine = lines.find((l) => alcoholById.get(l.menuItemId));
        if (alcoholLine) {
          toast("酒類が含まれているため送信できません");
          return;
        }
      }
      const btn = document.getElementById("submit");
      btn.disabled = true;
      try {
        await api("/guest/" + encodeURIComponent(TOKEN) + "/orders", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ lines }),
        });
        for (const k of Object.keys(cart)) delete cart[k];
        renderCart();
        toast("注文を送信しました");
        await loadOrders();
        await loadMenu();
      } catch (e) {
        document.getElementById("err").style.display = "block";
        document.getElementById("err").textContent = String(e.message || e);
      } finally {
        btn.disabled = Object.values(cart).reduce((s, x) => s + (x.qty || 0), 0) === 0;
      }
    };

    document.getElementById("btnHistory").onclick = () => {
      const box = document.getElementById("orders");
      if (box && box.innerHTML.trim()) box.scrollIntoView({ behavior: "smooth", block: "start" });
      else toast("まだ注文履歴がありません");
    };
    document.getElementById("btnStaff").onclick = () => toast("スタッフをお呼びしています。少々お待ちください。");
    document.getElementById("btnCartScroll").onclick = () => {
      document.getElementById("cartFooter").scrollIntoView({ behavior: "smooth", block: "end" });
    };

    document.getElementById("btnSaveProfile").onclick = async () => {
      try {
        const dev = getOrCreateDeviceId();
        const name = document.getElementById("custName").value.trim();
        const phone = document.getElementById("custPhone").value.trim();
        const idRes = await api("/guest/" + encodeURIComponent(TOKEN) + "/identify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ deviceId: dev, name, phone }),
        });
        const hint = document.getElementById("profileHint");
        if (hint && idRes.customer && idRes.customer.visitCount != null) {
          hint.textContent = "ご来店の記録: " + idRes.customer.visitCount + "回 · 保存しました";
        }
        toast("お客様情報を保存しました");
      } catch (e) {
        toast(String(e.message || e));
      }
    };

    async function ensureSafetyGate() {
      const key = "guest-safety:" + TOKEN;
      try {
        const raw = sessionStorage.getItem(key);
        if (raw) {
          const parsed = JSON.parse(raw);
          alcoholRestricted = parsed && parsed.allowAlcohol === false;
          return;
        }
      } catch (_) {}
      const gate = document.getElementById("ageGate");
      const qDrive = document.getElementById("qDrive");
      const qAge = document.getElementById("qAge");
      const okBtn = document.getElementById("ageGateOk");
      if (!gate || !qDrive || !qAge || !okBtn) return;
      gate.style.display = "flex";
      let drive = "";
      let age = "";
      function refreshBtn() {
        okBtn.disabled = !(drive && age);
      }
      qDrive.querySelectorAll("button").forEach((b) => {
        b.onclick = () => {
          drive = b.getAttribute("data-v") || "";
          qDrive.querySelectorAll("button").forEach((x) => x.classList.toggle("on", x === b));
          refreshBtn();
        };
      });
      qAge.querySelectorAll("button").forEach((b) => {
        b.onclick = () => {
          age = b.getAttribute("data-v") || "";
          qAge.querySelectorAll("button").forEach((x) => x.classList.toggle("on", x === b));
          refreshBtn();
        };
      });
      await new Promise((resolve) => {
        okBtn.onclick = () => {
          const allowAlcohol = drive === "no" && age === "yes";
          alcoholRestricted = !allowAlcohol;
          try {
            sessionStorage.setItem(key, JSON.stringify({ allowAlcohol, at: Date.now() }));
          } catch (_) {}
          gate.style.display = "none";
          resolve();
        };
      });
    }

    (async () => {
      try {
        await ensureSafetyGate();
        await loadMenu();
        await loadOrders();
      } catch (e) {
        document.getElementById("err").style.display = "block";
        document.getElementById("err").textContent = String(e.message || e);
        document.getElementById("hdr").textContent = "セッションを開けませんでした";
      }
    })();
  </script>
