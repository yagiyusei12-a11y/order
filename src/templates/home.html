<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>order — モバイルオーダー</title>
  <style>
    :root { --bg: #0f1419; --card: #1a222c; --text: #e8eef4; --muted: #8b9aab; --accent: #c9a227; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.5rem; }
    main { max-width: 36rem; margin: 0 auto; }
    h1 { font-size: 1.35rem; font-weight: 700; margin: 0 0 0.5rem; }
    p { color: var(--muted); line-height: 1.55; margin: 0 0 1.25rem; }
    ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.75rem; }
    a {
      display: block; padding: 1rem 1.1rem; background: var(--card); color: var(--text);
      text-decoration: none; border-radius: 10px; border: 1px solid #2a3542;
    }
    a:hover { border-color: var(--accent); color: var(--accent); }
    a strong { display: block; font-size: 1rem; margin-bottom: 0.2rem; }
    a span { font-size: 0.85rem; color: var(--muted); }
    code { font-size: 0.8rem; background: #243040; padding: 0.15rem 0.4rem; border-radius: 4px; }
  </style>
</head>
<body>
  <main>
    <h1>order</h1>
    <p>API とブラウザ画面のプロトタイプです。LINE ミニアプリは使いません。</p>
    <ul>
      <li>
        <a href="/staff-app/login"><strong>店舗ログイン</strong><span>メニュー・卓・会計など。ゲスト向けは各卓の <code>/table-app/&lt;公開コード&gt;</code> から。</span></a>
      </li>
    </ul>
  </main>
</body>
</html>
