<!DOCTYPE html>
<!-- staff-login theme: light-2026-05 -->
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#e8eef5" />
  <title>店舗ログイン</title>
  <style>
    html { color-scheme: light; }
    :root {
      --bg: #e8eef5;
      --card: #ffffff;
      --line: #c5d0df;
      --text: #152232;
      --muted: #4a5d72;
      --accent: #1565c0;
      --accent-hover: #0d47a1;
      --btn-text: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: linear-gradient(165deg, #f5f8fc 0%, var(--bg) 45%, #dce6f2 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      width: 100%;
      max-width: 22rem;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 1.35rem 1.25rem;
      box-shadow: 0 10px 40px rgba(21, 34, 50, 0.08), 0 1px 3px rgba(21, 34, 50, 0.06);
    }
    h1 { font-size: 1.15rem; margin: 0 0 0.35rem; font-weight: 700; color: var(--text); }
    p { color: var(--muted); font-size: 0.875rem; margin: 0 0 1rem; line-height: 1.55; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text); margin-bottom: 0.25rem; }
    input {
      width: 100%;
      padding: 0.6rem 0.7rem;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fafbfd;
      color: var(--text);
      margin-bottom: 0.75rem;
    }
    input:focus {
      outline: 2px solid rgba(21, 101, 192, 0.35);
      outline-offset: 1px;
      border-color: var(--accent);
      background: #fff;
    }
    button {
      width: 100%;
      padding: 0.68rem;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: var(--btn-text);
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.25rem;
      letter-spacing: 0.02em;
    }
    button:hover { background: var(--accent-hover); }
    #err { color: #b71c1c; font-size: 0.85rem; margin-top: 0.75rem; display: none; font-weight: 600; }
    .hint { font-size: 0.78rem; color: var(--muted); margin-top: 1rem; }
    .hint a { color: var(--accent); font-weight: 600; text-decoration: underline; text-underline-offset: 3px; }
    .hint a:hover { color: var(--accent-hover); }
    code { background: #e9eef5; color: var(--text); padding: 0.12rem 0.4rem; border-radius: 4px; font-size: 0.85em; border: 1px solid #d5dde8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>店舗ログイン</h1>
    <p>HTTPS 利用時は <code>COOKIE_SECURE=1</code> を推奨（Cookie の Secure フラグ）。</p>
    <p class="hint" style="margin-top:-0.35rem"><a href="/staff-app/setup">初めての場合：店舗とスタッフを登録</a></p>
    <p class="hint"><a href="/manual" target="_blank" rel="noopener noreferrer">スタッフ向け説明書（ログイン不要・別タブ）</a></p>
    <label for="storeId">店舗ID（ログインする店の識別子）</label>
    <p id="login-hint-store" class="hint" style="margin:-0.25rem 0 0.45rem">スタッフURLの <code>/staff-app/___</code> に当たるコードです。</p>
    <input id="storeId" type="text" autocomplete="organization" placeholder="店舗ID" aria-describedby="login-hint-store" />
    <label for="email">メールアドレス（スタッフアカウント）</label>
    <input id="email" type="email" autocomplete="username" placeholder="account@example.com" />
    <label for="password">パスワード</label>
    <input id="password" type="password" autocomplete="current-password" />
    <button type="button" id="go">ログイン</button>
    <div id="err"></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const next = params.get("next") || "";
    const presetStore = params.get("storeId");
    if (presetStore) document.getElementById("storeId").value = presetStore;

    document.getElementById("go").onclick = async () => {
      const err = document.getElementById("err");
      err.style.display = "none";
      const storeId = document.getElementById("storeId").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      try {
        const r = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ storeId, email, password }),
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(j.error || r.statusText);
        const sid = encodeURIComponent(storeId);
        const defaultHome = "/staff-app/" + sid;
        let dest = defaultHome;
        if (next && next.startsWith("/staff-app/" + sid)) dest = next;
        location.assign(dest);
      } catch (e) {
        err.style.display = "block";
        err.textContent = String(e.message || e);
      }
    };
  </script>
</body>
</html>
