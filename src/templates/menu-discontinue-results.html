<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>メニュー廃止投票 — 集計</title>
    <style>
      :root {
        --bg: #0f1419;
        --surface: rgba(255, 255, 255, 0.06);
        --line: rgba(255, 255, 255, 0.12);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.65);
        --accent: #38bdf8;
        --danger: #f87171;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", "Noto Sans JP", sans-serif;
        color: var(--text);
        background:
          radial-gradient(800px 480px at 90% 0%, rgba(248, 113, 113, 0.1), transparent 55%),
          var(--bg);
        min-height: 100vh;
      }
      .wrap {
        max-width: 820px;
        margin: 0 auto;
        padding: 1rem;
        padding-bottom: calc(1rem + env(safe-area-inset-bottom));
      }
      h1 { margin: 0 0 0.25rem; font-size: 1.25rem; }
      .sub { color: var(--muted); font-size: 0.85rem; margin: 0 0 1rem; line-height: 1.5; }
      .summary {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }
      .pill {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0.35rem 0.75rem;
        font-size: 0.82rem;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        margin-bottom: 0.85rem;
      }
      table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
      th, td {
        padding: 0.55rem 0.65rem;
        text-align: left;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        vertical-align: top;
      }
      th {
        font-size: 0.72rem;
        color: var(--muted);
        font-weight: 600;
        background: rgba(0, 0, 0, 0.15);
      }
      tr:last-child td { border-bottom: none; }
      .votes {
        font-weight: 800;
        font-size: 1rem;
        color: var(--danger);
        white-space: nowrap;
      }
      .voters { font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem; }
      .unavail { color: var(--danger); font-size: 0.72rem; }
      .btn-link {
        color: var(--accent);
        text-decoration: none;
        font-size: 0.85rem;
      }
      .toolbar {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 0.75rem;
      }
      button {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 0.45rem 0.75rem;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font-size: 0.82rem;
        cursor: pointer;
      }
      .loading { color: var(--muted); text-align: center; padding: 2rem 0; }
      .zero { color: var(--muted); }
      @media (max-width: 560px) {
        .hide-sm { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1 id="pageTitle">メニュー廃止投票 — 集計</h1>
      <p class="sub">スタッフ投票の集計結果です。票が多い順に表示しています。</p>
      <div class="toolbar">
        <a class="btn-link" id="voteLink" href="#">投票ページへ</a>
        <button type="button" id="btnRefresh">更新</button>
      </div>
      <div class="summary" id="summary"></div>
      <div id="resultsArea" class="loading">読み込み中…</div>
    </div>
    <script>
      const STORE_ID = __STORE_ID_JS__;
      const KEY = __KEY_JS__;
      const VOTE_PATH = __VOTE_PATH_JS__;

      const qs = (sel) => document.querySelector(sel);
      const resultsArea = qs("#resultsArea");
      const summaryEl = qs("#summary");
      qs("#voteLink").href = VOTE_PATH + "?key=" + encodeURIComponent(KEY);

      function api(path) {
        const u =
          "/menu-discontinue/api/" +
          encodeURIComponent(STORE_ID) +
          path +
          "?key=" +
          encodeURIComponent(KEY);
        return fetch(u).then(async (r) => {
          const j = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(j.error || r.statusText || "error");
          return j;
        });
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function render(data) {
        qs("#pageTitle").textContent = (data.storeName || "店舗") + " — 廃止投票 集計";
        summaryEl.innerHTML =
          '<span class="pill">投票者 ' +
          escapeHtml(String(data.voterCount || 0)) +
          " 名</span>" +
          '<span class="pill">対象メニュー ' +
          escapeHtml(String((data.items || []).length)) +
          " 件</span>";

        const items = data.items || [];
        const withVotes = items.filter((i) => i.voteCount > 0);
        if (withVotes.length === 0) {
          resultsArea.innerHTML =
            '<div class="card" style="padding:1rem"><p class="zero">まだ投票がありません。</p></div>';
          return;
        }

        let rows = "";
        for (const item of withVotes) {
          rows +=
            "<tr>" +
            '<td class="votes">' +
            item.voteCount +
            " 票</td>" +
            "<td>" +
            escapeHtml(item.name) +
            (item.isAvailable ? "" : ' <span class="unavail">（販売停止中）</span>') +
            '<div class="voters">' +
            escapeHtml((item.voters || []).join("、")) +
            "</div></td>" +
            '<td class="hide-sm">' +
            escapeHtml(item.categoryName) +
            "</td></tr>";
        }

        resultsArea.innerHTML =
          '<div class="card"><table><thead><tr><th>票数</th><th>メニュー</th><th class="hide-sm">カテゴリ</th></tr></thead><tbody>' +
          rows +
          "</tbody></table></div>";
      }

      function load() {
        resultsArea.innerHTML = '<p class="loading">読み込み中…</p>';
        api("/results")
          .then(render)
          .catch((e) => {
            resultsArea.innerHTML = '<p class="loading">' + escapeHtml(e.message) + "</p>";
          });
      }

      qs("#btnRefresh").addEventListener("click", load);
      load();
    </script>
  </body>
</html>
