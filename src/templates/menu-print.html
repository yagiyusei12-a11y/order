<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>__STORE_NAME__ メニュー</title>
  <style>
    :root {
      --ink: #2a211c;
      --muted: #6b5f56;
      --line: #d4c4b0;
      --accent: #5d4037;
      --gold: #a67c52;
      --paper: #faf6f0;
      --paper-deep: #f3ebe1;
    }
    * { box-sizing: border-box; }
    html { background: #e8e0d6; }
    body {
      margin: 0;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS PMincho", "Hiragino Sans", serif;
      color: var(--ink);
      line-height: 1.5;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* ── 画面上のツールバー ── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1rem;
      background: rgba(42, 33, 28, 0.92);
      color: #f5efe8;
      font-family: "Hiragino Sans", "Yu Gothic UI", sans-serif;
    }
    .toolbar p { margin: 0; font-size: 0.82rem; opacity: 0.9; }
    .btn-print {
      border: 1px solid var(--gold);
      background: transparent;
      color: #fff;
      font-weight: 700;
      padding: 0.5rem 1.15rem;
      border-radius: 2px;
      cursor: pointer;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
    }
    .btn-print:hover { background: rgba(166, 124, 82, 0.25); }

    /* ── A4 シート ── */
    .menu-book {
      padding: 1.5rem 0 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .a4-chapter {
      width: 210mm;
      min-height: 297mm;
      background: var(--paper);
      padding: 14mm 13mm 12mm;
      position: relative;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
    }
    .a4-chapter:not(.chapter-first) {
      margin-top: 0;
    }

    /* ── 表紙（1ページ目） ── */
    .menu-cover {
      text-align: center;
      padding: 6mm 0 10mm;
      margin-bottom: 4mm;
    }
    .cover-eyebrow {
      margin: 0 0 0.35rem;
      font-size: 0.72rem;
      letter-spacing: 0.45em;
      color: var(--gold);
      font-family: "Hiragino Sans", sans-serif;
    }
    .cover-title {
      margin: 0 0 0.5rem;
      font-size: 1.85rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--accent);
    }
    .cover-note {
      margin: 0;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: "Hiragino Sans", sans-serif;
    }
    .cover-rule {
      width: 48mm;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 8mm auto 0;
    }

    /* ── 章見出し ── */
    .chapter-head {
      text-align: center;
      margin-bottom: 7mm;
      padding-bottom: 4mm;
      border-bottom: 1px solid var(--line);
    }
    .chapter-first .chapter-head {
      margin-top: 0;
    }
    .chapter-en {
      margin: 0 0 0.15rem;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      color: var(--gold);
      font-family: "Hiragino Sans", sans-serif;
    }
    .chapter-ja {
      margin: 0 0 0.35rem;
      font-size: 1.45rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      color: var(--accent);
    }
    .chapter-lead {
      margin: 0;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: "Hiragino Sans", sans-serif;
    }

    /* ── 価格表 ── */
    .menu-table-wrap {
      overflow-x: auto;
    }
    .menu-price-table {
      width: 100%;
      border-collapse: collapse;
      font-family: "Hiragino Sans", "Yu Gothic UI", sans-serif;
      font-size: 0.72rem;
      line-height: 1.4;
    }
    .menu-price-table thead th {
      text-align: left;
      font-weight: 700;
      color: var(--accent);
      background: var(--paper-deep);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 2mm 2.5mm;
      white-space: nowrap;
    }
    .menu-price-table tbody td {
      vertical-align: middle;
      padding: 1.8mm 2.5mm;
      border-bottom: 1px solid rgba(212, 196, 176, 0.55);
    }
    .menu-price-table tbody tr:nth-child(even) td {
      background: rgba(255, 255, 255, 0.45);
    }
    .menu-price-table .col-cat {
      width: 18%;
      color: var(--muted);
      font-size: 0.68rem;
      vertical-align: top;
    }
    .menu-price-table .col-photo {
      width: 14mm;
      padding: 1.5mm 1mm;
    }
    .menu-price-table .col-photo img {
      width: 12mm;
      height: 12mm;
      object-fit: cover;
      border-radius: 1px;
      border: 1px solid var(--line);
      display: block;
      background: #fff;
    }
    .menu-price-table .col-photo .photo-empty {
      display: block;
      width: 12mm;
      height: 12mm;
      border-radius: 1px;
      border: 1px solid var(--line);
      background: linear-gradient(135deg, var(--paper-deep), #ebe3d9);
    }
    .chapter-teishoku .menu-price-table .col-photo img,
    .chapter-teishoku .menu-price-table .col-photo .photo-empty {
      width: 16mm;
      height: 12mm;
    }
    .menu-price-table .col-name {
      width: 38%;
      font-weight: 600;
      color: var(--ink);
      vertical-align: top;
    }
    .menu-price-table .col-net,
    .menu-price-table .col-incl {
      width: 14%;
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .menu-price-table .col-incl {
      font-weight: 700;
      color: var(--accent);
    }
    .menu-price-table thead .col-net,
    .menu-price-table thead .col-incl {
      text-align: right;
    }

    /* ── 章フッター ── */
    .chapter-foot {
      margin-top: 8mm;
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      font-family: "Hiragino Sans", sans-serif;
      border-top: 1px solid var(--line);
      padding-top: 2mm;
    }

    .book-footer {
      width: 210mm;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: "Hiragino Sans", sans-serif;
      padding: 0 1rem 2rem;
    }

    /* ── 印刷 ── */
    @media print {
      html { background: #fff; }
      .toolbar { display: none !important; }
      .menu-book {
        padding: 0;
        gap: 0;
      }
      .a4-chapter {
        width: auto;
        min-height: auto;
        box-shadow: none;
        margin: 0;
        page-break-after: always;
        break-after: page;
      }
      .a4-chapter:last-child {
        page-break-after: auto;
        break-after: auto;
      }
      .menu-price-table {
        font-size: 8pt;
      }
      .menu-price-table thead {
        display: table-header-group;
      }
      .menu-price-table tr {
        break-inside: avoid;
      }
      @page {
        size: A4 portrait;
        margin: 0;
      }
    }

    @media screen and (max-width: 800px) {
      .a4-chapter {
        width: 100%;
        min-height: auto;
        padding: 1rem;
      }
      .menu-price-table { font-size: 0.68rem; }
      .chapter-foot { position: static; margin-top: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <p>__TAX_NOTE__　更新: __GENERATED_AT__　｜　A4・料理 / ドリンク / 定食・カテゴリ / 画像 / 商品名 / 税抜 / 税込</p>
    <button type="button" class="btn-print" onclick="window.print()">印刷 / PDF保存</button>
  </div>
  <div class="menu-book">
    __MENU_CHAPTERS__
  </div>
  <p class="book-footer">
    写真・価格は予告なく変更する場合があります。コース・飲み放題プランは別途ご案内します。
  </p>
</body>
</html>
