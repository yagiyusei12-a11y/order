<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>__STORE_NAME__ メニュー</title>
  <style>
    :root {
      --ink: #2a211c;
      --muted: #6b5f56;
      --line: #d4c4b0;
      --accent: #5d4037;
      --gold: #a67c52;
      --paper: #faf6f0;
      --paper-deep: #f3ebe1;
    }
    * { box-sizing: border-box; }
    html { background: #e8e0d6; }
    body {
      margin: 0;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS PMincho", "Hiragino Sans", serif;
      color: var(--ink);
      line-height: 1.5;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* ── 画面上のツールバー ── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1rem;
      background: rgba(42, 33, 28, 0.92);
      color: #f5efe8;
      font-family: "Hiragino Sans", "Yu Gothic UI", sans-serif;
    }
    .toolbar p { margin: 0; font-size: 0.82rem; opacity: 0.9; }
    .btn-print {
      border: 1px solid var(--gold);
      background: transparent;
      color: #fff;
      font-weight: 700;
      padding: 0.5rem 1.15rem;
      border-radius: 2px;
      cursor: pointer;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
    }
    .btn-print:hover { background: rgba(166, 124, 82, 0.25); }

    /* ── A4 シート ── */
    .menu-book {
      padding: 1.5rem 0 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .a4-chapter {
      width: 210mm;
      min-height: 297mm;
      background: var(--paper);
      padding: 14mm 13mm 12mm;
      position: relative;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
    }
    .a4-chapter:not(.chapter-first) {
      margin-top: 0;
    }

    /* ── 表紙（1ページ目） ── */
    .menu-cover {
      text-align: center;
      padding: 6mm 0 10mm;
      margin-bottom: 4mm;
    }
    .cover-eyebrow {
      margin: 0 0 0.35rem;
      font-size: 0.72rem;
      letter-spacing: 0.45em;
      color: var(--gold);
      font-family: "Hiragino Sans", sans-serif;
    }
    .cover-title {
      margin: 0 0 0.5rem;
      font-size: 1.85rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--accent);
    }
    .cover-note {
      margin: 0;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: "Hiragino Sans", sans-serif;
    }
    .cover-rule {
      width: 48mm;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 8mm auto 0;
    }

    /* ── 章見出し ── */
    .chapter-head {
      text-align: center;
      margin-bottom: 7mm;
      padding-bottom: 4mm;
      border-bottom: 1px solid var(--line);
    }
    .chapter-first .chapter-head {
      margin-top: 0;
    }
    .chapter-en {
      margin: 0 0 0.15rem;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      color: var(--gold);
      font-family: "Hiragino Sans", sans-serif;
    }
    .chapter-ja {
      margin: 0 0 0.35rem;
      font-size: 1.45rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      color: var(--accent);
    }
    .chapter-lead {
      margin: 0;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: "Hiragino Sans", sans-serif;
    }

    /* ── サブカテゴリ ── */
    .subcat {
      margin-bottom: 5mm;
      break-inside: avoid;
    }
    .subcat-title {
      margin: 0 0 2.5mm;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.06em;
      padding-left: 2.5mm;
      border-left: 2px solid var(--gold);
      font-family: "Hiragino Sans", "Yu Gothic UI", sans-serif;
    }

    /* ── 料理・ドリンク：2段組リスト ── */
    .list-cols {
      column-count: 2;
      column-gap: 5mm;
    }
    .subcat-list .menu-row {
      break-inside: avoid;
      margin-bottom: 2.2mm;
    }
    .menu-row {
      display: flex;
      gap: 2mm;
      align-items: flex-start;
    }
    .menu-row.has-photo .row-body {
      min-width: 0;
    }
    .photo-sm {
      width: 11mm;
      height: 11mm;
      flex-shrink: 0;
      border-radius: 1px;
      overflow: hidden;
      background: var(--paper-deep);
      border: 1px solid var(--line);
    }
    .photo-sm img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .photo-empty {
      background: linear-gradient(135deg, var(--paper-deep), #ebe3d9);
    }
    .row-body { flex: 1; min-width: 0; }
    .row-line {
      display: flex;
      align-items: baseline;
      gap: 1mm;
      line-height: 1.35;
    }
    .row-name {
      font-size: 0.76rem;
      flex-shrink: 1;
      min-width: 0;
    }
    .row-dots {
      flex: 1;
      border-bottom: 1px dotted var(--line);
      min-width: 2mm;
      margin-bottom: 0.15em;
      opacity: 0.85;
    }
    .row-price {
      flex-shrink: 0;
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      font-family: "Hiragino Sans", sans-serif;
    }
    .row-desc {
      margin: 0.5mm 0 0;
      font-size: 0.62rem;
      color: var(--muted);
      line-height: 1.35;
      font-family: "Hiragino Sans", sans-serif;
    }

    /* ドリンク章は写真なし・コンパクト */
    .chapter-drink .list-cols {
      column-gap: 6mm;
    }
    .chapter-drink .row-name,
    .chapter-drink .row-price {
      font-size: 0.74rem;
    }
    .chapter-drink .subcat {
      margin-bottom: 4mm;
    }

    /* ── 定食：写真付きカード ── */
    .teishoku-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4mm;
    }
    .teishoku-card {
      break-inside: avoid;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 2px;
      overflow: hidden;
    }
    .photo-lg {
      aspect-ratio: 4 / 3;
      background: var(--paper-deep);
      overflow: hidden;
    }
    .photo-lg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .teishoku-card .photo-empty {
      width: 100%;
      height: 100%;
      min-height: 28mm;
      background: linear-gradient(160deg, #ebe3d9, #f5efe8);
    }
    .card-body {
      padding: 2.5mm 3mm 3mm;
    }
    .card-name {
      margin: 0 0 1mm;
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.35;
      color: var(--ink);
    }
    .card-desc {
      margin: 0 0 1.5mm;
      font-size: 0.62rem;
      color: var(--muted);
      line-height: 1.35;
      font-family: "Hiragino Sans", sans-serif;
    }
    .card-price {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      font-family: "Hiragino Sans", sans-serif;
    }

    /* ── 章フッター ── */
    .chapter-foot {
      margin-top: 8mm;
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      font-family: "Hiragino Sans", sans-serif;
      border-top: 1px solid var(--line);
      padding-top: 2mm;
    }

    .book-footer {
      width: 210mm;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: "Hiragino Sans", sans-serif;
      padding: 0 1rem 2rem;
    }

    /* ── 印刷 ── */
    @media print {
      html { background: #fff; }
      .toolbar { display: none !important; }
      .menu-book {
        padding: 0;
        gap: 0;
      }
      .a4-chapter {
        width: auto;
        min-height: auto;
        box-shadow: none;
        margin: 0;
        page-break-after: always;
        break-after: page;
      }
      .a4-chapter:last-child {
        page-break-after: auto;
        break-after: auto;
      }
      .list-cols {
        column-count: 2;
      }
      .subcat {
        break-inside: avoid-page;
      }
      .teishoku-card {
        break-inside: avoid;
      }
      @page {
        size: A4 portrait;
        margin: 0;
      }
    }

    @media screen and (max-width: 800px) {
      .a4-chapter {
        width: 100%;
        min-height: auto;
        padding: 1rem;
      }
      .list-cols { column-count: 1; }
      .teishoku-grid { grid-template-columns: 1fr; }
      .chapter-foot { position: static; margin-top: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <p>__TAX_NOTE__　更新: __GENERATED_AT__　｜　A4・料理 / ドリンク / 定食の3章構成</p>
    <button type="button" class="btn-print" onclick="window.print()">印刷 / PDF保存</button>
  </div>
  <div class="menu-book">
    __MENU_CHAPTERS__
  </div>
  <p class="book-footer">
    写真・価格は予告なく変更する場合があります。コース・飲み放題プランは別途ご案内します。
  </p>
</body>
</html>
