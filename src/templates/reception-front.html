<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>受付</title>
  <style>
    :root { --wood-dark:#5d4037; --accent:#d4a373; --bg:#fdfaf5; --reserved-blue:#0056b3; --error-red:#d90429; }
    body { font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", sans-serif; background:var(--bg); margin:0; padding:18px; text-align:center; }
    .card { background:#fff; padding:22px; border-radius:22px; border-top:12px solid var(--wood-dark); max-width:520px; margin:auto; box-shadow:0 10px 30px rgba(0,0,0,0.1); }
    .head-row { display:flex; align-items:center; justify-content:center; gap:10px; position: relative; }
    .btn-full { position:absolute; right:0; top:0; background:#111; color:#fff; border:none; border-radius:10px; padding:8px 12px; font-weight:900; cursor:pointer; font-size:0.95em; }
    .wait-display { margin: 14px 0; padding: 14px; border-radius: 14px; background:#fff; border: 2px dashed #ccc; }
    .wait-label { font-size: 1.05em; color:#666; margin-bottom:6px; }
    .wait-value { font-size: 3em; font-weight: 900; }
    .wait-zero { color: var(--wood-dark); }
    .wait-busy { color: var(--error-red); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.72; } 100% { opacity: 1; } }
    .type-selector, .num-selector { display:grid; gap:8px; margin: 14px 0; }
    .type-selector { grid-template-columns: repeat(auto-fill, minmax(118px, 1fr)); }
    .num-selector { grid-template-columns: repeat(3, 1fr); }
    .btn { padding: 14px; border: 2px solid #ddd; border-radius: 12px; background:#fff; font-weight: 800; cursor: pointer; font-size: 1.12em; }
    .btn.active { background: var(--accent); color:#fff; border-color: var(--accent); }
    .btn-checkin { width:100%; background: var(--wood-dark); color:#fff; padding: 22px; font-size: 1.6em; border: none; border-radius: 56px; font-weight: 900; cursor:pointer; }
    .btn-reserved { width:100%; background: var(--reserved-blue); color:#fff; padding: 20px 10px; font-size: 1.35em; border: 5px solid #fff; border-radius: 50px; margin-top: 16px; font-weight: 900; cursor:pointer; box-shadow:0 6px 12px rgba(0,0,0,0.1); }
    .overlay { display:none; position:fixed; inset:0; background:#fff; z-index:1000; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
    .overlay h2 { margin:0 0 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="head-row" style="margin:0 0 14px 0;">
      <h1 style="color:var(--wood-dark); margin:0;">受付</h1>
      <button id="btnFullscreen" class="btn-full" type="button" title="全画面表示">全画面</button>
    </div>
    <div style="background:#f8f9fa; padding:16px; border-radius:18px; text-align:left;">
      <p style="margin:0 0 10px 0; font-weight:900;">1. お席の希望</p>
      <div class="type-selector" id="typeSelector"></div>
      <p style="margin:16px 0 10px 0; font-weight:900;">2. ご来店人数</p>
      <div class="num-selector" id="numGrid"></div>
      <div class="wait-display" id="waitContainer">
        <div class="wait-label" id="waitLabel">ただいまの待ち時間</div>
        <div><span id="viewWaitTime" class="wait-value wait-zero">0</span><span style="font-size:1.5em; margin-left:5px;">分</span></div>
      </div>
      <button class="btn-checkin" id="btnCheckIn">上記の内容で確定する</button>
    </div>
    <button class="btn-reserved" id="btnReserved">ご予約の方はこちら</button>
  </div>
  <div id="navOverlay" class="overlay"><div id="overlayContent"></div></div>

  <script>
    const STORE_ID = __STORE_ID_JS__;
    const API_BASE = __API_URL_JS__;

    /** "any" または卓マスタの seatType と一致する文字列 */
    let selectedType = "any";
    let selectedNum = 2;
    let seatStates = {};
    /** 受付設定（席割りで mergeAllOrNothingGroups / maxMergeSize を参照） */
    let receptionConf = {};
    let activeShiftKey = "";
    let autoCloseTimeout = null;

    let tableMaster = [];
    /** /state の seatTypeOptions（卓マスタ＋ライブ席から集約） */
    let seatTypeOptionsFromApi = [];

    /** 席の表示ラベル（staff 受付と同じ C01 形式） */
    function seatDisplayLabel(id) {
      const raw0 = String(id || "").trim();
      const raw = raw0.toUpperCase();
      const m = raw.match(/(?:^|[^A-Z0-9])(C|T)0*(\d+)\s*$/i);
      if (m) {
        const kind = String(m[1]).toUpperCase();
        const n = parseInt(m[2], 10);
        if (Number.isFinite(n)) return kind + String(n).padStart(2, "0");
      }
      if (/^\d+$/.test(raw)) {
        const n = parseInt(raw, 10);
        if (n >= 1 && n <= 10) return "C" + String(n).padStart(2, "0");
        if (n >= 21) return "T" + String(n).padStart(2, "0");
      }
      return raw0;
    }

    function syncFullscreenButton() {
      const btn = document.getElementById("btnFullscreen");
      if (!btn) return;
      btn.textContent = document.fullscreenElement ? "解除" : "全画面";
    }

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen?.();
        } else {
          await document.exitFullscreen?.();
        }
      } catch (_) {
        // ignore (browser policy etc.)
      } finally {
        syncFullscreenButton();
      }
    }

    function getFormattedDate(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, "0");
      const d = String(dateObj.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }
    function getActiveShiftKey() {
      const now = new Date();
      const dateStr = getFormattedDate(now);
      const lunchEndRaw = Number(receptionConf.receptionShiftLunchEndHour);
      const lunchEnd =
        Number.isFinite(lunchEndRaw) ? Math.max(0, Math.min(23, Math.floor(lunchEndRaw))) : 15;
      const shift = now.getHours() < lunchEnd ? "lunch" : "dinner";
      return dateStr + "_" + shift;
    }

    async function apiGetState(shiftKey) {
      const url =
        API_BASE +
        "/state?shiftKey=" +
        encodeURIComponent(shiftKey) +
        "&t=" +
        Date.now() +
        "&r=" +
        Math.random().toString(36).slice(2) +
        "&skip304=1";
      const res = await fetch(url, { cache: "reload" });
      const text = await res.text();
      if (!res.ok) throw new Error(text || "state request failed");
      if (!text || !text.trim()) throw new Error("empty state response");
      try {
        return JSON.parse(text);
      } catch (e) {
        throw new Error("state is not JSON: " + String(text).slice(0, 120));
      }
    }
    async function apiEvent(body) {
      const res = await fetch(API_BASE + "/event", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      if (!res.ok) throw new Error(await res.text());
      return await res.json().catch(() => ({}));
    }

    function mergeSeatTypeLists(a, b) {
      const set = new Set();
      for (const x of a || []) {
        const s = String(x == null ? "" : x).trim();
        if (s) set.add(s);
      }
      for (const x of b || []) {
        const s = String(x == null ? "" : x).trim();
        if (s) set.add(s);
      }
      return [...set].sort((p, q) => p.localeCompare(q, "ja"));
    }

    /** receptionConfig.receptionGuestSeatTypePriority: 「どこでも」のとき席種別の優先（上ほど先に案内） */
    function guestSeatTypePriorityList() {
      const raw = receptionConf && receptionConf.receptionGuestSeatTypePriority;
      if (!Array.isArray(raw)) return [];
      return raw.map((x) => String(x == null ? "" : x).trim()).filter(Boolean);
    }

    function assignmentTypePriorityScore(ids, byMap, priorityList) {
      let s = 0;
      for (const id of ids) {
        const st = String(byMap.get(id)?.seatType || "").trim();
        const idx = priorityList.indexOf(st);
        if (idx >= 0) s += idx;
        else if (!st) s += 10000;
        else s += 5000;
      }
      return s;
    }

    function isBetterGuestSeatAssignment(cand, best, byMap, priorityList) {
      if (!best) return true;
      if (cand.cap !== best.cap) return cand.cap < best.cap;
      if (priorityList.length) {
        const sc = assignmentTypePriorityScore(cand.ids, byMap, priorityList);
        const sb = assignmentTypePriorityScore(best.ids, byMap, priorityList);
        if (sc !== sb) return sc < sb;
      }
      if (cand.ids.length !== best.ids.length) return cand.ids.length < best.ids.length;
      return cand.ids.join(",").localeCompare(best.ids.join(",")) < 0;
    }

    async function refreshSeatTypesCatalog() {
      try {
        const res = await fetch(API_BASE + "/table-seat-types?t=" + Date.now(), { cache: "no-store" });
        if (!res.ok) return;
        const j = await res.json();
        const arr = Array.isArray(j.seatTypes) ? j.seatTypes : [];
        seatTypeOptionsFromApi = mergeSeatTypeLists(seatTypeOptionsFromApi, arr);
        renderSeatPreferenceButtons();
      } catch (_) {}
    }

    function distinctSeatTypesForUi() {
      const set = new Set();
      for (const st0 of seatTypeOptionsFromApi || []) {
        const st = String(st0 || "").trim();
        if (st) set.add(st);
      }
      for (const row of tableMaster || []) {
        const st = String(row.seatType || "").trim();
        if (st) set.add(st);
      }
      for (const s of Object.values(seatStates || {})) {
        const st = s && String(s.seatType || "").trim();
        if (st) set.add(st);
      }
      return [...set].sort((a, b) => a.localeCompare(b, "ja"));
    }

    function renderSeatPreferenceButtons() {
      const host = document.getElementById("typeSelector");
      if (!host) return;
      const types = distinctSeatTypesForUi();
      if (selectedType !== "any" && !types.includes(selectedType)) selectedType = "any";
      host.innerHTML = "";
      const addBtn = (pref, label) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "btn" + (selectedType === pref ? " active" : "");
        b.setAttribute("data-pref", pref);
        b.textContent = label;
        b.onclick = () => {
          selectedType = pref;
          renderSeatPreferenceButtons();
        };
        host.appendChild(b);
      };
      addBtn("any", "どこでも");
      for (const st of types) addBtn(st, st);
    }
    function selectNum(n) {
      selectedNum = n;
      document.querySelectorAll("[data-num]").forEach((b) => b.classList.toggle("active", Number(b.getAttribute("data-num")) === n));
    }

    function renderNums() {
      const grid = document.getElementById("numGrid");
      grid.innerHTML = "";
      for (let i = 1; i <= 6; i++) {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "btn" + (i === selectedNum ? " active" : "");
        b.textContent = i + "名";
        b.setAttribute("data-num", String(i));
        b.onclick = () => selectNum(i);
        grid.appendChild(b);
      }
      const big = document.createElement("button");
      big.type = "button";
      big.className = "btn";
      big.style.gridColumn = "span 3";
      big.style.fontSize = "1em";
      big.textContent = "7名様以上はこちら";
      big.onclick = async () => {
        await apiEvent({ type: "callReserved", callType: "normal" }).catch(() => {});
        showOverlay("お席の確認をいたします。", "スタッフが参ります。");
      };
      grid.appendChild(big);
    }

    function showOverlay(html) {
      const ov = document.getElementById("navOverlay");
      const box = document.getElementById("overlayContent");
      box.innerHTML = html;
      ov.style.display = "flex";
    }

    async function triggerStaffCall(msg, callType = "normal") {
      try {
        await apiEvent({ type: "callReserved", callType: callType });
      } catch (_) {}
      showOverlay(`<h2>${msg}</h2><p>スタッフが参ります。</p><button onclick="location.reload()" class="btn-checkin">閉じる</button>`);
    }

    async function loadData() {
      activeShiftKey = getActiveShiftKey();
      await refreshSeatTypesCatalog();
      const data = await apiGetState(activeShiftKey);
      tableMaster = Array.isArray(data.tableMaster) ? data.tableMaster : [];
      seatTypeOptionsFromApi = mergeSeatTypeLists(
        seatTypeOptionsFromApi,
        Array.isArray(data.seatTypeOptions) ? data.seatTypeOptions : [],
      );
      receptionConf = data.config && typeof data.config === "object" ? data.config : {};
      const staff = parseInt(receptionConf.staff) || 6;
      const isOverride = receptionConf.override === true || receptionConf.override === "true";
      const manualWait = parseInt(receptionConf.manualWait) || 30;

      const shiftData = (data.shifts || {})[activeShiftKey] || { seats: [], waiting: [] };
      seatStates = {};
      (shiftData.seats || []).forEach((s) => {
        if (!s || typeof s !== "object" || Array.isArray(s)) return;
        const id = typeof s.id === "string" ? s.id : "";
        if (!id) return;
        seatStates[id] = { ...s };
      });

      const waitCount = (shiftData.waiting || []).length;
      const finalWait = isOverride ? manualWait : waitCount * 10;
      const waitEl = document.getElementById("viewWaitTime");
      const waitContainer = document.getElementById("waitContainer");
      if (waitEl) waitEl.textContent = String(finalWait);
      if (waitEl && waitContainer) {
        if (finalWait > 0) {
          waitEl.className = "wait-value wait-busy";
          waitContainer.style.borderColor = "var(--error-red)";
          waitContainer.style.background = "#fff0f0";
        } else {
          waitEl.className = "wait-value wait-zero";
          waitContainer.style.borderColor = "#ccc";
          waitContainer.style.background = "#fff";
        }
      }
      renderSeatPreferenceButtons();
    }

    async function handleCheckIn() {
      try {
        await loadData();
      } catch (e) {
        console.error("reception-front loadData", e);
        await triggerStaffCall("通信エラーです。スタッフにお声がけください。", "normal");
        return;
      }
      const num = selectedNum;
      const wait = parseInt(document.getElementById("viewWaitTime").innerText || "0", 10) || 0;

      // 旧 front.html の席割りAI（完全空席→それ以外）
      function getMasterTables(pref) {
        const all = (Array.isArray(tableMaster) ? tableMaster : []).map((t) => ({
          code: String(t.code || ""),
          capacity: Number(t.capacity || 2),
          mergeWith: Array.isArray(t.mergeWith) ? t.mergeWith.filter((x) => typeof x === "string").map(String) : [],
          seatType: String(t.seatType || "").trim(),
        })).filter((t) => t.code);
        if (pref === "any") return all;
        return all.filter((t) => t.seatType === pref);
      }

      function pickSeats(n, pref, requirePure) {
        const guestPri = pref === "any" ? guestSeatTypePriorityList() : [];
        const tables = getMasterTables(pref);
        const by = new Map(tables.map((t) => [t.code, t]));
        const used = new Set();
        for (const [id, s] of Object.entries(seatStates || {})) {
          if (!s || s.status !== "vacant") used.add(id);
          if (requirePure && s && s.hasFutureRes) used.add(id);
        }
        const freeCodes = tables.map((t) => t.code).filter((c) => c && !used.has(c));
        const freeSet = new Set(freeCodes);

        const allOrNothingGroups = Array.isArray(receptionConf.mergeAllOrNothingGroups)
          ? receptionConf.mergeAllOrNothingGroups
          : [];
        const groups = allOrNothingGroups
          .filter((g) => Array.isArray(g) && g.every((x) => typeof x === "string"))
          .map((g) => g.map(String).filter((x) => freeSet.has(x)))
          .filter((g) => g.length >= 2)
          .map((arr) => ({ arr, set: new Set(arr) }));

        function violatesAllOrNothing(sub) {
          for (const g of groups) {
            let hit = false;
            for (const x of g.arr) { if (sub.has(x)) { hit = true; break; } }
            if (!hit) continue;
            for (const x of g.arr) { if (!sub.has(x)) return true; }
          }
          return false;
        }

        // adjacency graph (undirected)
        const adj = new Map();
        for (const c of freeCodes) adj.set(c, new Set());
        for (const t of tables) {
          if (!freeSet.has(t.code)) continue;
          const a = adj.get(t.code);
          if (!a) continue;
          for (const o of (t.mergeWith || []).map(String)) {
            if (!freeSet.has(o)) continue;
            const b = adj.get(o);
            if (!b) continue;
            a.add(o);
            b.add(t.code);
          }
        }

        function isConnected(subArr) {
          if (subArr.length <= 1) return true;
          const sub = new Set(subArr);
          const q = [subArr[0]];
          const seen = new Set([subArr[0]]);
          while (q.length) {
            const cur = q.pop();
            for (const nx of (adj.get(cur) || [])) {
              if (!sub.has(nx) || seen.has(nx)) continue;
              seen.add(nx);
              q.push(nx);
            }
          }
          return seen.size === sub.size;
        }

        const maxMergeSize = Number.isFinite(Number(receptionConf.maxMergeSize))
          ? Math.floor(Number(receptionConf.maxMergeSize))
          : 10;

        let best = null;
        const visited = new Set();
        for (const start of freeCodes) {
          if (visited.has(start)) continue;
          const comp = [];
          const stack = [start];
          visited.add(start);
          while (stack.length) {
            const cur = stack.pop();
            comp.push(cur);
            for (const nx of (adj.get(cur) || [])) {
              if (visited.has(nx)) continue;
              visited.add(nx);
              stack.push(nx);
            }
          }
          const compSorted = comp.slice().sort();
          const limit = Math.min(maxMergeSize, compSorted.length);

          function backtrack(idx, chosen) {
            if (chosen.length > 0) {
              const sub = new Set(chosen);
              if (!violatesAllOrNothing(sub) && isConnected(chosen)) {
                const cap = chosen.reduce((acc, id) => acc + (by.get(id)?.capacity || 0), 0);
                if (cap >= n) {
                  const ids = chosen.slice().sort();
                  const cand = { ids, cap };
                  if (isBetterGuestSeatAssignment(cand, best, by, guestPri)) best = cand;
                }
              }
            }
            if (idx >= compSorted.length) return;
            if (chosen.length >= limit) return;
            chosen.push(compSorted[idx]);
            backtrack(idx + 1, chosen);
            chosen.pop();
            backtrack(idx + 1, chosen);
          }
          backtrack(0, []);
        }

        return best ? best.ids : [];
      }

      let foundIds = pickSeats(num, selectedType, true);
      if (foundIds.length === 0) foundIds = pickSeats(num, selectedType, false);
      if (foundIds.length === 0) {
        await triggerStaffCall("お席の確認をいたします。", "normal");
        return;
      }

      const seatText = foundIds.map(seatDisplayLabel).join("、");
      const typeLabels = [...new Set(foundIds.map((fid) => {
        const s = seatStates[fid];
        return s && String(s.seatType || "").trim() ? String(s.seatType).trim() : "";
      }).filter(Boolean))];
      const typeHtml = typeLabels.length
        ? `<p style="margin:0 0 10px;font-size:1.05em;font-weight:800;color:var(--wood-dark)">${typeLabels.join("・")}</p>`
        : "";
      const st =
        wait > 0
          ? new Date(Date.now() + wait * 60000).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
          : "";
      const html =
        `<h1 style="font-size:3.2em;margin:0 0 8px">${seatText}番</h1>` +
        `<h2 style="margin:0 0 10px">へどうぞ！</h2>` +
        typeHtml +
        (st
          ? `<div class="time-alert" style="color:var(--error-red);font-size:2.2em;font-weight:900;margin:12px 0">注文開始予定：${st}～</div>` +
            `<p style="font-size:1.1em; font-weight:900; color:var(--wood-dark); margin:10px 0 12px;">お時間になりましたらスタッフが<br>お席までご案内に参ります。</p>`
          : "") +
        `<button id="finalOk" class="btn-checkin">確定</button>` +
        `<p style="margin-top:16px; color:#888;">10秒後に自動確定します...</p>`;

      showOverlay(html);
      document.getElementById("finalOk").onclick = () => doFinalFlow(foundIds.join(","), num, st, wait > 0).catch(() => location.reload());
      autoCloseTimeout = setTimeout(() => { const b = document.getElementById("finalOk"); if (b) b.click(); }, 10000);
    }

    async function doFinalFlow(idsStr, num, time, isReserved) {
      if (autoCloseTimeout) clearTimeout(autoCloseTimeout);
      const ids = String(idsStr || "").split(",").map((x) => x.trim()).filter(Boolean);
      const btn = document.getElementById("finalOk"); if (btn) btn.disabled = true;

      const shiftKey = activeShiftKey;
      const data = await apiGetState(shiftKey);
      const shiftData = (data.shifts || {})[shiftKey] || { seats: [], waiting: [] };
      const ifShiftUpdatedAt = Number(shiftData.updatedAt || 0) || 0;

      const perSeatNum = Math.ceil(num / ids.length);
      const updatedSeats = (shiftData.seats || []).map((s) => {
        if (!ids.includes(s.id)) return s;
        if (isReserved) return { ...s, status: "reserved" };
        return { ...s, status: "occupied", current: perSeatNum, entryTime: Date.now() };
      });
      const updatedWaiting = shiftData.waiting || [];
      if (isReserved) updatedWaiting.push({ seat: ids.join(","), name: "案内済み", num: num, startTime: time, alerted: false });

      try {
        await apiEvent({ type: "updateAll", shiftKey, ifShiftUpdatedAt, seats: updatedSeats, waiting: updatedWaiting, newEntry: { seat: ids.join("、"), num: num } });
        location.reload();
      } catch (e) {
        // stale shift etc.
        location.reload();
      }
    }

    document.getElementById("btnFullscreen").onclick = () => toggleFullscreen();
    document.addEventListener("fullscreenchange", () => syncFullscreenButton());
    syncFullscreenButton();
    document.getElementById("btnCheckIn").onclick = () =>
      handleCheckIn().catch((e) => {
        console.error("reception-front handleCheckIn", e);
        return triggerStaffCall("エラーが発生しました。", "normal");
      });
    document.getElementById("btnReserved").onclick = async () => {
      await triggerStaffCall("ご予約のお客様", "reserved");
    };

    renderNums();
    renderSeatPreferenceButtons();
    loadData().catch(() => {});
    setInterval(() => loadData().catch(() => {}), 3000);
  </script>
</body>
</html>
