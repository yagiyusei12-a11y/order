<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ネット予約</title>
  <style>
    :root { --wood-dark:#5d4037; --accent:#d4a373; --bg:#fdfaf5; --error:#d90429; }
    body { font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", sans-serif; background:var(--bg); margin:0; padding:18px; }
    .card { background:#fff; padding:22px; border-radius:22px; border-top:12px solid var(--wood-dark); max-width:620px; margin:auto; box-shadow:0 10px 30px rgba(0,0,0,0.08); }
    .head-row { display:flex; align-items:center; justify-content:center; gap:10px; position: relative; margin-bottom: 12px; }
    .btn-full { position:absolute; right:0; top:0; background:#111; color:#fff; border:none; border-radius:10px; padding:8px 12px; font-weight:900; cursor:pointer; font-size:0.95em; }
    h1 { color: var(--wood-dark); margin:0; }
    label { display:block; font-weight: 900; margin-top: 12px; }
    input, select, textarea { width:100%; box-sizing:border-box; padding:12px; border-radius:12px; border:1px solid #ddd; font: inherit; margin-top: 6px; }
    textarea { min-height: 96px; resize: vertical; }
    .row { display:grid; gap:10px; grid-template-columns: 1fr; }
    @media (min-width: 620px) { .row { grid-template-columns: 1fr 1fr; } }
    .btn { width:100%; background: var(--wood-dark); color:#fff; padding: 16px; font-size: 1.25em; border: none; border-radius: 56px; font-weight: 900; cursor:pointer; margin-top: 16px; }
    .muted { color:#666; font-size:0.9em; line-height:1.5; margin: 8px 0 0; }
    .ok { background:#ecfdf5; border:1px solid #bbf7d0; color:#065f46; padding: 12px; border-radius: 12px; margin-top: 12px; font-weight: 900; }
    .err { background:#fff1f2; border:1px solid #fecdd3; color:#9f1239; padding: 12px; border-radius: 12px; margin-top: 12px; font-weight: 900; }
    .ok, .err { white-space: pre-line; }
    .btn-history { position:absolute; left:0; top:0; background:#fff; color:var(--wood-dark); border:2px solid var(--wood-dark); border-radius:10px; padding:8px 12px; font-weight:900; cursor:pointer; font-size:0.9em; }
    .history-panel { margin: 0 0 16px; padding: 14px; border-radius: 14px; border: 1px solid #e8dfd6; background: #faf6f0; }
    .history-panel[hidden] { display: none !important; }
    .history-panel-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; }
    .history-panel-head strong { color: var(--wood-dark); font-size: 0.95em; }
    .history-close { background:transparent; border:1px solid #ccc; border-radius:8px; padding:4px 10px; font-weight:700; cursor:pointer; font-size:0.82em; }
    .history-list { display:flex; flex-direction:column; gap:10px; }
    .history-item { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:12px 14px; line-height:1.5; }
    .history-item.is-past { opacity: 0.72; }
    .history-item.is-cancelled { opacity: 0.65; background: #f8fafc; border-color: #cbd5e1; }
    .history-item-title { font-weight:900; color:var(--wood-dark); margin:0 0 4px; font-size:0.95em; }
    .history-item-meta { margin:0; font-size:0.88em; color:#444; }
    .history-item-id { margin:6px 0 0; font-size:0.8em; color:#666; }
    .history-item-actions { margin-top:0.55rem; display:flex; flex-wrap:wrap; gap:0.4rem; align-items:center; }
    .history-cancel-btn { background:#fff; color:#b91c1c; border:2px solid #fecaca; border-radius:10px; padding:0.35rem 0.75rem; font-weight:800; font-size:0.82em; cursor:pointer; }
    .history-cancel-btn:disabled { opacity:0.45; cursor:not-allowed; }
    .history-badge-cancelled { display:inline-block; font-size:0.75em; font-weight:800; color:#b91c1c; background:#fff1f2; border:1px solid #fecaca; border-radius:6px; padding:0.1rem 0.45rem; margin-left:0.35rem; }
    .history-empty { margin:0; font-size:0.88em; color:#666; }
  </style>
</head>
<body>
  <div class="card">
    <div class="head-row">
      <button id="btnHistory" class="btn-history" type="button">予約履歴</button>
      <h1>ネット予約</h1>
      <button id="btnFullscreen" class="btn-full" type="button">全画面</button>
    </div>

    <section id="historyPanel" class="history-panel" hidden>
      <div class="history-panel-head">
        <strong>この端末の予約履歴</strong>
        <button type="button" class="history-close" id="btnHistoryClose">閉じる</button>
      </div>
      <p class="muted" style="margin:0 0 10px;font-size:0.82rem">
        このスマホ・パソコンで予約した内容だけ表示します。別の端末やブラウザでは見えません。キャンセルは予約時の<strong>電話番号</strong>で確認します（メール登録時はキャンセルメールも届きます）。
      </p>
      <div id="historyList" class="history-list"></div>
    </section>

    <div class="row">
      <div>
        <label>日付</label>
        <input type="date" id="rDate" required>
      </div>
      <div>
        <label>時間（人数に応じた空き）</label>
        <select id="rTime" required></select>
      </div>
    </div>

    <div class="row">
      <div>
        <label>お名前</label>
        <input type="text" id="rName" placeholder="例: 山田 太郎" required>
      </div>
      <div>
        <label>人数</label>
        <input type="number" id="rNum" min="1" max="20" value="2" required>
      </div>
    </div>

    <label for="rPhone">電話番号</label>
    <input type="tel" id="rPhone" placeholder="例: 09012345678" autocomplete="tel" maxlength="30" required>

    <label for="rEmail">メールアドレス（任意・確認用）</label>
    <input type="email" id="rEmail" placeholder="予約確定メールを受け取る場合" autocomplete="email" maxlength="200">

    <div id="seatTypeWrap" style="display:none">
      <label for="rSeatType">席の種別</label>
      <select id="rSeatType"></select>
      <p class="muted" id="seatTypeHint"></p>
    </div>

    <div id="noteWrap">
      <label>備考</label>
      <textarea id="rNote" placeholder="アレルギー等（任意）"></textarea>
    </div>

    <button class="btn" id="btnSubmit">予約する</button>
    <p class="muted" id="ruleText"></p>

    <div id="msg"></div>
  </div>

  <script>
    const STORE_ID = __STORE_ID_JS__;
    const RESERVE_DEVICE_KEY = "netReserveDevice_v1_" + STORE_ID;
    const LEGACY_RECENT_KEY = "netReserveRecent_v1_" + STORE_ID;
    const RECENT_RESERVE_WINDOW_MS = 5 * 60 * 1000;
    const RESERVE_HISTORY_MAX = 20;

    function loadDeviceStore() {
      try {
        const raw = localStorage.getItem(RESERVE_DEVICE_KEY);
        if (raw) {
          const p = JSON.parse(raw);
          if (p && p.v === 1 && Array.isArray(p.items)) {
            return { v: 1, items: p.items.filter((x) => x && typeof x === "object") };
          }
        }
        const legacy = localStorage.getItem(LEGACY_RECENT_KEY);
        if (legacy) {
          localStorage.removeItem(LEGACY_RECENT_KEY);
        }
      } catch (_) {}
      return { v: 1, items: [] };
    }

    function saveDeviceStore(store) {
      try {
        localStorage.setItem(RESERVE_DEVICE_KEY, JSON.stringify(store));
      } catch (_) {}
    }

    function loadRecentReserveAt() {
      const store = loadDeviceStore();
      const first = store.items[0];
      const at = first && typeof first.bookedAt === "number" ? first.bookedAt : null;
      return at != null && Number.isFinite(at) ? at : null;
    }

    function appendReserveHistory(entry) {
      const store = loadDeviceStore();
      const item = {
        resId: String(entry.resId || ""),
        date: String(entry.date || ""),
        time: String(entry.time || ""),
        name: String(entry.name || ""),
        num: Number(entry.num) || 0,
        phone: String(entry.phone || ""),
        email: String(entry.email || ""),
        note: String(entry.note || ""),
        status: entry.status === "cancelled" ? "cancelled" : "active",
        seatType: entry.seatType ? String(entry.seatType) : "",
        seatLabels: Array.isArray(entry.seatLabels)
          ? entry.seatLabels.map((x) => String(x))
          : [],
        bookedAt: Date.now(),
      };
      const withoutDup = store.items.filter((x) => x && x.resId !== item.resId);
      withoutDup.unshift(item);
      saveDeviceStore({ v: 1, items: withoutDup.slice(0, RESERVE_HISTORY_MAX) });
    }

    function shouldConfirmDuplicateReserve() {
      const at = loadRecentReserveAt();
      if (at == null) return false;
      return Date.now() - at < RECENT_RESERVE_WINDOW_MS;
    }

    function fmtReserveDateLabel(ymd) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(ymd)) return ymd;
      const [y, m, d] = ymd.split("-").map(Number);
      const dt = new Date(y, m - 1, d);
      if (!Number.isFinite(dt.getTime())) return ymd;
      const wd = ["日", "月", "火", "水", "木", "金", "土"][dt.getDay()];
      return `${m}月${d}日（${wd}）`;
    }

    function reserveHistoryIsPast(ymd, timeHm) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(ymd) || !/^\d{2}:\d{2}$/.test(timeHm)) return false;
      const [y, mo, d] = ymd.split("-").map(Number);
      const [h, mi] = timeHm.split(":").map(Number);
      const end = new Date(y, mo - 1, d, h, mi + 1, 0, 0);
      return end.getTime() < Date.now();
    }

    function renderReserveHistory() {
      const list = document.getElementById("historyList");
      const btn = document.getElementById("btnHistory");
      if (!list) return;
      const store = loadDeviceStore();
      const items = store.items.filter((x) => x && x.resId);
      if (btn) {
        const n = items.length;
        btn.textContent = n > 0 ? `予約履歴（${n}）` : "予約履歴";
      }
      list.innerHTML = "";
      if (!items.length) {
        const p = document.createElement("p");
        p.className = "history-empty";
        p.textContent = "この端末からの予約はまだありません。";
        list.appendChild(p);
        return;
      }
      for (const it of items) {
        const cancelled = it.status === "cancelled";
        const past = reserveHistoryIsPast(it.date, it.time);
        const card = document.createElement("article");
        card.className =
          "history-item" +
          (past ? " is-past" : "") +
          (cancelled ? " is-cancelled" : "");
        const title = document.createElement("p");
        title.className = "history-item-title";
        title.textContent =
          fmtReserveDateLabel(it.date) + " " + it.time + " · " + (it.num || "?") + "名";
        if (cancelled) {
          const badge = document.createElement("span");
          badge.className = "history-badge-cancelled";
          badge.textContent = "キャンセル済";
          title.appendChild(badge);
        }
        const meta = document.createElement("p");
        meta.className = "history-item-meta";
        const lines = [`お名前: ${it.name || "—"}`, `電話: ${it.phone || "—"}`];
        if (it.email) lines.push(`メール: ${it.email}`);
        if (it.seatType) lines.push(`席種別: ${it.seatType}`);
        if (it.seatLabels && it.seatLabels.length) lines.push(`席: ${it.seatLabels.join("、")}`);
        if (it.note) lines.push(`備考: ${it.note}`);
        meta.textContent = lines.join("\n");
        const idEl = document.createElement("p");
        idEl.className = "history-item-id";
        idEl.textContent = "予約番号: " + it.resId;
        card.appendChild(title);
        card.appendChild(meta);
        card.appendChild(idEl);
        if (!cancelled && !past) {
          const actions = document.createElement("div");
          actions.className = "history-item-actions";
          const btnCancel = document.createElement("button");
          btnCancel.type = "button";
          btnCancel.className = "history-cancel-btn";
          btnCancel.textContent = "この予約をキャンセル";
          btnCancel.onclick = async () => {
            const phone = window.prompt(
              "予約時の電話番号を入力してください（本人確認）",
              it.phone || "",
            );
            if (phone == null) return;
            const trimmed = String(phone).trim();
            if (!trimmed.replace(/\D/g, "") || trimmed.replace(/\D/g, "").length < 10) {
              showMsg("err", "電話番号（10桁以上）を入力してください。");
              return;
            }
            if (
              !window.confirm(
                fmtReserveDateLabel(it.date) +
                  " " +
                  it.time +
                  " の予約（" +
                  it.resId +
                  "）をキャンセルしますか？\n確定メールを登録している場合はキャンセルメールも送ります。",
              )
            ) {
              return;
            }
            btnCancel.disabled = true;
            try {
              const out = await apiCancelReservation(it.resId, trimmed);
              markReserveHistoryCancelled(it.resId);
              renderReserveHistory();
              if (out && out.alreadyCancelled) {
                showMsg("ok", "この予約はすでにキャンセル済みです。");
              } else {
                showMsg("ok", "予約をキャンセルしました。\n予約番号: " + it.resId);
              }
            } catch (e) {
              showMsg("err", String(e.message || e));
              btnCancel.disabled = false;
            }
          };
          actions.appendChild(btnCancel);
          card.appendChild(actions);
        }
        list.appendChild(card);
      }
    }

    function setHistoryPanelOpen(open) {
      const panel = document.getElementById("historyPanel");
      if (!panel) return;
      panel.hidden = !open;
      if (open) renderReserveHistory();
    }

    function syncFullscreenButton() {
      const btn = document.getElementById("btnFullscreen");
      if (!btn) return;
      btn.textContent = document.fullscreenElement ? "解除" : "全画面";
    }
    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) await document.documentElement.requestFullscreen?.();
        else await document.exitFullscreen?.();
      } catch (_) {}
      syncFullscreenButton();
    }

    async function apiGetConfig() {
      const res = await fetch(`/reception/${encodeURIComponent(STORE_ID)}/net/config?t=${Date.now()}`, { cache: "no-store" });
      if (!res.ok) throw new Error(await res.text());
      return await res.json();
    }
    async function apiReserve(body) {
      const res = await fetch(`/reception/${encodeURIComponent(STORE_ID)}/net/reservations`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const txt = await res.text();
      if (!res.ok) throw new Error(txt);
      try { return JSON.parse(txt); } catch { return {}; }
    }

    async function apiCancelReservation(resId, phone) {
      const res = await fetch(
        `/reception/${encodeURIComponent(STORE_ID)}/net/reservations/${encodeURIComponent(resId)}/cancel`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone }),
        },
      );
      const txt = await res.text();
      if (!res.ok) {
        try {
          const j = JSON.parse(txt);
          if (j && j.error) throw new Error(String(j.error));
        } catch (e) {
          if (e instanceof Error && e.message && e.message !== txt) throw e;
        }
        throw new Error(txt);
      }
      try { return JSON.parse(txt); } catch { return {}; }
    }

    function markReserveHistoryCancelled(resId) {
      const store = loadDeviceStore();
      let changed = false;
      for (const x of store.items) {
        if (x && x.resId === resId) {
          x.status = "cancelled";
          changed = true;
        }
      }
      if (changed) saveDeviceStore(store);
    }

    function showMsg(kind, html) {
      const el = document.getElementById("msg");
      const box = document.createElement("div");
      box.className = (kind === "ok" ? "ok" : "err");
      box.textContent = String(html || "");
      el.innerHTML = "";
      el.appendChild(box);
    }

    let cfg = { daysAhead: 30, enableNote: true, seatTypeMode: "any", seatTypes: [] };
    function fmtHm(min) {
      const h = Math.floor(Number(min) / 60);
      const m = Number(min) % 60;
      return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
    }

    function currentSeatTypeParam() {
      const mode = cfg.seatTypeMode === "require_select" ? "require_select" : "any";
      if (mode !== "require_select") return "";
      const st = document.getElementById("rSeatType");
      return st && st.value ? String(st.value).trim() : "";
    }

    function applySeatTypeUi() {
      const wrap = document.getElementById("seatTypeWrap");
      const sel = document.getElementById("rSeatType");
      const hint = document.getElementById("seatTypeHint");
      if (!wrap || !sel) return;
      const mode = cfg.seatTypeMode === "require_select" ? "require_select" : "any";
      const types = Array.isArray(cfg.seatTypes) ? cfg.seatTypes : [];
      if (mode !== "require_select") {
        wrap.style.display = "none";
        sel.removeAttribute("required");
        return;
      }
      wrap.style.display = "";
      sel.setAttribute("required", "required");
      sel.innerHTML = "";
      const ph = document.createElement("option");
      ph.value = "";
      ph.textContent = types.length ? "種別を選んでください" : "（店舗で種別未設定）";
      ph.disabled = !types.length;
      sel.appendChild(ph);
      for (const t of types) {
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        sel.appendChild(opt);
      }
      if (hint) {
        hint.textContent = types.length
          ? "選んだ種別の席だけを使って、この人数で予約できる時間を表示します。"
          : "店舗のネット予約設定で、卓に種別名を入力してください。";
      }
    }

    async function refreshSlots() {
      const date = document.getElementById("rDate").value;
      const num = Number(document.getElementById("rNum").value);
      const sel = document.getElementById("rTime");
      sel.innerHTML = "";
      if (!date || !Number.isFinite(num) || num < 1 || num > 20) return;
      const stParam = currentSeatTypeParam();
      if (cfg.seatTypeMode === "require_select" && !stParam) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "先に席の種別を選んでください";
        opt.disabled = true;
        sel.appendChild(opt);
        return;
      }
      try {
        let url =
          `/reception/${encodeURIComponent(STORE_ID)}/net/availability?date=${encodeURIComponent(date)}&partySize=${encodeURIComponent(String(num))}`;
        if (stParam) url += `&seatType=${encodeURIComponent(stParam)}`;
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        const slots = data.slots || [];
        if (!slots.length) {
          const opt = document.createElement("option");
          opt.value = "";
          opt.textContent = "この日は予約枠がありません";
          opt.disabled = true;
          sel.appendChild(opt);
          return;
        }
        for (const s of slots) {
          const opt = document.createElement("option");
          opt.value = s.time;
          opt.textContent = s.time + (s.available ? "（予約可）" : "（満席）");
          if (!s.available) opt.disabled = true;
          sel.appendChild(opt);
        }
        const firstOk = [...sel.options].find((o) => !o.disabled && o.value);
        if (firstOk) sel.value = firstOk.value;
      } catch (_) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "空き状況の取得に失敗しました";
        opt.disabled = true;
        sel.appendChild(opt);
      }
    }

    async function boot() {
      document.getElementById("btnFullscreen").onclick = () => toggleFullscreen();
      document.addEventListener("fullscreenchange", () => syncFullscreenButton());
      syncFullscreenButton();
      renderReserveHistory();
      const btnHistory = document.getElementById("btnHistory");
      const btnHistoryClose = document.getElementById("btnHistoryClose");
      if (btnHistory) {
        btnHistory.onclick = () => {
          const panel = document.getElementById("historyPanel");
          setHistoryPanelOpen(Boolean(panel && panel.hidden));
        };
      }
      if (btnHistoryClose) btnHistoryClose.onclick = () => setHistoryPanelOpen(false);

      cfg = await apiGetConfig();
      cfg.seatTypeMode = cfg.seatTypeMode === "require_select" ? "require_select" : "any";
      cfg.seatTypes = Array.isArray(cfg.seatTypes) ? cfg.seatTypes : [];
      const days = Number(cfg.daysAhead ?? 30);
      const enableNote = Boolean(cfg.enableNote ?? true);

      const today = typeof cfg.todayYmd === "string" && /^\d{4}-\d{2}-\d{2}$/.test(cfg.todayYmd)
        ? cfg.todayYmd
        : new Date().toISOString().slice(0, 10);
      const maxYmd =
        typeof cfg.maxReservableYmd === "string" && /^\d{4}-\d{2}-\d{2}$/.test(cfg.maxReservableYmd)
          ? cfg.maxReservableYmd
          : today;
      document.getElementById("rDate").min = today;
      document.getElementById("rDate").max = maxYmd;
      document.getElementById("rDate").value = today;

      document.getElementById("noteWrap").style.display = enableNote ? "" : "none";
      const wins = Array.isArray(cfg.businessWindows) ? cfg.businessWindows : [];
      const step = Number(cfg.slotMinutes ?? 15);
      const hoursLine =
        wins.length > 0 ? ` 営業枠: ${wins.map((w) => fmtHm(w.startMin) + "〜" + fmtHm(w.endMin)).join("、")}。` : "";
      document.getElementById("ruleText").textContent =
        `本日から ${days} 日先まで予約可能です（${step} 分刻み）。` + hoursLine;

      document.getElementById("rDate").addEventListener("change", () => refreshSlots());
      document.getElementById("rNum").addEventListener("change", () => refreshSlots());
      document.getElementById("rNum").addEventListener("input", () => refreshSlots());
      applySeatTypeUi();
      const rSeatType = document.getElementById("rSeatType");
      if (rSeatType) rSeatType.addEventListener("change", () => refreshSlots());

      await refreshSlots();

      document.getElementById("btnSubmit").onclick = async () => {
        const date = document.getElementById("rDate").value;
        const time = document.getElementById("rTime").value;
        const name = document.getElementById("rName").value.trim();
        const phone = document.getElementById("rPhone").value.trim();
        const num = Number(document.getElementById("rNum").value);
        const note = document.getElementById("rNote").value.trim();
        const email = document.getElementById("rEmail").value.trim();
        const phoneDigits = phone.replace(/\D/g, "");
        const sel = document.getElementById("rTime");
        const opt = sel && sel.selectedIndex >= 0 ? sel.options[sel.selectedIndex] : null;
        const stSel = document.getElementById("rSeatType");
        const seatType =
          cfg.seatTypeMode === "require_select" && stSel && stSel.value ? String(stSel.value).trim() : "";
        if (cfg.seatTypeMode === "require_select" && !seatType) {
          showMsg("err", "席の種別を選んでください。");
          return;
        }
        if (!date || !time || !name || !phone || phoneDigits.length < 10 || !Number.isFinite(num) || num < 1 || (opt && opt.disabled)) {
          showMsg("err", "日付・時間・お名前・電話番号（10桁以上）・人数を確認してください。満席の時間は選べません。");
          return;
        }
        if (shouldConfirmDuplicateReserve()) {
          const ok = window.confirm(
            "既にご予約を頂いておりますが、追加のご予約でしょうか？",
          );
          if (!ok) return;
        }
        try {
          const out = await apiReserve({
            date,
            time,
            name,
            phone,
            num,
            note,
            ...(email ? { email } : {}),
            ...(seatType ? { seatType } : {}),
          });
          const typeLine = (out.seatType || seatType)
            ? `\n席種別: ${String(out.seatType || seatType || "")}`
            : "";
          appendReserveHistory({
            resId: out.resId,
            date,
            time,
            name,
            phone,
            email,
            num,
            note,
            seatType: out.seatType || seatType,
            seatLabels: out.seatLabels,
          });
          renderReserveHistory();
          document.getElementById("msg").innerHTML = "";
          const mailNote = email ? "\n確認メールをお送りしました。" : "";
          alert(
            "予約が完了しました。\n\n" +
              "予約番号: " +
              (out.resId || "—") +
              typeLine +
              mailNote +
              "\n\n予約履歴画面に移動します。",
          );
          setHistoryPanelOpen(true);
          const historyPanel = document.getElementById("historyPanel");
          if (historyPanel) {
            try {
              historyPanel.scrollIntoView({ behavior: "smooth", block: "start" });
            } catch (_) {
              historyPanel.scrollIntoView();
            }
          }
        } catch (e) {
          showMsg("err", String(e.message || e));
        }
      };
    }
    boot().catch((e) => showMsg("err", String(e.message || e)));
  </script>
</body>
</html>
