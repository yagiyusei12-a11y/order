<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>初回セットアップ</title>
  <style>
    :root {
      --bg: #e8eef5;
      --card: #ffffff;
      --line: #c5d0df;
      --text: #152232;
      --muted: #4a5d72;
      --accent: #1565c0;
      --accent-hover: #0d47a1;
      --btn-text: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: linear-gradient(165deg, #f5f8fc 0%, var(--bg) 45%, #dce6f2 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      width: 100%;
      max-width: 22rem;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 1.35rem 1.25rem;
      box-shadow: 0 10px 40px rgba(21, 34, 50, 0.08), 0 1px 3px rgba(21, 34, 50, 0.06);
    }
    h1 { font-size: 1.15rem; margin: 0 0 0.35rem; font-weight: 700; color: var(--text); }
    p { color: var(--muted); font-size: 0.875rem; margin: 0 0 1rem; line-height: 1.55; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text); margin-bottom: 0.25rem; }
    input {
      width: 100%;
      padding: 0.6rem 0.7rem;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fafbfd;
      color: var(--text);
      margin-bottom: 0.75rem;
    }
    input:focus {
      outline: 2px solid rgba(21, 101, 192, 0.35);
      outline-offset: 1px;
      border-color: var(--accent);
      background: #fff;
    }
    button {
      width: 100%;
      padding: 0.68rem;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: var(--btn-text);
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.25rem;
      letter-spacing: 0.02em;
    }
    button:hover { background: var(--accent-hover); }
    #err { color: #b71c1c; font-size: 0.85rem; margin-top: 0.75rem; display: none; font-weight: 600; }
    .hint { font-size: 0.78rem; color: var(--muted); margin-top: 1rem; }
    code { background: #e9eef5; color: var(--text); padding: 0.12rem 0.4rem; border-radius: 4px; font-size: 0.85em; border: 1px solid #d5dde8; }
    a { color: var(--accent); font-weight: 600; text-decoration: underline; text-underline-offset: 3px; }
    a:hover { color: var(--accent-hover); }
    #closed { display: none; }
    #formWrap { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>初回セットアップ</h1>
    <div id="closed">
      <p>スタッフがすでに登録されています。ここからの新規登録はできません。</p>
      <p><a href="/staff-app/login">店舗ログインへ</a></p>
    </div>
    <div id="formWrap">
      <p>最初の<strong>店舗</strong>と<strong>管理者スタッフ</strong>を登録します。完了後はログイン画面へ進みます。</p>
      <label for="storeId">店舗ID</label>
      <p class="hint" style="margin:-0.25rem 0 0.45rem">URL の <code>/staff-app/___</code> に使う識別子（英小文字・数字・<code>-</code> <code>_</code>・2〜64文字）。</p>
      <input id="storeId" type="text" autocomplete="off" placeholder="例: my-shop-1" />
      <label for="storeName">店舗名（表示名）</label>
      <input id="storeName" type="text" autocomplete="organization" placeholder="例: 本店" />
      <label for="email">メールアドレス（ログインID）</label>
      <input id="email" type="email" autocomplete="email" placeholder="account@example.com" />
      <label for="password">パスワード（8文字以上）</label>
      <input id="password" type="password" autocomplete="new-password" />
      <button type="button" id="go">登録してログインへ</button>
      <div id="err"></div>
      <p class="hint"><a href="/staff-app/login">ログイン画面に戻る</a></p>
    </div>
  </div>
  <script>
    (async function () {
      const closed = document.getElementById("closed");
      const formWrap = document.getElementById("formWrap");
      try {
        const r = await fetch("/auth/bootstrap-status");
        const j = await r.json();
        if (j.open) {
          formWrap.style.display = "block";
        } else {
          closed.style.display = "block";
        }
      } catch {
        closed.style.display = "block";
        closed.querySelector("p").textContent = "状態を確認できませんでした。";
      }

      document.getElementById("go").onclick = async () => {
        const err = document.getElementById("err");
        err.style.display = "none";
        const storeId = document.getElementById("storeId").value.trim();
        const storeName = document.getElementById("storeName").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        try {
          const r = await fetch("/auth/bootstrap", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ storeId, storeName, email, password }),
          });
          const j = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(j.error || r.statusText);
          const sid = encodeURIComponent(storeId.trim().toLowerCase());
          location.assign("/staff-app/login?storeId=" + sid);
        } catch (e) {
          err.style.display = "block";
          err.textContent = String(e.message || e);
        }
      };
    })();
  </script>
</body>
</html>
