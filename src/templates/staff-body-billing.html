<main>
  <style>
    .billing-hero {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.6rem;
      margin-bottom: 0.85rem;
    }
    .billing-kpi {
      background: linear-gradient(180deg, #fff, #fff7ed);
      border: 1px solid #fed7aa;
      border-radius: 10px;
      padding: 0.6rem 0.7rem;
    }
    .billing-kpi .k {
      font-size: 0.72rem;
      color: var(--muted);
    }
    .billing-kpi .v {
      font-size: 1.05rem;
      font-weight: 800;
      margin-top: 0.15rem;
    }
    .bill-row {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.75rem 0.8rem;
      border: 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-family: inherit;
    }
    .bill-row.is-active {
      background: var(--accent-soft);
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .bill-row-top {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      align-items: baseline;
    }
    .bill-row-name {
      font-size: 0.9rem;
      font-weight: 800;
    }
    .bill-row-total {
      font-size: 0.95rem;
      font-weight: 800;
    }
    .bill-row-sub {
      margin-top: 0.3rem;
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .bill-chip {
      font-size: 0.68rem;
      padding: 0.12rem 0.4rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--muted);
      font-weight: 700;
    }
  </style>
  <h2 class="page-title">会計・レジ</h2>
  <div class="top-tabs" role="tablist" aria-label="会計タブ">
    <button type="button" class="is-on" id="tabCashier">会計管理</button>
    <button type="button" id="tabReceiptBox">レシートボックス</button>
    <button type="button" id="tabSettlement">精算</button>
  </div>
  <p class="muted" style="margin-top:-0.35rem;margin-bottom:0.8rem">席番号で伝票を開き、金額確認→支払い→印刷→完了の順で操作できます。</p>
  <div class="billing-hero">
    <div class="billing-kpi"><div class="k">未精算件数</div><div class="v" id="kpiOpenCount">0 件</div></div>
    <div class="billing-kpi"><div class="k">未精算残高</div><div class="v" id="kpiOpenRemainder">0 円</div></div>
    <div class="billing-kpi"><div class="k">本日入金合計（表示中）</div><div class="v" id="kpiPaid">0 円</div></div>
  </div>

  <div class="card" id="regCard" style="margin-bottom:1rem">
    <strong style="font-size:0.9rem">新規伝票</strong>
    <p class="muted" style="font-size:0.78rem;margin:0.35rem 0 0.65rem">来店セッションに紐付けると卓名が伝票に載り、会計後にセッションを閉じられます。</p>
    <label for="regSession" style="margin-top:0">来店セッション（任意）</label>
    <p id="regSession-hint" class="muted" style="font-size:0.72rem;margin:-0.2rem 0 0.35rem">どの卓の来店にこの伝票を付けるか。付けない場合はテイクアウト等・店内売上のみの伝票です。</p>
    <select id="regSession" style="margin-bottom:0.35rem" aria-describedby="regSession-hint">
      <option value="">セッション紐付けなし（店内売上など）</option>
    </select>
    <div class="row" style="gap:0.35rem;flex-wrap:wrap;margin-bottom:0.5rem">
      <button type="button" class="btn-ghost" id="btnRegPreview">参考額を取得</button>
      <button type="button" class="btn-ghost" id="btnRegApplyPrev" disabled>参考額を金額に入れる</button>
    </div>
    <p id="regPrevHint" class="muted" style="font-size:0.78rem;margin:0 0 0.5rem;min-height:1.1em"></p>
    <label for="regAmt">請求合計（円）</label>
    <p id="regAmt-hint" class="muted" style="font-size:0.72rem;margin:-0.2rem 0 0.35rem">この伝票の税込合計。金額確定後、下の入金欄で分割して記録できます。</p>
    <input id="regAmt" type="number" min="0" step="1" value="0" inputmode="numeric" aria-describedby="regAmt-hint" />
    <div class="row" style="gap:0.35rem;flex-wrap:wrap;margin:0.35rem 0 0.65rem">
      <button type="button" class="btn-ghost" data-reg-quick="1000">+1,000</button>
      <button type="button" class="btn-ghost" data-reg-quick="5000">+5,000</button>
      <button type="button" class="btn-ghost" data-reg-quick="10000">+10,000</button>
      <button type="button" class="btn-ghost" id="btnRegClear">クリア</button>
    </div>
    <label for="regLabel">伝票メモ（任意・スタッフ用）</label>
    <p class="muted" style="font-size:0.72rem;margin:-0.2rem 0 0.35rem">一覧やレシートに出す補足。内容が入っていてもここが何用か分かるように残します。</p>
    <input id="regLabel" type="text" maxlength="120" placeholder="例: テイクアウト、宴会予約名" />
    <button type="button" class="btn-primary" id="btnCreateBill" style="margin-top:0.75rem">伝票を発行</button>
  </div>

  <div class="row" style="margin-bottom:0.75rem;justify-content:space-between;flex-wrap:wrap;gap:0.5rem">
    <button type="button" class="btn-ghost" id="btnRefBills">一覧を再読込</button>
    <div class="row" style="gap:0.35rem;flex-wrap:wrap">
      <label for="billFilter" class="muted" style="margin:0;font-size:0.78rem;align-self:center">表示切替</label>
      <select id="billFilter" style="width:auto;min-width:120px;margin-bottom:0" title="伝票の状態で一覧を絞り込み">
        <option value="">すべて</option>
        <option value="open" selected>未精算</option>
        <option value="settled">精算済</option>
        <option value="void">取消済</option>
      </select>
      <label for="fltFrom" class="muted" style="margin:0;font-size:0.78rem;align-self:center">開始日</label>
      <input id="fltFrom" type="date" style="width:auto;min-width:148px;margin:0" />
      <label for="fltTo" class="muted" style="margin:0;font-size:0.78rem;align-self:center">終了日</label>
      <input id="fltTo" type="date" style="width:auto;min-width:148px;margin:0" />
      <label for="fltMethod" class="muted" style="margin:0;font-size:0.78rem;align-self:center">支払い方法</label>
      <select id="fltMethod" style="width:auto;min-width:140px;margin-bottom:0">
        <option value="">すべて</option>
      </select>
    </div>
  </div>
  <div class="ops-split">
    <div id="billsList" class="card" style="padding:0;overflow:hidden;max-height:70vh;overflow-y:auto"></div>
    <div id="billDetail" class="detail-panel">
      <div class="detail-placeholder">左から伝票を選択</div>
    </div>
  </div>
  <div id="log"></div>
</main>
