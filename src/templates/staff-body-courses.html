<main>
  <h2 class="page-title">コース</h2>
  <p class="muted" style="margin-top:-0.35rem;margin-bottom:1rem">各コースに<strong>複数の時間・料金パターン</strong>（例: 60分・90分）を登録できます。卓開始時にパターンを選びます。対象商品は「対象商品を選択」からダイアログで指定してください。</p>
  <div class="row" style="margin-bottom:0.75rem">
    <button type="button" class="btn-ghost" id="btnRefCourses">再読込</button>
    <div style="margin-left:auto;display:flex;align-items:center;gap:.45rem">
      <span class="muted" style="font-size:.78rem">金額表示</span>
      <select id="coursesPriceMode" style="min-width:10rem">
        <option value="gross">税込</option>
        <option value="net">税抜</option>
      </select>
      <a class="btn-ghost" id="lnkCoursesPriceModeSettings" href="/staff-app/__STORE_PATH__/settings#tab=basic" style="text-decoration:none;display:inline-block;width:auto">
        設定で変更
      </a>
    </div>
  </div>
  <div id="coursesList" class="card" style="padding:0;overflow:hidden"></div>
  <div class="card" style="margin-top:1rem">
    <strong style="font-size:0.88rem">コースを追加</strong>
    <p class="muted" style="font-size:0.72rem;margin:0.35rem 0 0.5rem">プラン名と、時間（分）ごとの大人・子供単価を1行以上追加してください。</p>
    <label for="cName" style="margin-top:0.65rem">コース名（ゲスト・伝票に表示）</label>
    <input id="cName" type="text" placeholder="例: スタンダード食べ放題" />
    <label for="cKind">種別コード（内部・一覧用・任意）</label>
    <p class="muted" style="font-size:0.72rem;margin:-0.15rem 0 0.35rem">識別用の短い文字列。画面には補助的に表示されます。</p>
    <input id="cKind" type="text" placeholder="例: eat_drink_all, tabehodai" />
    <strong style="font-size:0.82rem;display:block;margin-top:0.75rem">料金・制限時間パターン</strong>
    <p class="muted" style="font-size:0.72rem;margin:0.25rem 0 0.5rem">分単位が異なると別料金として扱われます。子供は空欄で大人と同額です。</p>
    <div id="addTierRows" style="display:flex;flex-direction:column;gap:0.5rem"></div>
    <button type="button" class="btn-ghost" id="btnAddTierRowNew" style="margin-top:0.35rem;width:auto">＋ 時間パターンを追加</button>
    <button type="button" class="btn-primary" id="btnAddCourse" style="margin-top:0.65rem">追加</button>
  </div>
  <div id="log"></div>
</main>
