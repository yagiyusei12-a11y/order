<main class="games-admin-page">
  <div class="games-admin-head">
    <h1>ゲーム・占い</h1>
    <p class="muted games-admin-lead">
      店内POP用の<strong>ゲームハブ</strong>を管理します。有料ゲームは卓のモバイルオーダーQRと連携し、参加費を会計に載せます。成功時は選んだメニューを0円で厨房へ送ります。
    </p>
    <div class="games-hub-qr-row">
      <div>
        <div class="muted" style="font-size:0.78rem;margin-bottom:0.35rem">POP用 QR（ゲーム一覧）</div>
        <img id="gamesHubQr" src="/staff-app/__STORE_PATH__/games-hub-qr.svg" width="128" height="128" alt="ゲームハブ QR" />
      </div>
      <div class="games-hub-url-wrap">
        <label class="lbl" for="gamesHubUrl">公開URL</label>
        <input id="gamesHubUrl" type="text" readonly value="__GAMES_HUB_URL__" />
        <button type="button" class="btn-secondary" id="btnCopyHubUrl">URLをコピー</button>
      </div>
    </div>
    <div class="row" style="gap:0.5rem;flex-wrap:wrap;margin-top:0.85rem">
      <button type="button" class="btn-primary" id="btnAddGame">ゲームを追加</button>
      <button type="button" class="btn-secondary" id="btnReloadGames">再読込</button>
      <span id="gamesLog" class="muted" style="font-size:0.82rem"></span>
    </div>
  </div>
  <div id="gamesList" class="games-list" aria-live="polite"></div>

  <div id="gameModal" class="games-modal" hidden aria-hidden="true">
    <div class="games-modal__backdrop" id="gameModalBackdrop"></div>
    <div class="games-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="gameModalTitle">
      <header class="games-modal__head">
        <h2 id="gameModalTitle" class="games-modal__title">ゲーム</h2>
        <button type="button" class="btn-ghost games-modal__close" id="gameModalClose">閉じる</button>
      </header>
      <form id="gameForm" class="games-modal__body">
        <input type="hidden" id="gameId" />
        <label class="lbl" for="gameKind">種類</label>
        <select id="gameKind">
          <option value="paid">有料ゲーム</option>
          <option value="fortune">占い（無料）</option>
        </select>
        <label class="lbl" for="gameSlug">slug（英数字・ハイフン）</label>
        <input id="gameSlug" type="text" placeholder="lucky-stop" required />
        <label class="lbl" for="gameTitle">タイトル</label>
        <input id="gameTitle" type="text" required />
        <label class="lbl" for="gameDesc">説明</label>
        <textarea id="gameDesc" rows="2"></textarea>
        <label class="lbl" for="gameEmoji">アイコン（絵文字）</label>
        <input id="gameEmoji" type="text" maxlength="8" placeholder="🎮" />
        <div id="paidFields">
          <label class="lbl" for="gamePrice">参加費（税込円）</label>
          <input id="gamePrice" type="number" min="0" step="1" value="88" />
          <label class="lbl" for="gameReward">成功時プレゼント（メニュー）</label>
          <select id="gameReward"><option value="">— 選択 —</option></select>
          <label class="lbl" for="gameWinMode">勝敗判定</label>
          <select id="gameWinMode">
            <option value="random">ランダム（当選率）</option>
            <option value="skill">スキル（slug モジュール連携）</option>
          </select>
          <label class="lbl" for="gameWinPct">当選率（%）random 用</label>
          <input id="gameWinPct" type="number" min="0" max="100" step="1" value="30" />
        </div>
        <label class="lbl" for="gameSort">表示順</label>
        <input id="gameSort" type="number" step="1" value="0" />
        <label class="lbl"><input type="checkbox" id="gameEnabled" checked /> 公開する</label>
        <div class="games-modal__actions">
          <button type="submit" class="btn-primary">保存</button>
          <button type="button" class="btn-danger" id="btnDeleteGame" style="display:none">削除</button>
        </div>
      </form>
    </div>
  </div>
</main>
<style>
  .games-admin-page { padding:0.25rem 0 1.5rem; max-width:52rem; }
  .games-admin-lead { margin:0.35rem 0 0; font-size:0.88rem; line-height:1.55; max-width:42rem; }
  .games-hub-qr-row { display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-start; margin-top:0.85rem; }
  .games-hub-url-wrap { flex:1; min-width:14rem; }
  .games-hub-url-wrap input { width:100%; font-size:0.78rem; padding:0.45rem 0.5rem; }
  .games-list { display:flex; flex-direction:column; gap:0.55rem; margin-top:1rem; }
  .games-row {
    border:1px solid var(--border); border-radius:10px; padding:0.75rem 0.85rem; background:#fff;
    display:flex; gap:0.65rem; align-items:flex-start; justify-content:space-between;
  }
  .games-row-title { font-weight:800; margin:0 0 0.15rem; font-size:0.95rem; }
  .games-row-meta { font-size:0.75rem; color:var(--muted); margin:0; line-height:1.45; }
  .games-row-actions { display:flex; gap:0.35rem; flex-shrink:0; }
  .games-modal[hidden] { display:none !important; }
  .games-modal { position:fixed; inset:0; z-index:1200; display:flex; align-items:center; justify-content:center; padding:1rem; }
  .games-modal__backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.35); }
  .games-modal__dialog {
    position:relative; background:#fff; border-radius:12px; width:min(24rem,100%); max-height:90vh; overflow:auto;
    box-shadow:0 12px 40px rgba(0,0,0,0.18);
  }
  .games-modal__head { display:flex; align-items:center; justify-content:space-between; padding:0.75rem 1rem; border-bottom:1px solid var(--border); }
  .games-modal__title { margin:0; font-size:1rem; font-weight:800; }
  .games-modal__body { padding:0.85rem 1rem 1rem; display:flex; flex-direction:column; gap:0.45rem; }
  .games-modal__body input, .games-modal__body select, .games-modal__body textarea { width:100%; }
  .games-modal__actions { display:flex; gap:0.5rem; margin-top:0.5rem; flex-wrap:wrap; }
</style>
