<main>
  <style>
    /* リストのみ全画面（サイドバー・ヘッダー・フッター非表示） */
    body.hall-list-fullscreen .sidebar,
    body.hall-list-fullscreen .topbar,
    body.hall-list-fullscreen .app-footer {
      display: none !important;
    }
    body.hall-list-fullscreen .app {
      height: 100vh;
      height: 100dvh;
    }
    body.hall-list-fullscreen .col {
      flex: 1;
      min-width: 0;
      min-height: 0;
      height: 100%;
    }
    body.hall-list-fullscreen .scroll-main {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 0 !important;
      padding-bottom: 0 !important;
    }
    body.hall-list-fullscreen .global-call-banner {
      left: 0 !important;
    }
    body.hall-list-fullscreen .hall-fs-hide {
      display: none !important;
    }
    .hall-full-exit-bar {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.35rem;
      padding: 0.4rem 0.55rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 40;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
    }
    .hall-fs-exit-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .hall-fs-tabs {
      margin: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    .hall-fs-tabs button {
      font-size: 0.76rem;
      padding: 0.32rem 0.55rem;
    }
    .hall-full-exit-bar .hall-full-exit-title {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--accent);
    }
    .hall-full-exit-bar .row {
      margin: 0;
      gap: 0.35rem;
    }
    body.hall-list-fullscreen #hallReadyRoot {
      min-height: calc(100dvh - 4.25rem);
      margin-bottom: 0;
    }

    .hall-ready-toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; margin-bottom: 0.65rem; }
    .hall-ready-groups { display: flex; flex-direction: column; gap: 1.35rem; }
    .hall-ready-table-head {
      display: flex; align-items: baseline; gap: 0.45rem; flex-wrap: wrap;
      margin: 0 0 0.5rem;
      font-size: 1.02rem;
      font-weight: 800;
      color: var(--accent);
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.35rem;
    }
    .hall-ready-table-head .badge-n { font-size: 0.72rem; font-weight: 700; color: var(--muted); }
    .hall-ready-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(172px, 1fr));
      gap: 0.55rem;
    }
    .hall-ready-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 0.65rem 0.72rem;
      display: flex;
      flex-direction: column;
      gap: 0.32rem;
      min-height: 5.8rem;
    }
    .hall-ready-block-early {
      border-color: #93c5fd;
      background: #eff6ff;
    }
    .hall-ready-chip-early {
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: 800;
    }
    .hall-ready-block .name { font-weight: 800; font-size: 0.88rem; line-height: 1.35; color: #0f172a; }
    .hall-ready-chips { display: flex; flex-wrap: wrap; gap: 0.25rem; }
    .hall-ready-chip {
      font-size: 0.65rem; font-weight: 700; padding: 0.12rem 0.38rem; border-radius: 6px;
      background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0;
    }
    .hall-ready-meta { font-size: 0.72rem; color: var(--muted); line-height: 1.4; }
    .hall-ready-time { font-size: 0.74rem; font-weight: 700; color: #0f766e; }
    .hall-ready-serve {
      margin-top: auto;
      width: 100%;
      padding: 0.52rem 0.4rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(180deg, #4ade80, #22c55e);
      color: #fff;
      font-weight: 800;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 2px 6px rgba(34, 197, 94, 0.35);
    }
    .hall-ready-serve:active { transform: scale(0.98); }
    .hall-ready-empty { text-align: center; padding: 2.2rem 1rem; color: var(--muted); }
    .hall-ready-empty .ico { font-size: 2.2rem; margin-bottom: 0.45rem; opacity: 0.4; }
  </style>
  <div id="hallFullExitBar" class="hall-full-exit-bar" hidden>
    <div class="hall-fs-exit-head">
      <span class="hall-full-exit-title">調理済・提供 · リスト全画面</span>
      <div class="row">
        <button type="button" class="btn-ghost" id="btnHallFsRef" style="width:auto">再読込</button>
        <button type="button" class="btn-ghost" id="btnHallFullExit" style="width:auto;font-weight:800">全画面を終了</button>
      </div>
    </div>
    <div class="top-tabs hall-fs-tabs" role="tablist" aria-label="提供リスト（全画面）">
      <button type="button" class="is-on" id="hallTabDoneFs">提供待ち（調理済）</button>
      <button type="button" id="hallTabServedFs">提供済み</button>
    </div>
  </div>
  <div class="hall-fs-hide">
    <h2 class="page-title">調理済・提供</h2>
    <div class="top-tabs" role="tablist" aria-label="提供リスト" style="margin-top:-0.25rem;margin-bottom:0.5rem">
      <button type="button" class="is-on" id="hallTabDone">提供待ち（調理済）</button>
      <button type="button" id="hallTabServed">提供済み</button>
    </div>
    <p class="muted" style="margin-top:-0.15rem;margin-bottom:0.65rem;font-size:0.8rem">
      <strong>提供待ち</strong>ではキッチンで「調理済」にした商品を表示します。お渡し後に「提供済み」にしてください（並びは<strong>調理完了が早い順</strong>・<strong>卓ごと</strong>）。<strong>提供済み</strong>タブでは、会計前のセッション内で提供済みにした商品を<strong>提供が新しい順</strong>で確認できます。
    </p>
    <div class="hall-ready-toolbar">
      <button type="button" class="btn-ghost" id="btnRefHall" style="width:auto">再読込</button>
      <button type="button" class="btn-ghost" id="btnHallFullList" style="width:auto;font-weight:700">リスト全画面</button>
      <label class="row" style="margin:0;align-items:flex-start;gap:0.35rem;font-size:0.8rem;color:var(--muted)">
        <input type="checkbox" id="hallAuto" checked style="margin-top:0.2rem" />
        <span>自動再読込（間隔は設定の「キッチン自動更新（秒）」）</span>
      </label>
    </div>
    <div id="log"></div>
  </div>
  <div class="card hall-fs-hide" id="hallFilterCard" style="margin-bottom:0.75rem;padding:0.75rem 1rem">
    <div style="font-size:0.82rem;font-weight:700;margin-bottom:0.35rem">絞り込み</div>
    <p class="muted" style="font-size:0.72rem;margin:0 0 0.5rem">キッチン画面と同じく、カテゴリ・調理場を複数選ぶと<strong>すべて一致</strong>する行だけ表示します。</p>
    <div class="row" style="align-items:flex-start;flex-wrap:wrap;gap:1rem">
      <div style="flex:1;min-width:160px">
        <div class="muted" style="font-size:0.72rem;margin-bottom:0.35rem">カテゴリ</div>
        <div id="hallFltCats" style="max-height:160px;overflow:auto;font-size:0.78rem;border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.5rem;background:#fafafa"></div>
      </div>
      <div style="flex:1;min-width:160px">
        <div class="muted" style="font-size:0.72rem;margin-bottom:0.35rem">調理場</div>
        <div id="hallFltStas" style="max-height:160px;overflow:auto;font-size:0.78rem;border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.5rem;background:#fafafa"></div>
      </div>
    </div>
    <div class="row" style="margin-top:0.5rem;gap:0.35rem">
      <button type="button" class="btn-ghost" id="hallFltClear" style="width:auto">絞り込み解除</button>
    </div>
  </div>
  <div id="hallReadyRoot" class="card" style="min-height:200px;padding:0.85rem 1rem"></div>
</main>
