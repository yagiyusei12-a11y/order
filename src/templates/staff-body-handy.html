<main class="handy-bright">
  <div class="handy-bright-inner">

      オプション必須の商品・セットはここでは選べません。
    </p>

    <section class="handy-card handy-section">
      <div class="handy-section-head">
        <span class="handy-section-title">お客様情報</span>
        <span class="handy-section-hint">端末で登録した会員向け</span>
      </div>

      <label for="handyCustomer">お客様を選択</label>
      <select id="handyCustomer" style="margin-bottom:0.5rem">
        <option value="">お客様を選ぶ（任意）</option>
      </select>
      <div class="row" style="margin-bottom:0">
        <button type="button" class="btn-ghost" id="handyRefCust" style="width:auto">一覧を再読込</button>
      </div>

        <p class="handy-placeholder">お客様を選ぶと、来店情報や注文傾向が表示されます。</p>
      </div>

      <div id="handyRankingHost" class="handy-subblock" hidden>
        <div class="handy-subtitle">累計 · よく注文する商品</div>
        <div id="handyRanking" class="handy-ranking"></div>
      </div>

        <div class="handy-subtitle">最近の注文履歴</div>
        <div id="handyHistory" class="handy-history"></div>
      </div>
    </section>

    <section class="handy-card handy-section">
      <div class="handy-section-head">
        <span class="handy-section-title">注文先</span>
      </div>

      <select id="handySession" style="margin-bottom:0.5rem">
        <option value="">読込中…</option>
      </select>
      <div class="row" style="margin-bottom:0">
        <button type="button" class="btn-ghost" id="handyRefSess" style="width:auto">セッション再読込</button>
      </div>
    </section>

    <section class="handy-card handy-section">
      <div class="handy-section-head">
        <span class="handy-section-title">メニュー</span>
      </div>
      <label for="handyCat">カテゴリ</label>
      <select id="handyCat" style="margin-bottom:0.5rem">
        <option value="">すべて</option>
      </select>
      <label for="handySearch">商品を検索</label>
      <input id="handySearch" type="search" placeholder="名前の一部" autocomplete="off" />
    </section>

    <div id="handyItemList" class="handy-item-list handy-card" style="padding:0"></div>

    <section class="handy-card handy-section">
      <div class="handy-section-head">
        <span class="handy-section-title">提供区分</span>
      </div>
      <label class="row" style="align-items:center;gap:0.45rem;font-size:0.82rem;margin:0.25rem 0">
        <input type="radio" name="handyEatMode" id="handyEatDineIn" value="dine_in" checked />
        <span>店内（標準税率で計上）</span>
      </label>
      <label class="row" style="align-items:flex-start;gap:0.45rem;font-size:0.82rem;margin:0.25rem 0">
        <input type="radio" name="handyEatMode" id="handyEatTakeout" value="takeout" style="margin-top:0.15rem;flex-shrink:0" />
        <span>テイクアウト（軽減税率・メニューで「テイクアウト可」のみ）</span>
      </label>
    </section>

    <section class="handy-card handy-section handy-cart-section">
      <div class="handy-section-head">
        <span class="handy-section-title">カート</span>
        <button type="button" class="btn-ghost" id="handyClearCart" style="width:auto;padding:0.25rem 0.5rem;font-size:0.75rem">空にする</button>
      </div>
      <div id="handyCart" class="muted handy-cart-empty">商品をタップして追加</div>
      <label for="handyOrderNote">伝票メモ（任意）</label>
      <input id="handyOrderNote" type="text" placeholder="例: 電話注文・テイクアウト希望 など" />
      <button type="button" class="btn-primary handy-submit-btn" id="handySubmit">キッチンへ送信</button>
    </section>
    <div id="log"></div>
  </div>
