<main>
  <style>
    /* リストのみ全画面（サイドバー・ヘッダー・フッター非表示） */
    body.kit-list-fullscreen .sidebar,
    body.kit-list-fullscreen .topbar,
    body.kit-list-fullscreen .app-footer {
      display: none !important;
    }
    body.kit-list-fullscreen .app {
      height: 100vh;
      height: 100dvh;
    }
    body.kit-list-fullscreen .col {
      flex: 1;
      min-width: 0;
      min-height: 0;
      height: 100%;
    }
    body.kit-list-fullscreen .scroll-main {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 0 !important;
      padding-bottom: 0 !important;
    }
    body.kit-list-fullscreen .global-call-banner {
      left: 0 !important;
    }
    body.kit-list-fullscreen .kit-fs-hide {
      display: none !important;
    }
    .kit-full-exit-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 0.4rem 0.55rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 40;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
    }
    .kit-full-exit-bar .kit-full-exit-title {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--accent);
    }
    .kit-full-exit-bar .row {
      margin: 0;
      gap: 0.35rem;
    }
    body.kit-list-fullscreen #kit.kit-layout-normal {
      min-height: calc(100dvh - 2.75rem);
    }
    /* 通常表示: 注文をタイル状に詰めて表示 */
    #kit.kit-layout-normal {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.42rem;
      padding: 0.45rem;
      align-content: start;
      min-height: 220px;
    }
    .kit-order-box {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .kit-order-box-head {
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--accent);
      padding: 0.38rem 0.5rem;
      background: var(--accent-soft);
      border-bottom: 1px solid #fed7aa;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* まとめ表示: 左上に品名・時刻、右上に数量を強調 */
    .kit-order-box-head.kit-summary-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.4rem;
      white-space: normal;
      overflow: visible;
      text-overflow: unset;
    }
    .kit-summary-head-main {
      min-width: 0;
      flex: 1;
    }
    .kit-summary-head-sta {
      font-size: 0.62rem;
      font-weight: 700;
      color: #9a3412;
      margin-bottom: 0.12rem;
      line-height: 1.25;
    }
    .kit-summary-head-name {
      font-size: 0.78rem;
      font-weight: 800;
      color: #c2410c;
      line-height: 1.3;
      word-break: break-word;
    }
    .kit-summary-head-time {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--muted);
      margin-top: 0.2rem;
    }
    .kit-summary-qty {
      flex-shrink: 0;
      text-align: right;
      padding: 0.05rem 0 0 0.2rem;
      line-height: 1.05;
    }
    .kit-summary-qty-hint {
      font-size: 0.55rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .kit-summary-qty-num {
      font-size: 1.42rem;
      font-weight: 900;
      color: var(--accent);
      margin-top: 0.08rem;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.9);
    }
    .kit-order-box-body {
      padding: 0.4rem 0.45rem 0.45rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .kit-line-box {
      border-top: 1px solid #f1f5f9;
      padding-top: 0.4rem;
      margin-top: 0.1rem;
    }
    .kit-line-box:first-child {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }
    .kit-line-name {
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1.35;
      color: #0f172a;
      word-break: break-word;
    }
    .kit-line-extra {
      font-size: 0.65rem;
      color: var(--muted);
      line-height: 1.35;
      white-space: pre-line;
      margin-top: 0.2rem;
      max-height: 3.2em;
      overflow: hidden;
    }
    /* タイマーと調理済を縦に分離（誤タップ防止） */
    .kit-line-actions-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      margin-top: 0.32rem;
    }
    .kit-line-actions-timers {
      display: flex;
      flex-wrap: wrap;
      gap: 0.28rem;
      align-items: center;
    }
    .kit-line-actions-timers button {
      padding: 0.22rem 0.42rem !important;
      font-size: 0.68rem !important;
      min-height: 0;
      line-height: 1.2;
      width: auto !important;
    }
    .kit-line-actions-status {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .kit-line-actions-wrap.kit-line-actions-has-timers .kit-line-actions-status {
      padding-top: 0.48rem;
      border-top: 1px dashed #94a3b8;
      margin-top: 0.08rem;
    }
    .kit-line-actions-status button {
      padding: 0.36rem 0.5rem !important;
      font-size: 0.74rem !important;
      line-height: 1.25;
      width: 100% !important;
      box-sizing: border-box;
    }
    .kit-summary-action-stack {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      margin-top: 0.35rem;
    }
    .kit-summary-timers-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .kit-summary-done-row {
      padding-top: 0.48rem;
      border-top: 1px dashed #94a3b8;
    }
    .kit-summary-done-row .row {
      margin-top: 0 !important;
    }
    .kit-summary-action-stack:not(.kit-summary-has-timers) .kit-summary-done-row {
      padding-top: 0;
      border-top: none;
    }
    .kit-order-box-head.kit-history-head {
      background: #ecfdf5;
      color: #166534;
      border-bottom-color: #86efac;
    }
    .kit-history-done-meta {
      font-size: 0.65rem;
      font-weight: 600;
      color: #0f766e;
      margin-top: 0.15rem;
    }
    .kit-line-actions-status button.kit-btn-revert {
      background: #fffbeb !important;
      border-color: #fcd34d !important;
      color: #b45309 !important;
    }
    .kit-btn-stockout {
      background: #fef2f2 !important;
      border-color: #f87171 !important;
      color: #b91c1c !important;
      font-weight: 700 !important;
    }
    .kit-btn-stockout:hover {
      background: #fee2e2 !important;
    }
  </style>
  <div id="kitFullExitBar" class="kit-full-exit-bar" hidden>
    <span class="kit-full-exit-title">キッチン · リスト全画面</span>
    <div class="row">
      <button type="button" class="btn-ghost" id="btnKitFsRef" style="width:auto">再読込</button>
      <button type="button" class="btn-ghost" id="btnKitFsSummary" style="width:auto">まとめ表示</button>
      <button type="button" class="btn-ghost" id="btnKitFullExit" style="width:auto;font-weight:800">全画面を終了</button>
    </div>
  </div>
  <div class="kit-fs-hide">
    <div class="top-tabs" role="tablist" aria-label="注文ビュー">
      <button type="button" id="kitTabHistory" role="tab" aria-selected="false">注文履歴（調理済）</button>
      <button type="button" id="kitTabActive" class="is-on" role="tab" aria-selected="true">進行中の注文</button>
      <button type="button" id="kitTabReserve" role="tab" aria-selected="false" disabled style="opacity:0.45;cursor:not-allowed" title="未対応">予約注文管理</button>
    </div>
    <div class="row" style="margin-bottom:0.5rem">
      <button type="button" class="btn-ghost" id="btnRefKit">再読込</button>
      <button type="button" class="btn-ghost" id="btnKitSummary">まとめ表示</button>
      <button type="button" class="btn-ghost" id="btnKitFullList" style="width:auto;font-weight:700">リスト全画面</button>
      <label class="row" style="margin:0;align-items:flex-start;gap:0.35rem;font-size:0.8rem;color:var(--muted)">
        <input type="checkbox" id="auto" checked style="margin-top:0.2rem" />
        <span>注文行一覧の<strong>自動再読込</strong>（間隔は設定の「キッチン自動更新（秒）」）</span>
      </label>
    </div>
  </div>
  <div id="kitTimerToast" class="kit-timer-toast" role="dialog" aria-modal="true" aria-labelledby="kitTimerToastHeading" hidden>
    <div id="kitTimerToastHeading" class="kit-timer-toast-title">調理完了</div>
    <div id="kitTimerToastList" class="kit-timer-toast-list"></div>
    <button type="button" class="btn-ghost kit-timer-toast-ack" id="btnKitTimerAck">確認</button>
  </div>
  <div id="kitTimerStrip" class="kit-timer-strip" aria-label="進行中の調理タイマー"></div>
  <div class="card kit-fs-hide" id="kitFilterCard" style="margin-bottom:0.75rem;padding:0.75rem 1rem">
    <div style="font-size:0.82rem;font-weight:700;margin-bottom:0.35rem">絞り込み</div>
    <p class="muted" style="font-size:0.72rem;margin:0 0 0.5rem">カテゴリ・調理場を複数選択すると<strong>すべて一致</strong>する行だけ表示（どちらも未選択なら全件）。調理場未設定の行は「未割当」を付けると絞り込み対象にできます。</p>
    <div class="row" style="align-items:flex-start;flex-wrap:wrap;gap:1rem">
      <div style="flex:1;min-width:160px">
        <div class="muted" style="font-size:0.72rem;margin-bottom:0.35rem">カテゴリ（商品マスタ）</div>
        <div id="fltCats" style="max-height:160px;overflow:auto;font-size:0.78rem;border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.5rem;background:#fafafa"></div>
      </div>
      <div style="flex:1;min-width:160px">
        <div class="muted" style="font-size:0.72rem;margin-bottom:0.35rem">調理場（マスタ）</div>
        <div id="fltStas" style="max-height:160px;overflow:auto;font-size:0.78rem;border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.5rem;background:#fafafa"></div>
      </div>
    </div>
    <div class="row" style="margin-top:0.5rem;gap:0.35rem">
      <button type="button" class="btn-ghost" id="fltClear" style="width:auto">絞り込み解除</button>
    </div>
  </div>
  <div id="kit" class="card" style="min-height:220px;padding:0;box-sizing:border-box"></div>
  <div class="kit-fs-hide">
    <p class="muted" style="margin:0.5rem 0 0.15rem;font-size:0.72rem">卓ショートカット（席の識別用）</p>
    <div class="chip-bar" id="chipBar"></div>
    <div id="log"></div>
  </div>
</main>
