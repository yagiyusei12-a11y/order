        <div id="fltCats" style="max-height:160px;overflow:auto;font-size:0.78rem;border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.5rem;background:#fafafa"></div>
      </div>
      <div style="flex:1;min-width:160px">
        <div class="muted" style="font-size:0.72rem;margin-bottom:0.35rem">調理場（マスタ）</div>
        <div id="fltStas" style="max-height:160px;overflow:auto;font-size:0.78rem;border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.5rem;background:#fafafa"></div>
