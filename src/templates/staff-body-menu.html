<main>
  <h2 class="page-title">メニュー管理</h2>
  <p class="muted" style="margin-top:-0.35rem;margin-bottom:0.75rem">画像・在庫・販売可否まで含めて商品マスタを編集します。</p>
  <div class="top-tabs" style="margin-top:0">
    <button class="is-on" type="button" id="tab-items">商品管理</button>
    <button type="button" id="tab-categories">カテゴリー</button>
    <button type="button" id="tab-options">オプション</button>
    <button type="button" id="tab-kitchens">調理場</button>
  </div>
  <div class="card" style="padding:0.75rem">
    <p class="muted" style="font-size:0.72rem;margin:0 0 0.5rem">左：カテゴリの一括追加。右：ゲストメニューにそのカテゴリを出すか。</p>
    <div class="row" style="justify-content:space-between;gap:0.5rem;align-items:flex-end;flex-wrap:wrap">
      <div class="row" style="gap:0.5rem;flex-wrap:wrap;align-items:flex-end">
        <button type="button" class="btn-ghost" id="btnRefMenu">再読込</button>
        <div style="display:flex;flex-direction:column;gap:0.2rem">
          <label for="newCatName" style="font-size:0.72rem;color:var(--muted);margin:0">新規カテゴリ名</label>
          <input id="newCatName" type="text" placeholder="例: 季節限定" style="margin:0;max-width:200px" />
        </div>
        <div style="display:flex;flex-direction:column;gap:0.2rem">
          <label for="newCatParentId" style="font-size:0.72rem;color:var(--muted);margin:0">親カテゴリ</label>
          <select id="newCatParentId" style="margin:0;max-width:200px" title="空欄は最上位カテゴリ">
            <option value="">親なし（最上位）</option>
          </select>
        </div>
        <button type="button" class="btn-ghost" id="btnAddCat">カテゴリ追加</button>
      </div>
      <label class="row" style="align-items:center;gap:0.35rem;font-size:0.78rem;max-width:12rem">
        <input type="checkbox" id="newCatGuest" checked /> ゲスト注文画面にこのカテゴリを表示する
      </label>
    </div>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div id="menuMasterLayout" style="display:grid;grid-template-columns:260px 1fr 360px;min-height:540px">
      <aside id="menuCategoryPane" style="border-right:1px solid var(--border);background:#f7f8fa"></aside>
      <section id="menuItemPane" style="border-right:1px solid var(--border)"></section>
      <aside id="menuDetailPane" style="background:#fafafa"></aside>
    </div>
  </div>
  <div id="log"></div>
</main>
