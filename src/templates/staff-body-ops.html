<main>
  <style>
    /* レシートボックス等の下端DOM差し替え時に scroll anchoring でビューが跳びにくくする */
    .scroll-main {
      overflow-anchor: none;
    }
  </style>
  <div class="ops-split">
    <div>
      <h2 class="page-title">テーブル・伝票管理</h2>
      <div class="row" style="margin-bottom:0.5rem;flex-wrap:wrap;align-items:center;gap:0.4rem">
        <button type="button" class="btn-ghost" id="btnRefFloor">一覧を更新</button>
        <button type="button" class="btn-ghost" id="btnOpenDrawer" style="font-weight:600">ドロアを開く</button>
        <a class="btn-ghost" href="/staff-app/__STORE_PATH__/settings" style="text-decoration:none;display:inline-block;width:auto;margin-left:auto">設定</a>
      </div>
      <div id="tableGrid" class="table-grid"></div>
      <div class="card" style="margin-top:1rem;padding:0.75rem">
        <strong style="font-size:0.82rem;color:var(--muted)">開いているセッション</strong>
        <div id="openSessionsMini" style="margin-top:0.5rem;font-size:0.85rem"></div>
      </div>
    </div>
    <div>
      <h2 class="page-title" style="font-size:0.95rem">詳細・レジ</h2>
      <div id="detailPanel" class="detail-panel">
        <div class="detail-placeholder">左の卓一覧からテーブルを選ぶと、ここに会計機能が表示されます</div>
      </div>
    </div>
  </div>
  <section class="card ops-receipt-box" aria-labelledby="receiptBoxHeading" style="margin-top:1rem;padding:0.85rem 1rem">
    <div class="ops-receipt-box-head">
      <div>
        <h2 id="receiptBoxHeading" class="ops-receipt-box-title">レシートボックス</h2>
        <p class="muted" style="margin:0.15rem 0 0;font-size:0.78rem;line-height:1.4">精算済み伝票を一覧し、レシート・領収書の再印刷や、誤精算時の「レジに戻す」（入金削除・未精算へ）ができます（店舗タイムゾーンの<strong>当日</strong>に精算された伝票のみ・最大40件・精算日時の新しい順）</p>
      </div>
      <button type="button" class="btn-ghost" id="btnRefReceiptBox">一覧を更新</button>
    </div>
    <div id="receiptBoxList" class="ops-receipt-list-wrap" style="margin-top:0.65rem;font-size:0.84rem">読み込み中…</div>
  </section>
  <div id="log"></div>
</main>
