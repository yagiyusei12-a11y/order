<main onclick="initAudio()">
  <style>
    :root { --wood-dark: #5d4037; --accent: #d4a373; --bg: #fdfaf5; --staff-bg: #2c2c2c; --empty-white: #ffffff; --reserved-yellow: #f1c40f; --guiding-orange: #e67e22; --occupied-blue: #4a90e2; --cleaning-red: #ff4d4f; --error-alert: #d90429; }
    html, body { height: 100vh; overflow: hidden; }
    /* Kiosk (fullscreen) mode: hide staff frame chrome */
    body.rc-kiosk .sidebar,
    body.rc-kiosk .topbar,
    body.rc-kiosk .app-footer { display: none !important; }
    body.rc-kiosk .app { height: 100vh !important; }
    body.rc-kiosk .scroll-main { padding: 0 !important; margin: 0 !important; }
    body.rc-kiosk .col { height: 100vh !important; }
    .container { height: 100vh; display: flex; flex-direction: column; padding: 5px; box-sizing: border-box; }
    .top-nav { background: var(--wood-dark); color: white; padding: 8px 15px; border-radius: 8px; margin-bottom: 5px; display: flex; align-items: center; gap: 15px; font-weight: bold; }
    .top-nav input[type="date"], .top-nav select { padding: 5px; font-size: 1.1em; border-radius: 5px; border: none; }
    .btn-reserve-add { background: var(--accent); color: white; border: none; padding: 6px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1.1em; margin-left: auto; }
    .btn-csv { background: #4a90e2; color: white; border: none; padding: 6px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1.1em; }
    .btn-full { background: #111; color: #fff; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: 900; font-size: 1.05em; }
    .main-content { display: flex; flex: 1; gap: 8px; overflow: hidden; }
    .map-section { background: var(--staff-bg); padding: 8px; border-radius: 12px; flex: 3.5; display: flex; flex-direction: column; min-height: 0; }
    .shop-map { position: relative; background: #444; padding: 8px; border-radius: 10px; flex: 1; min-height: min(62vh, 520px); overflow: hidden; }
    .shop-map.map-editing { outline: 2px dashed var(--accent); outline-offset: 2px; }
    .map-edit-hint { font-size: 0.78rem; color: #bbb; margin-top: 6px; line-height: 1.35; }
    .seat { background: #666; color: white; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: clamp(11px, 1.5vw, 14px); cursor: pointer; border: 1px solid rgba(255,255,255,0.1); font-weight: bold; position: absolute; box-sizing: border-box; min-width: 36px; min-height: 28px; user-select: none; touch-action: none; gap: 1px; }
    .seat .seat-label { pointer-events: none; text-align: center; line-height: 1.1; padding: 2px; }
    .seat .seat-type-line { pointer-events: none; text-align: center; font-size: clamp(8px, 1.05vw, 11px); font-weight: 700; opacity: 0.92; line-height: 1.05; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 2px; }
    .seat-resize-handle { position: absolute; right: 0; bottom: 0; width: 14px; height: 14px; background: rgba(255,255,255,0.35); border-radius: 4px 0 4px 0; cursor: se-resize; display: none; z-index: 2; }
    .map-editing .seat-resize-handle { display: block; }
    .map-editing .seat { cursor: grab; }
    .map-editing .seat.seat-dragging { cursor: grabbing; z-index: 50; opacity: 0.95; }
    .seat:active { transform: scale(0.95); }
    .seat.empty, .seat.vacant { background-color: var(--empty-white) !important; color: #333 !important; border: 1px solid #bbb !important; }
    .seat.reserved { background-color: var(--reserved-yellow) !important; color: #333 !important; }
    .seat.guiding { background-color: var(--guiding-orange) !important; color: #fff !important; }
    .seat.occupied { background-color: var(--occupied-blue) !important; }
    .seat.cleaning { background-color: var(--cleaning-red) !important; animation: blink 1.2s infinite; border: 2px solid white; }
    .seat.closed { background-color: #111 !important; color: #444 !important; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    .side-section { flex: 1; display: flex; flex-direction: column; gap: 5px; overflow: hidden; max-width: 300px; min-width: 250px; }
    .control-panel { background: #3d3d3d; padding: 8px; border-radius: 10px; color: white; font-size: 0.85em; display: flex; flex-direction: column; }
    /* スタッフ人数・待ち固定分：ブラウザ標準の上下矢印（スピナー）を非表示 */
    .control-panel input[type="number"] { -moz-appearance: textfield; appearance: textfield; }
    .control-panel input[type="number"]::-webkit-outer-spin-button,
    .control-panel input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .list-panel { flex: 1; overflow-y: auto; min-height: 0; padding-top: 0; }
    .wait-table { width: 100%; border-collapse: collapse; color: white; font-size: 0.85em; }
    .wait-table td { border-bottom: 1px solid #555; padding: 6px 4px; }
    .btn-action { background: #fff; color: #333; border: none; padding: 4px 8px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    #reservedAlertBar { display:none; background: var(--error-alert); color: white; padding: 10px; text-align: center; font-weight: 900; font-size: 1.2em; border-radius: 10px; margin-bottom: 5px; position: sticky; top: 0; z-index: 2000; }
    #reservedAlertBar.is-on { display:block; animation: reservedPulse 1.2s infinite; box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
    @keyframes reservedPulse { 0% { filter: brightness(1); } 50% { filter: brightness(0.8); } 100% { filter: brightness(1); } }
    #entryPopup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--occupied-blue); color:white; padding:30px; border-radius:20px; box-shadow:0 0 50px rgba(0,0,0,0.6); z-index:10000; text-align:center; cursor:pointer; border: 4px solid white; }
    #reserveModal, #csvModal, #reservationListModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10001; justify-content:center; align-items:center; }
    .modal-content { background:white; padding:20px; border-radius:15px; width:450px; max-width:90%; color:#333; }
    .modal-content input, .modal-content select { width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box; font-size:1.1em; }
    .seat-selector { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:15px; max-height:150px; overflow-y:auto; padding:5px; background:#f0f0f0; border-radius:5px; }
    .seat-check-btn { background:#fff; border:1px solid #aaa; padding:5px 10px; border-radius:3px; cursor:pointer; }
    .seat-check-btn.selected { background:var(--reserved-yellow); font-weight:bold; border-color:#d4ac0d; }
    .csv-content { background:white; padding:20px; border-radius:15px; width:95%; max-width:1200px; height:85%; display:flex; flex-direction:column; color:#333; }
    .csv-table-wrap { flex:1; overflow:auto; margin-bottom:15px; border:1px solid #ddd; }
    .csv-table { width:100%; border-collapse:collapse; font-size:0.95em; }
    .csv-table th, .csv-table td { border:1px solid #ccc; padding:8px; text-align:center; }
    .csv-table th { background:#f5f5f5; position:sticky; top:0; z-index:1; }
    .csv-table input, .csv-table select { width:100%; padding:5px; border:1px solid #ccc; box-sizing:border-box; }
    .csv-table .input-seats { background:#fffbea; border:1px solid #d4ac0d; font-weight:bold; }
    .res-list-actions { display:flex; flex-wrap:wrap; gap:0.35rem; justify-content:center; }
    .res-list-actions button { padding:0.35rem 0.55rem; border-radius:6px; border:1px solid #bbb; background:#fff; font-size:0.82em; font-weight:700; cursor:pointer; white-space:nowrap; }
    .res-list-actions button.res-btn-edit { border-color:#4a90e2; color:#1a4d8c; }
    .res-list-actions button.res-btn-delete { border-color:#fecaca; color:#b91c1c; }
  </style>

  <div id="entryPopup" onclick="clearEntry()"><h2 id="entryText" style="font-size:3em; margin:10px 0;">---</h2><div style="background:white; color:var(--occupied-blue); padding:10px; border-radius:50px; font-weight:bold;">確認</div></div>

  <div id="reserveModal">
    <div class="modal-content">
      <h2 id="reserveModalTitle" style="margin-top:0;">手動予約登録</h2>
      <p id="reserveModalResIdLine" class="muted" style="display:none;font-size:0.78rem;margin:-0.5rem 0 0.65rem;"></p>
      <div style="display:flex; gap:10px;"><input type="date" id="resDate" required onchange="updateReserveSeatSelector()"><select id="resShift" onchange="updateReserveSeatSelector()"><option value="lunch">ランチ(～15:00)</option><option value="dinner">ディナー(～23:00)</option></select></div>
      <div style="display:flex; gap:10px;"><input type="time" id="resTime" required style="flex:1;">      <input type="number" id="resNum" placeholder="人数" min="1" required style="flex:1;"></div>
      <select id="resStatus" style="margin-bottom:15px;">
        <option value="予約確定">予約確定</option>
        <option value="来店済み">来店済み</option>
        <option value="キャンセル">キャンセル</option>
      </select>
      <input type="text" id="resName" placeholder="お名前" required>
      <input type="tel" id="resPhone" placeholder="電話番号" required maxlength="30">
      <input type="text" id="resNote" placeholder="備考（任意）">
      <p style="margin:0 0 5px 0; font-weight:bold;">席を選択（予約済・利用中の席は表示されません）</p>
      <div class="seat-selector" id="seatSelectorArea"></div>
      <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="closeReserveModal()" style="flex:1; padding:12px; border-radius:8px; border:none; background:#ccc; font-weight:bold;">キャンセル</button>
        <button id="resSubmitBtn" onclick="submitReservation()" style="flex:1; padding:12px; border-radius:8px; border:none; background:var(--wood-dark); color:white; font-weight:bold;">登録する</button>
      </div>
    </div>
  </div>

  <div id="reservationListModal">
    <div class="csv-content">
      <h2 style="margin-top:0;">予約一覧</h2>
      <p id="resListModalSubtitle" style="margin:0 0 0.75rem;font-size:0.88rem;line-height:1.45;color:#555;"></p>
      <div class="csv-table-wrap">
        <table class="csv-table">
          <thead><tr><th>日付</th><th>区分</th><th>時間</th><th>氏名</th><th>電話</th><th>人数</th><th>状況</th><th>席</th><th>備考</th><th>予約番号</th><th>操作</th></tr></thead>
          <tbody id="resListModalBody"></tbody>
        </table>
      </div>
      <div style="display:flex; justify-content:flex-end;">
        <button type="button" onclick="closeReservationListModal()" style="padding:12px 28px; border-radius:8px; border:none; background:#ccc; font-weight:bold; font-size:1.05em; cursor:pointer;">閉じる</button>
      </div>
    </div>
  </div>

  <div id="csvModal">
    <div class="csv-content">
      <h2 style="margin-top:0;">予約 一括確認・修正</h2>
      <div class="csv-table-wrap">
        <table class="csv-table">
          <thead><tr><th>予約番号</th><th>日付</th><th>シフト</th><th>時間</th><th>氏名</th><th>電話</th><th>人数</th><th>状況</th><th>備考</th><th>席（例: 22, 23）</th></tr></thead>
          <tbody id="csvTableBody"></tbody>
        </table>
      </div>
      <div style="display:flex; gap:15px; justify-content:flex-end;">
        <button onclick="closeCsvModal()" style="padding:15px 30px; border-radius:8px; border:none; background:#ccc; font-weight:bold; font-size:1.1em; cursor:pointer;">キャンセル</button>
        <button onclick="submitBulkCsv()" style="padding:15px 30px; border-radius:8px; border:none; background:var(--occupied-blue); color:white; font-weight:bold; font-size:1.1em; cursor:pointer;">内容を一括保存する</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="top-nav">
      表示：<input type="date" id="viewDate" onchange="changeViewShift()">
      <select id="viewShift" onchange="changeViewShift()"><option value="lunch">ランチ (〜15:00)</option><option value="dinner">ディナー (〜23:00)</option></select>
      <button class="btn-csv" onclick="setToday()" style="background:var(--accent);">当日</button>
      <button class="btn-csv" onclick="openReservationListModal()">予約一覧</button>
      <button class="btn-csv" onclick="openBulkEditModal()">予約一括編集</button>
      <button class="btn-full" id="btnFullscreen" type="button" title="全画面表示">全画面</button>
      <button class="btn-reserve-add" onclick="openReserveModal()">＋ 手動予約</button>
    </div>
    <div id="reservedAlertBar"></div>
    <div class="main-content">
      <section class="map-section">
        <div id="map" class="shop-map"></div>
        <div class="map-edit-hint" id="mapEditHint" style="display:none">
          配置編集中：席をドラッグで移動、右下の角をドラッグでサイズ変更。「配置を保存」で店舗に記録します（自動更新は一時停止）。
        </div>
      </section>
      <section class="side-section">
        <div class="control-panel" style="flex: none;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span>客数: <span id="totalGuestCount" style="color:var(--accent); font-weight:bold;">0</span>名</span>
          </div>
          <hr style="border:0.5px solid #555; margin:8px 0;">
          <label style="display:flex; align-items:center; gap:5px;"><input type="checkbox" id="waitOverride" style="transform:scale(1.3);" onchange="saveConfig()"> 待ち強制表示</label>
          <div style="margin-top:8px;"><input type="number" id="manualWaitValue" value="30" style="width:50px; font-size:1.1em; text-align:center;" onchange="saveConfig()">分に固定</div>
          <div style="margin-top:8px; font-size:0.88em; line-height:1.35; opacity:0.95;">
            ゲスト受付の人数ボタン: 1〜<input type="number" id="walkInPartySizeMax" value="6" min="1" max="20" style="width:44px; font-size:1.05em; text-align:center;" oninput="syncWalkInPartyOverLabel()" onchange="saveConfig()">名まで表示（<span id="walkInPartyOverLabel">7</span>名様以上→スタッフ呼出）
          </div>
          <hr style="border:0.5px solid #555; margin:8px 0;">
          <label style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">
            <input type="checkbox" id="mapEditMode" style="transform:scale(1.2);" onchange="toggleMapEditMode()">
            席マップの配置を編集
          </label>
          <div style="display:flex; gap:6px; flex-wrap:wrap; margin-top:6px;">
            <button type="button" class="btn-action" onclick="saveSeatLayout()" style="background:var(--accent);color:#fff;font-weight:800;">配置を保存</button>
            <button type="button" class="btn-action" onclick="resetSeatLayoutDefaults()" style="background:#555;color:#fff;">既定に戻す</button>
          </div>
        </div>
        <div class="control-panel list-panel" style="background:#4e342e;">
          <strong style="color:var(--reserved-yellow); position:sticky; top:0; background:#4e342e; padding:8px 0; border-bottom:1px solid #77554c; z-index:1; display:block;">
            予約リスト (<span id="viewShiftLabel"></span>)
          </strong>
          <table class="wait-table"><tbody id="reservationListBody"></tbody></table>
        </div>
        <div class="control-panel list-panel">
          <strong style="position:sticky; top:0; background:#3d3d3d; padding:8px 0; border-bottom:1px solid #666; z-index:1; display:block;">
            案内・清掃リスト
          </strong>
          <table class="wait-table"><tbody id="waitListBody"></tbody></table>
        </div>
      </section>
    </div>
  </div>
  <div id="log"></div>
</main>
