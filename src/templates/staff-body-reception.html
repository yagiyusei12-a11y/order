<main>
  <style>
    :root {
      --vacant-green: #8fa382;
      --occupied-blue: #4a90e2;
      --cleaning-red: #ff4d4f;
    }
    .rc-wrap { display: grid; grid-template-columns: 1fr; gap: 0.85rem; }
    @media (min-width: 980px) { .rc-wrap { grid-template-columns: 1.35fr 0.65fr; } }
    .rc-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .rc-head { padding: 0.75rem 0.9rem; border-bottom: 1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:0.6rem; }
    .rc-head strong { font-size: 0.95rem; }
    .rc-map { padding: 0.85rem; }
    .rc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(84px, 1fr));
      gap: 0.45rem;
    }
    .rc-seat {
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.08);
      padding: 0.6rem 0.45rem;
      color: #fff;
      cursor: pointer;
      user-select: none;
      font-weight: 800;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height: 64px;
      text-align:center;
      position: relative;
    }
    .rc-seat:active { transform: scale(0.98); }
    .rc-seat.vacant { background: var(--vacant-green); }
    .rc-seat.occupied { background: var(--occupied-blue); }
    .rc-seat.cleaning { background: var(--cleaning-red); animation: rcBlink 1.2s infinite; border: 2px solid #fff; }
    @keyframes rcBlink { 0% { opacity: 1; } 50% { opacity: 0.72; } 100% { opacity: 1; } }
    .rc-seat small { font-size: 0.7rem; font-weight: 700; opacity: 0.95; margin-top: 0.25rem; }
    .rc-side { padding: 0.85rem; display:flex; flex-direction:column; gap:0.75rem; }
    .rc-detail h3 { margin: 0 0 0.35rem; font-size: 0.95rem; }
    .rc-muted { color: var(--muted); font-size: 0.82rem; line-height: 1.45; margin: 0.15rem 0 0; }
    .rc-actions { display:flex; gap:0.45rem; flex-wrap:wrap; margin-top:0.55rem; }
    .rc-actions .btn-primary, .rc-actions .btn-ghost { width:auto; }
    .rc-list { display:flex; flex-direction:column; gap:0.45rem; }
    .rc-pill { display:flex; align-items:center; justify-content:space-between; gap:0.6rem; padding:0.55rem 0.6rem; border-radius: 10px; border:1px solid var(--border); background:#fff; }
    .rc-pill strong { font-size: 0.86rem; }
    .rc-pill .tag { font-size:0.72rem; font-weight:800; border-radius:999px; padding:0.15rem 0.5rem; background:#f3f4f6; color:#334155; border:1px solid var(--border); }
    .rc-pill.cleaning { border-color: #fecaca; background: #fff1f2; }
    .rc-pill.cleaning .tag { background:#fee2e2; border-color:#fecaca; color:#991b1b; }
  </style>

  <div class="row" style="justify-content:space-between;gap:0.5rem;flex-wrap:wrap;align-items:center;margin-bottom:0.75rem">
    <h2 class="page-title" style="margin:0">受付（座席状況）</h2>
    <div class="row" style="gap:0.5rem;flex-wrap:wrap">
      <button type="button" class="btn-ghost" id="btnRcRef" style="width:auto">再読込</button>
      <a class="btn-ghost" href="/staff-app/__STORE_PATH__/ops" style="text-decoration:none;display:inline-flex;align-items:center">卓・会計へ</a>
    </div>
  </div>

  <div class="rc-wrap">
    <section class="rc-card">
      <div class="rc-head">
        <strong>座席マップ</strong>
        <span class="muted" id="rcSummary" style="font-size:0.82rem"></span>
      </div>
      <div class="rc-map">
        <div class="rc-grid" id="rcGrid"></div>
      </div>
    </section>

    <aside class="rc-card">
      <div class="rc-head"><strong>詳細</strong></div>
      <div class="rc-side">
        <div class="rc-detail" id="rcDetail">
          <p class="rc-muted">左の席を押すと詳細が表示されます。</p>
        </div>
        <div>
          <strong style="font-size:0.9rem">バッシング待ち</strong>
          <div class="rc-list" id="rcCleaningList" style="margin-top:0.45rem"></div>
        </div>
        <div id="log"></div>
      </div>
    </aside>
  </div>
</main>
