<main>
  <div class="top-tabs" role="tablist" aria-label="席マスタ（タブは今後拡張）">
    <button type="button" class="is-on">一覧</button>
    <button type="button">カテゴリ</button>
    <button type="button">インポート</button>
  </div>
  <div class="row" style="margin-bottom:0.75rem;justify-content:space-between;flex-wrap:wrap;gap:0.35rem">
    <button type="button" class="btn-ghost" id="btnRefTables">一覧を再読込</button>
    <span class="muted" style="font-size:0.78rem">左の⋮⋮をドラッグして並び替え（POS「卓」一覧の順・利用中は先頭固定）</span>
    <span class="muted" style="font-size:0.78rem">卓QRのURLは固定コードごとに不変。お客様がQRから人数・単品／コースを選んで注文開始できます（オペのセッション開始は任意）</span>
  </div>
  <div id="tablesMaster" class="card" style="padding:0;overflow:hidden"></div>
  <div class="card" style="margin-top:1rem">
    <strong style="font-size:0.88rem">席を追加</strong>
    <p class="muted" style="font-size:0.72rem;margin:0.35rem 0 0.5rem">卓の呼び名と、QR用URLに使う固定コードを登録します。</p>
    <label for="newTableName" style="margin-top:0.65rem">席名（店内表示・キッチン卓名）</label>
    <input id="newTableName" type="text" placeholder="例: カウンター3" />
    <label for="newTableCode">卓QR用コード（空欄なら自動発行）</label>
    <p class="muted" style="font-size:0.72rem;margin:-0.15rem 0 0.35rem"><code>/table-app/コード</code> の末尾。英数字・ハイフン推奨。変更するとQRのURLも変わります。</p>
    <input id="newTableCode" type="text" placeholder="例: counter-3" autocomplete="off" />
    <label for="newTableSeatType">席種別（任意・ネット予約の種別指定用）</label>
    <p class="muted" style="font-size:0.72rem;margin:-0.15rem 0 0.35rem">例: カウンター、テーブル。複数卓で同じ文字列にすると同一種別としてまとまります。</p>
    <input id="newTableSeatType" type="text" placeholder="空欄で種別なし" maxlength="40" autocomplete="off" />
    <button type="button" class="btn-primary" id="btnAddTable">席を追加</button>
  </div>
  <div id="log"></div>
</main>
