<div class="wrap">
  <div class="row" style="justify-content:space-between;align-items:flex-end;gap:.5rem;flex-wrap:wrap">
    <div>
      <h2 style="margin:0">テイクアウト（ネット・口頭）</h2>
      <div class="muted" style="font-size:.8rem;margin-top:.15rem">ネット注文と口頭登録の一覧（ステータス更新）</div>
    </div>
    <div class="row" style="gap:.35rem">
      <select id="statusFilter" class="muted" style="padding:.4rem;border-radius:10px;border:1px solid var(--border);background:var(--card)">
        <option value="">すべて</option>
        <option value="new">新規</option>
        <option value="accepted">受付済</option>
        <option value="preparing">調理中</option>
        <option value="ready">受取待ち</option>
        <option value="picked_up">受取済</option>
        <option value="cancelled">キャンセル</option>
      </select>
      <button type="button" class="btn-ghost" id="btnReload">更新</button>
    </div>
  </div>
  <div id="takeoutList" style="margin-top:0.8rem"></div>
</div>
