<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>__PAGE_TITLE__ — __STORE_ID_HTML__</title>
  <style>
    :root {
      --bg: #eef0f4;
      --surface: #ffffff;
      --sidebar: #f6f7f9;
      --border: #e2e5eb;
      --text: #1a1d24;
      --muted: #6b7280;
      --accent: #f97316;
      --accent-soft: #fff7ed;
      --green: #16a34a;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
      --radius: 12px;
      --sidebar-w: 72px;
      --topbar-h: 52px;
      --footer-h: 44px;
    }
    * { box-sizing: border-box; }
    html {
      font-size: 112.5%;
    }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    .app {
      display: flex;
      height: 100vh;
      height: 100dvh;
    }
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.5rem 0;
      gap: 0.35rem;
    }
    .snav {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--muted);
      border: 1px solid transparent;
      transition: background .15s, color .15s, border-color .15s;
    }
    .snav:hover { background: #fff; color: var(--accent); border-color: var(--border); }
    .snav.nav-active {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: #fed7aa;
      font-weight: 700;
    }
    .snav svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .snav-spacer { flex: 1; }
    .col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    .topbar {
      height: var(--topbar-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem 0 0.75rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .topbar .brand { display: flex; flex-direction: column; gap: 0.1rem; min-width: 0; }
    .topbar .brand-top {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
      min-width: 0;
    }
    .topbar .brand-top strong {
      font-size: 0.95rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(52vw, 20rem);
    }
    .topbar-guest-links {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      flex-shrink: 0;
    }
    .topbar-guest-link {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--muted);
      border: 1px solid var(--border);
      background: #f9fafb;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .topbar-guest-link:hover {
      background: #fff;
      color: var(--accent);
      border-color: #fed7aa;
    }
    .topbar-guest-link svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .topbar .brand span { font-size: 0.72rem; color: var(--muted); }
    .topbar .actions { display: flex; align-items: center; gap: 0.5rem; }
    .topbar .pill {
      font-size: 0.72rem;
      padding: 0.25rem 0.55rem;
      border-radius: 999px;
      background: #f3f4f6;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .topbar a.logout { font-size: 0.8rem; color: var(--accent); text-decoration: none; font-weight: 600; }
    .scroll-main {
      flex: 1;
      overflow: auto;
      padding: 1rem;
      padding-bottom: calc(var(--footer-h) + 1rem);
    }
    .app-footer {
      position: fixed;
      bottom: 0;
      left: var(--sidebar-w);
      right: 0;
      height: var(--footer-h);
      background: var(--green);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      z-index: 20;
    }
    .app-footer.staff-order-footer {
      cursor: pointer;
      border: none;
      width: 100%;
      font-family: inherit;
      text-align: left;
      box-sizing: border-box;
    }
    .app-footer.staff-order-footer:focus-visible {
      outline: 2px solid #fff;
      outline-offset: -2px;
    }
    .app-footer.is-open { background: var(--green); }
    .app-footer.is-closed { background: #b91c1c; }
    .app-footer.is-paused { background: #7f1d1d; }
    .app-footer small { opacity: 0.9; font-weight: 500; }

    .global-call-banner {
      position: fixed;
      left: var(--sidebar-w);
      right: 0;
      top: 0;
      z-index: 9999;
      padding: 0.75rem 1rem;
      background: #d90429;
      color: #fff;
      border-bottom: 2px solid rgba(255,255,255,0.25);
      box-shadow: 0 10px 28px rgba(0,0,0,0.25);
      text-align: center;
    }
    .global-call-banner.is-on { display: block !important; animation: globalCallPulse 1.2s infinite; }
    @keyframes globalCallPulse { 0% { filter: brightness(1); } 50% { filter: brightness(0.82); } 100% { filter: brightness(1); } }

    /* 共通コンポーネント（各ページ） */
    .page-title { font-size: 1.05rem; font-weight: 800; color: var(--accent); margin: 0 0 0.75rem; letter-spacing: 0.02em; }
    .muted { color: var(--muted); font-size: 0.82rem; }
    .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); padding: 1rem; margin-bottom: 1rem; }
    .top-tabs { display: flex; gap: 0.25rem; flex-wrap: wrap; border-bottom: 1px solid var(--border); margin: -0.25rem 0 1rem; padding-bottom: 0.5rem; }
    .top-tabs button {
      background: transparent;
      border: none;
      padding: 0.45rem 0.85rem;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: default;
      border-radius: 8px 8px 0 0;
      font-family: inherit;
    }
    .top-tabs button.is-on { color: var(--accent); font-weight: 700; box-shadow: inset 0 -2px 0 var(--accent); }
    label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.25rem; }
    select, input[type="text"], input[type="number"] {
      width: 100%;
      padding: 0.5rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fafafa;
      font-size: 0.9rem;
      margin-bottom: 0.6rem;
    }
    button.btn-primary {
      width: 100%;
      padding: 0.65rem;
      border: none;
      border-radius: 10px;
      background: linear-gradient(180deg, #fb923c, var(--accent));
      color: #fff;
      font-weight: 800;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(249,115,22,.35);
    }
    button.btn-primary:active { transform: scale(0.99); }
    button.btn-ghost {
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--text);
    }
    button.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .row { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }
    .linkbox { word-break: break-all; font-size: 0.78rem; background: #f9fafb; padding: 0.6rem; border-radius: 8px; border: 1px solid var(--border); }
    .badge { display: inline-block; padding: 0.12rem 0.45rem; border-radius: 6px; background: #f3f4f6; font-size: 0.72rem; color: var(--muted); }
    #log { white-space: pre-wrap; font-size: 0.78rem; color: #dc2626; margin-top: 0.5rem; min-height: 1.1rem; }

    /* ダッシュボード */
    .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; }
    @media (min-width: 700px) { .dash-grid { grid-template-columns: repeat(3, 1fr); } }
    .dash-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.35rem;
      padding: 1rem;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      min-height: 110px;
      transition: border-color .15s, box-shadow .15s;
    }
    .dash-card:hover { border-color: #fdba74; box-shadow: 0 4px 14px rgba(249,115,22,.15); }
    .dash-card strong { font-size: 0.92rem; }
    .dash-card small { font-size: 0.75rem; color: var(--muted); line-height: 1.35; }
    .dash-card-lg { grid-column: span 1; min-height: 120px; }
    @media (min-width: 700px) { .dash-card-lg { grid-column: span 1; } }
    .dash-card-muted { opacity: 0.5; pointer-events: none; cursor: default; }
    .dash-icon { font-size: 1.4rem; line-height: 1; }

    /* 卓グリッド */
    .ops-split { display: grid; grid-template-columns: 1fr; gap: 1rem; }
    @media (min-width: 900px) { .ops-split { grid-template-columns: 1.15fr 0.85fr; } }
    .table-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.5rem; }
    .table-cell {
      aspect-ratio: 1.1;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0.35rem;
      transition: border-color .12s, box-shadow .12s;
    }
    .table-cell:hover { border-color: #fdba74; }
    .table-cell.busy {
      border-color: #22c55e;
      box-shadow: 0 0 0 2px rgba(34,197,94,.2);
    }
    .table-cell.bashing {
      border-color: #f59e0b;
      box-shadow: 0 0 0 2px rgba(245,158,11,.2);
    }
    .table-cell.merged {
      border-color: #9333ea;
      box-shadow: 0 0 0 2px rgba(147,51,234,.22);
    }
    .table-cell.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(249,115,22,.25); }
    .table-cell .code { font-size: 0.72rem; color: var(--muted); }
    .table-cell .name { font-weight: 700; font-size: 0.88rem; text-align: center; line-height: 1.2; }
    .table-cell .meta { font-size: 0.72rem; margin-top: 0.2rem; color: var(--muted); text-align: center; line-height: 1.25; }
    .table-cell .meta.money { font-weight: 800; color: #065f46; }
    .table-cell .meta.warn { font-weight: 800; color: #b45309; }
    /* 商品マスタ一覧（並び替え） */
    .mi-row {
      width: 100%;
      display: flex;
      gap: 0.45rem;
      align-items: center;
      padding: 0.55rem 0.65rem;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-family: inherit;
      box-sizing: border-box;
    }
    .mi-row.selected { background: #fff7ed; }
    .mi-sort-col {
      display: flex;
      flex-direction: column;
      gap: 0.12rem;
      flex-shrink: 0;
    }
    .mi-sort-btn {
      padding: 0.06rem 0.28rem !important;
      font-size: 0.72rem !important;
      line-height: 1.15 !important;
      min-width: 30px;
      font-weight: 700;
    }
    .detail-placeholder { color: var(--muted); font-size: 0.88rem; line-height: 1.55; padding: 1.5rem 0.5rem; text-align: center; }
    .detail-panel {
      background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
      border-radius: var(--radius);
      border: 1px solid #dbe2ea;
      padding: 1rem;
      min-height: 200px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    .ops-register-head { display: flex; align-items: center; gap: 0.45rem; }
    .ops-register-guest { font-size: 0.84rem; color: #334155; font-weight: 600; }
    .ops-sec-title { margin: 0.7rem 0 0.45rem; font-size: 0.95rem; letter-spacing: 0.01em; color: #0f172a; }
    .ops-order-card { padding: 0.45rem; margin-bottom: 0.6rem; border-color: #e2e8f0; background: #fff; }
    .ops-order-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    .ops-order-table tr + tr td { border-top: 1px solid #f1f5f9; }
    .ops-order-table td { padding: 0.45rem 0.35rem; vertical-align: middle; }
    .ops-course-line-row td {
      background: #ede9fe;
      border-bottom-color: #ddd6fe !important;
    }
    .ops-line-name { font-weight: 700; color: #0f172a; margin-bottom: 0.15rem; }
    .ops-line-sub { font-size: 0.73rem; color: #64748b; margin-bottom: 0.35rem; }
    .ops-line-actions { display: flex; align-items: center; gap: 0.28rem; flex-wrap: wrap; }
    .ops-act-btn { min-width: 30px; padding: 0.12rem 0.32rem !important; font-weight: 700; }
    .ops-act-del { padding: 0.13rem 0.5rem !important; color: #b91c1c !important; border-color: #fecaca !important; background: #fff1f2 !important; }
    .ops-act-del:hover { color: #991b1b !important; border-color: #fda4af !important; }
    .ops-qty-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      padding: 0.14rem 0.45rem;
      border-radius: 999px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .ops-line-total { text-align: right; font-weight: 800; color: #0f766e; white-space: nowrap; }
    .ops-total-row { justify-content: space-between; margin-bottom: 0.3rem; }
    .ops-total-main {
      margin-top: 0.15rem;
      margin-bottom: 0.55rem;
      padding: 0.5rem 0.65rem;
      border-radius: 10px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
    }
    .ops-total-main strong { color: #c2410c; font-size: 1rem; }
    .ops-receipt-box { border-color: #e2e8f0; background: #fafbfc; }
    .ops-receipt-box-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .ops-receipt-box-title {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #0f172a;
    }
    .ops-receipt-list-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .ops-receipt-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; min-width: 420px; }
    .ops-receipt-table th,
    .ops-receipt-table td { padding: 0.4rem 0.35rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .ops-receipt-table th { color: var(--muted); font-weight: 700; font-size: 0.76rem; text-align: left; white-space: nowrap; }
    .ops-receipt-table td:last-child { white-space: nowrap; text-align: right; }
    .ops-receipt-table .rx-actions { display: inline-flex; gap: 0.35rem; flex-wrap: wrap; justify-content: flex-end; }

    /* 席マスタ行 */
    .pm-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: flex-start;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .pm-row .pm-mid { flex: 1.2; min-width: 140px; }
    .pm-row .pm-actions { flex: 1; min-width: 200px; }
    .pm-row:last-child { border-bottom: none; }
    .pm-thumb { flex-shrink: 0; width: 48px; height: 48px; border-radius: 8px; background: linear-gradient(135deg, #e5e7eb, #f3f4f6); border: 1px solid var(--border); }
    .pm-thumb.tables-master-grip {
      cursor: grab;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: var(--muted);
      line-height: 1;
    }
    .pm-thumb.tables-master-grip:active { cursor: grabbing; }
    .pm-row.tables-master-row.is-dragging { opacity: 0.45; }
    .pm-row.tables-master-row.drag-over {
      box-shadow: inset 0 0 0 2px var(--accent);
      background: var(--accent-soft);
    }
    .tables-master-qr {
      margin-top: 0.4rem;
    }
    .tables-master-qr-img {
      display: block;
      width: 128px;
      height: 128px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      object-fit: contain;
    }
    /* メニュー管理：カテゴリ行のドラッグ並べ替え */
    .pm-row-category .pm-cat-drag {
      flex-shrink: 0;
      align-self: stretch;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 2rem;
      margin-right: 0.15rem;
      cursor: grab;
      user-select: none;
      font-size: 1rem;
      line-height: 1;
      letter-spacing: -0.12em;
      color: var(--muted);
    }
    .pm-row-category .pm-cat-drag:active {
      cursor: grabbing;
    }
    .pm-row-category.is-dragging {
      opacity: 0.45;
    }
    .pm-row-category.drag-over {
      box-shadow: inset 0 0 0 2px var(--accent);
      background: var(--accent-soft);
    }
    .pm-actions { display: flex; flex-wrap: wrap; gap: 0.35rem; justify-content: flex-end; }

    /* キッチン */
    .kit-empty { text-align: center; padding: 2.5rem 1rem; color: var(--muted); }
    .kit-empty .ico { font-size: 2.5rem; margin-bottom: 0.5rem; opacity: 0.35; }
    .kit-timer-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-bottom: 0.55rem;
      min-height: 0;
    }
    .kit-timer-strip:empty { display: none; }
    .kit-timer-pill-wrap {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.35rem 0.55rem 0.35rem 0.72rem;
      border-radius: 999px;
      background: #fef9c3;
      border: 1px solid #eab308;
    }
    .kit-timer-pill {
      font-size: 0.82rem;
      font-weight: 800;
      color: #854d0e;
    }
    .kit-timer-pill-cancel {
      flex-shrink: 0;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.22rem 0.5rem;
      border-radius: 8px;
      border: 1px solid #ca8a04;
      background: #fff;
      color: #713f12;
      cursor: pointer;
      font-family: inherit;
      line-height: 1.2;
    }
    .kit-timer-pill-cancel:hover { background: #fffbeb; }
    .kit-timer-pill-cancel:active { transform: scale(0.98); }
    .kit-timer-toast {
      position: fixed;
      top: calc(var(--topbar-h) + 10px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      max-width: min(94vw, 440px);
      padding: 0.95rem 1.15rem;
      border-radius: var(--radius);
      background: var(--surface);
      border: 2px solid var(--accent);
      box-shadow: 0 10px 32px rgba(0,0,0,.14);
      animation: kitTimerToastIn 0.32s ease-out;
    }
    .kit-timer-toast-title {
      margin: 0 0 0.5rem;
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.04em;
    }
    .kit-timer-toast-list {
      max-height: min(40vh, 280px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .kit-timer-toast-line {
      margin: 0;
      padding: 0.55rem 0.7rem;
      border-radius: 8px;
      background: #fff7ed;
      border: 1px solid #fdba74;
      font-size: 0.9rem;
      font-weight: 800;
      text-align: center;
      line-height: 1.45;
      color: #9a3412;
    }
    .kit-timer-toast-ack {
      margin-top: 0.75rem;
      width: 100%;
      justify-content: center;
      font-weight: 800;
      border-color: var(--accent) !important;
      color: var(--accent) !important;
    }
    .kit-timer-toast[hidden] { display: none !important; }
    @keyframes kitTimerToastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="メインメニュー">
      <a href="/staff-app/__STORE_PATH__" class="snav" id="nav-home" data-nav-key="home" title="ホーム">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>

  <button type="button" class="app-footer staff-order-footer is-open" id="staffOrderFooterBtn" aria-live="polite">
    <span class="staff-footer-label">営業中</span>
    <small id="staffOrderFooterHint">補助は随時ここからお知らせします</small>
  </button>

  <div id="globalCallBanner" class="global-call-banner" style="display:none" role="status" aria-live="assertive"></div>

  <script>
    const STORE = __STORE_ID_JS__;
    __TABLE_DISPLAY_CODE__
    document.getElementById("sid").textContent = STORE;

    const api = (path, opt = {}) =>
      fetch(path, { ...opt, credentials: "include" }).then(async (r) => {
        if (r.status === 401) {
          location.assign("/staff-app/login?next=" + encodeURIComponent(location.pathname));
          throw new Error("ログインの有効期限が切れたか、権限がありません。再度ログインしてください。");
        }
        const raw = await r.text();
        let body = null;
        if (raw) {
          try {
            body = JSON.parse(raw);
          } catch (_) {
            body = null;
          }
        }
        let errMsg = "";
        if (body && typeof body === "object" && !Array.isArray(body)) {
          if (body.error != null && String(body.error) !== "") errMsg = String(body.error);
          else if (body.message != null && String(body.message) !== "") errMsg = String(body.message);
        }
        if (!r.ok) {
          if (r.status === 403) {
            throw new Error(
              "この店舗のデータを開けません（権限がありません）。ログインしたスタッフの店舗と、URL の /staff-app/〇〇 の店舗 ID が同じか確認してください。"
            );
          }
          throw new Error(errMsg || raw.trim().slice(0, 400) || r.statusText || String(r.status));
        }
        if (body === null || body === undefined) return {};
        if (typeof body === "object") return body;
        return {};
      });

    window.STAFF_ROLE = "staff";
    window.__staffMeLoaded = api("/auth/me")
      .then((m) => {
        const r = m && m.user && m.user.role;
        window.STAFF_ROLE = r === "manager" ? "manager" : "staff";
        return m;
      })
      .catch(() => ({}));

    document.getElementById("logout").onclick = async (e) => {
      e.preventDefault();
      await fetch("/auth/logout", { method: "POST", credentials: "include" });
      location.assign("/staff-app/login");
    };

    function log(t, options) {
      const el = document.getElementById("log");
      if (el) {
        el.textContent = t || "";
        const skipScroll = options && options.skipScroll;
        if (t && !skipScroll) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    }

    // Global reception call announcement (all staff pages)
    let __callAudio = null;
    function __initCallAudio() {
      if (!__callAudio) __callAudio = new (window.AudioContext || window.webkitAudioContext)();
      if (__callAudio && __callAudio.state === "suspended") __callAudio.resume();
    }
    function __playCallChime() {
      if (!__callAudio) return;
      const o = __callAudio.createOscillator();
      const g = __callAudio.createGain();
      o.type = "triangle";
      o.frequency.setValueAtTime(660, __callAudio.currentTime);
      g.gain.setValueAtTime(0.08, __callAudio.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, __callAudio.currentTime + 1.0);
      o.connect(g); g.connect(__callAudio.destination);
      o.start(); o.stop(__callAudio.currentTime + 1.0);
    }

    (function setupGlobalCallBanner() {
      const banner = document.getElementById("globalCallBanner");
      if (!banner) return;

      // Avoid double-announcement on reception page (it has its own persistent banner)
      if (location.pathname.includes("/reception")) return;

      let lastOn = false;
      let chimeTimer = null;

      function parseSeatFromCallType(callType) {
        const s = String(callType || "");
        if (s.startsWith("guest:")) return s.slice("guest:".length);
        return "";
      }
      function show(callType) {
        const seat = displayTableCode(parseSeatFromCallType(callType));
        banner.style.display = "block";
        banner.classList.add("is-on");
        banner.innerHTML = "";
        const msg = document.createElement("div");
        msg.style.fontWeight = "900";
        msg.style.fontSize = "1.02rem";
        msg.textContent = seat ? `⚠️ ${seat}番席からお呼び出しです。` : "⚠️ お呼び出しがあります。";
        const row = document.createElement("div");
        row.className = "row";
        row.style.cssText = "gap:.5rem;justify-content:center;margin-top:.35rem";
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "btn-ghost";
        btn.style.cssText = "background:#fff;color:#b91c1c;border-color:#fecaca;font-weight:900";
        btn.textContent = "確認";
        btn.onclick = async () => {
          try {
            await fetch(`/reception/${encodeURIComponent(STORE)}/event`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ type: "resetCall" }),
            });
          } catch (_) {}
          hide();
        };
        row.appendChild(btn);
        banner.appendChild(msg);
        banner.appendChild(row);

        if (!lastOn) {
          try { __initCallAudio(); } catch (_) {}
          __playCallChime();
        }
        if (!chimeTimer) {
          chimeTimer = setInterval(() => __playCallChime(), 5000);
        }
        lastOn = true;
      }
      function hide() {
        banner.classList.remove("is-on");
        banner.style.display = "none";
        banner.innerHTML = "";
        lastOn = false;
        if (chimeTimer) { clearInterval(chimeTimer); chimeTimer = null; }
      }

      // Enable audio on first user gesture anywhere
      window.addEventListener("pointerdown", () => { try { __initCallAudio(); } catch (_) {} }, { once: true });
      window.addEventListener("keydown", () => { try { __initCallAudio(); } catch (_) {} }, { once: true });

      async function poll() {
        try {
          const shiftKey = ""; // server will default to today's shift
          const url = `/reception/${encodeURIComponent(STORE)}/state?t=${Date.now()}` + (shiftKey ? `&shiftKey=${encodeURIComponent(shiftKey)}` : "");
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) return;
          // 304 では本文が無い。呼出表示を誤って消さない（複数台・ETag 対策）
          if (res.status === 304) return;
          const data = await res.json().catch(() => ({}));
          const on = Boolean(data && data.callReserved);
          const callType = data && typeof data.callType === "string" ? data.callType : "";
          if (on) show(callType);
          else hide();
        } catch (_) {}
      }
      poll();
      setInterval(poll, 3000);
    })();

    window.STAFF_SIDEBAR_NAV_KEYS_DEFAULT = [
      "home",
      "ops",
      "reception",
      "handy",
      "kitchen",
      "hallReady",
      "menu",
      "stock",
      "customers",
      "reports",
      "cashDrawer",
      "courses",
      "settings",
    ];

    function applyStaffSidebarPrefs() {
      const STORAGE_KEY = "staffSidebarNav_v1_" + STORE;
      const defaults = window.STAFF_SIDEBAR_NAV_KEYS_DEFAULT;
      const aside = document.querySelector("aside.sidebar");
      const spacer = aside && aside.querySelector(".snav-spacer");
      if (!aside || !spacer) return;
      const links = [...aside.querySelectorAll("a.snav[data-nav-key]")];
      const byKey = new Map();
      for (const a of links) {
        const k = a.getAttribute("data-nav-key");
        if (k) byKey.set(k, a);
      }
      let prefs = null;
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) prefs = JSON.parse(raw);
      } catch (_) {}
      const hidden = new Set(Array.isArray(prefs && prefs.hidden) ? prefs.hidden : []);
      let order = Array.isArray(prefs && prefs.order) ? [...prefs.order] : [...defaults];
      const seen = new Set(order);
      for (const k of defaults) {
        if (!seen.has(k)) {
          order.push(k);
          seen.add(k);
        }
      }
      for (const k of byKey.keys()) {
        if (!seen.has(k)) {
          order.push(k);
          seen.add(k);
        }
      }
      for (const k of order) {
        const el = byKey.get(k);
        if (!el) continue;
        aside.insertBefore(el, spacer);
        el.style.display = hidden.has(k) ? "none" : "";
      }
    }
    window.applyStaffSidebarPrefs = applyStaffSidebarPrefs;
    applyStaffSidebarPrefs();

    (function staffOrderFooter() {
      const btn = document.getElementById("staffOrderFooterBtn");
      const hint = document.getElementById("staffOrderFooterHint");
      const labelEl = btn && btn.querySelector(".staff-footer-label");
      if (!btn || !hint || !labelEl) return;

      async function refreshOrderFooter() {
        try {
          await window.__staffMeLoaded;
          const r = await api("/stores/" + encodeURIComponent(STORE) + "/order-footer");
          labelEl.textContent = r.labelJa || "—";
          btn.classList.remove("is-open", "is-closed", "is-paused");
          const v = r.variant;
          if (v === "open") btn.classList.add("is-open");
          else if (v === "paused") btn.classList.add("is-paused");
          else btn.classList.add("is-closed");
          const effOpen =
            typeof r.guestOperatingEffectiveOpen === "boolean"
              ? r.guestOperatingEffectiveOpen
              : Boolean(r.guestOperatingOpenByStaff);
          btn.dataset.guestOpen = effOpen ? "1" : "0";
          hint.textContent = effOpen
            ? "タップで営業時間外にします（卓QR停止・テイクアウトは次の枠以降の受取のみ）"
            : "タップで営業中にし、卓QRとテイクアウトを再開します";
        } catch (_) {}
      }
      refreshOrderFooter();
      setInterval(refreshOrderFooter, 120000);

      btn.addEventListener("click", async () => {
        try {
          await window.__staffMeLoaded;
          const cur = btn.dataset.guestOpen === "1";
          await api("/stores/" + encodeURIComponent(STORE) + "/order-pause", {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ guestOperatingOpenByStaff: !cur }),
          });
          await refreshOrderFooter();
        } catch (e) {
          alert(String(e && e.message ? e.message : e));
        }
      });
    })();

    (function navActive() {
      const p = location.pathname;
      const segs = p.split("/").filter(Boolean);
      let id = "nav-home";
      if (p.includes("/ops")) id = "nav-ops";
      else if (p.includes("/reception")) id = "nav-reception";
      else if (p.includes("/handy")) id = "nav-handy";
      else if (p.includes("/hall-ready")) id = "nav-hall-ready";
      else if (p.includes("/kitchen")) id = "nav-kitchen";
      else if (p.includes("/menu")) id = "nav-menu";
      else if (p.includes("/stock")) id = "nav-stock";
      else if (p.includes("/customers")) id = "nav-customers";
      else if (p.includes("/reports")) id = "nav-reports";
      else if (p.includes("/cash-drawer")) id = "nav-cash-drawer";
      else if (p.includes("/courses")) id = "nav-courses";
      else if (p.includes("/settings")) {
        id = "nav-settings";
      } else if (segs.length >= 2 && segs[0] === "staff-app" && !segs[2]) id = "nav-home";
      const n = document.getElementById(id);
      if (n) n.classList.add("nav-active");
    })();

    __PAGE_SCRIPT__
  </script>
