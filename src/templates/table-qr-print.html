<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>__STORE_NAME__ 席QR印刷</title>
  <style>
    :root {
      --ink: #1a1d24;
      --muted: #5b6472;
      --line: #c5cad3;
      --paper: #fff;
    }
    * { box-sizing: border-box; }
    html { background: #e8eaef; }
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic UI", "Segoe UI", sans-serif;
      color: var(--ink);
      line-height: 1.35;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1rem;
      background: rgba(26, 29, 36, 0.94);
      color: #f4f5f7;
    }
    .toolbar p { margin: 0; font-size: 0.82rem; opacity: 0.92; max-width: 42rem; }
    .btn-print {
      border: 1px solid #d4a017;
      background: transparent;
      color: #fff;
      font-weight: 700;
      padding: 0.5rem 1.15rem;
      border-radius: 2px;
      cursor: pointer;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .btn-print:hover { background: rgba(212, 160, 23, 0.22); }

    .sheet-stack {
      padding: 1.25rem 0 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .a4-sheet {
      width: 210mm;
      min-height: 297mm;
      background: var(--paper);
      padding: 8mm;
      box-shadow: 0 4px 22px rgba(0, 0, 0, 0.12);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 0;
    }

    .seat-cell {
      border: 1px dashed var(--line);
      padding: 3.5mm 3mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      text-align: center;
      min-height: 0;
      overflow: hidden;
    }
    .seat-cell.is-empty {
      border-color: transparent;
    }

    .seat-lead {
      margin: 0;
      font-size: 8.5pt;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--ink);
    }
    .seat-name {
      margin: 1.5mm 0 0;
      font-size: 13pt;
      font-weight: 800;
      letter-spacing: 0.06em;
      line-height: 1.2;
    }
    .seat-qr {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 0;
      padding: 1.5mm 0;
    }
    .seat-qr svg {
      width: 38mm;
      height: 38mm;
      max-width: 100%;
      max-height: 100%;
      display: block;
    }
    .seat-tail {
      margin: 0;
      font-size: 7.2pt;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.02em;
      line-height: 1.35;
    }

    .empty-msg {
      margin: 3rem auto;
      max-width: 28rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media print {
      html { background: #fff; }
      .toolbar { display: none !important; }
      .sheet-stack {
        padding: 0;
        gap: 0;
      }
      .a4-sheet {
        width: auto;
        min-height: auto;
        height: 297mm;
        box-shadow: none;
        margin: 0;
        page-break-after: always;
        break-after: page;
      }
      .a4-sheet:last-child {
        page-break-after: auto;
        break-after: auto;
      }
      @page {
        size: A4 portrait;
        margin: 0;
      }
    }

    @media screen and (max-width: 900px) {
      .a4-sheet {
        width: 100%;
        min-height: auto;
        aspect-ratio: 210 / 297;
      }
      .seat-qr svg {
        width: min(38mm, 28vw);
        height: min(38mm, 28vw);
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <p>__TOOLBAR_NOTE__</p>
    <button type="button" class="btn-print" onclick="window.print()">印刷 / PDF保存</button>
  </div>
  __SHEETS__
</body>
</html>
