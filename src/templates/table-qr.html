<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>卓 — __PUBLIC_CODE_HTML__</title>
  <style>
    :root { --bg: #0f1419; --card: #161c24; --text: #e8eef4; --muted: #8b9aab; --accent: #c9a227; --line: #2a3340; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 1rem 1rem calc(1rem + env(safe-area-inset-bottom)); }
    .wrap { max-width: 26rem; margin: 0 auto; }
    h1 { font-size: 1.15rem; margin: 0 0 0.35rem; font-weight: 700; }
    .sub { color: var(--muted); font-size: 0.85rem; margin: 0 0 1rem; line-height: 1.45; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 1rem 1rem 1.1rem; margin-bottom: 0.85rem; }
    label.lbl { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.35rem; }
    input[type="number"] {
      width: 100%; padding: 0.55rem 0.65rem; border-radius: 8px; border: 1px solid var(--line);
      background: #0f141c; color: var(--text); font-size: 1rem; margin-bottom: 0.5rem;
    }
    .course-list { display: flex; flex-direction: column; gap: 0.45rem; margin-top: 0.35rem; }
    .course-list label.row {
      display: flex; align-items: flex-start; gap: 0.5rem; padding: 0.5rem 0.55rem; border-radius: 8px;
      border: 1px solid var(--line); background: #1a222c; cursor: pointer; font-size: 0.88rem;
    }
    .course-list label.row:has(input:checked) { border-color: var(--accent); background: #1e2735; }
    .course-list input { margin-top: 0.2rem; flex-shrink: 0; }
    .course-meta { font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; }
    button.primary {
      width: 100%; padding: 0.7rem; border: none; border-radius: 10px; background: var(--accent); color: #1a1408;
      font-weight: 800; font-size: 0.95rem; cursor: pointer; margin-top: 0.35rem;
    }
    button.primary:disabled { opacity: 0.45; cursor: not-allowed; }
    button.secondary {
      width: 100%; padding: 0.7rem; border-radius: 10px; background: transparent; color: var(--text);
      font-weight: 700; font-size: 0.92rem; cursor: pointer; margin-top: 0.5rem;
      border: 1px solid var(--line);
    }
    button.secondary:disabled { opacity: 0.45; cursor: not-allowed; }
    #err { color: #ffb4b4; font-size: 0.85rem; margin-top: 0.65rem; display: none; }
    #loading { color: var(--muted); text-align: center; padding: 2rem 0; }
    .hint { font-size: 0.72rem; color: var(--muted); margin-top: 0.75rem; line-height: 1.5; }
    #choiceIntro { margin: 0 0 0.75rem; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <p id="loading">読み込み中…</p>
    <div id="main" style="display:none">
      <h1 id="title">ご注文</h1>
      <p class="sub" id="deskLine"></p>
      <div class="card" id="choiceCard" style="display: none">
        <p id="choiceIntro"></p>
        <div id="sessionPickWrap" style="display: none; margin-bottom: 0.65rem"></div>
        <button type="button" class="primary" id="btnJoinShared">同じ会計で続ける（注文を合算）</button>
        <button type="button" class="secondary" id="btnSeparate">別の会計で始める</button>
      </div>
      <div class="card" id="formCard">
        <label class="lbl" for="guestCount">人数（延べ）</label>
        <input id="guestCount" type="number" min="1" max="99" step="1" value="2" inputmode="numeric" />
        <label class="lbl" for="childCount">うち子供の人数（任意）</label>
        <input id="childCount" type="number" min="0" max="99" step="1" value="0" inputmode="numeric" />
        <label class="lbl">メニューの種類</label>
        <div class="course-list" id="courseRadios"></div>
        <button type="button" class="primary" id="btnStart">注文を始める</button>
        <p class="hint" id="hintText">
          初めての方は人数とメニュー種類を選んでから始めてください。
        </p>
      </div>
      <p id="err" role="alert"></p>
    </div>
  </div>
  <script>
    const code = __PUBLIC_CODE_JS__;

    function esc(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function goGuest(token) {
      location.replace("/guest-app/" + encodeURIComponent(token));
    }

    function taxRateFactor(ratePercent) {
      const r = Number(ratePercent || 0);
      if (!Number.isFinite(r) || r <= 0) return 1;
      return 1 + r / 100;
    }
    function netYenFromGross(grossYen, taxRatePercent) {
      const g = Number(grossYen) || 0;
      return Math.round(g / taxRateFactor(taxRatePercent));
    }

    function renderCourseRadios(courses, store) {
      const box = document.getElementById("courseRadios");
      box.innerHTML = "";
      const courseMode = store && store.coursePriceTaxMode === "exclusive" ? "exclusive" : "inclusive";
      const taxRatePercent = store && store.taxRatePercent != null ? Number(store.taxRatePercent) : 10;
      const suffix = courseMode === "exclusive" ? "（税抜）" : "（税込）";
      const noneId = "course-none";
      const none = document.createElement("label");
      none.className = "row";
      none.innerHTML =
        "<input type=\"radio\" name=\"coursePick\" id=\"" +
        noneId +
        "\" value=\"\" checked /><div><strong>単品メニュー</strong><div class=\"course-meta\">コースなし・全メニューから注文</div></div>";
      box.appendChild(none);
      for (const c of courses || []) {
        const tiers = c.priceTiers || [];
        for (let i = 0; i < tiers.length; i++) {
          const t = tiers[i];
          const id = "course-" + c.id + "-" + t.id;
          const val = c.id + "|" + t.id;
          const adultUnit =
            courseMode === "exclusive" ? netYenFromGross(t.pricePerPerson, taxRatePercent) : Number(t.pricePerPerson);
          const childUnit =
            t.childPricePerPerson != null
              ? courseMode === "exclusive"
                ? netYenFromGross(t.childPricePerPerson, taxRatePercent)
                : Number(t.childPricePerPerson)
              : null;
          const childBit =
            childUnit != null ? " · 子 " + Number(childUnit).toLocaleString("ja-JP") + "円/人" + suffix : "";
          const lab = document.createElement("label");
          lab.className = "row";
          lab.innerHTML =
            "<input type=\"radio\" name=\"coursePick\" id=\"" +
            esc(id) +
            "\" value=\"" +
            esc(val) +
            "\" /><div><strong>" +
            esc(c.name) +
            "</strong><div class=\"course-meta\">" +
            t.durationMinutes +
            "分 · 大人 " +
            Number(adultUnit).toLocaleString("ja-JP") +
            "円/人" +
            suffix +
            childBit +
            " · " +
            esc(c.kind || "") +
            "</div></div>";
          box.appendChild(lab);
        }
      }
    }

    function fmtSessionWhen(iso) {
      try {
        const d = new Date(iso);
        if (!isFinite(d.getTime())) return "";
        return d.toLocaleString("ja-JP", {
          month: "numeric",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      } catch (_) {
        return "";
      }
    }

    (async () => {
      const loading = document.getElementById("loading");
      const main = document.getElementById("main");
      const err = document.getElementById("err");
      try {
        const r = await fetch("/public/tables/" + encodeURIComponent(code));
        const j = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(j.error || r.statusText);

        const openList =
          Array.isArray(j.openSessions) && j.openSessions.length > 0
            ? j.openSessions
            : j.session && j.session.guestToken
              ? [j.session]
              : [];

        function sessionMenuSummary(s) {
          if (s && s.course && s.course.id) {
            return "「" + String(s.course.name || "コース") + "」コース";
          }
          return "単品メニュー";
        }

        function pickedOpenSession() {
          if (openList.length === 0) return null;
          if (openList.length === 1) return openList[0];
          const sel = document.querySelector("input[name=\"sessionPick\"]:checked");
          if (sel && sel.value) {
            return openList.find((s) => s.guestToken === sel.value) || openList[0];
          }
          return openList[0];
        }

        async function startSeparateSessionFrom(ref) {
          const gc = Math.max(1, Math.min(99, Math.floor(Number(ref.guestCount) || 2)));
          const childN = Math.max(0, Math.min(gc, Math.floor(Number(ref.childCount) || 0)));
          const body = {
            guestCount: gc,
            childCount: childN,
            courseId: ref.course && ref.course.id ? ref.course.id : null,
            separateBill: true,
          };
          if (ref.coursePriceTier && ref.coursePriceTier.id) {
            body.coursePriceTierId = ref.coursePriceTier.id;
          }
          const r2 = await fetch("/public/tables/" + encodeURIComponent(code) + "/session", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          const j2 = await r2.json().catch(() => ({}));
          if (!r2.ok) throw new Error(j2.error || r2.statusText);
          if (j2.guestToken) goGuest(j2.guestToken);
          else throw new Error("トークンを取得できませんでした");
        }

        loading.style.display = "none";
        main.style.display = "block";
        const dispName =
          (j.table && (j.table.displayName || j.table.name)) || (j.table && j.table.displayCode) || code;
        const dispCode = (j.table && j.table.displayCode) || code;
        document.getElementById("title").textContent = dispName;
        renderCourseRadios(j.courses || [], j.store || {});

        const choiceCard = document.getElementById("choiceCard");
        const formCard = document.getElementById("formCard");
        const sessionPickWrap = document.getElementById("sessionPickWrap");
        const choiceIntro = document.getElementById("choiceIntro");
        const btnJoin = document.getElementById("btnJoinShared");
        const btnSep = document.getElementById("btnSeparate");

        if (openList.length > 0) {
          choiceCard.style.display = "block";
          formCard.style.display = "none";
          const ref0 = openList[0];
          document.getElementById("deskLine").textContent =
            "卓コード " + dispCode + " · すでに" + sessionMenuSummary(ref0) + "で注文中です。";
          choiceIntro.innerHTML =
            "この卓では<strong>すでに注文が始まっています</strong>（" +
            esc(sessionMenuSummary(ref0)) +
            "）。<br />同伴と<strong>同じ会計（お支払いをまとめる）</strong>ですか？それとも<strong>別々の会計</strong>ですか？";
          if (openList.length > 1) {
            sessionPickWrap.style.display = "block";
            sessionPickWrap.innerHTML = openList
              .map(function (s, i) {
                const when = s.openedAt ? fmtSessionWhen(s.openedAt) : "";
                const lab =
                  sessionMenuSummary(s) +
                  (when ? " · " + when : "") +
                  " · " +
                  Number(s.guestCount || 0) +
                  "名" +
                  (Number(s.childCount || 0) > 0 ? "（子" + s.childCount + "）" : "");
                const sid = "sessPick-" + i;
                return (
                  "<label class=\"row\" style=\"cursor:pointer\"><input type=\"radio\" name=\"sessionPick\" id=\"" +
                  esc(sid) +
                  "\" value=\"" +
                  esc(s.guestToken) +
                  "\"" +
                  (i === 0 ? " checked" : "") +
                  " /><div><strong>会計 " +
                  (i + 1) +
                  "</strong><div class=\"course-meta\">" +
                  esc(lab) +
                  "</div></div></label>"
                );
              })
              .join("");
            sessionPickWrap.querySelectorAll("input[name=\"sessionPick\"]").forEach((inp) => {
              inp.addEventListener("change", () => {
                const ref = pickedOpenSession();
                if (!ref) return;
                choiceIntro.innerHTML =
                  "この卓では<strong>すでに注文が始まっています</strong>（" +
                  esc(sessionMenuSummary(ref)) +
                  "）。<br />同伴と<strong>同じ会計（お支払いをまとめる）</strong>ですか？それとも<strong>別々の会計</strong>ですか？";
              });
            });
          } else {
            sessionPickWrap.style.display = "none";
            sessionPickWrap.innerHTML = "";
          }

          btnJoin.onclick = function () {
            const ref = pickedOpenSession();
            if (!ref || !ref.guestToken) return;
            goGuest(ref.guestToken);
          };
          btnSep.onclick = async function () {
            err.style.display = "none";
            const ref = pickedOpenSession();
            if (!ref) return;
            btnJoin.disabled = true;
            btnSep.disabled = true;
            btnSep.textContent = "準備中…";
            try {
              await startSeparateSessionFrom(ref);
            } catch (e) {
              err.textContent = String(e.message || e);
              err.style.display = "block";
              btnJoin.disabled = false;
              btnSep.disabled = false;
              btnSep.textContent = "別の会計で始める";
            }
          };
        } else {
          choiceCard.style.display = "none";
          formCard.style.display = "block";
          document.getElementById("deskLine").textContent =
            "卓コード " + dispCode + " · 人数とメニュー種類を選んでください。";
        }

        document.getElementById("btnStart").onclick = async () => {
          err.style.display = "none";
          const gc = Number(document.getElementById("guestCount").value);
          const childN = Number(document.getElementById("childCount").value);
          if (!Number.isInteger(gc) || gc < 1 || gc > 99) {
            err.textContent = "人数は1〜99の整数で入力してください";
            err.style.display = "block";
            return;
          }
          if (!Number.isInteger(childN) || childN < 0 || childN > gc) {
            err.textContent = "子供の人数は0〜人数の整数で入力してください";
            err.style.display = "block";
            return;
          }
          const picked = document.querySelector("input[name=\"coursePick\"]:checked");
          const courseVal = picked ? picked.value : "";
          let courseId = null;
          let coursePriceTierId = undefined;
          if (courseVal && String(courseVal).trim()) {
            const parts = String(courseVal).split("|");
            courseId = parts[0] || null;
            if (parts[1]) coursePriceTierId = parts[1];
          }
          const btn = document.getElementById("btnStart");
          btn.disabled = true;
          try {
            const body = { guestCount: gc, childCount: childN, courseId: courseId };
            if (coursePriceTierId) body.coursePriceTierId = coursePriceTierId;
            const r2 = await fetch("/public/tables/" + encodeURIComponent(code) + "/session", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            const j2 = await r2.json().catch(() => ({}));
            if (!r2.ok) throw new Error(j2.error || r2.statusText);
            if (j2.guestToken) goGuest(j2.guestToken);
            else throw new Error("トークンを取得できませんでした");
          } catch (e) {
            err.textContent = String(e.message || e);
            err.style.display = "block";
            btn.disabled = false;
          }
        };
      } catch (e) {
        loading.innerHTML = esc(String(e.message || e)) || "卓情報を取得できませんでした。";
      }
    })();
  </script>
</body>
</html>
