<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>テイクアウト注文</title>
    <style>
      :root {
        --bg: #0b1020;
        --surface: rgba(255, 255, 255, 0.06);
        --surface2: rgba(255, 255, 255, 0.08);
        --line: rgba(255, 255, 255, 0.14);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --accent: #fb923c;
        --accent2: #f97316;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          "Noto Sans JP",
          "Hiragino Sans",
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(840px 520px at 12% 0%, rgba(249, 115, 22, 0.16), transparent 60%),
          radial-gradient(920px 620px at 100% 20%, rgba(56, 189, 248, 0.12), transparent 55%),
          var(--bg);
      }
      a {
        color: inherit;
      }
      .muted {
        color: var(--muted);
      }
      .go-topbar {
        position: sticky;
        top: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        padding: 0.85rem 0.85rem;
        padding-top: max(0.85rem, env(safe-area-inset-top));
        backdrop-filter: blur(10px);
        background: rgba(0, 0, 0, 0.25);
        border-bottom: 1px solid var(--line);
      }
      .go-brand h1 {
        margin: 0;
        font-size: 1rem;
        font-weight: 900;
        letter-spacing: 0.02em;
      }
      .go-brand .sub {
        margin-top: 0.15rem;
        font-size: 0.76rem;
        color: var(--muted);
      }
      .go-topicons {
        display: flex;
        align-items: center;
        gap: 0.35rem;
      }
      .go-iconbtn {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .go-iconbtn svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .go-tabs-wrap {
        position: sticky;
        top: 64px;
        z-index: 20;
        background: rgba(0, 0, 0, 0.12);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--line);
      }
      .go-tabs {
        display: flex;
        gap: 0.4rem;
        padding: 0.6rem 0.75rem;
        overflow: auto;
      }
      .go-tab {
        white-space: nowrap;
        padding: 0.38rem 0.7rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-size: 0.82rem;
        cursor: pointer;
      }
      .go-tab.is-active {
        background: rgba(249, 115, 22, 0.18);
        border-color: rgba(249, 115, 22, 0.45);
        color: rgba(255, 255, 255, 0.92);
        font-weight: 800;
      }
      .go-menu-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.65rem;
        padding: 0.85rem 0.85rem 6.4rem;
        padding-bottom: calc(6.4rem + env(safe-area-inset-bottom));
      }
      @media (min-width: 560px) {
        .go-menu-grid {
          grid-template-columns: 1fr 1fr;
        }
      }
      .go-card {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.06);
        padding: 0.75rem;
      }
      .go-card .ttl {
        font-weight: 900;
        letter-spacing: 0.01em;
      }
      .go-card .desc {
        color: var(--muted);
        font-size: 0.78rem;
        line-height: 1.35;
        margin-top: 0.25rem;
        white-space: pre-wrap;
      }
      .go-card .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        margin-top: 0.55rem;
      }
      .pill {
        font-size: 0.78rem;
        padding: 0.2rem 0.5rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.12);
        color: rgba(255, 255, 255, 0.88);
      }
      button {
        font: inherit;
      }
      .btn-primary {
        border: none;
        border-radius: 12px;
        padding: 0.55rem 0.8rem;
        color: #0b1020;
        font-weight: 900;
        cursor: pointer;
        background: linear-gradient(180deg, var(--accent), var(--accent2));
      }
      .btn-ghost {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.52rem 0.75rem;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        cursor: pointer;
      }
      .go-cart {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.65rem;
        padding: 0.75rem 0.85rem;
        padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
        background: rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(10px);
        border-top: 1px solid var(--line);
      }
      .go-cart .info {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 0.12rem;
        cursor: pointer;
      }
      .go-cart .count {
        font-weight: 900;
      }
      .go-cart .sum {
        color: var(--muted);
        font-size: 0.86rem;
      }
      .go-cart .submit {
        min-width: 110px;
      }
      .go-cart .submit[disabled] {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .toast {
        position: fixed;
        left: 50%;
        bottom: 86px;
        transform: translateX(-50%);
        z-index: 60;
        padding: 0.55rem 0.75rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.6);
        color: rgba(255, 255, 255, 0.92);
        font-size: 0.82rem;
        max-width: min(92vw, 520px);
        text-align: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.18s;
      }
      .toast.is-on {
        opacity: 1;
      }
      .sheet {
        position: fixed;
        inset: 0;
        z-index: 70;
        display: none;
      }
      .sheet.is-on {
        display: block;
      }
      .sheet-bg {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
      }
      .sheet-panel {
        position: absolute;
        left: 50%;
        bottom: 0;
        transform: translateX(-50%);
        width: min(720px, 100%);
        max-height: min(86vh, 760px);
        border-radius: 18px 18px 0 0;
        background: rgba(20, 24, 40, 0.98);
        border: 1px solid var(--line);
        overflow: hidden;
      }
      .sheet-head {
        position: sticky;
        top: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        padding: 0.85rem 0.9rem;
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--line);
      }
      .sheet-title {
        margin: 0;
        font-size: 1rem;
        font-weight: 900;
      }
      .sheet-close {
        width: 38px;
        height: 38px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        cursor: pointer;
      }
      .sheet-body {
        padding: 0.85rem 0.9rem 6.2rem;
        overflow: auto;
        max-height: min(86vh, 760px);
      }
      .sheet-bar {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.65rem;
        padding: 0.75rem 0.9rem;
        padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
        background: rgba(0, 0, 0, 0.55);
        border-top: 1px solid var(--line);
      }
      .sheet-sum {
        font-weight: 900;
      }
      label {
        display: block;
        margin: 0.55rem 0 0.25rem;
        font-size: 0.8rem;
        color: var(--muted);
      }
      input,
      textarea {
        width: 100%;
        padding: 0.55rem 0.65rem;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font: inherit;
      }
      textarea {
        min-height: 74px;
        resize: vertical;
      }
      .cart-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.65rem;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding: 0.65rem 0;
      }
      .cart-line:first-child {
        border-top: none;
        padding-top: 0;
      }
      .cart-line .nm {
        font-weight: 900;
      }
      .cart-line .sub {
        color: var(--muted);
        font-size: 0.76rem;
        margin-top: 0.12rem;
      }
      .qty {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
      }
      .qty button {
        width: 34px;
        height: 34px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        cursor: pointer;
      }
      .ok {
        border: 1px solid rgba(34, 197, 94, 0.45);
        background: rgba(34, 197, 94, 0.16);
        padding: 0.7rem;
        border-radius: 14px;
        margin-top: 0.65rem;
      }
      .err {
        border: 1px solid rgba(244, 63, 94, 0.45);
        background: rgba(244, 63, 94, 0.14);
        padding: 0.7rem;
        border-radius: 14px;
        margin-top: 0.65rem;
      }
    </style>
  </head>
  <body>
    <header class="go-topbar">
      <div class="go-topicons">
        <button type="button" class="go-iconbtn" id="btnCart" aria-label="カートを開く" title="カートを開く">
          <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg>
        </button>
      </div>
      <div class="go-brand">
        <h1 id="title">テイクアウト注文</h1>
        <div class="sub" id="subTitle">税率8%（店頭支払い）</div>
      </div>
      <div class="go-topicons">
        <span class="pill" style="border:1px solid var(--line);padding:.2rem .5rem;border-radius:999px;background:rgba(255,255,255,.04);font-size:.76rem">8%</span>
      </div>
    </header>

    <div id="msg" style="padding: 0.75rem 0.85rem"></div>

    <div class="go-tabs-wrap">
      <div class="go-tabs" id="catTabs"></div>
    </div>
    <div id="menu" class="go-menu-grid"></div>

    <footer class="go-cart" id="cartFooter">
      <div class="info" id="cartFooterInfo" role="button" tabindex="0" aria-label="カートを開く">
        <div class="count" id="cartCount">カート 0点</div>
        <div class="sum" id="cartSum">¥0</div>
      </div>
      <button class="btn-primary submit" id="btnCheckout" disabled type="button">注文する</button>
    </footer>
    <div class="toast" id="toast"></div>

    <div id="cartSheet" class="sheet" aria-hidden="true">
      <div class="sheet-bg" id="cartSheetBg" tabindex="-1"></div>
      <div class="sheet-panel" role="dialog" aria-modal="true" aria-labelledby="cartSheetTitle">
        <div class="sheet-head">
          <h2 class="sheet-title" id="cartSheetTitle">カート</h2>
          <button class="sheet-close" type="button" id="cartSheetClose" aria-label="閉じる">×</button>
        </div>
        <div class="sheet-body">
          <div id="cartLines"></div>
          <div class="muted" style="font-size:.74rem;line-height:1.35;margin-top:.65rem">
            お客様情報・受取日時は「注文する」押下後に入力します。
          </div>
        </div>
        <div class="sheet-bar">
          <div class="sheet-sum" id="cartSheetSum">¥0</div>
          <button class="btn-primary" id="cartSheetCheckoutBtn" type="button">注文する</button>
        </div>
      </div>
    </div>

    <div id="checkoutSheet" class="sheet" aria-hidden="true">
      <div class="sheet-bg" id="checkoutSheetBg" tabindex="-1"></div>
      <div class="sheet-panel" role="dialog" aria-modal="true" aria-labelledby="checkoutSheetTitle">
        <div class="sheet-head">
          <h2 class="sheet-title" id="checkoutSheetTitle">ご注文手続き</h2>
          <button class="sheet-close" type="button" id="checkoutSheetClose" aria-label="閉じる">×</button>
        </div>
        <div class="sheet-body">
          <div class="muted" style="font-size:.78rem;line-height:1.35;margin-top:-0.1rem">
            受取日時・お客様情報は必須です（確認の連絡に使用します）
          </div>

          <label for="pickupAt">受取日時</label>
          <input id="pickupAt" type="datetime-local" />

          <label for="name">お名前</label>
          <input id="name" type="text" autocomplete="name" maxlength="100" placeholder="例）山田 太郎" />

          <label for="phone">電話番号</label>
          <input id="phone" type="tel" autocomplete="tel" maxlength="20" placeholder="例）09012345678" />

          <label for="email">メールアドレス</label>
          <input id="email" type="email" autocomplete="email" maxlength="200" placeholder="例）taro@example.com" />

          <label for="note">備考（任意）</label>
          <textarea id="note" placeholder="アレルギー・到着予定など"></textarea>

          <div style="margin-top:.75rem;border-top:1px solid rgba(255,255,255,.1);padding-top:.75rem">
            <div style="font-weight:900;margin-bottom:.4rem">注文内容</div>
            <div id="checkoutLines"></div>
          </div>
        </div>
        <div class="sheet-bar">
          <div class="sheet-sum" id="checkoutSum">¥0</div>
          <button class="btn-primary" id="btnSubmit" type="button">確定</button>
        </div>
      </div>
    </div>

    <script>
      const STORE_ID = __STORE_ID_JS__;
      const PROFILE_KEY = "order-customer-profile-v1";

      const api = (path, opt) =>
        fetch(path, opt).then(async (r) => {
          const j = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(j.error || r.statusText || String(r.status));
          return j;
        });

      /** @type {Map<string, {menuItemId:string,name:string,unitPrice:number,qty:number}>} */
      const cart = new Map();
      let menuData = null;
      let activeCatId = "";

      function yen(n) {
        return "¥" + Number(n || 0).toLocaleString("ja-JP");
      }
      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function toast(t) {
        const el = document.getElementById("toast");
        if (!el) return;
        el.textContent = t || "";
        el.classList.toggle("is-on", !!t);
        if (t) setTimeout(() => el.classList.remove("is-on"), 1500);
      }
      function setMsg(kind, text) {
        const el = document.getElementById("msg");
        if (!el) return;
        if (!text) return (el.innerHTML = "");
        el.innerHTML = "<div class=\"" + (kind === "ok" ? "ok" : "err") + "\">" + esc(text) + "</div>";
      }

      function readProfile() {
        try {
          const raw = localStorage.getItem(PROFILE_KEY);
          if (!raw) return { name: "", phone: "", email: "" };
          const p = JSON.parse(raw);
          return {
            name: p && typeof p.name === "string" ? p.name : "",
            phone: p && typeof p.phone === "string" ? p.phone : "",
            email: p && typeof p.email === "string" ? p.email : "",
          };
        } catch (_) {
          return { name: "", phone: "", email: "" };
        }
      }
      function writeProfile(next) {
        try {
          localStorage.setItem(
            PROFILE_KEY,
            JSON.stringify({
              name: String(next.name || "").trim().slice(0, 100),
              phone: String(next.phone || "").trim().slice(0, 30),
              email: String(next.email || "").trim().slice(0, 200),
              at: Date.now(),
            })
          );
        } catch (_) {}
      }

      function cartRows() {
        return [...cart.values()].filter((x) => x.qty > 0);
      }
      function cartTotal() {
        let total = 0;
        for (const r of cartRows()) total += Number(r.unitPrice || 0) * Number(r.qty || 0);
        return total;
      }
      function renderFooter() {
        const rows = cartRows();
        const cnt = rows.reduce((s, r) => s + Number(r.qty || 0), 0);
        const total = cartTotal();
        document.getElementById("cartCount").textContent = "カート " + cnt + "点";
        document.getElementById("cartSum").textContent = yen(total);
        const btn = document.getElementById("btnCheckout");
        btn.disabled = cnt <= 0;
      }

      function openSheet(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.add("is-on");
        el.setAttribute("aria-hidden", "false");
      }
      function closeSheet(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.remove("is-on");
        el.setAttribute("aria-hidden", "true");
      }

      function renderCartLines(hostId, allowEdit) {
        const host = document.getElementById(hostId);
        if (!host) return;
        const rows = cartRows();
        if (!rows.length) {
          host.innerHTML = "<div class=\"muted\">カートは空です</div>";
          return;
        }
        host.innerHTML = rows
          .map((r) => {
            const lineTotal = Number(r.unitPrice || 0) * Number(r.qty || 0);
            return (
              "<div class=\"cart-line\">" +
              "<div style=\"min-width:0\">" +
              "<div class=\"nm\">" +
              esc(r.name) +
              "</div>" +
              "<div class=\"sub\">" +
              yen(r.unitPrice) +
              " / 点 · " +
              yen(lineTotal) +
              "</div>" +
              "</div>" +
              (allowEdit
                ? "<div class=\"qty\"><button type=\"button\" data-dec=\"" +
                  esc(r.menuItemId) +
                  "\">-</button><span>×" +
                  Number(r.qty || 0) +
                  "</span><button type=\"button\" data-inc=\"" +
                  esc(r.menuItemId) +
                  "\">+</button></div>"
                : "<div class=\"pill\">×" + Number(r.qty || 0) + "</div>") +
              "</div>"
            );
          })
          .join("");
        if (!allowEdit) return;
        host.querySelectorAll("[data-inc]").forEach((b) => {
          b.onclick = () => {
            const id = b.getAttribute("data-inc");
            const r = cart.get(id);
            if (!r) return;
            r.qty += 1;
            renderAllCartUis();
          };
        });
        host.querySelectorAll("[data-dec]").forEach((b) => {
          b.onclick = () => {
            const id = b.getAttribute("data-dec");
            const r = cart.get(id);
            if (!r) return;
            r.qty = Math.max(0, r.qty - 1);
            if (r.qty === 0) cart.delete(id);
            renderAllCartUis();
          };
        });
      }

      function renderAllCartUis() {
        const total = cartTotal();
        renderFooter();
        document.getElementById("cartSheetSum").textContent = yen(total);
        document.getElementById("checkoutSum").textContent = yen(total);
        renderCartLines("cartLines", true);
        renderCartLines("checkoutLines", false);
      }

      function renderTabs() {
        const el = document.getElementById("catTabs");
        if (!el) return;
        const cats = menuData && menuData.categories ? menuData.categories : [];
        el.innerHTML = "";
        const allBtn = document.createElement("button");
        allBtn.type = "button";
        allBtn.className = "go-tab" + (!activeCatId ? " is-active" : "");
        allBtn.textContent = "すべて";
        allBtn.onclick = () => {
          activeCatId = "";
          renderTabs();
          renderMenu();
        };
        el.appendChild(allBtn);
        for (const c of cats) {
          const b = document.createElement("button");
          b.type = "button";
          b.className = "go-tab" + (activeCatId === c.id ? " is-active" : "");
          b.textContent = c.name;
          b.onclick = () => {
            activeCatId = c.id;
            renderTabs();
            renderMenu();
          };
          el.appendChild(b);
        }
      }

      function renderMenu() {
        const el = document.getElementById("menu");
        if (!el) return;
        if (!menuData) return (el.innerHTML = "<div class=\"muted\">読み込み中…</div>");
        const cats = menuData.categories || [];
        const rows = [];
        for (const c of cats) {
          if (activeCatId && c.id !== activeCatId) continue;
          for (const it of c.items || []) {
            if (it.sellKind === "set") continue;
            rows.push({ cat: c, it });
          }
        }
        if (!rows.length) {
          el.innerHTML = "<div class=\"muted\">現在ネット注文できる商品がありません</div>";
          return;
        }
        el.innerHTML = rows
          .map(({ cat, it }) => {
            return (
              "<section class=\"go-card\" data-cat=\"" +
              esc(cat.id) +
              "\">" +
              "<div class=\"ttl\">" +
              esc(it.name) +
              "</div>" +
              (it.description ? "<div class=\"desc\">" + esc(it.description) + "</div>" : "") +
              "<div class=\"row\"><span class=\"pill\">" +
              yen(it.price) +
              "</span><button type=\"button\" class=\"btn-primary\" data-add=\"" +
              esc(it.id) +
              "\">追加</button></div>" +
              "</section>"
            );
          })
          .join("");
        el.querySelectorAll("[data-add]").forEach((b) => {
          b.onclick = () => {
            const id = b.getAttribute("data-add");
            const it = findItem(id);
            if (!it) return;
            const cur =
              cart.get(id) || { menuItemId: id, name: it.name, unitPrice: Number(it.price || 0), qty: 0 };
            cur.qty += 1;
            cart.set(id, cur);
            setMsg("", "");
            renderAllCartUis();
            toast(it.name + " を追加");
          };
        });
      }

      function findItem(id) {
        for (const c of (menuData && menuData.categories) || []) {
          for (const it of c.items || []) if (it.id === id) return it;
        }
        return null;
      }

      function openCartSheet() {
        renderAllCartUis();
        openSheet("cartSheet");
      }
      function closeCartSheet() {
        closeSheet("cartSheet");
      }
      function openCheckoutSheet() {
        const rows = cartRows();
        if (!rows.length) {
          setMsg("err", "カートが空です");
          return;
        }
        const p = readProfile();
        const nameEl = document.getElementById("name");
        const phoneEl = document.getElementById("phone");
        const emailEl = document.getElementById("email");
        if (nameEl && !nameEl.value) nameEl.value = p.name || "";
        if (phoneEl && !phoneEl.value) phoneEl.value = p.phone || "";
        if (emailEl && !emailEl.value) emailEl.value = p.email || "";
        renderAllCartUis();
        closeCartSheet();
        openSheet("checkoutSheet");
      }
      function closeCheckoutSheet() {
        closeSheet("checkoutSheet");
      }

      document.getElementById("btnCart").onclick = () => openCartSheet();
      document.getElementById("cartFooterInfo").onclick = () => openCartSheet();
      document.getElementById("btnCheckout").onclick = () => openCheckoutSheet();
      document.getElementById("cartSheetCheckoutBtn").onclick = () => openCheckoutSheet();

      document.getElementById("cartSheetClose").onclick = () => closeCartSheet();
      document.getElementById("cartSheetBg").onclick = () => closeCartSheet();
      document.getElementById("checkoutSheetClose").onclick = () => closeCheckoutSheet();
      document.getElementById("checkoutSheetBg").onclick = () => closeCheckoutSheet();

      document.getElementById("btnSubmit").onclick = async () => {
        try {
          setMsg("", "");
          const pickupAt = document.getElementById("pickupAt").value;
          const customerName = document.getElementById("name").value.trim();
          const phone = document.getElementById("phone").value.trim();
          const email = document.getElementById("email").value.trim();
          const note = document.getElementById("note").value;
          const lines = cartRows().map((x) => ({ menuItemId: x.menuItemId, qty: x.qty }));

          if (!lines.length) return setMsg("err", "カートが空です");
          if (!pickupAt) return setMsg("err", "受取日時を入力してください");
          if (!customerName) return setMsg("err", "お名前を入力してください");
          if (!phone) return setMsg("err", "電話番号を入力してください");
          if (!email) return setMsg("err", "メールアドレスを入力してください");

          const btn = document.getElementById("btnSubmit");
          btn.disabled = true;
          await api("/takeout/" + encodeURIComponent(STORE_ID) + "/orders", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ pickupAt, customerName, phone, email, note, lines }),
          });

          writeProfile({ name: customerName, phone, email });
          cart.clear();
          renderAllCartUis();
          closeCheckoutSheet();
          setMsg("ok", "注文を受け付けました。店頭でのお支払いになります。");
        } catch (e) {
          setMsg("err", String((e && e.message) || e));
        } finally {
          const btn = document.getElementById("btnSubmit");
          if (btn) btn.disabled = false;
        }
      };

      async function load() {
        const data = await api("/takeout/" + encodeURIComponent(STORE_ID) + "/menu");
        menuData = data;
        document.getElementById("title").textContent = esc(menuData.store.name) + " / テイクアウト注文";
        renderTabs();
        renderMenu();
        renderAllCartUis();
      }

      load().catch((e) => setMsg("err", String((e && e.message) || e)));
    </script>
  </body>
</html>
