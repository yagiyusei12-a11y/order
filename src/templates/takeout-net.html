<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>テイクアウト注文</title>
    <style>
      :root {
        --bg: #0b1020;
        --surface: rgba(255, 255, 255, 0.06);
        --surface2: rgba(255, 255, 255, 0.08);
        --line: rgba(255, 255, 255, 0.14);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.72);
        --accent: #fb923c;
        --accent2: #f97316;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          "Noto Sans JP",
          "Hiragino Sans",
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(840px 520px at 12% 0%, rgba(249, 115, 22, 0.16), transparent 60%),
          radial-gradient(920px 620px at 100% 20%, rgba(56, 189, 248, 0.12), transparent 55%),
          var(--bg);
      }
      a {
        color: inherit;
      }
      .muted {
        color: var(--muted);
      }
      .go-topbar {
        position: sticky;
        top: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        padding: 0.85rem 0.85rem;
        padding-top: max(0.85rem, env(safe-area-inset-top));
        backdrop-filter: blur(10px);
        background: rgba(0, 0, 0, 0.25);
        border-bottom: 1px solid var(--line);
      }
      .go-brand h1 {
        margin: 0;
        font-size: 1rem;
        font-weight: 900;
        letter-spacing: 0.02em;
      }
      .go-brand .sub {
        margin-top: 0.15rem;
        font-size: 0.76rem;
        color: var(--muted);
      }
      .go-topicons {
        display: flex;
        align-items: center;
        gap: 0.35rem;
      }
      .go-iconbtn {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .go-iconbtn svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .go-tabs-wrap {
        position: sticky;
        top: 64px;
        z-index: 20;
        background: rgba(0, 0, 0, 0.12);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--line);
      }
      .go-tabs {
        display: flex;
        gap: 0.4rem;
        padding: 0.6rem 0.75rem;
        overflow: auto;
      }
      .go-tab {
        white-space: nowrap;
        padding: 0.38rem 0.7rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-size: 0.82rem;
        cursor: pointer;
      }
      .go-tab.is-active {
        background: rgba(249, 115, 22, 0.18);
        border-color: rgba(249, 115, 22, 0.45);
        color: rgba(255, 255, 255, 0.92);
        font-weight: 800;
      }
      .go-menu-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.65rem;
        padding: 0.85rem 0.85rem 6.4rem;
        padding-bottom: calc(6.4rem + env(safe-area-inset-bottom));
      }
      @media (min-width: 560px) {
        .go-menu-grid {
          grid-template-columns: 1fr 1fr;
        }
      }
      .go-card {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.06);
        padding: 0.75rem;
      }
      .go-card .ttl {
        font-weight: 900;
        letter-spacing: 0.01em;
      }
      .go-card .desc {
        color: var(--muted);
        font-size: 0.78rem;
        line-height: 1.35;
        margin-top: 0.25rem;
        white-space: pre-wrap;
      }
      .go-card .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        margin-top: 0.55rem;
      }
      .go-card .img {
        width: 100%;
        aspect-ratio: 1.6;
        object-fit: cover;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.10);
        margin-bottom: 0.55rem;
        background: rgba(0, 0, 0, 0.15);
      }
      /* 商品詳細シートは .go-card 外のため別指定（大画像のはみ出し防止） */
      .sheet-body .img {
        width: 100%;
        max-height: min(42vh, 320px);
        aspect-ratio: 1.6;
        object-fit: cover;
        object-position: center;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        margin-bottom: 0.55rem;
        background: rgba(0, 0, 0, 0.15);
        display: block;
      }
      .pill {
        font-size: 0.78rem;
        padding: 0.2rem 0.5rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.12);
        color: rgba(255, 255, 255, 0.88);
      }
      button {
        font: inherit;
      }
      .btn-primary {
        border: none;
        border-radius: 12px;
        padding: 0.55rem 0.8rem;
        color: #0b1020;
        font-weight: 900;
        cursor: pointer;
        background: linear-gradient(180deg, var(--accent), var(--accent2));
      }
      .btn-ghost {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.52rem 0.75rem;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        cursor: pointer;
      }
      .go-cart {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.65rem;
        padding: 0.75rem 0.85rem;
        padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
        background: rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(10px);
        border-top: 1px solid var(--line);
      }
      .go-cart .info {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 0.12rem;
        cursor: pointer;
      }
      .go-cart .count {
        font-weight: 900;
      }
      .go-cart .sum {
        color: var(--muted);
        font-size: 0.86rem;
      }
      .go-cart .submit {
        min-width: 110px;
      }
      .go-cart .submit[disabled] {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .toast {
        position: fixed;
        left: 50%;
        bottom: 86px;
        transform: translateX(-50%);
        z-index: 60;
        padding: 0.55rem 0.75rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.6);
        color: rgba(255, 255, 255, 0.92);
        font-size: 0.82rem;
        max-width: min(92vw, 520px);
        text-align: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.18s;
      }
      .toast.is-on {
        opacity: 1;
      }
      .sheet {
        position: fixed;
        inset: 0;
        z-index: 70;
        display: none;
      }
      .sheet.is-on {
        display: block;
      }
      .sheet-bg {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
      }
      .sheet-panel {
        position: absolute;
        left: 50%;
        bottom: 0;
        transform: translateX(-50%);
        width: min(720px, 100%);
        max-height: min(86vh, 760px);
        border-radius: 18px 18px 0 0;
        background: rgba(20, 24, 40, 0.98);
        border: 1px solid var(--line);
        overflow: hidden;
      }
      .sheet-head {
        position: sticky;
        top: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        padding: 0.85rem 0.9rem;
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--line);
      }
      .sheet-title {
        margin: 0;
        font-size: 1rem;
        font-weight: 900;
      }
      .sheet-close {
        width: 38px;
        height: 38px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        cursor: pointer;
      }
      .sheet-body {
        padding: 0.85rem 0.9rem 6.2rem;
        overflow: auto;
        max-height: min(86vh, 760px);
      }
      .sheet-bar {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.65rem;
        padding: 0.75rem 0.9rem;
        padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
        background: rgba(0, 0, 0, 0.55);
        border-top: 1px solid var(--line);
      }
      .sheet-sum {
        font-weight: 900;
      }
      label {
        display: block;
        margin: 0.55rem 0 0.25rem;
        font-size: 0.8rem;
        color: var(--muted);
      }
      input,
      textarea {
        width: 100%;
        padding: 0.55rem 0.65rem;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font: inherit;
      }
      textarea {
        min-height: 74px;
        resize: vertical;
      }
      .cart-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.65rem;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding: 0.65rem 0;
      }
      .cart-line:first-child {
        border-top: none;
        padding-top: 0;
      }
      .cart-line .nm {
        font-weight: 900;
      }
      .cart-line .sub {
        color: var(--muted);
        font-size: 0.76rem;
        margin-top: 0.12rem;
      }
      .qty {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
      }
      .qty button {
        width: 34px;
        height: 34px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        cursor: pointer;
      }
      .ok {
        border: 1px solid rgba(34, 197, 94, 0.45);
        background: rgba(34, 197, 94, 0.16);
        padding: 0.7rem;
        border-radius: 14px;
        margin-top: 0.65rem;
      }
      .err {
        border: 1px solid rgba(244, 63, 94, 0.45);
        background: rgba(244, 63, 94, 0.14);
        padding: 0.7rem;
        border-radius: 14px;
        margin-top: 0.65rem;
      }
      .desktop-shell {
        display: block;
      }
      .desktop-cats,
      .desktop-cart {
        display: none;
      }
      @media (min-width: 1000px) {
        .go-tabs-wrap {
          display: none;
        }
        .desktop-shell {
          display: grid;
          grid-template-columns: 220px 1fr 360px;
          gap: 0.85rem;
          padding: 0.85rem;
          padding-bottom: 1.2rem;
        }
        .desktop-cats,
        .desktop-cart {
          display: block;
        }
        .go-menu-grid {
          padding: 0;
          grid-template-columns: 1fr 1fr;
        }
        .go-cart {
          display: none;
        }
        #msg {
          padding: 0 0.85rem 0.35rem;
        }
      }
      .cat-list {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.06);
        padding: 0.35rem;
        overflow: auto;
        max-height: calc(100vh - 140px);
      }
      .cat-btn {
        width: 100%;
        text-align: left;
        border: 1px solid transparent;
        background: transparent;
        color: var(--muted);
        padding: 0.55rem 0.65rem;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 800;
      }
      .cat-btn.is-on {
        background: rgba(249, 115, 22, 0.18);
        border-color: rgba(249, 115, 22, 0.45);
        color: rgba(255, 255, 255, 0.92);
      }
      .desktop-cart {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        max-height: calc(100vh - 140px);
      }
      .desktop-cart-head {
        padding: 0.75rem 0.85rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        font-weight: 900;
      }
      .desktop-cart-body {
        padding: 0.75rem 0.85rem;
        overflow: auto;
        flex: 1;
      }
      .desktop-cart-bar {
        padding: 0.75rem 0.85rem;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.65rem;
      }
      .pickup-candidates {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        margin: 0.35rem 0 0.55rem;
      }
      .pickup-candidates button {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        border-radius: 999px;
        padding: 0.35rem 0.55rem;
        cursor: pointer;
        font-size: 0.78rem;
        font-weight: 800;
      }
      #takeoutOrderGateBanner {
        display: none;
        margin: 0;
        padding: 0.65rem 0.85rem;
        background: rgba(185, 28, 28, 0.35);
        border-bottom: 1px solid rgba(254, 202, 202, 0.35);
        color: #fecaca;
        font-size: 0.85rem;
        font-weight: 800;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header class="go-topbar">
      <div class="go-topicons">
        <button type="button" class="go-iconbtn" id="btnCart" aria-label="カートを開く" title="カートを開く">
          <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M3 10h18"/></svg>
        </button>
      </div>
      <div class="go-brand">
        <h1 id="title">テイクアウト注文</h1>
        <div class="sub" id="subTitle">税率8%（店頭支払い）</div>
      </div>
      <div class="go-topicons">
        <span class="pill" style="border:1px solid var(--line);padding:.2rem .5rem;border-radius:999px;background:rgba(255,255,255,.04);font-size:.76rem">8%</span>
      </div>
    </header>

    <div id="takeoutOrderGateBanner" role="alert"></div>

    <div id="msg" style="padding: 0.75rem 0.85rem"></div>

    <div class="desktop-shell">
      <aside class="desktop-cats">
        <div class="cat-list" id="catList"></div>
      </aside>
      <main>
        <div class="go-tabs-wrap">
          <div class="go-tabs" id="catTabs"></div>
        </div>
        <div id="menu" class="go-menu-grid"></div>
      </main>
      <aside class="desktop-cart">
        <div class="desktop-cart-head">カート</div>
        <div class="desktop-cart-body" id="desktopCartLines"></div>
        <div class="desktop-cart-bar">
          <div class="sheet-sum" id="desktopCartSum">¥0</div>
          <button class="btn-primary" id="desktopCheckoutBtn" type="button">注文する</button>
        </div>
      </aside>
    </div>

    <footer class="go-cart" id="cartFooter">
      <div class="info" id="cartFooterInfo" role="button" tabindex="0" aria-label="カートを開く">
        <div class="count" id="cartCount">カート 0点</div>
        <div class="sum" id="cartSum">¥0</div>
      </div>
      <button class="btn-primary submit" id="btnCheckout" disabled type="button">注文する</button>
    </footer>
    <div class="toast" id="toast"></div>

    <div id="cartSheet" class="sheet" aria-hidden="true">
      <div class="sheet-bg" id="cartSheetBg" tabindex="-1"></div>
      <div class="sheet-panel" role="dialog" aria-modal="true" aria-labelledby="cartSheetTitle">
        <div class="sheet-head">
          <h2 class="sheet-title" id="cartSheetTitle">カート</h2>
          <button class="sheet-close" type="button" id="cartSheetClose" aria-label="閉じる">×</button>
        </div>
        <div class="sheet-body">
          <div id="cartLines"></div>
          <div class="muted" style="font-size:.74rem;line-height:1.35;margin-top:.65rem">
            お客様情報・受取日時は「注文する」押下後に入力します。
          </div>
        </div>
        <div class="sheet-bar">
          <div class="sheet-sum" id="cartSheetSum">¥0</div>
          <button class="btn-primary" id="cartSheetCheckoutBtn" type="button">注文する</button>
        </div>
      </div>
    </div>

    <div id="detailSheet" class="sheet" aria-hidden="true">
      <div class="sheet-bg" id="detailSheetBg" tabindex="-1"></div>
      <div class="sheet-panel" role="dialog" aria-modal="true" aria-labelledby="detailSheetTitle">
        <div class="sheet-head">
          <h2 class="sheet-title" id="detailSheetTitle">商品</h2>
          <button class="sheet-close" type="button" id="detailSheetClose" aria-label="閉じる">×</button>
        </div>
        <div class="sheet-body" id="detailSheetBody"></div>
        <div class="sheet-bar">
          <div class="sheet-sum" id="detailSheetSum">¥0</div>
          <button class="btn-primary" id="detailSheetAddBtn" type="button">カートに入れる</button>
        </div>
      </div>
    </div>

    <div id="checkoutSheet" class="sheet" aria-hidden="true">
      <div class="sheet-bg" id="checkoutSheetBg" tabindex="-1"></div>
      <div class="sheet-panel" role="dialog" aria-modal="true" aria-labelledby="checkoutSheetTitle">
        <div class="sheet-head">
          <h2 class="sheet-title" id="checkoutSheetTitle">ご注文手続き</h2>
          <button class="sheet-close" type="button" id="checkoutSheetClose" aria-label="閉じる">×</button>
        </div>
        <div class="sheet-body">
          <div class="muted" style="font-size:.78rem;line-height:1.35;margin-top:-0.1rem">
            受取日時・お客様情報は必須です（確認の連絡に使用します）
          </div>
          <div id="checkoutSheetErr" class="err" style="display:none;margin-top:0.55rem" role="alert"></div>

          <label for="pickupAt">受取日時</label>
          <div class="pickup-candidates" id="pickupCandidates"></div>
          <input id="pickupAt" type="datetime-local" />

          <label for="name">お名前</label>
          <input id="name" type="text" autocomplete="name" maxlength="100" placeholder="例）山田 太郎" />

          <label for="phone">電話番号</label>
          <input id="phone" type="tel" autocomplete="tel" maxlength="20" placeholder="例）09012345678" />

          <label for="email">メールアドレス</label>
          <input id="email" type="email" autocomplete="email" maxlength="200" placeholder="例）taro@example.com" />

          <label for="note">備考（任意）</label>
          <textarea id="note" placeholder="アレルギー・到着予定など"></textarea>

          <div style="margin-top:.75rem;border-top:1px solid rgba(255,255,255,.1);padding-top:.75rem">
            <div style="font-weight:900;margin-bottom:.4rem">注文内容</div>
            <div id="checkoutLines"></div>
          </div>
        </div>
        <div class="sheet-bar">
          <div class="sheet-sum" id="checkoutSum">¥0</div>
          <button class="btn-primary" id="btnSubmit" type="button">確定</button>
        </div>
      </div>
    </div>

    <script>
      const STORE_ID = __STORE_ID_JS__;
      const PROFILE_KEY = "order-customer-profile-v1";

      const api = (path, opt) =>
        fetch(path, opt).then(async (r) => {
          const rawText = await r.text();
          let j = {};
          if (rawText) {
            try {
              j = JSON.parse(rawText);
            } catch (_) {
              j = {};
            }
          }
          if (!r.ok) {
            const fromJson =
              (typeof j.error === "string" && j.error.trim()) ||
              (typeof j.message === "string" && j.message.trim()) ||
              "";
            const human =
              fromJson ||
              (r.status >= 500
                ? "サーバーで処理できませんでした。時間をおいて再度お試しください。"
                : r.statusText && r.statusText !== "error"
                  ? r.statusText
                  : "リクエストに失敗しました（" + r.status + "）");
            throw new Error(human);
          }
          return j;
        });

      /**
       * @type {Map<string, {
       *   cartKey: string,
       *   menuItemId: string,
       *   sellKind: string,
       *   name: string,
       *   unitPrice: number,
       *   qty: number,
       *   optionSelections?: any[],
       *   setSelections?: any[],
       *   setComponentOptionSelections?: any[],
       * }>}
       */
      const cart = new Map();
      let menuData = null;
      let takeoutGateBlocked = false;
      let activeCatId = "";
      let activeDetailItemId = "";
      let activeDetailSellKind = "";
      /** メニューAPIの税込価格を税抜表示に変換するか（伝票計算は税込のまま） */
      let takeoutPriceDisplayExclusive = false;
      let takeoutTaxRatePercent = 8;

      function yen(n) {
        return "¥" + Number(n || 0).toLocaleString("ja-JP");
      }

      function takeoutNetFromInclusive(inc) {
        const p = Number(inc || 0);
        const r = Math.max(0, Number(takeoutTaxRatePercent) || 8);
        return Math.round(p / (1 + r / 100));
      }

      /** API由来の税込円を画面表示用に整形（設定が税抜なら税抜に換算） */
      function yenTakeout(inclusiveYen) {
        const v = takeoutPriceDisplayExclusive ? takeoutNetFromInclusive(inclusiveYen) : Number(inclusiveYen || 0);
        return yen(v);
      }

      /** オプション差額など税込円の増分を表示用に */
      function deltaYenTakeout(inclusiveDelta) {
        const d = Number(inclusiveDelta || 0);
        if (d <= 0) return "+0円";
        const v = takeoutPriceDisplayExclusive ? takeoutNetFromInclusive(d) : d;
        return "+" + Number(v).toLocaleString("ja-JP") + "円";
      }
      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function toast(t) {
        const el = document.getElementById("toast");
        if (!el) return;
        el.textContent = t || "";
        el.classList.toggle("is-on", !!t);

          return {

              phone: String(next.phone || "").trim().slice(0, 30),

              "<div class=\"nm\">" +

              "</div>" +
              "<div class=\"sub\">" +

      function toJstParts(d) {
        const fmt = new Intl.DateTimeFormat("ja-JP", {
          timeZone: (menuData && menuData.timezone) || "Asia/Tokyo",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
        });
        const parts = fmt.formatToParts(d);
        const by = Object.fromEntries(parts.map((p) => [p.type, p.value]));
        return {
          y: by.year,
          m: by.month,
          d: by.day,
          hh: by.hour,
          mm: by.minute,
        };
      }

      function buildPickupCandidates() {
        const host = document.getElementById("pickupCandidates");
        if (!host) return;
        host.innerHTML = "";
        const wins = (menuData && menuData.pickupTimeWindows) || [];
        if (!Array.isArray(wins) || wins.length === 0) {
          host.innerHTML = "<span class=\"muted\" style=\"font-size:.76rem\">（候補が未設定です）</span>";
          return;
        }
        const now = new Date();
        const stepMin = 15;
        const leadMin = Math.max(
          0,
          Number((menuData && menuData.takeoutPickupMinLeadMinutes) != null
            ? menuData.takeoutPickupMinLeadMinutes
            : 2),
        );
        const candidates = [];
        for (let dayOffset = 0; dayOffset <= 1; dayOffset++) {
          const base = new Date(now.getTime() + dayOffset * 24 * 60 * 60 * 1000);
          for (const w of wins) {
            const s = Number(w.startMin || 0);
            const e = Number(w.endMin || 0);
            const spans = [];
            if (e > s) spans.push({ start: s, end: e });
            else {
              spans.push({ start: s, end: 1440 });
              spans.push({ start: 0, end: e });
            }
            for (const sp of spans) {
              for (let m = sp.start; m <= sp.end; m += stepMin) {
                const hh = Math.floor(m / 60);
                const mm = m % 60;
                const dt = new Date(base);
                dt.setHours(hh, mm, 0, 0);
                if (dt.getTime() <= now.getTime() + leadMin * 60 * 1000) continue;
                candidates.push(dt);
              }
            }
          }
        }
        const uniq = new Map();
        for (const dt of candidates) {
          const p = toJstParts(dt);
          const key = `${p.y}-${p.m}-${p.d}T${p.hh}:${p.mm}`;
          if (!uniq.has(key)) uniq.set(key, { key, dt });
        }
        const rows = [...uniq.values()].sort((a, b) => a.dt.getTime() - b.dt.getTime()).slice(0, 24);
        if (!rows.length) {
          host.innerHTML = "<span class=\"muted\" style=\"font-size:.76rem\">（候補がありません）</span>";
          return;
        }
        host.innerHTML = rows
          .map((r) => {
            const p = toJstParts(r.dt);
            const lab = `${Number(p.m)}/${Number(p.d)} ${p.hh}:${p.mm}`;
            return "<button type=\"button\" data-pickup=\"" + esc(r.key) + "\">" + esc(lab) + "</button>";
          })
          .join("");
        host.querySelectorAll("[data-pickup]").forEach((b) => {
          b.onclick = () => {
            const v = b.getAttribute("data-pickup");
            const inp = document.getElementById("pickupAt");
            if (inp) inp.value = v;
          };
        });
      }

        const el = document.getElementById("catTabs");

        el.innerHTML = "";

      function renderMenu() {
        const el = document.getElementById("menu");
        if (!el) return;

        const cats = menuData.categories || [];
        const rows = [];

          return;
        }
        el.innerHTML = rows

            return (
              "<section class=\"go-card\" data-cat=\"" +

              "\">" +
              imgHtml +

      function findItem(id) {
        for (const c of (menuData && menuData.categories) || []) {
          for (const it of c.items || []) if (it.id === id) return it;
        }
        return null;
      }

      function stableOptionKey(optionSelections) {
        const arr = Array.isArray(optionSelections) ? optionSelections : [];
        const parts = arr
          .map((r) => ({
            gid: String(r.optionGroupId || ""),
            ids: (Array.isArray(r.optionItemIds) ? r.optionItemIds : []).map(String).sort(),
          }))
          .sort((a, b) => a.gid.localeCompare(b.gid));
        return JSON.stringify(parts);
      }

      function stableSetKey(setSelections, serveLaterDeferStepId, setComponentOptionSelections) {
        const ss = Array.isArray(setSelections) ? setSelections : [];
        const s0 = ss
          .map((r) => ({
            stepId: String(r.stepId || ""),
            menuItemIds: (Array.isArray(r.menuItemIds) ? r.menuItemIds : []).map(String).sort(),
          }))
          .sort((a, b) => a.stepId.localeCompare(b.stepId));
        const sc = Array.isArray(setComponentOptionSelections)
          ? setComponentOptionSelections
              .map((r) => ({
                stepId: String(r.stepId || ""),
                menuItemId: String(r.menuItemId || ""),
                optionSelections: Array.isArray(r.optionSelections) ? r.optionSelections : [],
              }))
              .sort((a, b) => (a.stepId + a.menuItemId).localeCompare(b.stepId + b.menuItemId))
              .map((r) => ({
                stepId: r.stepId,
                menuItemId: r.menuItemId,
                k: stableOptionKey(r.optionSelections),
              }))
          : [];
        return JSON.stringify({ s0, sc, sl: serveLaterDeferStepId || "" });
      }

      function computeSingleUnitPrice(item, optionSelections) {
        let sum = Number(item.price || 0);
        const groups = Array.isArray(item.optionGroups) ? item.optionGroups : [];
        for (const g of groups) {
          const row = (optionSelections || []).find((x) => x.optionGroupId === g.id);
          const ids = row && Array.isArray(row.optionItemIds) ? row.optionItemIds : [];
          for (const id of ids) {
            const oi = (g.items || []).find((x) => x.id === id);
            if (oi) sum += Number(oi.priceDelta || 0);
          }
        }
        return sum;
      }

      function computeSetUnitPrice(item, setSelections, setComponentOptionSelections) {
        let sum = Number(item.price || 0);
        const steps = Array.isArray(item.setSteps) ? item.setSteps : [];
        const byStep = new Map();
        for (const row of setSelections || []) {
          if (!row || !row.stepId) continue;
          byStep.set(String(row.stepId), Array.isArray(row.menuItemIds) ? row.menuItemIds.map(String) : []);
        }
        for (const st of steps) {
          const picked = byStep.get(st.id) || [];
          const chs = (st.choices || []).filter((c) => picked.includes(c.menuItemId));
          for (const ch of chs) sum += Number(ch.extraPrice || 0);
        }
        // component options
        const compOpts = Array.isArray(setComponentOptionSelections) ? setComponentOptionSelections : [];
        for (const row of compOpts) {
          if (!row || !row.stepId || !row.menuItemId) continue;
          const st = steps.find((s) => s.id === row.stepId);
          const ch = st && (st.choices || []).find((c) => c.menuItemId === row.menuItemId);
          if (!ch || !Array.isArray(ch.optionGroups)) continue;
          for (const g of ch.optionGroups) {
            const sel = (row.optionSelections || []).find((x) => x.optionGroupId === g.id);
            const ids = sel && Array.isArray(sel.optionItemIds) ? sel.optionItemIds : [];
            for (const id of ids) {
              const oi = (g.items || []).find((x) => x.id === id);
              if (oi) sum += Number(oi.priceDelta || 0);
            }
          }
        }
        return sum;
      }

      function collectOptionSelections(panel, item) {
        const out = [];
        for (const g of item.optionGroups || []) {
          const useRadio = Number(g.maxSelect || 1) <= 1;
          let ids = [];
          if (useRadio) {
            const r = panel.querySelector("input[type=radio][name=\"og-" + esc(g.id) + "\"]:checked");
            if (r && r.value) ids = [r.value];
          } else {
            ids = [...panel.querySelectorAll("input[type=checkbox][name=\"ogcb-" + esc(g.id) + "\"]:checked")].map(
              (x) => x.value
            );
          }
          out.push({ optionGroupId: g.id, optionItemIds: ids });
        }
        return out;
      }

      function collectSetSelections(panel, item) {
        const out = [];
        for (const st of item.setSteps || []) {
          const ids = [
            ...panel.querySelectorAll("input[type=checkbox][name=\"st-" + esc(st.id) + "\"]:checked"),
          ].map((x) => x.value);
          out.push({ stepId: st.id, menuItemIds: ids });
        }
        return out;
      }

      function collectSetComponentOptionSelections(panel, item, setSelections) {
        const out = [];
        const byStep = new Map();
        for (const row of setSelections || []) byStep.set(row.stepId, row.menuItemIds || []);
        for (const st of item.setSteps || []) {
          const picked = byStep.get(st.id) || [];
          for (const mid of picked) {
            const ch = (st.choices || []).find((c) => c.menuItemId === mid);
            if (!ch || !Array.isArray(ch.optionGroups) || ch.optionGroups.length === 0) continue;
            const optionSelections = [];
            for (const g of ch.optionGroups) {
              const useRadio = Number(g.maxSelect || 1) <= 1;
              let ids = [];
              if (useRadio) {
                const r = panel.querySelector(
                  "input[type=radio][name=\"copt-" + esc(st.id) + "-" + esc(mid) + "-" + esc(g.id) + "\"]:checked"
                );
                if (r && r.value) ids = [r.value];
              } else {
                ids = [
                  ...panel.querySelectorAll(
                    "input[type=checkbox][name=\"copt-" + esc(st.id) + "-" + esc(mid) + "-" + esc(g.id) + "\"]:checked"
                  ),
                ].map((x) => x.value);
              }
              optionSelections.push({ optionGroupId: g.id, optionItemIds: ids });
            }
            out.push({ stepId: st.id, menuItemId: mid, optionSelections });
          }
        }
        return out;
      }

      function validateOptionMinMax(item, optionSelections) {
        const groups = Array.isArray(item.optionGroups) ? item.optionGroups : [];
        for (const g of groups) {
          const row = (optionSelections || []).find((x) => x.optionGroupId === g.id);
          const n = row && Array.isArray(row.optionItemIds) ? row.optionItemIds.length : 0;
          const min = Number(g.minSelect || 0);
          const max = Number(g.maxSelect || 1);
          if (n < min || n > max) return "「" + (g.name || "オプション") + "」は" + min + "〜" + max + "個で選んでください";
        }
        return "";
      }

      function validateSetMinMax(item, setSelections) {
        const steps = Array.isArray(item.setSteps) ? item.setSteps : [];
        for (const st of steps) {
          const row = (setSelections || []).find((x) => x.stepId === st.id);
          const n = row && Array.isArray(row.menuItemIds) ? row.menuItemIds.length : 0;
          const min = Number(st.minPick || 0);
          const max = Number(st.maxPick || 0);
          if (n < min || n > max) return "「" + (st.label || "項目") + "」は" + min + "〜" + max + "個で選んでください";
        }
        return "";
      }

                html += "<div style=\"margin:.15rem 0 .35rem 1.8rem;padding-left:.45rem;border-left:2px solid rgba(255,255,255,.12)\">";
                for (const g of ch.optionGroups) {
                  const req = Number(g.minSelect || 0) > 0;
                  html +=
                    "<div class=\"muted\" style=\"font-size:.74rem;margin:.25rem 0\">" +
                    esc((req ? "(必須) " : "") + (g.name || "")) +
                    " " +
                    Number(g.minSelect || 0) +
                    "〜" +
                    Number(g.maxSelect || 1) +
                    "個</div>";
                  const useRadio = Number(g.maxSelect || 1) <= 1;
                  for (const oi of g.items || []) {
                    const delta = Number(oi.priceDelta || 0);
                    const priceTxt = delta > 0 ? deltaYenTakeout(delta) : "+0円";
                    if (useRadio) {
                      html +=
                        "<label class=\"row\" style=\"align-items:center;gap:.45rem;margin:.28rem 0\"><input type=\"radio\" name=\"copt-" +
                        esc(st.id) +
                        "-" +
                        esc(ch.menuItemId) +
                        "-" +
                        esc(g.id) +
                        "\" value=\"" +
                        esc(oi.id) +
                        "\" /> <span style=\"flex:1\">" +
                        esc(oi.name || "") +
                        "</span><span class=\"muted\" style=\"font-size:.76rem\">" +
                        priceTxt +
                        "</span></label>";
                    } else {
                      html +=
                        "<label class=\"row\" style=\"align-items:center;gap:.45rem;margin:.28rem 0\"><input type=\"checkbox\" name=\"copt-" +
                        esc(st.id) +
                        "-" +
                        esc(ch.menuItemId) +
                        "-" +
                        esc(g.id) +
                        "\" value=\"" +
                        esc(oi.id) +
                        "\" /> <span style=\"flex:1\">" +
                        esc(oi.name || "") +
                        "</span><span class=\"muted\" style=\"font-size:.76rem\">" +
                        priceTxt +
                        "</span></label>";
                    }
                  }
                }
                html += "</div>";
              }
            }
            html += "</div>";
          }
          html += "</div>";
        }

        body.innerHTML = html;
        updateDetailAddPrice();
        openSheet("detailSheet");
      }

      function updateDetailAddPrice() {
        const item = findItem(activeDetailItemId);
        if (!item) return;
        const panel = document.getElementById("detailSheetBody");
        let unit = Number(item.price || 0);
        if (activeDetailSellKind === "single") {
          const opt = collectOptionSelections(panel, item);
          unit = computeSingleUnitPrice(item, opt);
        } else {
          const sel = collectSetSelections(panel, item);
          const compOpt = collectSetComponentOptionSelections(panel, item, sel);
          unit = computeSetUnitPrice(item, sel, compOpt);
        }
        document.getElementById("detailSheetSum").textContent = yenTakeout(unit);
      }

      function openCartSheet() {
        renderAllCartUis();
        openSheet("cartSheet");
      }
      function closeCartSheet() {
        closeSheet("cartSheet");
      }
      function openCheckoutSheet() {
        const rows = cartRows();
        if (!rows.length) {
          setMsg("err", "カートが空です");
          return;
        }
        setCheckoutErr("");
        const p = readProfile();
        const nameEl = document.getElementById("name");
        const phoneEl = document.getElementById("phone");
        const emailEl = document.getElementById("email");
        if (nameEl && !nameEl.value) nameEl.value = p.name || "";
        if (phoneEl && !phoneEl.value) phoneEl.value = p.phone || "";
        if (emailEl && !emailEl.value) emailEl.value = p.email || "";
        renderAllCartUis();
        buildPickupCandidates();
        closeCartSheet();
        openSheet("checkoutSheet");
      }
      function closeCheckoutSheet() {
        closeSheet("checkoutSheet");
      }

      document.getElementById("btnCart").onclick = () => openCartSheet();
      document.getElementById("cartFooterInfo").onclick = () => openCartSheet();
      document.getElementById("btnCheckout").onclick = () => openCheckoutSheet();
      document.getElementById("cartSheetCheckoutBtn").onclick = () => openCheckoutSheet();
      const desktopCheckoutBtn = document.getElementById("desktopCheckoutBtn");
      if (desktopCheckoutBtn) desktopCheckoutBtn.onclick = () => openCheckoutSheet();

      document.getElementById("cartSheetClose").onclick = () => closeCartSheet();
      document.getElementById("cartSheetBg").onclick = () => closeCartSheet();
      document.getElementById("detailSheetClose").onclick = () => closeSheet("detailSheet");
      document.getElementById("detailSheetBg").onclick = () => closeSheet("detailSheet");
      document.getElementById("checkoutSheetClose").onclick = () => closeCheckoutSheet();
      document.getElementById("checkoutSheetBg").onclick = () => closeCheckoutSheet();

      document.getElementById("detailSheetBody").onchange = () => updateDetailAddPrice();
      document.getElementById("detailSheetAddBtn").onclick = () => {
        try {
          const item = findItem(activeDetailItemId);
          if (!item) return;
          const panel = document.getElementById("detailSheetBody");
          if (activeDetailSellKind === "single") {
            const optionSelections = collectOptionSelections(panel, item);
            const err = validateOptionMinMax(item, optionSelections);
            if (err) return toast(err);
            const unitPrice = computeSingleUnitPrice(item, optionSelections);
            const cartKey = "o:" + item.id + ":" + stableOptionKey(optionSelections);
            const cur =
              cart.get(cartKey) || {
                cartKey,
                menuItemId: item.id,
                sellKind: "single",
                name: item.name,
                unitPrice,
                qty: 0,
                optionSelections,
              };
            cur.unitPrice = unitPrice;
            cur.optionSelections = optionSelections;
            cur.name = item.name;
            cur.qty += 1;
            cart.set(cartKey, cur);
          } else {
            const setSelections = collectSetSelections(panel, item);
            const err = validateSetMinMax(item, setSelections);
            if (err) return toast(err);
            const setComponentOptionSelections = collectSetComponentOptionSelections(panel, item, setSelections);
            // validate component options min/max
            for (const row of setComponentOptionSelections) {
              const st = (item.setSteps || []).find((x) => x.id === row.stepId);
              const ch = st && (st.choices || []).find((x) => x.menuItemId === row.menuItemId);
              if (!ch || !Array.isArray(ch.optionGroups)) continue;
              for (const g of ch.optionGroups) {
                const sel = (row.optionSelections || []).find((x) => x.optionGroupId === g.id);
                const n = sel && Array.isArray(sel.optionItemIds) ? sel.optionItemIds.length : 0;
                const min = Number(g.minSelect || 0);
                const max = Number(g.maxSelect || 1);
                if (n < min || n > max) return toast("「" + (ch.name || "構成単品") + "：" + (g.name || "オプション") + "」は" + min + "〜" + max + "個で選んでください");
              }
            }
            const unitPrice = computeSetUnitPrice(item, setSelections, setComponentOptionSelections);
            const cartKey = "s:" + item.id + ":" + stableSetKey(setSelections, "", setComponentOptionSelections);
            const cur =
              cart.get(cartKey) || {
                cartKey,
                menuItemId: item.id,
                sellKind: "set",
                name: item.name,
                unitPrice,
                qty: 0,
                setSelections,
                setComponentOptionSelections,
              };
            cur.unitPrice = unitPrice;
            cur.setSelections = setSelections;
            cur.setComponentOptionSelections = setComponentOptionSelections;
            cur.name = item.name;
            cur.qty += 1;
            cart.set(cartKey, cur);
          }
          setMsg("", "");
          renderAllCartUis();
          closeSheet("detailSheet");
          toast(item.name + " をカートに追加");
        } catch (e) {
          toast(String((e && e.message) || e));
        }
      };

      document.getElementById("btnSubmit").onclick = async () => {
        try {
          setMsg("", "");
          setCheckoutErr("");
          const pickupAt = document.getElementById("pickupAt").value;
          const customerName = document.getElementById("name").value.trim();
          const phone = document.getElementById("phone").value.trim();
          const email = document.getElementById("email").value.trim();
          const note = document.getElementById("note").value;
          const lines = cartRows().map((x) => {
            const o = { menuItemId: x.menuItemId, qty: x.qty };
            if (x.sellKind === "set" && x.setSelections) o.setSelections = x.setSelections;
            if (x.optionSelections && x.optionSelections.length) o.optionSelections = x.optionSelections;
            if (x.setComponentOptionSelections && x.setComponentOptionSelections.length) o.setComponentOptionSelections = x.setComponentOptionSelections;
            return o;
          });

          if (!lines.length) return setMsg("err", "カートが空です");
          if (!pickupAt) return setMsg("err", "受取日時を入力してください");
          if (!customerName) return setMsg("err", "お名前を入力してください");
          if (!phone) return setMsg("err", "電話番号を入力してください");
          if (!email) return setMsg("err", "メールアドレスを入力してください");

          const btn = document.getElementById("btnSubmit");
          btn.disabled = true;
          await api("/takeout/" + encodeURIComponent(STORE_ID) + "/orders", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ pickupAt, customerName, phone, email, note, lines }),
          });

          writeProfile({ name: customerName, phone, email });
          cart.clear();
          renderAllCartUis();
          closeCheckoutSheet();
          setCheckoutErr("");
          setMsg("ok", "注文を受け付けました。店頭でのお支払いになります。");
        } catch (e) {
          const errText = String((e && e.message) || e);
          setMsg("err", errText);
          setCheckoutErr(errText);
          toast(errText);
        } finally {
          const btn = document.getElementById("btnSubmit");
          if (btn) btn.disabled = takeoutGateBlocked;
        }
      };

      async function load() {
        const data = await api("/takeout/" + encodeURIComponent(STORE_ID) + "/menu");
        menuData = data;
        const og = data.orderGate;
        const gateBlocked = !!(og && og.acceptingOrders === false);
        takeoutGateBlocked = gateBlocked;
        const gateEl = document.getElementById("takeoutOrderGateBanner");
        if (gateEl) {
          if (gateBlocked && og.messageJa) {
            gateEl.textContent = og.messageJa;
            gateEl.style.display = "block";
          } else {
            gateEl.textContent = "";
            gateEl.style.display = "none";
          }
        }
        const chkSubmit = document.getElementById("btnSubmit");
        if (chkSubmit) chkSubmit.disabled = gateBlocked;
        takeoutPriceDisplayExclusive = menuData.takeoutNetPriceDisplayMode === "exclusive";
        takeoutTaxRatePercent = Number(menuData.taxRatePercent) || 8;
        document.getElementById("title").textContent = esc(menuData.store.name) + " / テイクアウト注文";
        const subEl = document.getElementById("subTitle");
        if (subEl) {
          subEl.textContent = takeoutPriceDisplayExclusive
            ? "税抜表示（お支払い時に消費税が加算されます）"
            : "税率" + takeoutTaxRatePercent + "%・税込表示（店頭支払い）";
        }
        renderTabs();
        renderDesktopCatList();
        renderMenu();
        renderAllCartUis();
      }

      load().catch((e) => setMsg("err", String((e && e.message) || e)));
    </script>
  </body>
</html>
